                          <svg className="progress-svg h-1.5" viewBox="0 0 100 1" preserveAspectRatio="none" aria-hidden>
                            <rect x="0" y="0" width={r * 100} height="1" className={meeting ? 'fill-bar-meet' : 'fill-bar-miss'} />
                          </svg>
                        </div>
                      </div>
                      <div className="col-span-1">
                        <span className={`font-ui text-sm font-semibold whitespace-nowrap ${meeting ? 'text-[var(--accent)]' : 'text-[var(--status-warn)]'}`}>
                          {delta >= 0 ? '+' : ''}{(delta*100).toFixed(1)} pts
                        </span>
                        <div className="font-ui text-[10px] text-[var(--muted)] whitespace-nowrap">target {(m.target*100).toFixed(0)}%</div>
                      </div>
                      <div className="col-span-1">
                        <span className={`font-ui text-xs flex items-center gap-1 whitespace-nowrap ${m.trend > 0 ? 'text-[var(--accent)]' : 'text-[var(--status-warn)]'}`}>
                          <Icon name={m.trend > 0 ? 'trending-up' : 'trending-down'} size={12} />
                          {m.trend > 0 ? '+' : ''}{m.trend}
                        </span>
                        {m.flag && <span className="text-[9px] bg-critical text-[var(--on-inverse)] px-1 py-0.5 tracking-wider uppercase">{m.flag}</span>}
                      </div>
                    </button>
                  );
                })}
              </div>
            </>
          )}
        </div>
      );
    }

    function MeasureDetail({ measure, members, allSystemMembers, onBack, onPickMember, phiVisible }) {
      // Scope toggle — defaults to "my" caseload (the conservative view that
      // helps a care manager focus on their own work). Director-style users
      // can flip to plan-wide to see every member with this gap across the
      // health plan. The button click flips state; the displayed roster +
      // count + sub-label all swap together so the context stays clear.
      const [scope, setScope] = useState('my'); // 'my' | 'plan'
      const planMembers = (allSystemMembers || members).filter(m => (m.gaps || []).includes(measure.code));
      const displayedMembers = scope === 'plan' ? planMembers : members;
      const r = rate(measure); const delta = performanceVsTarget(measure); const meeting = delta >= 0;
      return (
        <div>
          <button onClick={onBack}
            className="font-ui text-[11px] uppercase tracking-wider border hairline px-3 py-1.5 flex items-center gap-1.5 hover:bg-[var(--elevated)] hover:border-[var(--accent)] hover:text-[var(--accent)] text-[var(--text)] transition-colors rounded-sm mb-4"
            aria-label="Back to all measures">
            <Icon name="arrow-left" size={12} /> All measures
          </button>
          <div className="grid md:grid-cols-3 gap-8 mb-8">
            <div className="md:col-span-2">
              <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">Measure · {measure.code}</div>
              <h2 className="font-display text-4xl leading-tight font-medium">{measure.name}</h2>
              <div className="font-ui text-sm text-[var(--muted)] mt-3 flex flex-wrap items-center gap-3">
                <span className={`border px-2 py-1 text-[11px] tracking-wider uppercase ${lineStyle(measure.line)}`}>{measure.line}</span>
                <span>{measure.category}</span>
                <span className="text-[var(--dim)]">·</span>
                <span>Weight <strong>{measure.weight}×</strong></span>
                {measure.pharma && <span className="border border-[var(--accent)] text-[var(--accent)] px-2 py-1 text-[10px] tracking-wider uppercase">Pharmacy measure</span>}
                {measure.flag && <span className="bg-critical text-[var(--on-inverse)] px-2 py-1 text-[10px] tracking-wider uppercase">{measure.flag}</span>}
              </div>
            </div>
            <div className="border-2 hairline p-5 bg-[var(--surface)]">
              <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] mb-2">Rate</div>
              <div className="font-display num text-5xl font-medium">{(r*100).toFixed(1)}%</div>
              <div className="font-ui text-xs text-[var(--muted)] mt-1 num">{measure.num.toLocaleString()} of {measure.denom.toLocaleString()} compliant</div>
              <div className="h-3 border hairline bg-[var(--bg-secondary)] mt-3 overflow-hidden">
                <svg className="progress-svg h-3" viewBox="0 0 100 3" preserveAspectRatio="none" role="presentation">
                  <rect x="0" y="0" width={r * 100} height="3" className={meeting ? 'fill-bar-meet' : 'fill-bar-miss'} />
                  <rect x={measure.target * 100 - 0.25} y="0" width="0.5" height="3" className="fill-target-marker" />
                </svg>
              </div>
              <div className={`font-ui text-xs mt-2 ${meeting ? 'text-[var(--accent)]' : 'text-[var(--status-warn)]'}`}>
                Target {(measure.target*100).toFixed(0)}% — {meeting ? 'meeting' : 'below'} ({delta >= 0 ? '+' : ''}{(delta*100).toFixed(1)} pts)
              </div>
            </div>
          </div>
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-display text-2xl font-medium">Non-compliant members <span className="num text-[var(--muted)]">({displayedMembers.length})</span></h3>
            <div className="font-ui text-xs text-[var(--muted)] flex items-center gap-2">
              <span className={`w-2 h-2 rounded-full ${scope === 'my' ? 'bg-[var(--accent)]' : 'bg-[var(--status-warn)]'}`} />
              {scope === 'my'
                ? <>Showing your assigned members · <button className="underline hover:text-[var(--text)]" onClick={() => setScope('plan')}>Switch to plan-wide view</button></>
                : <>Showing all plan members with this gap ({planMembers.length}) · <button className="underline hover:text-[var(--text)]" onClick={() => setScope('my')}>Switch to my caseload</button></>}
            </div>
          </div>
          <MemberTable members={[...displayedMembers].sort((a,b) => {
            const pRank = { Critical: 0, High: 1, Medium: 2, Low: 3 };
            return pRank[a.priority] - pRank[b.priority] || b.risk - a.risk;
          }).slice(0, 30)} onPick={onPickMember} phiVisible={phiVisible} compact />
        </div>
      );
    }

    function Chip({ label, field, values, filters, setFilters, title }) {
      return (
        <div className="flex items-center gap-1" title={title || undefined}>
          <span className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)]">{label}</span>
          <select value={filters[field]} onChange={e => setFilters(prev => ({ ...prev, [field]: e.target.value }))}
            className="font-ui text-sm border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)] max-w-[22rem] truncate"
            title={typeof filters[field] === 'string' ? filters[field] : ''}>
            {values.map(v => {
              const isObj = v && typeof v === 'object';
              const val = isObj ? v.value : v;
              const lab = isObj ? v.label : v;
              return <option key={val} value={val} title={isObj && v.title ? v.title : undefined}>{lab}</option>;
            })}
          </select>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // PharmacyRosterCard — draggable, resizable floating panel that shows the
    // full member roster for a single pharmacy *location* (chain + branch
    // address). Launched from the worklist filter bar whenever a specific
    // pharmacy is selected. Position + size persist to localStorage so the
    // user's preferred placement carries between sessions.
    // ════════════════════════════════════════════════════════════════════════
    function PharmacyRosterCard({ location, members, onClose, onPick, phiVisible, getAssignee, currentUser, extraColIds = [], pharmaCols = null }) {
      const [pos, setPos] = useState(() => {
        const defW = Math.min(780, (typeof window !== 'undefined' ? window.innerWidth : 1200) - 40);
        const defH = Math.min(620, (typeof window !== 'undefined' ? window.innerHeight : 800) - 80);
        const defaults = {
          x: Math.max(20, Math.floor(((typeof window !== 'undefined' ? window.innerWidth : 1200) - defW) / 2)),
          y: Math.max(60, Math.floor(((typeof window !== 'undefined' ? window.innerHeight : 800) - defH) / 2)),
          w: defW, h: defH,
        };
        try {
          const saved = JSON.parse(localStorage.getItem('acm-pharm-roster-pos') || 'null');
          if (saved && Number.isFinite(saved.x) && Number.isFinite(saved.y) && Number.isFinite(saved.w) && Number.isFinite(saved.h)) {
            return {
              x: Math.max(0, Math.min(window.innerWidth - 120, saved.x)),
              y: Math.max(0, Math.min(window.innerHeight - 80,  saved.y)),
              w: Math.max(440, Math.min(window.innerWidth - 20, saved.w)),
              h: Math.max(300, Math.min(window.innerHeight - 40, saved.h)),
            };
          }
        } catch (e) {}
        return defaults;
      });



      useEffect(() => {
        try { localStorage.setItem('acm-pharm-roster-pos', JSON.stringify(pos)); } catch (e) {}
      }, [pos]);

      // Minimize collapses the card to just its drag header, so a care manager
      // can keep the roster visually parked while they reference other parts
      // of the screen, and one click restores the full table.
      const [minimized, setMinimized] = useState(() => {
        try { return localStorage.getItem('acm-pharm-roster-min') === '1'; } catch (e) { return false; }
      });
      useEffect(() => {
        try { localStorage.setItem('acm-pharm-roster-min', minimized ? '1' : '0'); } catch (e) {}
      }, [minimized]);

      // Drag header → reposition
      const dragRef = useRef(null);
      const onDragStart = (e) => {
        if (e.button !== 0) return;
        // Don't initiate drag from interactive children (close button, etc.)
        if (e.target.closest('button, a, input, select, textarea, [data-no-drag]')) return;
        e.preventDefault();
        dragRef.current = { sx: e.clientX, sy: e.clientY, bx: pos.x, by: pos.y };
        const move = (ev) => {
          if (!dragRef.current) return;
          const nx = dragRef.current.bx + (ev.clientX - dragRef.current.sx);
          const ny = dragRef.current.by + (ev.clientY - dragRef.current.sy);
          setPos(p => ({
            ...p,
            x: Math.max(0, Math.min(window.innerWidth  - 120, nx)),
            y: Math.max(0, Math.min(window.innerHeight - 60,  ny)),
          }));
        };
        const up = () => {
          dragRef.current = null;
          window.removeEventListener('mousemove', move);
          window.removeEventListener('mouseup',   up);
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup',   up);
      };

      // Multi-edge resize — a single factory builds handlers for all 8
      // resize zones (edges + corners). `edges` is an object with boolean
      // flags: { n, s, e, w } indicating which axes this zone controls.
      const resizeRef = useRef(null);
      const makeResizeHandler = (edges) => (e) => {
        e.preventDefault(); e.stopPropagation();
        resizeRef.current = {
          sx: e.clientX, sy: e.clientY,
          bx: pos.x, by: pos.y, bw: pos.w, bh: pos.h,
          edges,
        };
        const MIN_W = 440, MIN_H = 260;
        const move = (ev) => {
          if (!resizeRef.current) return;
          const { sx, sy, bx, by, bw, bh, edges: ed } = resizeRef.current;
          const dx = ev.clientX - sx;
          const dy = ev.clientY - sy;
          let nx = bx, ny = by, nw = bw, nh = bh;
          if (ed.e)  nw = Math.max(MIN_W, Math.min(window.innerWidth  - bx - 8, bw + dx));
          if (ed.s)  nh = Math.max(MIN_H, Math.min(window.innerHeight - by - 8, bh + dy));
          if (ed.w) { const raw = bw - dx; if (raw >= MIN_W) { nw = raw; nx = bx + dx; } }
          if (ed.n) { const raw = bh - dy; if (raw >= MIN_H) { nh = raw; ny = by + dy; } }
          setPos({ x: nx, y: ny, w: nw, h: nh });
        };
        const up = () => {
          resizeRef.current = null;
          window.removeEventListener('mousemove', move);
          window.removeEventListener('mouseup',   up);
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup',   up);
      };
      // Convenience aliases used in JSX
      const onResizeStart = makeResizeHandler({ s: true, e: true }); // bottom-right (original)

      // Esc to close
      useEffect(() => {
        const h = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [onClose]);

      // Ownership stats at this pharmacy location — same model as the
      // worklist's expanded scope view, surfaced here so a care manager
      // working from the popup card sees the same coordination picture
      // (mine / teammate / unassigned) without flipping back to the table.
      const ownStats = useMemo(() => {
        if (!getAssignee || !currentUser) return null;
        let mine = 0, teammates = 0, unassigned = 0;
        const teammateOwners = new Set();
        members.forEach(m => {
          const a = getAssignee(m);
          if (!a) { unassigned++; return; }
          if (a === currentUser.id) { mine++; return; }
          teammates++;
          teammateOwners.add(a);
        });
        return { mine, teammates, unassigned, teammateOwners };
      }, [members, getAssignee, currentUser]);

      // Sort: mine first (so the care manager's own members are at the top —
      // the popup's primary use is "scan my members at this pharmacy and
      // batch them"), then non-compliant first, then by PDC ascending.
      // When ownership info isn't available, fall back to the legacy sort.
      const sorted = [...members].sort((a, b) => {
        if (getAssignee && currentUser) {
          const aMine = getAssignee(a) === currentUser.id ? 0 : 1;
          const bMine = getAssignee(b) === currentUser.id ? 0 : 1;
          if (aMine !== bMine) return aMine - bMine;
        }
        const sa = a.compStatus === 'Non-Compliant' ? 0 : a.compStatus === 'At Risk' ? 1 : a.compStatus === 'Compliant' ? 2 : 3;
        const sb = b.compStatus === 'Non-Compliant' ? 0 : b.compStatus === 'At Risk' ? 1 : b.compStatus === 'Compliant' ? 2 : 3;
        if (sa !== sb) return sa - sb;
        return ((a.pdc != null ? a.pdc : 1) - (b.pdc != null ? b.pdc : 1));
      });

      const phoneFmt = (m) => phiVisible ? (m.phoneFull || m.phone || '—') : (m.phone || '—');

      return (
        <div
          className="fixed z-[9700] border-2 hairline shadow-2xl bg-[var(--surface)] rounded flex flex-col"
          style={{ top: pos.y, left: pos.x, width: pos.w, height: minimized ? 'auto' : pos.h }}
          role="dialog" aria-labelledby="pharm-roster-title"
        >
          {/* Drag header */}
          <div
            onMouseDown={onDragStart}
            className={`flex items-center gap-2 px-3 py-2 bg-[var(--elevated)] border-b hairline ${minimized ? 'rounded' : 'rounded-t'} cursor-move select-none`}
            title="Drag header to move · drag bottom-right corner to resize"
          >
            <Icon name="grip-vertical" size={14} className="text-[var(--muted)] shrink-0" />
            <div className="flex-1 min-w-0">
              <div id="pharm-roster-title" className="font-ui text-[10px] uppercase tracking-[0.2em] text-[var(--accent)] font-bold flex items-center gap-1.5">
                <Icon name="pill" size={11} /> Pharmacy Roster
                <span className="num text-[var(--muted)] font-normal tracking-normal">· {members.length} member{members.length !== 1 ? 's' : ''}</span>
              </div>
              <div className="font-ui text-sm font-semibold truncate text-[var(--text)] mt-0.5">
                {location.name}
                {location.addr && <span className="font-normal text-[var(--muted)]"> — {location.addr}, {location.city} {location.zip}</span>}
              </div>
            </div>
            <button data-no-drag onClick={() => setMinimized(m => !m)}
              className="shrink-0 text-[var(--muted)] hover:text-[var(--accent)] p-1 rounded"
              title={minimized ? 'Restore roster' : 'Minimize to header'}
              aria-label={minimized ? 'Restore pharmacy roster' : 'Minimize pharmacy roster'}>
              <Icon name={minimized ? 'chevron-down' : 'chevron-up'} size={16} />
            </button>
            <button data-no-drag onClick={onClose}
              className="shrink-0 text-[var(--muted)] hover:text-[var(--status-critical)] p-1 rounded"
              title="Close (Esc)" aria-label="Close pharmacy roster">
              <Icon name="x" size={16} />
            </button>
          </div>

          {/* Body / footer / resize handle are hidden when minimized — only   */}
          {/* the drag header remains, so the user can park the card.          */}
          {!minimized && (<>
          {/* Ownership breakdown — same coordination picture as the worklist's */}
          {/* expanded pharmacy banner, so care managers working from the popup */}
          {/* see who else is calling this pharmacy at a glance.                */}
          {ownStats && (
            <div className="px-3 py-2 border-b hairline bg-[var(--bg-secondary)] font-ui text-[11px] flex items-center gap-2.5 flex-wrap">
              <span className="inline-flex items-center gap-1.5">
                <span className="w-2 h-2 bg-[var(--accent)] inline-block rounded-sm" />
                <span className="num font-semibold text-[var(--text)]">{ownStats.mine}</span>
                <span className="text-[var(--muted)]">yours</span>
              </span>
              <span className="text-[var(--dim)]">·</span>
              <span className="inline-flex items-center gap-1.5">
                <span className="w-2 h-2 bg-[var(--subtle)] inline-block rounded-sm" />
                <span className="num font-semibold text-[var(--text)]">{ownStats.teammates}</span>
                <span className="text-[var(--muted)]">teammate{ownStats.teammates !== 1 ? 's' : ''}</span>
                {ownStats.teammateOwners.size > 0 && (
                  <span className="text-[var(--muted)] num">({ownStats.teammateOwners.size}&nbsp;CM{ownStats.teammateOwners.size !== 1 ? 's' : ''})</span>
                )}
              </span>
              <span className="text-[var(--dim)]">·</span>
              <span className="inline-flex items-center gap-1.5">
                <span className="w-2 h-2 border-2 border-dashed border-[var(--status-warn)] inline-block" />
                <span className="num font-semibold text-[var(--text)]">{ownStats.unassigned}</span>
                <span className="text-[var(--muted)]">unassigned</span>
              </span>
              <span className="ml-auto text-[10px] text-[var(--placeholder)] italic">Sorted: yours first</span>
            </div>
          )}
          {/* Body — scrollable roster table */}
          <div className="flex-1 overflow-y-auto overflow-x-auto">
            {sorted.length === 0 ? (
              <div className="p-8 font-ui text-sm text-[var(--placeholder)] italic text-center">
                No members at this pharmacy location.
              </div>
            ) : (
              <table className="w-full font-ui text-xs" style={{minWidth: extraColIds.length > 0 ? '900px' : undefined}}>
                <thead className="sticky top-0 z-[1] bg-[var(--bg-secondary)] border-b hairline">
                  <tr className="text-[10px] uppercase tracking-wider text-[var(--muted)]">
                    <th className="text-left  px-3 py-2">Member</th>
                    <th className="text-left  px-2 py-2">Plan / Line</th>
                    <th className="text-left  px-2 py-2">Phone</th>
                    <th className="text-left  px-2 py-2">Drug</th>
                    <th className="text-right px-2 py-2">PDC</th>
                    <th className="text-left  px-2 py-2">Status</th>
                    <th className="text-left  px-2 py-2">Gaps</th>
                    <th className="text-right px-3 py-2">Days</th>
                    {pharmaCols && extraColIds.map(id => {
                      const c = pharmaCols[id];
                      if (!c || id === 'member') return null;
                      return <th key={`rh-${id}`} className="text-left px-2 py-2 whitespace-nowrap">{c.label}</th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {sorted.map(m => {
                    const statusCls =
                      m.compStatus === 'Non-Compliant' ? 'text-[var(--status-critical)]' :
                      m.compStatus === 'At Risk'        ? 'text-[var(--status-warn)]'     :
                      m.compStatus === 'Compliant'      ? 'text-[var(--accent)]'          :
                                                          'text-[var(--muted)]';
                    const assigneeId   = getAssignee ? getAssignee(m) : m.assignedCM;
                    const assignee     = assigneeId ? CARE_MANAGERS.find(c => c.id === assigneeId) : null;
                    const ownAvailable = !!getAssignee && !!currentUser;
                    const isMine       = ownAvailable && assigneeId === currentUser.id;
                    const isUnassigned = ownAvailable && !assigneeId;
                    const isTeammate   = ownAvailable && assigneeId && assigneeId !== currentUser.id;
                    const rowBorderCls = isMine       ? 'border-l-[3px] border-l-[var(--accent)]'
                                       : isUnassigned ? 'border-l-[3px] border-l-[var(--status-warn)] border-dashed'
                                       : isTeammate   ? 'border-l-[3px] border-l-[var(--dim)]'
                                       : '';
                    const rowBgCls     = isMine ? 'bg-[rgba(31,74,74,0.04)] dark:bg-[rgba(127,176,184,0.05)]' : '';
                    return (
                      <tr key={m.id}
                        className={`border-t hairline cursor-pointer hover:bg-[var(--elevated)] ${rowBgCls} ${rowBorderCls}`}
                        onClick={() => onPick(m)}
                        title={isTeammate && assignee ? `Owned by ${assignee.name} — opening as coverage; both names will be logged on any action.`
                             : isUnassigned ? 'No assigned CM — claim this member to add them to your worklist.'
                             : 'Open this member — roster stays open'}
                      >
                        <td className="px-3 py-2">
                          <div className="flex items-center gap-1.5 flex-wrap">
                            <span className="font-semibold text-[var(--text)] truncate max-w-[140px]">
                              {phiVisible ? `${m.last}, ${m.first}` : m.initials}
                            </span>
                            {isMine && (
                              <span className="text-[8px] tracking-wider uppercase px-1 py-0.5 bg-[var(--accent)] text-[var(--on-accent)] font-bold rounded-sm" title="Assigned to you">Mine</span>
                            )}
                            {isTeammate && assignee && (
                              <span className="text-[8px] tracking-wider uppercase px-1 py-0.5 border hairline text-[var(--muted)] rounded-sm flex items-center gap-0.5" title={`Owned by ${assignee.name} — coverage view`}>
                                <span className="font-bold text-[var(--text)]">{assignee.initials}</span>
                              </span>
                            )}
                            {isUnassigned && (
                              <span className="text-[8px] tracking-wider uppercase px-1 py-0.5 border-2 border-dashed border-[var(--status-warn)] text-[var(--status-warn)] font-bold rounded-sm" title="No assigned CM at this pharmacy">Unassigned</span>
                            )}
                          </div>
                          <div className="text-xs text-[var(--muted)] num">{m.id}</div>
                        </td>
                        <td className="px-2 py-2">
                          <div className="truncate max-w-[140px]" title={m.healthPlanName}>{m.healthPlanShort || m.healthPlanName || '—'}</div>
                          <div className="text-xs text-[var(--muted)]">{m.line}</div>
                        </td>
                        <td className="px-2 py-2 num truncate max-w-[120px]" title={phoneFmt(m)}>{phoneFmt(m)}</td>
                        <td className="px-2 py-2 truncate max-w-[140px]" title={m.drugName || ''}>{m.drugName || '—'}</td>
                        <td className="px-2 py-2 text-right num font-semibold">{m.pdc != null ? m.pdc.toFixed(2) : '—'}</td>
                        <td className={`px-2 py-2 font-semibold whitespace-nowrap ${statusCls}`}>{m.compStatus || '—'}</td>
                        <td className="px-2 py-2">
                          <div className="flex flex-wrap gap-0.5">
                            {m.gaps.slice(0, 3).map(g => (
                              <span key={g} className="text-[9px] px-1 py-0.5 border hairline bg-[var(--bg-secondary)] rounded-sm">{g}</span>
                            ))}
                            {m.gaps.length > 3 && <span className="text-[9px] text-[var(--muted)] self-center">+{m.gaps.length - 3}</span>}
                          </div>
                        </td>
                        <td className="px-3 py-2 text-right num">{m.daysOpen}</td>
                        {pharmaCols && extraColIds.map(id => {
                          if (id === 'member') return null;
                          const c = pharmaCols[id];
                          if (!c) return null;
                          return <td key={`rc-${id}`} className={c.cellCls + ' whitespace-nowrap'}>{c.render(m)}</td>;
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>

          {/* Footer */}
          <div className="px-3 py-1.5 border-t hairline bg-[var(--bg-secondary)] font-ui text-[10px] text-[var(--placeholder)] rounded-b flex items-center justify-between gap-2">
            <span className="truncate">Drag header to move · drag corner to resize · click row to open member (roster stays open) · Esc or × to close</span>
            <span className="num shrink-0">{members.length} member{members.length !== 1 ? 's' : ''}</span>
          </div>

          {/* Resize handle — diagonal stripes in bottom-right corner */}
          <div
            onMouseDown={onResizeStart}
            className="absolute bottom-0 right-0 w-4 h-4 cursor-se-resize"
            title="Drag to resize"
            aria-hidden="true"
            style={{
              background:
                'linear-gradient(135deg, transparent 0 55%, var(--muted) 55% 62%, transparent 62% 70%, var(--muted) 70% 77%, transparent 77% 85%, var(--muted) 85% 92%, transparent 92% 100%)',
              opacity: 0.6,
            }}
          />
          </>)}
        </div>
      );
    }

    function MemberWorklist({ members, allMembers, allSystemMembers, allCount, search, setSearch, filters, setFilters, onPick, phiVisible, canReassign, onReassign, getAssignee, currentUser, escalations = {}, gapStatuses = {}, onOpenPharmRoster, pharmRoster, extraColIds: extraColIdsProp, onExtraColsChange, pharmaCols: pharmacoColsProp, isBookmarked, onToggleBookmark }) {

      // Default allMembers to the filtered set if caller didn't pass one in —
      // keeps the component usable as a drop-in.
      const universe = allMembers || members;
      // allSystemMembers is the full member set visible to the user under RBAC
      // (every member at the organization their role can see, regardless of
      // CM assignment). Used to compute pharmacy ownership stats so the user
      // can see how many teammates and unassigned members are at the same
      // pharmacy. Falls back to universe when not provided.
      const systemUniverse = allSystemMembers || universe;

      const pharmacyActive = filters.pharmacy && filters.pharmacy !== 'All';
      const scope = filters.scope || 'mine';

      // Build the unique pharmacy-location universe from the user's full
      // assigned membership. Each chain may appear at multiple branches, so
      // each entry represents one physical location (chain + street address).
      // Dropdown stays stable as other filters are applied/cleared.
      // Sourced from MY members only — the natural workflow is to expand
      // outward from a pharmacy you already know.
      const pharmacyOptions = useMemo(() => {
        const seen = new Map();
        (universe || []).forEach(m => {
          if (!m.pharmName) return;
          const key = `${m.pharmName}|${m.pharmAddr || ''}`;
          if (!seen.has(key)) {
            seen.set(key, {
              value: key,
              name:  m.pharmName,
              addr:  m.pharmAddr || '',
              city:  m.pharmCity || '',
              zip:   m.pharmZip  || '',
              count: 0,
            });
          }
          seen.get(key).count++;
        });
        const list = Array.from(seen.values()).sort((a, b) => {
          const n = a.name.localeCompare(b.name);
          return n !== 0 ? n : a.addr.localeCompare(b.addr);
        });
        // Compose final display label — chain + address + count
        list.forEach(o => {
          const where = o.addr ? `${o.addr}, ${o.city}` : '';
          o.label = where ? `${o.name} — ${where} (${o.count})` : `${o.name} (${o.count})`;
          o.title = where ? `${o.name} · ${o.addr}, ${o.city} ${o.zip}` : o.name;
        });
        return [{ value: 'All', label: 'All' }, ...list];
      }, [universe]);

      // Resolve the active pharmacy detail object for the launcher banner +
      // the roster popup title
      const activePharm = useMemo(() => {
        if (!pharmacyActive) return null;
        return pharmacyOptions.find(o => o.value === filters.pharmacy) || null;
      }, [filters.pharmacy, pharmacyOptions, pharmacyActive]);

      // ── Ownership stats at the active pharmacy ─────────────────────────
      // Compute from the FULL system roster (not just my members) so the
      // user sees a true picture of who else is calling this pharmacy.
      // Stable per (pharmacy filter, system universe, assignments).
      const pharmStats = useMemo(() => {
        if (!pharmacyActive) return null;
        const sep = filters.pharmacy.indexOf('|');
        const fName = sep === -1 ? filters.pharmacy : filters.pharmacy.slice(0, sep);
        const fAddr = sep === -1 ? null             : filters.pharmacy.slice(sep + 1);
        let total = 0, mine = 0, teammates = 0, unassigned = 0;
        const teammateOwners = new Set();
        systemUniverse.forEach(m => {
          if (m.pharmName !== fName) return;
          if (fAddr != null && m.pharmAddr !== fAddr) return;
          total++;
          const a = getAssignee(m);
          if (!a) { unassigned++; return; }
          if (a === currentUser.id) { mine++; return; }
          teammates++;
          teammateOwners.add(a);
        });
        return { total, mine, teammates, unassigned, teammateOwners };
      }, [pharmacyActive, filters.pharmacy, systemUniverse, currentUser, getAssignee]);

      // Auto-switch scope to 'all' the moment a pharmacy is picked, so the
      // expanded coordination view is the default (most useful) state once a
      // pharmacy is selected. The user can then narrow back to "Mine" or
      // "Unassigned" via the scope chips. Clearing the pharmacy resets to
      // 'mine' so the worklist returns to the single-CM default.
      const prevPharmRef = useRef(filters.pharmacy);
      useEffect(() => {
        const prev = prevPharmRef.current;
        const curr = filters.pharmacy;
        if (prev !== curr) {
          if (curr && curr !== 'All' && (!prev || prev === 'All')) {
            // pharmacy just became active → expand scope to all
            setFilters(f => ({ ...f, scope: 'all' }));
          } else if ((!curr || curr === 'All') && prev && prev !== 'All') {
            // pharmacy just cleared → snap back to mine
            setFilters(f => ({ ...f, scope: 'mine' }));
          }
          prevPharmRef.current = curr;
        }
      }, [filters.pharmacy, setFilters]);

      // Roster popup state and member list now live on the parent (Dashboard)
      // so they survive when the worklist unmounts during member-detail nav.
      // Worklist still controls the "Open Members" entry point via the
      // onOpenPharmRoster callback prop.
      const rosterOpenHere = !!pharmRoster && !!activePharm
        && pharmRoster.name === activePharm.name
        && (pharmRoster.addr || '') === (activePharm.addr || '');

      // Column filters are always visible — they live directly above the table
      // header. The old show/hide toggle was redundant once we removed the
      // duplicated Priority / Line dropdowns from the top filter row.
      const showCols = true;

      // Per-column filters for the worklist table.
      // Persisted to localStorage so they survive navigation to a member
      // detail and back (the component otherwise remounts fresh).
      const COL_FILTERS_EMPTY = { priority:'', member:'', line:'', gaps:'', risk:'', days:'', outreach:'', assigned:'' };
      const [colFilters, setColFilters] = useState(() => {
        try { return { ...COL_FILTERS_EMPTY, ...(JSON.parse(localStorage.getItem('acm-worklist-cols') || '{}')) }; }
        catch(e) { return { ...COL_FILTERS_EMPTY }; }
      });
      useEffect(() => {
        try { localStorage.setItem('acm-worklist-cols', JSON.stringify(colFilters)); } catch(e) {}
      }, [colFilters]);
      const setCol = (k, v) => setColFilters(prev => ({ ...prev, [k]: v }));
      const clearCols = () => setColFilters({ ...COL_FILTERS_EMPTY });
      const hasColFilters = Object.values(colFilters).some(v => v !== '');

      const displayed = members.filter(m => {
        if (colFilters.priority && !m.priority.toLowerCase().includes(colFilters.priority.toLowerCase())) return false;
        if (colFilters.member) {
          const hay = phiVisible ? `${m.first} ${m.last} ${m.id} ${m.mbi}` : `${m.initials} ${m.id} ${m.mbi}`;
          if (!hay.toLowerCase().includes(colFilters.member.toLowerCase())) return false;
        }
        if (colFilters.line && !m.line.toLowerCase().includes(colFilters.line.toLowerCase())) return false;
        if (colFilters.gaps && !m.gaps.join(' ').toLowerCase().includes(colFilters.gaps.toLowerCase())) return false;
        if (colFilters.risk && !String(m.risk.toFixed(2)).startsWith(colFilters.risk)) return false;
        if (colFilters.days && !String(m.daysOpen).startsWith(colFilters.days)) return false;
        if (colFilters.outreach && !m.outreach.toLowerCase().includes(colFilters.outreach.toLowerCase())) return false;
        if (colFilters.assigned) {
          // dropdown returns CM id; '__unassigned__' is the special token
          // for members with no assigned CM (only visible in expanded scope).
          const a = getAssignee(m);
          if (colFilters.assigned === '__unassigned__') {
            if (a) return false;
          } else if (a !== colFilters.assigned) {
            return false;
          }
        }
        // PDC compliance status filter — applies to pharmacy members only.
        // When the user picks a status, members with no pharma data are
        // excluded (they have no compStatus to match against).
        if (filters.pdcStatus && filters.pdcStatus !== 'All') {
          if (!m.hasPharma) return false;
          if (m.compStatus !== filters.pdcStatus) return false;
        }
        return true;
      });

      // ─── Pagination ──────────────────────────────────────────────────────
      // Show 25 members per page. Reset to page 0 whenever filters change so
      // a care manager isn't stranded on page 7 after narrowing the list to
      // 20 members. Page state lives only in memory — intentional, so back-
      // navigation from a member detail lands on page 1 for fresh context.
      const PER_PAGE = 25;
      const [page, setPage] = useState(0);
      const totalPages = Math.max(1, Math.ceil(displayed.length / PER_PAGE));
      const safePage = Math.min(page, totalPages - 1);
      useEffect(() => { setPage(0); }, [filters, colFilters]);
      const pageMembers = displayed.slice(safePage * PER_PAGE, (safePage + 1) * PER_PAGE);
      const pageFrom = displayed.length === 0 ? 0 : safePage * PER_PAGE + 1;
      const pageTo   = Math.min((safePage + 1) * PER_PAGE, displayed.length);

      // ── Per-user Worklist column visibility ─────────────────────────────
      // Each care manager picks which columns appear on their personal
      // worklist; selection persists in localStorage scoped by user id so
      // Patricia's column choices don't leak into Evelin's session on a
      // shared workstation. The Member, Priority, and Chevron columns are
      // always shown — they're the row's identifier and navigation hooks.
      // Everything else is toggleable.
      const wColsLsKey = `acm-worklist-cols:${(currentUser && currentUser.id) || 'anon'}`;
      const WORKLIST_TOGGLEABLE_COLS = [
        { key: 'line',     label: 'Line of business' },
        { key: 'gaps',     label: 'Open gaps' },
        { key: 'risk',     label: 'Risk score' },
        { key: 'daysOpen', label: 'Days open' },
        { key: 'outreach', label: 'Outreach status' },
      ];
      const [hiddenWCols, setHiddenWCols] = useState(() => {
        try {
          const v = localStorage.getItem(wColsLsKey);
          return v ? JSON.parse(v) : [];
        } catch (e) { return []; }
      });
      useEffect(() => {
        try { localStorage.setItem(wColsLsKey, JSON.stringify(hiddenWCols)); } catch (e) {}
      }, [hiddenWCols, wColsLsKey]);
      const toggleWCol = (key) => setHiddenWCols(prev =>
        prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]
      );
      const resetWCols = () => setHiddenWCols([]);
      const [wColsMenuOpen, setWColsMenuOpen] = useState(false);
      const wColsMenuRef = useRef(null);
      useEffect(() => {
        if (!wColsMenuOpen) return;
        const onClickOutside = (e) => {
          if (wColsMenuRef.current && !wColsMenuRef.current.contains(e.target)) setWColsMenuOpen(false);
        };
        document.addEventListener('mousedown', onClickOutside);
        return () => document.removeEventListener('mousedown', onClickOutside);
      }, [wColsMenuOpen]);

      // ── Opt-in pharma columns on the Worklist ─────────────────────────
      // The full pharma column registry is shared with the Pharmacy view
      // via the top-level factory. The Worklist hides every pharma column
      // by default and lets each CM opt in to the ones they want. Selection
      // persists per-user under a dedicated localStorage key so toggle
      // choices don't leak between care managers on a shared workstation.
      // When extraColIdsProp/onExtraColsChange come from Dashboard (post-lift),
      // use those so the roster shares the same selection. Fall back to local
      // state if this component is ever used standalone.
      // Always call useMemo (hooks rules); if parent provides the registry, use it.
      const _localPharmaCols = React.useMemo(
        () => buildPharmaCols({ phiVisible, userPrefs: {} }),
        [phiVisible]
      );
      const wPharmaCols = pharmacoColsProp || _localPharmaCols;
      const wExtraColsLsKey = `acm-worklist-extra-cols:${(currentUser && currentUser.id) || 'anon'}`;
      const [localExtraColIds, setLocalExtraColIds] = useState(() => {
        try {
          const v = localStorage.getItem(wExtraColsLsKey);
          const parsed = v ? JSON.parse(v) : [];
          return Array.isArray(parsed) ? parsed.filter(id => PHARMA_COL_IDS.includes(id)) : [];
        } catch (e) { return []; }
      });
      const extraColIds    = extraColIdsProp    !== undefined ? extraColIdsProp    : localExtraColIds;
      const setExtraColIds = onExtraColsChange  !== undefined ? onExtraColsChange  : setLocalExtraColIds;
      useEffect(() => {
        if (onExtraColsChange) return; // parent owns persistence
        try { localStorage.setItem(wExtraColsLsKey, JSON.stringify(localExtraColIds)); } catch (e) {}
      }, [localExtraColIds, wExtraColsLsKey, onExtraColsChange]);
      const toggleExtraCol = (id) => setExtraColIds(prev =>
        prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
      );
      const [colFilter, setColFilter] = useState('');
      const filteredPharmaIds = useMemo(() => {
        const q = colFilter.trim().toLowerCase();
        if (!q) return PHARMA_COL_IDS.filter(id => id !== 'member');
        return PHARMA_COL_IDS.filter(id =>
          id !== 'member' &&
          (wPharmaCols[id]?.label || '').toLowerCase().includes(q)
        );
      }, [colFilter, wPharmaCols]);

      // ── Worklist CSV export ────────────────────────────────────────────
      // Mirrors the visible filter set ("export what I see") and writes the
      // filter values into the metadata block for auditability. PHI-masked
      // exports use initials + IDs; PHI-revealed exports include full names.
      const handleExportCsv = () => {
        const headers = ['Member ID', 'Initials', 'Name (last, first)', 'Age', 'Line', 'Health Plan', 'Dual Eligible', 'Priority', 'Risk Score', 'Open Gaps Count', 'Open Gaps', 'Days Oldest Gap', 'Has Pharma', 'Assigned CM', 'Outreach Status', 'PCP', 'Housing', 'Transportation Need', 'Food Insecurity', 'Language'];
        const rows = displayed.map(m => {
          const assigneeId = getAssignee ? getAssignee(m) : m.assignedCM;
          const assignee   = CARE_MANAGERS.find(c => c.id === assigneeId);
          return [
            m.id,
            m.initials,
            phiVisible ? `${m.last}, ${m.first}` : '—',
            m.age,
            m.line,
            m.healthPlanName || '',
            m.dualEligible ? 'Y' : 'N',
            m.priority,
            (m.risk || 0).toFixed(2),
            (m.gaps || []).length,
            (m.gaps || []).join(' · '),
            m.daysOpen,
            m.hasPharma ? 'Y' : 'N',
            assignee ? assignee.name : 'Unassigned',
            m.outreachStatus || 'Not Attempted',
            m.pcpFull || m.pcp || '',
            m.housingStatus || 'STABLE',
            m.transportationNeeds ? 'Y' : 'N',
            m.foodInsecurity ? 'Y' : 'N',
            m.language || '',
          ];
        });
        downloadCsv({
          filename: `UM_Aid_Worklist_${currentUser.id}_${new Date().toISOString().slice(0,10)}.csv`,
          headers, rows,
          meta: {
            title: 'Worklist Export',
            exportedBy: `${currentUser.name} (${currentUser.id})`,
            extra: [
              ['# Scope', pharmacyActive ? `Pharmacy: ${activePharm?.name || '—'} (${scope})` : 'Personal worklist'],
              ['# Search', search || '(none)'],
              ['# PHI', phiVisible ? 'REVEALED — names included' : 'masked — initials/IDs only'],
              ['# Filters', JSON.stringify(filters).replace(/,/g, ';')],
              ['# Column filters', JSON.stringify(colFilters).replace(/,/g, ';')],
            ],
          },
        });
      };

      return (
        <div>
          <div className="flex items-end justify-between mb-6 flex-wrap gap-4">
            <div>
              <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">My Worklist</div>
              {pharmacyActive && scope !== 'mine' ? (
                <>
                  <h2 className="font-display text-3xl font-medium">
                    {scope === 'unassigned' ? 'Unassigned members at this pharmacy' : 'All members at this pharmacy'}
                    <span className="text-[var(--muted)] num"> ({members.length})</span>
                  </h2>
                  <p className="font-ui text-sm text-[var(--muted)] mt-1">
                    {scope === 'all'
                      ? <>Expanded coordination view — showing every UM_Aid member at this location regardless of assigned CM. Yours are highlighted with a teal accent. Cross-CM actions are logged with both names.</>
                      : <>Orphaned members at this location with no assigned CM. Claim a member to add them to your worklist.</>}
                  </p>
                </>
              ) : (
                <>
                  <h2 className="font-display text-3xl font-medium">Your assigned members <span className="text-[var(--muted)] num">({members.length})</span></h2>
                  <p className="font-ui text-sm text-[var(--muted)] mt-1">Only your {allCount} members are shown. Other care managers work their own lists simultaneously — no file locking.</p>
                </>
              )}
            </div>
            {/* Inline legend — clarifies that the Pharmacy Detail panel is data-driven, not tab-driven. */}
            {/* Worklist holds every assigned member; Pharmacy tab is pre-filtered to members with Rx.   */}
            <div className="flex items-center gap-2 flex-wrap">
              <button onClick={handleExportCsv}
                className="flex items-center gap-1.5 font-ui text-xs uppercase tracking-wider border hairline px-3 py-2 hover:bg-[var(--elevated)] shrink-0"
                title={`Export ${displayed.length} filtered member${displayed.length === 1 ? '' : 's'} to CSV`}>
                <Icon name="download" size={13} /> Export CSV
              </button>
              <div className="border hairline bg-[var(--elevated)] px-3 py-2 font-ui text-[10px] text-[var(--muted)] flex items-center gap-2 max-w-md">
                <span className="text-[9px] tracking-wider uppercase px-1.5 py-0.5 bg-[var(--accent)] text-[var(--on-accent)] font-bold flex items-center gap-0.5 rounded-sm shrink-0">
                  <Icon name="pill" size={9} /> Rx
                </span>
                <span className="leading-snug">
                  = pharmacy adherence tracked. The <strong className="text-[var(--text)]">Pharmacy Detail</strong> panel will appear on member open. Members without Rx have no medication data on file.
                </span>
              </div>
            </div>
          </div>
          {filters.overdueOnly && (
            <div className="border-2 border-[var(--secondary)] bg-[var(--secondary-soft)] px-4 py-2 mb-3 rounded flex items-center gap-3 font-ui text-xs">
              <Icon name="alarm-clock" size={13} className="text-[var(--secondary)] shrink-0" />
              <span className="flex-1"><strong>Showing only overdue (60+ days)</strong> from your worklist. {members.length} {members.length === 1 ? 'member' : 'members'} match.</span>
              <button onClick={() => setFilters(prev => ({ ...prev, overdueOnly: false }))}
                className="font-ui text-[10px] uppercase tracking-wider text-[var(--status-critical)] hover:underline flex items-center gap-1">
                <Icon name="x" size={11} /> Clear
              </button>
            </div>
          )}
          {activePharm && (
            <div className="border-2 border-[var(--accent)] bg-[var(--surface)] mb-3 rounded">
              {/* Top row: pharmacy identity + actions */}
              <div className="px-4 py-2.5 flex items-center gap-3 font-ui text-xs flex-wrap border-b hairline">
                <Icon name="pill" size={13} className="text-[var(--accent)] shrink-0" />
                <span className="flex-1 min-w-0">
                  <strong>Filtering by pharmacy:</strong>{' '}
                  <span className="text-[var(--text)] font-semibold">{activePharm.name}</span>
                  {activePharm.addr && (

            <div className="flex items-center gap-3 flex-wrap">

                title="Filter by pharmacy location — chains with multiple branches are listed separately (chain — address)" />
              <Chip label="Outreach" field="outreach" values={['All','Not Attempted','Left Voicemail','Scheduled','Reached — Pending','Reached — Declined','Closed']} filters={filters} setFilters={setFilters} />
              {/* PDC Status — pharmacy-centric filter brought over from the    */}
              {/* Pharmacy tab so the Worklist can serve as a single command    */}
              {/* surface for adherence work too. When set, members with no    */}
              {/* pharma data are excluded (they have no PDC status to match). */}
              <Chip label="PDC Status" field="pdcStatus" values={['All','Non-Compliant','At Risk','Compliant']} filters={filters} setFilters={setFilters}
                title="PDC compliance status (Part D pharmacy members only). Selecting a status hides non-Rx members." />
              {/* Priority and Line filtering moved exclusively to the per-column     */}
              {/* filter row directly above the table — eliminates redundant filtering. */}
              {/* The filter state still accepts priority/line via deep-link jumpTo,  */}
              {/* so the "× Clear" button below remains active when those are set.    */}
              {(filters.priority !== 'All' || filters.line !== 'All' || filters.healthPlan !== 'All' || filters.measure !== 'All' || filters.pharmacy !== 'All' || filters.outreach !== 'All' || filters.pdcStatus !== 'All' || filters.overdueOnly) && (
                <button onClick={() => setFilters({ ...WORKLIST_FILTERS_DEFAULT })}
                  className="font-ui text-xs uppercase tracking-wider flex items-center gap-1 text-[var(--status-critical)] hover:underline">
                  <Icon name="x" size={12} /> Clear
                </button>

              {hasColFilters && (
                <button onClick={clearCols}
                  className="font-ui text-xs uppercase tracking-wider flex items-center gap-1 text-[var(--status-critical)] hover:underline">

              )}
              {/* Columns visibility popover — per-user column selection,     */}
              {/* persisted in localStorage. Members and Priority always show; */}
              {/* the rest are toggleable. Pattern intentionally mirrors the   */}
              {/* Pharmacy tab's Columns button so the muscle memory carries.  */}
              <div className="relative" ref={wColsMenuRef}>
                <button onClick={() => setWColsMenuOpen(o => !o)}
                  className="font-ui text-xs uppercase tracking-wider flex items-center gap-1 text-[var(--muted)] hover:text-[var(--text)] px-2 py-1 border hairline bg-[var(--surface)] hover:bg-[var(--elevated)] rounded-sm"
                  title="Choose which columns appear on your worklist">
                  <Icon name="settings" size={12} /> Columns
                  {hiddenWCols.length > 0 && (
                    <span className="bg-[var(--inverse)] text-[var(--on-inverse)] text-[9px] num px-1 py-px ml-0.5 normal-case tracking-normal">{hiddenWCols.length} hidden</span>
                  )}
                </button>
                {wColsMenuOpen && (
                  <div className="absolute top-full left-0 mt-1 z-[200] bg-[var(--surface)] border-2 hairline w-80 shadow-xl rounded-sm">
                    <div className="px-3 py-2 border-b hairline font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] flex items-center justify-between">
                      <span>Show columns</span>
                      {hiddenWCols.length > 0 && (
                        <button onClick={resetWCols}
                          className="font-ui text-[10px] uppercase tracking-wider text-[var(--accent)] hover:underline normal-case tracking-normal">
                          Reset
                        </button>
                      )}
                    </div>
                    {WORKLIST_TOGGLEABLE_COLS.map(c => {
                      const visible = !hiddenWCols.includes(c.key);
                      return (
                        <label key={c.key}
                          className="flex items-center gap-2 px-3 py-2 hover:bg-[var(--elevated)] cursor-pointer font-ui text-sm">
                          <input type="checkbox" checked={visible} onChange={() => toggleWCol(c.key)}
                            className="accent-[var(--accent)]" />

                      );
                    })}
                    {/* ── Pharma columns section ─────────────────────────  */}
                    {/* All ~50 columns from the Pharmacy view's data        */}
                    {/* dictionary are exposed here as opt-in extras. With   */}
                    {/* this many entries a search box is essential — type  */}
                    {/* to narrow ("phone", "pres", "ppg") then check what  */}
                    {/* you want. Selection is persisted per-user.           */}
                    <div className="border-t hairline px-3 py-2 font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] flex items-center justify-between gap-2">
                      <span>Pharmacy columns</span>
                      <span className="num normal-case tracking-normal text-[var(--placeholder)]">
                        {extraColIds.length}/{PHARMA_COL_IDS.length - 1} on
                      </span>
                    </div>
                    <div className="px-2 pb-1">
                      <input type="text" value={colFilter} onChange={e => setColFilter(e.target.value)}
                        placeholder="Search pharma columns…"
                        className="w-full px-2 py-1 border hairline bg-[var(--elevated)] font-ui text-xs focus:outline-none focus:border-[var(--accent)] rounded-sm" />
                    </div>
                    <div className="max-h-64 overflow-y-auto border-t hairline">
                      {filteredPharmaIds.length === 0 && (
                        <div className="px-3 py-2 font-ui text-[11px] text-[var(--placeholder)] italic">
                          No columns match "{colFilter}".
                        </div>
                      )}
                      {filteredPharmaIds.map(id => {
                        const c = wPharmaCols[id];
                        if (!c) return null;
                        const on = extraColIds.includes(id);
                        return (
                          <label key={`pcol-${id}`}
                            className="flex items-center gap-2 px-3 py-1.5 hover:bg-[var(--elevated)] cursor-pointer font-ui text-xs">
                            <input type="checkbox" checked={on} onChange={() => toggleExtraCol(id)}
                              className="accent-[var(--accent)]" />

                      })}
                    </div>
                    <div className="px-3 py-1.5 border-t hairline font-ui text-[9px] text-[var(--subtle)] italic">
                      Member, Priority, and Assigned CM always shown. Pharma columns show "—" for members with no Rx data.
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
          <MemberTable members={pageMembers} onPick={onPick} phiVisible={phiVisible}
            escalations={escalations} gapStatuses={gapStatuses}
            colFilters={showCols ? colFilters : null} setCol={showCols ? setCol : null}
            canReassign={canReassign} onReassign={onReassign} getAssignee={getAssignee} currentUser={currentUser}
            showOwnerColumn={pharmacyActive && scope !== 'mine'}
            highlightOwnership={pharmacyActive && scope !== 'mine'}
            hiddenCols={hiddenWCols}
            pharmaCols={wPharmaCols} extraColIds={extraColIds}
            isBookmarked={isBookmarked} onToggleBookmark={onToggleBookmark} />

          {/* Pagination footer — 25 per page. Stays visible even on a single */}
          {/* page so the count stays anchored and predictable.               */}
          <div className="mt-4 flex items-center justify-between gap-4 flex-wrap font-ui text-xs text-[var(--muted)]">
            <div>
              {displayed.length === 0
                ? 'No members match the current filters.'
                : <>Showing <span className="num text-[var(--text)] font-semibold">{pageFrom}–{pageTo}</span> of <span className="num text-[var(--text)] font-semibold">{displayed.length}</span></>}
            </div>
            {totalPages > 1 && (
              <div className="flex items-center gap-1">
                <button onClick={() => setPage(0)} disabled={safePage === 0}
                  className="px-2 py-1 border-2 hairline text-[10px] uppercase tracking-wider disabled:opacity-30 disabled:cursor-not-allowed hover:bg-[var(--elevated)]"
                  title="First page">« First</button>
                <button onClick={() => setPage(p => Math.max(0, p - 1))} disabled={safePage === 0}
                  className="px-2 py-1 border-2 hairline text-[10px] uppercase tracking-wider disabled:opacity-30 disabled:cursor-not-allowed hover:bg-[var(--elevated)]">
                  ‹ Prev
                </button>
                <span className="px-3 num text-[var(--text)]">
                  Page <span className="font-semibold">{safePage + 1}</span> of <span className="font-semibold">{totalPages}</span>
                </span>
                <button onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))} disabled={safePage >= totalPages - 1}
                  className="px-2 py-1 border-2 hairline text-[10px] uppercase tracking-wider disabled:opacity-30 disabled:cursor-not-allowed hover:bg-[var(--elevated)]">
                  Next ›
                </button>
                <button onClick={() => setPage(totalPages - 1)} disabled={safePage >= totalPages - 1}
                  className="px-2 py-1 border-2 hairline text-[10px] uppercase tracking-wider disabled:opacity-30 disabled:cursor-not-allowed hover:bg-[var(--elevated)]"
                  title="Last page">Last »</button>
              </div>
            )}
          </div>
          {/* PharmacyRosterCard is rendered at the Dashboard parent level so   */}
          {/* it survives the worklist unmounting when a member is opened.      */}
        </div>
      );
    }

    // ── useResizableColumns ─────────────────────────────────────────────────
    // State + drag logic for Excel-style column resizing. Pass in:
    //   storageKey: localStorage prefix (e.g. 'acm-worklist-col-widths')
    //   userId:     for per-user persistence
    //   colDefs:    array of { id, defaultWidth, minWidth } — visible cols
    //               in render order. Width defaults apply only when no
    //               persisted value exists for that column id.
    // Returns:
    //   widths:      { [id]: pixels }  current widths
    //   startResize: (colId, mouseEvent) — bind to a resizer handle's
    //                onMouseDown to begin a drag-resize gesture
    //
    // The hook resyncs widths when visible columns change (e.g. user toggles
    // a column on via the Columns popover) so newly-shown columns pick up
    // their default width without clobbering persisted widths of others.
    function useResizableColumns(storageKey, userId, colDefs) {
      const lsKey = `${storageKey}:${userId || 'anon'}`;
      const colIdsSig = colDefs.map(c => c.id).join(',');

      const [widths, setWidths] = useState(() => {
        try {
          const stored = localStorage.getItem(lsKey);
          const parsed = stored ? JSON.parse(stored) : {};
          const out = {};
          colDefs.forEach(c => { out[c.id] = parsed[c.id] || c.defaultWidth; });
          return out;
        } catch {
          const out = {};
          colDefs.forEach(c => { out[c.id] = c.defaultWidth; });
          return out;
        }
      });

      // Re-sync when visible columns change. Preserve persisted widths for
      // columns still present; assign defaults to newly-visible ones.
      useEffect(() => {
        setWidths(prev => {
          let dirty = false;
          const next = {};
          colDefs.forEach(c => {
            if (prev[c.id] != null) {
              next[c.id] = prev[c.id];
            } else {
              next[c.id] = c.defaultWidth;
              dirty = true;
            }
          });
          // Only return a new object if something actually changed, to
          // avoid an unnecessary render cycle.
          if (!dirty && Object.keys(prev).length === Object.keys(next).length) return prev;
          return next;
        });
      }, [colIdsSig]); // eslint-disable-line react-hooks/exhaustive-deps

      // Persist on every width change.
      useEffect(() => {
        try { localStorage.setItem(lsKey, JSON.stringify(widths)); } catch {}
      }, [widths, lsKey]);

      const startResize = useCallback((colId, event) => {
        event.preventDefault();
        event.stopPropagation();
        const startX = event.clientX;
        const startWidth = widths[colId] || (colDefs.find(c => c.id === colId)?.defaultWidth ?? 120);
        const minWidth = colDefs.find(c => c.id === colId)?.minWidth ?? 40;
        const handleEl = event.currentTarget;
        document.body.classList.add('col-resizing');
        if (handleEl && handleEl.classList) handleEl.classList.add('resizing');
        const onMove = (e) => {
          const dx = e.clientX - startX;
          const newWidth = Math.max(minWidth, startWidth + dx);
          setWidths(prev => prev[colId] === newWidth ? prev : { ...prev, [colId]: newWidth });
        };
        const onUp = () => {
          document.body.classList.remove('col-resizing');
          if (handleEl && handleEl.classList) handleEl.classList.remove('resizing');
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup',   onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup',   onUp);
      }, [widths, colDefs]);

      return { widths, startResize };
    }

    function MemberTable({ members, onPick, phiVisible, compact, colFilters, setCol, canReassign, onReassign, getAssignee, currentUser, escalations = {}, gapStatuses = {}, showOwnerColumn = false, highlightOwnership = false, hiddenCols = [], pharmaCols = null, extraColIds = [], isBookmarked = null, onToggleBookmark = null }) {
      // pharmaCols  — the full pharma column registry from buildPharmaCols()
      //               (passed in from MemberWorklist so opt-in columns can
      //               render alongside the existing anchor columns)
      // extraColIds — ordered list of pharma column ids the user has
      //               enabled via the Columns popover; renders after the
      //               core worklist columns. Skipped if pharmaCols absent.
      const tableWrapRef     = useRef(null);
      const stickyScrollRef  = useRef(null);

      // Sticky-bottom horizontal scrollbar proxy — mirrors the pharmacy table
      // pattern. Syncs scrollLeft between the table wrap and the proxy div so
      // the scrollbar is always reachable at the viewport bottom even when the
      // table extends below the fold. Hides itself when there's no overflow.
      useEffect(() => {
        const wrap  = tableWrapRef.current;
        const proxy = stickyScrollRef.current;
        if (!wrap || !proxy) return;
        const inner = proxy.firstElementChild;
        if (!inner) return;
        let syncing = false;
        const update = () => {
          const needs = wrap.scrollWidth > wrap.clientWidth + 1;
          proxy.style.display = needs ? 'block' : 'none';
          if (needs) inner.style.width = wrap.scrollWidth + 'px';
        };
        const onWrapScroll  = () => { if (syncing) return; syncing = true; proxy.scrollLeft = wrap.scrollLeft; requestAnimationFrame(() => { syncing = false; }); };
        const onProxyScroll = () => { if (syncing) return; syncing = true; wrap.scrollLeft  = proxy.scrollLeft; requestAnimationFrame(() => { syncing = false; }); };
        const raf = requestAnimationFrame(() => { update(); requestAnimationFrame(update); });
        wrap.addEventListener('scroll',  onWrapScroll,  { passive: true });
        proxy.addEventListener('scroll', onProxyScroll, { passive: true });
        window.addEventListener('resize', update);
        let ro = null;
        if (typeof ResizeObserver !== 'undefined') {
          ro = new ResizeObserver(update);
          ro.observe(wrap);
          const tbl = wrap.querySelector('table.worklist-table');
          if (tbl) ro.observe(tbl);
        }
        return () => {
          cancelAnimationFrame(raf);
          wrap.removeEventListener('scroll',  onWrapScroll);
          proxy.removeEventListener('scroll', onProxyScroll);
          window.removeEventListener('resize', update);
          if (ro) ro.disconnect();
        };
      }, [extraColIds, hiddenCols, members.length]);
      const f = colFilters || { priority:'', member:'', line:'', gaps:'', risk:'', days:'', outreach:'', assigned:'' };
      // Column visibility helper — checks the hiddenCols list (passed in
      // from the worklist's per-user persisted column-config popover).
      // Member, Priority, and Chevron are never hidden — they're the row's
      // identifier and navigation hooks. All other columns are toggleable.
      const showCol = (key) => !hiddenCols.includes(key);
      const setF = setCol || (() => {});
      // The Assigned-CM column appears when either:
      //   (a) the current user can reassign (director), OR
      //   (b) the worklist is in expanded pharmacy-scope (showing teammates +
      //       unassigned members), where ownership context becomes essential.
      // When (a) is true, the cell renders an editable dropdown; when only
      // (b) is true, the cell renders a read-only avatar + name chip.
      const showReassignCol = !!canReassign || !!showOwnerColumn;
      const editableReassign = !!canReassign;

      // ── Resizable columns ──────────────────────────────────────────────
      // Build the ordered list of columns currently visible. Default widths
      // are tuned to keep the layout close to what it looked like before
      // table-layout: fixed, so existing users don't see a jarring re-flow
      // on first paint. Min widths are aggressive — Excel-like, the user
      // is allowed to narrow a column to where text wraps tightly.
      const visibleCols = React.useMemo(() => {
        const cols = [
          { id: 'priority', defaultWidth: 110, minWidth: 60 },
          { id: 'member',   defaultWidth: 240, minWidth: 100 },
        ];
        if (showCol('line'))     cols.push({ id: 'line',     defaultWidth: 100, minWidth: 60 });
        if (showCol('gaps'))     cols.push({ id: 'gaps',     defaultWidth: 280, minWidth: 80 });
        if (showCol('risk'))     cols.push({ id: 'risk',     defaultWidth: 80,  minWidth: 50 });
        if (!compact && showCol('daysOpen')) cols.push({ id: 'daysOpen', defaultWidth: 90, minWidth: 50 });
        if (showCol('outreach')) cols.push({ id: 'outreach', defaultWidth: 170, minWidth: 80 });
        if (pharmaCols) {
          extraColIds.forEach(id => {
            if (id === 'member') return;
            cols.push({ id: `pharma-${id}`, defaultWidth: 130, minWidth: 60 });
          });
        }
        if (showReassignCol)  cols.push({ id: 'assigned', defaultWidth: 170, minWidth: 80 });
        if (onToggleBookmark) cols.push({ id: 'bookmark', defaultWidth: 50,  minWidth: 30 });
        cols.push({ id: 'chevron', defaultWidth: 40, minWidth: 30 });
        return cols;
      }, [compact, hiddenCols.join(','), !!pharmaCols, extraColIds.join(','), showReassignCol, !!onToggleBookmark]); // eslint-disable-line react-hooks/exhaustive-deps

      const { widths: colWidths, startResize } = useResizableColumns('acm-worklist-col-widths', currentUser?.id, visibleCols);
      const Resizer = ({ id }) => (
        <span className="col-resizer" onMouseDown={(e) => startResize(id, e)} aria-hidden="true" />
      );

      return (
        <div className="worklist-table-section">
          <div ref={tableWrapRef} className="border-2 hairline bg-[var(--surface)] mobile-stack worklist-table-wrap">
          <table className="w-full worklist-table resizable-table">
            <colgroup>
              {visibleCols.map(c => <col key={c.id} style={{ width: colWidths[c.id] }} />)}
            </colgroup>
            <thead>
              <tr className="bg-[var(--elevated)] font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--text)]">
                <th className="text-left px-4 py-3 font-semibold">Priority<Resizer id="priority" /></th>
                <th className="text-left px-4 py-3 font-semibold">Member<Resizer id="member" /></th>
                {showCol('line')     && <th className="text-left px-4 py-3 font-semibold">Line<Resizer id="line" /></th>}
                {showCol('gaps')     && <th className="text-left px-4 py-3 font-semibold">Open gaps<Resizer id="gaps" /></th>}
                {showCol('risk')     && <th className="text-right px-4 py-3 font-semibold">Risk<Resizer id="risk" /></th>}
                {!compact && showCol('daysOpen') && <th className="text-right px-4 py-3 font-semibold">Days open<Resizer id="daysOpen" /></th>}
                {showCol('outreach') && <th className="text-left px-4 py-3 font-semibold">Outreach status<Resizer id="outreach" /></th>}
                {/* Extra pharma columns the user opted into via the          */}
                {/* Columns popover. They render here so they sit between the */}
                {/* core worklist columns and the Assigned CM / chevron tail. */}
                {pharmaCols && extraColIds.map(id => {
                  const c = pharmaCols[id];
                  if (!c) return null;
                  // Member column is duplicated between anchor + pharma; the
                  // anchor version (with badges) wins, so skip the pharma one.
                  if (id === 'member') return null;

    }

      const [pharmCols, setPharmCols] = useState(() => {

        catch(e) { return { ...PHARM_COLS_EMPTY }; }

      useEffect(() => {
        try { localStorage.setItem('acm-pharm-cols', JSON.stringify(pharmCols)); } catch(e) {}

      const setPCol = (k, v) => setPharmCols(prev => ({ ...prev, [k]: v }));
      const clearPCols = () => setPharmCols({ ...PHARM_COLS_EMPTY });
      const hasPCols = Object.values(pharmCols).some(v => v !== '');
      const activePColCount = Object.values(pharmCols).filter(v => v !== '').length;

      // The 16-field filter grid takes a lot of vertical space. Care managers
      // told us they rarely need every filter at once, so it now collapses by
      // default with state persisted in localStorage. The badge on the toggle
      // shows how many filters are currently applied so they're never lost
      // behind a collapsed panel.
      const [filtersOpen, setFiltersOpen] = useState(() => {
        try { return localStorage.getItem('acm-pharm-filters-open') === '1'; } catch (e) { return false; }
      });
      useEffect(() => {
        try { localStorage.setItem('acm-pharm-filters-open', filtersOpen ? '1' : '0'); } catch (e) {}
      }, [filtersOpen]);
      const [pharmPage, setPharmPage] = useState(() => {
        try { return parseInt(localStorage.getItem('acm-pharm-page') || '0', 10) || 0; } catch(e) { return 0; }
      });
      useEffect(() => {
        try { localStorage.setItem('acm-pharm-page', String(pharmPage)); } catch(e) {}
      }, [pharmPage]);
      const PHARMA_PAGE_SIZE = userPrefs.pharmaPageSize || 50;

      // ───────────────────────────────────────────────────────────────────
      // Per-user column reordering. Each care manager has their own saved
      // column order in localStorage keyed by user id. Column definitions
      // (label + cell render) live in one place so reordering the thead
      // automatically reorders every row's cells via the same `.map`.
      // ───────────────────────────────────────────────────────────────────
      const PHARMA_COLS = useMemo(() => buildPharmaCols({ phiVisible, userPrefs }), [phiVisible, userPrefs]);

      // The legacy PHARMA_COL_DEFAULT name is preserved here as an alias to
      // the shared top-level PHARMA_COL_IDS so the rest of PharmacyView keeps
      // working without churn. New code should reference PHARMA_COL_IDS.
      const PHARMA_COL_DEFAULT = PHARMA_COL_IDS;

      const colStorageKey = `acm-pharma-cols-${currentUser?.id || 'default'}`;
      // pharmColOrder is the canonical display sequence (all known columns,
      // present regardless of hidden state). pharmColHidden is the set of
      // column ids the user has switched off. Saved together as one JSON
      // blob keyed by user id; backward-compatible with the old "array of
      // ids" save format.
      const initialColState = (() => {
        try {
          const saved = JSON.parse(localStorage.getItem(colStorageKey) || 'null');
          const valid = new Set(PHARMA_COL_DEFAULT);
          const cleanOrder = (arr) => {
            const filtered = (Array.isArray(arr) ? arr : []).filter(id => valid.has(id));
            const missing = PHARMA_COL_DEFAULT.filter(id => !filtered.includes(id));
            return [...filtered, ...missing];
          };
          if (Array.isArray(saved)) return { order: cleanOrder(saved), hidden: [] };
          if (saved && typeof saved === 'object') {

              hidden: (Array.isArray(saved.hidden) ? saved.hidden : []).filter(id => valid.has(id)),

        return { order: PHARMA_COL_DEFAULT.slice(), hidden: [] };
      })();
      const [pharmColOrder, setPharmColOrder] = useState(initialColState.order);
      const [pharmColHidden, setPharmColHidden] = useState(initialColState.hidden);

      useEffect(() => {
        try {

            hidden: pharmColHidden,

        } catch (e) {}

        () => pharmColOrder.filter(id => !pharmColHidden.includes(id)),

      );

      // ── Resizable columns (Excel-style drag) ───────────────────────────
      // Per-column default widths tuned to typical content. Anything not
      // listed falls back to 120px. The trailing chevron column has its
      // own narrow default and isn't user-resizable.
      const PHARMA_COL_WIDTH_DEFAULTS = {
        member: 220, language: 100, phone: 140, altPhone: 140,
        measure: 100, inMeasure: 90, singleFill: 90, status: 110,
        compDetail: 200, drugName: 160, daysLeft: 100, daysToNonAdh: 110,
        lastRefill: 110, refillDue: 110, pdc: 100, lis: 90, tier: 80,
        pharmacy: 180, prescriber: 160, lisCat: 110, planCode: 110,

      const pharmaTableCols = useMemo(() => {
        const cols = visiblePharmCols.map(id => ({

          defaultWidth: PHARMA_COL_WIDTH_DEFAULTS[id] || 120,

      }, [visiblePharmCols.join(',')]); // eslint-disable-line react-hooks/exhaustive-deps
      const { widths: pharmaColWidths, startResize: startPharmaResize } =
        useResizableColumns('acm-pharma-col-widths', currentUser?.id, pharmaTableCols);
      // The cloned thead (for sticky-header overlay) delegates mousedown to
      // this ref. A ref (not a direct closure) so the clone-building effect
      // doesn't have to depend on the hook's identity.
      const startPharmaResizeRef = useRef(startPharmaResize);
      useEffect(() => { startPharmaResizeRef.current = startPharmaResize; });
      const PharmaResizer = ({ id }) => (
        <span className="col-resizer" onMouseDown={(e) => startPharmaResize(id, e)} aria-hidden="true" />
      );

      // Panel state and handlers
      const [colPanelOpen, setColPanelOpen] = useState(false);
      const [dragColId, setDragColId] = useState(null);
      const [dropOnId, setDropOnId] = useState(null);

      const moveCol = (id, delta) => {
        setPharmColOrder(prev => {
          const next = [...prev];
          const i = next.indexOf(id);
          if (i === -1) return prev;
          const j = i + delta;
          if (j < 0 || j >= next.length) return prev;

      };

      const resetCols = () => { setPharmColOrder(PHARMA_COL_DEFAULT.slice()); setPharmColHidden([]); setActiveViewId(null); };
      const dropColOnTarget = (targetId) => {
        if (!dragColId || dragColId === targetId) { setDragColId(null); setDropOnId(null); return; }
        setPharmColOrder(prev => {
          const next = [...prev];
          const fromIdx = next.indexOf(dragColId);
          let toIdx = next.indexOf(targetId);
          if (fromIdx === -1 || toIdx === -1) return prev;

      // ───────────────────────────────────────────────────────────────────

      // ───────────────────────────────────────────────────────────────────
      const viewsStorageKey = `acm-pharma-views-${currentUser?.id || 'default'}`;
      const activeViewKey = `acm-pharma-active-view-${currentUser?.id || 'default'}`;

      const [pharmaViews, setPharmaViews] = useState(() => {
        try {

          if (!Array.isArray(saved)) return [];
          const valid = new Set(PHARMA_COL_DEFAULT);

            .filter(v => v && typeof v.id === 'string' && typeof v.name === 'string' && Array.isArray(v.order))

      const viewMenuRef = useRef(null);

      useEffect(() => {

      const activeView = pharmaViews.find(v => v.id === activeViewId) || null;
