    // ── Contact History ───────────────────────────────────────────────────────
    function ContactHistory({ memberLog, outreachDocs = {} }) {
      const [histSearch, setHistSearch] = useState('');
      const [histAuthor, setHistAuthor] = useState('');
      const authors = [...new Set(memberLog.map(e => e.who))];
      const filtered = memberLog.filter(e => {
        if (histAuthor && e.who !== histAuthor) return false;
        if (histSearch) {
          const q = histSearch.toLowerCase();
          if (!(e.notes||'').toLowerCase().includes(q) && !(e.outcome||'').toLowerCase().includes(q)) return false;
        }
        return true;
      });
      return (
        <div>
          <div className="flex items-center gap-2 mb-2 flex-wrap">
            <div className="flex-1 min-w-[140px] flex items-center gap-1.5 border hairline bg-[var(--surface)] px-2 py-1">
              <Icon name="search" size={12} className="text-[var(--muted)] shrink-0" />
              <input value={histSearch} onChange={e => setHistSearch(e.target.value)} placeholder="Search notes…"
                className="flex-1 font-ui text-xs bg-transparent focus:outline-none placeholder:text-[var(--placeholder)]" />
            </div>
            {authors.length > 0 && (
              <select value={histAuthor} onChange={e => setHistAuthor(e.target.value)}
                className="font-ui text-xs border hairline bg-[var(--surface)] px-2 py-1 focus:bg-[var(--elevated)]">
                <option value="">All authors</option>
                {authors.map(a => <option key={a} value={a}>{a}</option>)}
              </select>
            )}
          </div>
          <div className="border-2 hairline bg-[var(--surface)] max-h-[420px] overflow-y-auto">
            {filtered.length === 0 ? (
              <div className="p-6 font-ui text-sm text-[var(--muted)] italic">{memberLog.length === 0 ? 'No logged contacts yet.' : 'No entries match filter.'}</div>
            ) : filtered.map((o, i) => {
              // Documents attached to this specific contact-log entry — keyed
              // by audit-entry id so an upload always travels with its source
              // event in the timeline.
              const entryDocs = outreachDocs[o.id] || [];
              return (
              <div key={o.id} className={`p-4 ${i !== filtered.length - 1 ? 'border-b hairline' : ''}`}>
                <div className="flex items-center justify-between">
                  <span className={`font-ui text-[11px] font-semibold ${outcomeStyle(o.outcome)}`}>{o.outcome}</span>
                  <span className="font-ui text-[10px] text-[var(--muted)] num">{o.displayTime}</span>
                </div>
                {o.measure !== '—' && <div className="font-ui text-[10px] text-[var(--accent)] tracking-wider uppercase mt-0.5">{o.measure}</div>}
                <div className="font-ui text-sm mt-1">{o.notes}</div>
                {o.nextAction && <div className="font-ui text-xs text-[var(--muted)] mt-1">Next: {o.nextAction}{o.daysUntilAction ? ` (${o.daysUntilAction}d)` : ''}</div>}
                <div className="font-ui text-[10px] text-[var(--subtle)] mt-1">{o.who}</div>
                {entryDocs.length > 0 && <AttachedDocList docs={entryDocs} compact />}
              </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── SDOH Editor ───────────────────────────────────────────────────────────
    const SDOH_BARRIERS = [
      { key: 'housing',       label: 'Housing Instability',     icon: 'home' },
      { key: 'transportation',label: 'Transportation Barrier',   icon: 'car' },
      { key: 'food',          label: 'Food Insecurity',          icon: 'shopping-cart' },
      { key: 'medication',    label: 'Medication Cost Barrier',  icon: 'dollar-sign' },
      { key: 'literacy',      label: 'Health Literacy Concern',  icon: 'book-open' },
      { key: 'social',        label: 'Social Isolation',         icon: 'users' },
      { key: 'language',      label: 'Language Barrier',         icon: 'message-circle' },
      { key: 'caregiver',     label: 'Caregiver Burden',         icon: 'heart' },
    ];

    function SdohEditor({ member }) {
      const initBarriers = () => ({
        housing:       member.housingStatus !== 'STABLE',
        transportation:member.transportationNeeds || false,
        food:          member.foodInsecurity || false,
        medication:    false, literacy: false, social: false, language: member.language !== 'English', caregiver: false,
      });
      const [barriers, setBarriers] = useState(initBarriers);
      const [editNote, setEditNote] = useState('');
      const [editMode, setEditMode] = useState(false);
      const [notes, setNotes] = useState([]);

      const toggle = (key) => setBarriers(prev => ({ ...prev, [key]: !prev[key] }));
      const addNote = () => {
        if (!editNote.trim()) return;
        setNotes(prev => [{ text: editNote.trim(), ts: new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) }, ...prev]);
        setEditNote('');
      };

      const activeCount = Object.values(barriers).filter(Boolean).length;

      return (
        <div className="space-y-3">
          <div className="grid grid-cols-2 gap-2">
            {SDOH_BARRIERS.map(b => (
              <button key={b.key} onClick={() => toggle(b.key)}
                className={`flex items-center gap-2 px-3 py-2 border text-left transition-colors ${barriers[b.key] ? 'bg-[var(--status-warn)] border-[var(--status-warn)] text-white' : 'hairline hover:bg-[var(--elevated)]'}`}>
                <Icon name={b.icon} size={12} />
                <span className="font-ui text-xs">{b.label}</span>
                {barriers[b.key] && <Icon name="check" size={11} className="ml-auto" />}
              </button>
            ))}
          </div>
          {activeCount > 0 && (
            <div className="font-ui text-xs text-[var(--status-warn)] flex items-center gap-1">
              <Icon name="alert-triangle" size={12} /> {activeCount} barrier{activeCount !== 1 ? 's' : ''} flagged
            </div>
          )}
          <div>
            <button onClick={() => setEditMode(v => !v)}
              className="font-ui text-[10px] uppercase tracking-wider text-[var(--accent)] flex items-center gap-1 hover:underline">
              <Icon name={editMode ? 'chevron-up' : 'edit-2'} size={11} /> {editMode ? 'Close note' : 'Add barrier note'}
            </button>
            {editMode && (
              <div className="mt-2 space-y-2 slide-in">
                <textarea value={editNote} onChange={e => setEditNote(e.target.value)} rows={2}
                  placeholder="Document barrier detail, intervention, or follow-up plan…"
                  className="w-full font-ui text-xs border-2 hairline bg-[var(--surface)] p-2 focus:bg-[var(--elevated)] placeholder:text-[var(--placeholder)]" />
                <button onClick={addNote} disabled={!editNote.trim()}
                  className="font-ui text-[10px] uppercase tracking-wider bg-[var(--inverse)] text-[var(--on-inverse)] px-3 py-1.5 disabled:opacity-40 flex items-center gap-1">
                  <Icon name="check" size={11} /> Save note
                </button>
              </div>
            )}
            {notes.length > 0 && (
              <div className="mt-2 space-y-1 max-h-32 overflow-y-auto">
                {notes.map((n, i) => (
                  <div key={i} className="font-ui text-xs border hairline p-2 bg-[var(--elevated)]">
                    <span className="text-[var(--muted)] text-[10px] mr-2">{n.ts}</span>{n.text}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Per-medication barrier types ──────────────────────────────────────────
    // Distinct from SDOH (member-level) barriers — these attach to a SPECIFIC
    // Rx so the care manager can have a precise conversation with the provider.
    // Patricia's call-out (5/20/26): the existing single member-level "barrier
    // flagged" indicator is too coarse; the workflow needs prescription-level
    // granularity ("metformin: GI side effects, refuses" not "this member has
    // problems").
    const MED_BARRIER_TYPES = [
      { key: 'sideEffects',  label: 'Side Effects',       icon: 'alert-circle', hint: 'Member reports adverse reaction' },
      { key: 'refusing',     label: 'Member Refusing',    icon: 'x-circle',     hint: 'Spitting out pills, declining doses' },
      { key: 'cost',         label: 'Cost / Copay',       icon: 'dollar-sign',  hint: 'Affordability blocking pickup' },
      { key: 'transport',    label: 'Transport to Pharm.', icon: 'car',         hint: 'Cannot get to pharmacy reliably' },
      { key: 'understanding',label: 'Misunderstands Dose',icon: 'help-circle',  hint: 'Confused about timing / titration' },
      { key: 'forgot',       label: 'Forgets Doses',      icon: 'clock',        hint: 'No reminder system in place' },
      { key: 'supply',       label: 'Supply / Backorder', icon: 'package-x',    hint: 'Pharmacy out of stock' },
      { key: 'priorAuth',    label: 'Prior Auth Block',   icon: 'lock',         hint: 'PA denied or expired' },
      { key: 'duplicate',    label: 'Duplicate Therapy',  icon: 'copy',         hint: 'Same drug class from 2 prescribers' },
      { key: 'other',        label: 'Other',              icon: 'more-horizontal', hint: 'Document in detail field' },
    ];

    // ── Document source pick-list ─────────────────────────────────────────────
    // Drives both gap-evidence uploads and outreach attachments. Source matters
    // for audit: HEDIS auditors check provenance separately from date of
    // service. Member-supplied evidence has lower validation weight than
    // provider-supplied — surfaced here so the care manager classifies on
    // upload, not after the fact.
    const DOC_SOURCES = [
      'PCP / Specialist',
      'Hospital / Health System',
      'Pharmacy',
      'Lab',
      'Health Plan',
      'Member-Reported',
      'Other',
    ];

    // ── Compact upload form ──────────────────────────────────────────────────
    // Inline form for capturing the metadata that HEDIS audit demands on every
    // chart-note attachment. Filename is simulated for the mockup (no real
    // file I/O); in production this is replaced by a file picker bound to
    // Azure Blob upload. Everything else — source, date of service, received
    // date, notes — is real and gets persisted to the audit trail.
    function DocUploadInlineForm({ onSubmit, onCancel, defaultFilename = '', compact = false }) {
      const [filename,    setFilename]    = useState(defaultFilename);
      const [source,      setSource]      = useState(DOC_SOURCES[0]);
      const [dateOfSvc,   setDateOfSvc]   = useState('');
      const [receivedDt,  setReceivedDt]  = useState(new Date().toLocaleDateString('en-CA'));
      const [notes,       setNotes]       = useState('');
      const canSubmit = !!filename.trim();
      const submit = () => {
        if (!canSubmit) return;
        onSubmit({
          filename:    filename.trim(),
          source,
          dateOfService: dateOfSvc,
          receivedDate:  receivedDt,
          notes:         notes.trim(),
        });
      };
      return (
        <div className={`border-2 border-[var(--accent)] bg-[var(--surface)] ${compact ? 'p-3' : 'p-4'} rounded space-y-2.5`}>
          <div className="flex items-center gap-2 mb-1">
            <Icon name="upload-cloud" size={13} className="text-[var(--accent)]" />
            <span className="font-ui text-[10px] uppercase tracking-[0.15em] font-bold text-[var(--accent)]">Attach evidence document</span>
          </div>
          {/* Simulated picker — the demo doesn't actually read file bytes;
              we record the filename and metadata so the audit trail works. */}
          <div>
            <label className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] block mb-0.5">File</label>
            <div className="flex items-center gap-2">
              <input value={filename} onChange={e => setFilename(e.target.value)}
                placeholder="e.g. mammogram_05_16_2026.pdf"
                className="flex-1 font-ui text-xs border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)]" />
              <button type="button"
                onClick={() => {
                  // Stub file-picker — generates a plausible name so demo flow
                  // matches what a real <input type=file> would feel like.
                  const stub = `chart_evidence_${new Date().getTime().toString().slice(-6)}.pdf`;
                  setFilename(stub);
                }}
                className="font-ui text-[10px] uppercase tracking-wider border hairline px-2 py-1.5 hover:bg-[var(--elevated)] flex items-center gap-1 shrink-0"
                title="Simulate file picker (demo)">
                <Icon name="folder" size={11} /> Browse
              </button>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div>
              <label className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] block mb-0.5">Source *</label>
              <select value={source} onChange={e => setSource(e.target.value)}
                className="w-full font-ui text-xs border hairline bg-[var(--surface)] px-2 py-1.5">
                {DOC_SOURCES.map(s => <option key={s}>{s}</option>)}
              </select>
            </div>
            <div>
              <label className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] block mb-0.5">Date of Service</label>
              <input type="date" value={dateOfSvc} onChange={e => setDateOfSvc(e.target.value)}
                className="w-full font-ui text-xs border hairline bg-[var(--surface)] px-2 py-1.5" />
            </div>
            <div>
              <label className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] block mb-0.5">Received Date</label>
              <input type="date" value={receivedDt} onChange={e => setReceivedDt(e.target.value)}
                className="w-full font-ui text-xs border hairline bg-[var(--surface)] px-2 py-1.5" />
            </div>
            <div className="flex items-end">
              <div className="font-ui text-[10px] text-[var(--subtle)] italic leading-tight">
                Uploader, timestamp, hash captured automatically on save.
              </div>
            </div>
          </div>
          <div>
            <label className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] block mb-0.5">Notes (optional)</label>
            <input value={notes} onChange={e => setNotes(e.target.value)}
              placeholder="e.g. Pages 14–17 of full chart; mammogram report"
              className="w-full font-ui text-xs border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)]" />
          </div>
          <div className="flex items-center gap-2 pt-1">
            <button onClick={submit} disabled={!canSubmit}
              className="font-ui text-[10px] uppercase tracking-wider bg-[var(--accent)] text-[var(--on-accent)] px-3 py-1.5 disabled:opacity-40 flex items-center gap-1 rounded-sm">
              <Icon name="check" size={11} /> Attach document
            </button>
            <button onClick={onCancel}
              className="font-ui text-[10px] uppercase tracking-wider text-[var(--muted)] hover:text-[var(--text)] px-2 py-1.5">
              Cancel
            </button>
            <div className="ml-auto font-ui text-[9px] text-[var(--subtle)] italic">
              Pending Review → Accepted / Rejected by reviewer
            </div>
          </div>
        </div>
      );
    }

    // ── Document list — compact rendering of attached docs ────────────────────
    // Used in both gap-evidence and outreach contexts. Same shape, same render.
    function AttachedDocList({ docs, compact = false }) {
      if (!docs || docs.length === 0) return null;
      return (
        <div className={`space-y-1.5 ${compact ? 'mt-1.5' : 'mt-2'}`}>
          {docs.map(d => (
            <div key={d.id} className="border hairline bg-[var(--elevated)] p-2 rounded-sm flex items-start gap-2 font-ui text-[11px]">
              <Icon name="file-text" size={12} className="text-[var(--accent)] mt-0.5 shrink-0" />
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="font-semibold truncate text-[var(--text)]">{d.filename}</span>
                  <span className="num text-[var(--subtle)] text-[9px]">{(d.sizeKb / 1024).toFixed(2)} MB</span>
                  <span className={`text-[9px] tracking-wider uppercase px-1.5 py-0.5 rounded-sm font-semibold ${
                    d.status === 'Accepted' ? 'bg-[var(--success-soft)] text-[var(--success)]'
                    : d.status === 'Rejected' ? 'bg-[rgba(168,50,50,0.15)] text-[var(--status-critical)]'
                    : 'bg-[var(--bg-secondary)] text-[var(--muted)]'
                  }`}>{d.status}</span>
                </div>
                <div className="text-[var(--muted)] text-[10px] mt-0.5 flex items-center gap-2 flex-wrap">
                  <span>Source: <strong className="text-[var(--text)] font-medium">{d.source}</strong></span>
                  {d.dateOfService && <span>· DOS: <span className="num">{d.dateOfService}</span></span>}
                  <span>· Received: <span className="num">{d.receivedDate}</span></span>
                </div>
                {d.notes && <div className="text-[var(--muted)] text-[10px] mt-0.5 italic">"{d.notes}"</div>}
                <div className="text-[var(--subtle)] text-[9px] mt-0.5">{d.uploadedBy} · {d.displayTs}</div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ── Gap row with inline document upload ───────────────────────────────────
    // Replaces the inline render in Gap Closure Status. Bundles: status pill,
    // step rail, advance/back buttons, evidence count, attached doc list, and
    // an "attach evidence" expander. Auto-advances gap status to 'Submitted to
    // Plan' on first successful upload (since that's the workflow logic per
    // the call: upload IS the submission step).
    function GapClosureRow({ gapCode, status, meta, step, measure, memberId, docs, onUpdateGapStatus, onAddGapDoc }) {
      const [uploadOpen, setUploadOpen] = useState(false);
      const acceptedCount = docs.filter(d => d.status === 'Accepted').length;
      const pendingCount  = docs.filter(d => d.status === 'Pending Review').length;
      const handleUpload = (docPayload) => {
        const rec = onAddGapDoc(memberId, gapCode, docPayload);
        setUploadOpen(false);
        // Auto-advance status — if this is the first evidence on the gap and
        // status hasn't reached "Submitted to Plan" yet, bump it. Care
        // managers asked us to remove a click; the upload IS the submission.
        if (rec && status !== 'Closed' && step < GAP_STATUS_STEPS.indexOf('Submitted to Plan')) {
          onUpdateGapStatus && onUpdateGapStatus(memberId, gapCode, 'Submitted to Plan');
        }
      };
      return (
        <div className="border hairline p-3">
          <div className="flex items-center justify-between gap-3 flex-wrap mb-2">
            <div className="flex items-center gap-2 flex-1 min-w-0">
              <span className="font-display font-bold num text-base text-[var(--accent)] shrink-0">{gapCode}</span>
              <span className="font-ui text-xs text-[var(--muted)] truncate">{measure?.name}</span>
              {measure?.weight > 1 && <span className="font-ui text-[9px] border hairline px-1.5 py-0.5 shrink-0">{measure.weight}×</span>}
              {docs.length > 0 && (
                <span className="font-ui text-[10px] uppercase tracking-wider bg-[var(--accent)] text-[var(--on-accent)] px-1.5 py-0.5 rounded-sm font-semibold flex items-center gap-1 shrink-0"
                      title={`${docs.length} document${docs.length !== 1 ? 's' : ''} attached`}>
                  <Icon name="paperclip" size={9} /> {docs.length}
                </span>
              )}
            </div>
            <div className="flex items-center gap-2 shrink-0">
              <span className={`font-ui text-[10px] uppercase tracking-wider px-2 py-0.5 font-semibold flex items-center gap-1 rounded ${GAP_STATUS_COLORS[status] || ''}`}>
                <Icon name={GAP_STATUS_ICONS[status] || 'circle'} size={10} /> {status}
              </span>
            </div>
          </div>
          {/* Step progress rail */}
          <div className="flex items-center gap-0.5 mb-2">
            {GAP_STATUS_STEPS.map((s, i) => (
              <div key={s} className={`h-1.5 flex-1 rounded-full transition-all ${i <= step ? 'bg-[var(--accent)]' : 'bg-[var(--progress-track)]'}`} title={s} />
            ))}
          </div>
          {meta && <div className="font-ui text-[10px] text-[var(--subtle)]">Updated to <strong>{meta.status}</strong> by {meta.updatedBy} at {meta.updatedAt}</div>}

          {/* Action row: advance/back + attach evidence */}
          <div className="flex items-center gap-1 mt-2 flex-wrap">
            {onUpdateGapStatus && status !== 'Closed' && (
              <>
                <span className="font-ui text-[9px] uppercase tracking-wider text-[var(--muted)] mr-1">Advance to:</span>
                {GAP_STATUS_STEPS.slice(step + 1).map(nextStatus => (
                  <button key={nextStatus} onClick={() => onUpdateGapStatus(memberId, gapCode, nextStatus)}
                    className="font-ui text-[10px] border hairline px-2 py-0.5 hover:border-[var(--accent)] hover:text-[var(--accent)] flex items-center gap-1 rounded">
                    <Icon name={GAP_STATUS_ICONS[nextStatus]} size={9} /> {nextStatus}
                  </button>
                ))}
                {step > 0 && (
                  <button onClick={() => onUpdateGapStatus(memberId, gapCode, GAP_STATUS_STEPS[step - 1])}
                    title="Undo last status advance"
                    className="font-ui text-[10px] border hairline px-2 py-0.5 ml-1 hover:border-[var(--status-warn)] hover:text-[var(--status-warn)] text-[var(--muted)] flex items-center gap-1 rounded">
                    <Icon name="undo-2" size={9} /> Back to {GAP_STATUS_STEPS[step - 1]}
                  </button>
                )}
              </>
            )}
            {/* Always-available attach-evidence button — even on closed gaps  */}
            {/* (auditors sometimes want late evidence attached for completeness). */}
            {onAddGapDoc && !uploadOpen && (
              <button onClick={() => setUploadOpen(true)}
                className="font-ui text-[10px] uppercase tracking-wider bg-[var(--accent)] text-[var(--on-accent)] px-2 py-0.5 ml-auto flex items-center gap-1 rounded">
                <Icon name="upload-cloud" size={10} /> Attach evidence
              </button>
            )}
          </div>

          {uploadOpen && (
            <div className="mt-3">
              <DocUploadInlineForm
                onSubmit={handleUpload}
                onCancel={() => setUploadOpen(false)}
                compact />
            </div>
          )}

          {/* Attached documents list */}
          {docs.length > 0 && (
            <div className="mt-2">
              <div className="font-ui text-[9px] uppercase tracking-[0.15em] text-[var(--muted)] font-semibold mb-1 flex items-center gap-1">
                <Icon name="paperclip" size={10} /> Evidence on file
                {acceptedCount > 0 && <span className="num text-[var(--success)]">· {acceptedCount} accepted</span>}
                {pendingCount > 0 && <span className="num">· {pendingCount} pending review</span>}
              </div>
              <AttachedDocList docs={docs} compact />
            </div>
          )}
        </div>
      );
    }

    // ── Per-medication notes + barriers panel ─────────────────────────────────
    // The big new workflow surface called out in Michelle's 5/20 explanation
    // doc. Every medication on the Pharmacy Detail panel gets a tabbed footer
    // with the three contact-type note streams (Pharmacy → Rx Provider →
    // Member) plus a Barriers stream. Each stream is independent state and
    // attributable; the audit log captures every entry with both author and
    // the specific medication.
    function MedNotesAndBarriers({ member, med, medIdx, medNotes, onAddMedNote, medBarriers, onAddMedBarrier, onResolveMedBarrier }) {
      const key = member.id + '__' + medIdx;
      const notesByType = medNotes[key] || { pharmacy: [], rxProvider: [], member: [] };
      const barriers    = medBarriers[key] || [];
      const activeBarriers   = barriers.filter(b => !b.resolvedAt);
      const resolvedBarriers = barriers.filter(b => !!b.resolvedAt);

      const [tab, setTab] = useState('pharmacy'); // 'pharmacy' | 'rxProvider' | 'member' | 'barriers'
      const [draft, setDraft] = useState('');
      const [addingBarrier, setAddingBarrier] = useState(false);
      const [barrierType, setBarrierType] = useState(MED_BARRIER_TYPES[0].key);
      const [barrierDetail, setBarrierDetail] = useState('');
      const [resolvingId, setResolvingId] = useState(null);
      const [resolveNote, setResolveNote] = useState('');

      const tabs = [
        { id: 'pharmacy',   label: 'Pharmacy',    icon: 'pill',         count: notesByType.pharmacy.length,   hint: 'Notes from pharmacy contact (refills, day supply, copay, pharmacist)' },
        { id: 'rxProvider', label: 'Rx Provider', icon: 'user-check',   count: notesByType.rxProvider.length, hint: 'Notes from prescriber contact (extended day supply, dose changes, mail order)' },
        { id: 'member',     label: 'Member',      icon: 'user',         count: notesByType.member.length,     hint: 'Notes from member contact (pickup status, education, mail-order setup)' },
        { id: 'barriers',   label: 'Barriers',    icon: 'alert-triangle', count: activeBarriers.length, accent: activeBarriers.length > 0, hint: 'Per-medication barriers blocking adherence' },
      ];

      const submitNote = () => {
        if (!draft.trim() || tab === 'barriers') return;
        onAddMedNote(member.id, medIdx, tab, draft, med);
        setDraft('');
      };
      const submitBarrier = () => {
        const typeLabel = MED_BARRIER_TYPES.find(t => t.key === barrierType)?.label || barrierType;
        onAddMedBarrier(member.id, medIdx, typeLabel, barrierDetail, med);
        setBarrierDetail(''); setAddingBarrier(false);
      };
      const submitResolve = () => {
        onResolveMedBarrier(member.id, medIdx, resolvingId, resolveNote, med);
        setResolvingId(null); setResolveNote('');
      };

      const currentNotes = tab !== 'barriers' ? (notesByType[tab] || []) : [];

      return (
        <div className="mt-3 border-t hairline pt-3">
          {/* Tab strip */}
          <div className="flex items-center gap-1 flex-wrap mb-2">
            {tabs.map(t => {
              const active = tab === t.id;
              return (
                <button key={t.id} onClick={() => setTab(t.id)}
                  title={t.hint}
                  className={`font-ui text-[10px] uppercase tracking-wider px-2 py-1 rounded-sm border-2 flex items-center gap-1.5 ${
                    active ? 'bg-[var(--inverse)] text-[var(--on-inverse)] border-[var(--inverse)]'
                           : t.accent ? 'border-[var(--status-critical)] text-[var(--status-critical)] bg-[rgba(168,50,50,0.06)] hover:bg-[rgba(168,50,50,0.12)]'
                                      : 'hairline hover:bg-[var(--elevated)] text-[var(--text)]'
                  }`}>
                  <Icon name={t.icon} size={10} /> {t.label}
                  {t.count > 0 && <span className="num font-bold">{t.count}</span>}
                </button>
              );
            })}
          </div>

          {/* Notes tab body */}
          {tab !== 'barriers' && (
            <div className="space-y-2">
              <div className="flex items-end gap-2">
                <div className="flex-1">
                  <label className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] block mb-0.5">
                    Add {tabs.find(t => t.id === tab).label.toLowerCase()} note
                    <span className="text-[var(--subtle)] normal-case tracking-normal italic ml-1">— re: {med.drug}</span>
                  </label>
                  <textarea value={draft} onChange={e => setDraft(e.target.value)} rows={2}
                    placeholder={
                      tab === 'pharmacy'   ? `e.g. Walgreens — John, Pharm.: confirmed last p/u of ${med.drug} ${med.daySupply || '30'}-day supply, 2 refills remaining. Asked re: ext day supply — concurred, will send request to Rx Provider.`
                    : tab === 'rxProvider' ? `e.g. R/o & s/w Jane @ ${med.prescriber || 'Rx Provider'}: advsd member elig for ext day supply, confirmed pharm on file, msg sent to Rx Provider to review & send new Rx if tx allows.`
                                           : `e.g. R/o & s/w member: advsd Rx available for p/u; offered Mail Order via HP — member concurred, initiated transfer of all meds to Express Scripts.`}
                    className="w-full font-ui text-xs border-2 hairline bg-[var(--surface)] p-2 focus:bg-[var(--elevated)] placeholder:text-[var(--placeholder)] resize-y" />
                </div>
                <button onClick={submitNote} disabled={!draft.trim()}
                  className="font-ui text-[10px] uppercase tracking-wider bg-[var(--accent)] text-[var(--on-accent)] px-3 py-2 disabled:opacity-40 flex items-center gap-1 rounded-sm shrink-0">
                  <Icon name="check" size={11} /> Save
                </button>
              </div>
              {currentNotes.length === 0 ? (
                <div className="font-ui text-[10px] text-[var(--muted)] italic px-1">No {tabs.find(t => t.id === tab).label.toLowerCase()} notes yet for this medication.</div>
              ) : (
                <div className="space-y-1.5 max-h-56 overflow-y-auto">
                  {currentNotes.map(n => (
                    <div key={n.id} className="border hairline bg-[var(--surface)] p-2 rounded-sm font-ui text-[11px]">
                      <div className="flex items-center gap-2 text-[10px] text-[var(--subtle)] mb-0.5">
                        <span className="num">{n.displayTs}</span>
                        <span className="text-[var(--dim)]">·</span>
                        <span className="font-medium text-[var(--muted)]">{n.author}</span>
                      </div>
                      <div className="text-[var(--text)] leading-snug whitespace-pre-wrap">{n.text}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Barriers tab body */}
          {tab === 'barriers' && (
            <div className="space-y-2">
              {!addingBarrier && (
                <button onClick={() => setAddingBarrier(true)}
                  className="font-ui text-[10px] uppercase tracking-wider border-2 border-[var(--status-critical)] text-[var(--status-critical)] px-3 py-1.5 hover:bg-[var(--status-critical)] hover:text-white flex items-center gap-1 rounded-sm">
                  <Icon name="alert-triangle" size={11} /> Flag a barrier
                </button>
              )}
              {addingBarrier && (
                <div className="border-2 border-[var(--status-critical)] bg-[rgba(168,50,50,0.04)] p-3 rounded space-y-2">
                  <div className="font-ui text-[10px] uppercase tracking-[0.15em] font-bold text-[var(--status-critical)] flex items-center gap-1">
                    <Icon name="alert-triangle" size={11} /> Flag a barrier for {med.drug}
                  </div>
                  <div className="grid grid-cols-2 gap-2 sm:grid-cols-3">
                    {MED_BARRIER_TYPES.map(t => (
                      <button key={t.key} onClick={() => setBarrierType(t.key)}
                        title={t.hint}
                        className={`text-left px-2 py-1.5 border rounded-sm flex items-center gap-1.5 font-ui text-[10px] ${barrierType === t.key ? 'border-[var(--status-critical)] bg-[var(--status-critical)] text-white font-semibold' : 'hairline hover:bg-[var(--elevated)]'}`}>
                        <Icon name={t.icon} size={11} /> {t.label}
                      </button>
                    ))}
                  </div>
                  <div>
                    <label className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] block mb-0.5">Detail (optional but recommended)</label>
                    <input value={barrierDetail} onChange={e => setBarrierDetail(e.target.value)}
                      placeholder="e.g. GI side effects since titrating to 1000mg; member refusing morning dose"
                      className="w-full font-ui text-xs border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)]" />
                  </div>
                  <div className="flex items-center gap-2">
                    <button onClick={submitBarrier}
                      className="font-ui text-[10px] uppercase tracking-wider bg-[var(--status-critical)] text-white px-3 py-1.5 flex items-center gap-1 rounded-sm">
                      <Icon name="flag" size={11} /> Flag barrier
                    </button>
                    <button onClick={() => { setAddingBarrier(false); setBarrierDetail(''); }}
                      className="font-ui text-[10px] uppercase tracking-wider text-[var(--muted)] hover:text-[var(--text)] px-2 py-1.5">
                      Cancel
                    </button>
                  </div>
                </div>
              )}
              {/* Active barriers list */}
              {activeBarriers.length > 0 && (
                <div className="space-y-1.5">
                  <div className="font-ui text-[10px] uppercase tracking-[0.15em] text-[var(--status-critical)] font-bold flex items-center gap-1">
                    <Icon name="alert-triangle" size={11} /> Active barriers ({activeBarriers.length})
                  </div>
                  {activeBarriers.map(b => (
                    <div key={b.id} className="border-2 border-[var(--status-critical)] bg-[rgba(168,50,50,0.04)] p-2 rounded-sm font-ui text-[11px]">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-bold text-[var(--status-critical)] uppercase tracking-wider text-[10px]">{b.type}</span>
                        <span className="text-[10px] text-[var(--subtle)] num">flagged {b.displayTs} by {b.flaggedBy}</span>
                      </div>
                      {b.detail && <div className="text-[var(--text)] mt-1 leading-snug">{b.detail}</div>}
                      {resolvingId === b.id ? (
                        <div className="mt-2 flex items-center gap-2 flex-wrap">
                          <input value={resolveNote} onChange={e => setResolveNote(e.target.value)}
                            placeholder="Resolution note (e.g. dose lowered to 500mg, member tolerating)"
                            className="flex-1 min-w-[200px] font-ui text-[11px] border hairline bg-[var(--surface)] px-2 py-1" />
                          <button onClick={submitResolve}
                            className="font-ui text-[10px] uppercase tracking-wider bg-[#4a6b52] text-white px-2 py-1 flex items-center gap-1 rounded-sm">
                            <Icon name="check" size={10} /> Resolve
                          </button>
                          <button onClick={() => { setResolvingId(null); setResolveNote(''); }}
                            className="font-ui text-[10px] uppercase tracking-wider text-[var(--muted)] px-2 py-1">Cancel</button>
                        </div>
                      ) : (
                        <button onClick={() => setResolvingId(b.id)}
                          className="font-ui text-[10px] uppercase tracking-wider text-[#4a6b52] hover:underline mt-1.5 flex items-center gap-1">
                          <Icon name="check-circle-2" size={10} /> Mark resolved
                        </button>
                      )}
                    </div>
                  ))}
                </div>
              )}
              {/* Resolved barriers — collapsed, low-noise */}
              {resolvedBarriers.length > 0 && (
                <details>
                  <summary className="font-ui text-[10px] uppercase tracking-[0.15em] text-[var(--muted)] cursor-pointer hover:text-[var(--text)] flex items-center gap-1">
                    <Icon name="check-circle-2" size={11} /> Resolved ({resolvedBarriers.length})
                  </summary>
                  <div className="space-y-1 mt-1.5">
                    {resolvedBarriers.map(b => (
                      <div key={b.id} className="border hairline bg-[var(--bg-secondary)] p-2 rounded-sm font-ui text-[11px] text-[var(--muted)]">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-bold uppercase tracking-wider text-[10px] line-through">{b.type}</span>
                          <span className="text-[10px] text-[var(--subtle)]">resolved by {b.resolvedBy}</span>
                        </div>
                        {b.detail && <div className="text-[10px] italic mt-0.5 line-through opacity-70">{b.detail}</div>}
                        {b.resolutionNote && <div className="text-[var(--text)] text-[11px] mt-1 not-italic">→ {b.resolutionNote}</div>}
                      </div>
                    ))}
                  </div>
                </details>
              )}
              {activeBarriers.length === 0 && resolvedBarriers.length === 0 && !addingBarrier && (
                <div className="font-ui text-[10px] text-[var(--muted)] italic px-1">No barriers flagged for this medication.</div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── Help & Field Guide drawer ────────────────────────────────────────────
    // ── WorkingListPanel ─────────────────────────────────────────────────────
    // Floating draggable bookmark panel. Lives outside all tab views so it
    // survives navigation. The CM adds members via the bookmark (🔖) button
    // on any worklist row or member detail header. Click any item to jump to
    // that member. The currently-open member is bolded / accent-coloured.
    // Ticking the checkbox removes the item — "Done" means the CM is satisfied
    // the outreach attempt is complete and no longer needs a reminder.
    //
    // Drag: mousedown on the header starts a drag; position is clamped to the
    // viewport and persisted to localStorage so it survives a page refresh.
    // ── usePopOutWindow ──────────────────────────────────────────────────────
    // Opens a real browser window for a panel so the user can drag it to a
    // second monitor. (position:fixed panels are physically confined to the
    // current browser window — only a new window can cross monitors.) The
    // React tree stays in the parent; content renders into the popup via
    // ReactDOM.createPortal. Stylesheets, fonts, and the Tailwind CDN are
    // cloned to the new window so the popped-out content looks identical
    // to the floating version. Theme attribute is mirrored so CSS variables
    // (--accent, --surface, etc) resolve correctly across both windows.
    //
    // Window-close detection uses 500ms polling because there's no reliable
    // cross-browser event for popup close. The lag is invisible to users.
    //
    // The returned container is a div inside the new window's <body>. When
    // it's null, the window hasn't finished setting up yet — render null.
    function usePopOutWindow(isOpen, onClose, title, width = 620, height = 720) {
      const [container, setContainer] = useState(null);
      const onCloseRef = useRef(onClose);
      useEffect(() => { onCloseRef.current = onClose; });

      useEffect(() => {
        if (!isOpen) return;

        const features = `width=${width},height=${height},popup=yes,resizable=yes,scrollbars=yes,location=no,menubar=no,toolbar=no,status=no`;
        const w = window.open('', '_blank', features);
        if (!w) {
          // Popup blocked — surface a clear message and back out cleanly.
          try {
            window.alert('Pop-out blocked by the browser. Please allow pop-ups for this site to use the second-monitor pop-out feature.');
          } catch {}
          onCloseRef.current && onCloseRef.current();
          return;
        }

        w.document.title = `${title} — Care Manager NaviStation`;

        // Mirror the parent's theme so CSS variables resolve right.
        const theme = document.documentElement.getAttribute('data-theme');
        if (theme) w.document.documentElement.setAttribute('data-theme', theme);

        // Clone parent stylesheets and <style> tags. Tailwind CDN is included
        // separately so its JIT runs in the new window and compiles any
        // classes used only by popped-out content.
        document.head.querySelectorAll('link[rel="stylesheet"], style').forEach(node => {
          w.document.head.appendChild(node.cloneNode(true));
        });
        document.head.querySelectorAll('script[src*="tailwind"]').forEach(node => {
          const s = w.document.createElement('script');
          Array.from(node.attributes).forEach(a => s.setAttribute(a.name, a.value));
          w.document.head.appendChild(s);
        });

        w.document.body.style.cssText = "margin:0;background:var(--page);color:var(--text);font-family:'Inter Tight',sans-serif;min-height:100vh;";

        // Sticky header inside the popup window — title + close button.
        const headerEl = w.document.createElement('div');
        headerEl.style.cssText = "display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--elevated);border-bottom:3px solid var(--accent);font-family:'Inter Tight',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--accent);position:sticky;top:0;z-index:100;";
        headerEl.textContent = title;
        const closeBtn = w.document.createElement('button');
        closeBtn.textContent = '✕';
        closeBtn.title = 'Close pop-out';
        closeBtn.style.cssText = "margin-left:auto;background:none;border:1px solid var(--border-color);width:24px;height:24px;cursor:pointer;color:var(--muted);border-radius:3px;font-size:12px;line-height:1;";
        closeBtn.onclick = () => { try { w.close(); } catch {} };
        headerEl.appendChild(closeBtn);
        w.document.body.appendChild(headerEl);

        // React portal target.
        const containerEl = w.document.createElement('div');
        containerEl.style.cssText = "padding:16px 20px;";
        w.document.body.appendChild(containerEl);
        setContainer(containerEl);

        // Poll for window-closed — no reliable cross-browser event exists.
        const interval = setInterval(() => {
          if (w.closed) {
            clearInterval(interval);
            setContainer(null);
            onCloseRef.current && onCloseRef.current();
          }
        }, 500);

        // Also close the popup if the parent unloads (refresh/navigation).
        const onUnload = () => { try { w.close(); } catch {} };
        window.addEventListener('beforeunload', onUnload);

        return () => {
          clearInterval(interval);
          window.removeEventListener('beforeunload', onUnload);
          try { if (!w.closed) w.close(); } catch {}
          setContainer(null);
        };
      }, [isOpen, title, width, height]);

      return container;
    }

    // ── findSnapAdjustment ────────────────────────────────────────────────
    // Magnetic snap helper used by both FloatPanelShell and WorkingListPanel
    // during drag. Given the dragged panel's element and its *proposed* new
    // position (the simulated rect), it scans the DOM for other floating
    // panels and returns the dx/dy nudge needed to lock its edges flush
    // against the nearest one — or zero if nothing is in range.
    //
    // Four cardinal snaps are supported:
    //   • dragged right  → other left   (dragged sits left of other)
    //   • dragged left   → other right  (dragged sits right of other)
    //   • dragged bottom → other top    (dragged sits above other)
    //   • dragged top    → other bottom (dragged sits below other)
    //
    // Plus edge alignment when adjacency snap engages:
    //   • side-by-side  → align top edges
    //   • stacked       → align left edges
    //
    // Closest candidate wins when multiple are in range. Threshold is 14px
    // by default — wide enough to feel intentional, narrow enough that
    // unrelated panels don't grab unintentionally.
    function findSnapAdjustment(draggedEl, simulated, threshold = 14) {
      const candidates = document.querySelectorAll('.float-panel, .wl-panel');
      let snapDx = null;
      let snapDy = null;
      const dRight  = simulated.left + simulated.width;
      const dBottom = simulated.top  + simulated.height;

      candidates.forEach(el => {
        if (el === draggedEl) return;
        const o = el.getBoundingClientRect();
        const yOverlap = dBottom > o.top  && simulated.top  < o.bottom;
        const xOverlap = dRight  > o.left && simulated.left < o.right;

        if (yOverlap) {
          // Right edge → other's left edge
          const distRL = Math.abs(dRight - o.left);
          if (distRL < threshold && (snapDx === null || distRL < Math.abs(snapDx))) {
            snapDx = o.left - dRight;
          }
          // Left edge → other's right edge
          const distLR = Math.abs(simulated.left - o.right);
          if (distLR < threshold && (snapDx === null || distLR < Math.abs(snapDx))) {
            snapDx = o.right - simulated.left;
          }
        }
        if (xOverlap) {
          // Bottom edge → other's top edge
          const distBT = Math.abs(dBottom - o.top);
          if (distBT < threshold && (snapDy === null || distBT < Math.abs(snapDy))) {
            snapDy = o.top - dBottom;
          }
          // Top edge → other's bottom edge
          const distTB = Math.abs(simulated.top - o.bottom);
          if (distTB < threshold && (snapDy === null || distTB < Math.abs(snapDy))) {
            snapDy = o.bottom - simulated.top;
          }
        }
        // Edge alignment when adjacency snap has engaged
        if (snapDx !== null) {
          const distTT = Math.abs(simulated.top - o.top);
          if (distTT < threshold && (snapDy === null || distTT < Math.abs(snapDy))) {
            snapDy = o.top - simulated.top;
          }
        }
        if (snapDy !== null) {
          const distLL = Math.abs(simulated.left - o.left);
          if (distLL < threshold && (snapDx === null || distLL < Math.abs(snapDx))) {
            snapDx = o.left - simulated.left;
          }
        }
      });

      return {
        snapDx:  snapDx || 0,
        snapDy:  snapDy || 0,
        snapped: snapDx !== null || snapDy !== null,
      };
    }

    // ── FloatPanelShell ──────────────────────────────────────────────────────
    // Generic floating-panel chrome: header (drag handle + title + minimize +
    // close), body container, position state via props. The pop-out panels
    // for Gap Guide and Resource Tools each render `<FloatPanelShell>` with
    // their content as children. WorkingListPanel intentionally does NOT use
    // this — it has bespoke item-row interactions (drag-to-reorder, badges,
    // active-member highlight) that are easier to keep inlined.
    // ── Bottom Taskbar (replaces the old FAB stack) ────────────────────────
    // Renders at viewport level (position: fixed via .app-taskbar CSS) so it
    // persists across every dashboard tab — same as the dark top bar above.
    // Each tab represents one reference panel and shows its current state
    // (closed / open / focused / minimised / popped-out) at a glance. Clicks
    // cycle through states the way the Windows taskbar does: closed→opens,
    // open-but-unfocused→focuses, focused→minimises, minimised→restores.
    // Hover reveals secondary actions (pop-out, close) on the right edge.
    //
    // Props:
    //   panels[]           - array of { id, label, icon, isOpen, isMinimised,
    //                         isPoppedOut, isFocused, badge, stateText,
    //                         onClick, onPopOut, onClose }
    //   currentUser        - for the user identifier on the right
    //   groupLockVisible   - whether to show the Group lock button
    //   groupLockActive    - current state of the group lock
    //   onToggleGroupLock  - handler
    function AppTaskbar({ panels, currentUser, groupLockVisible, groupLockActive, onToggleGroupLock }) {
      // Track which tab the mouse is over so we can reveal secondary actions.
      const [hoverId, setHoverId] = useState(null);

      const tabClass = (p) => {
        if (!p.isOpen)        return 'app-taskbar-tab is-closed';
        if (p.isPoppedOut)    return 'app-taskbar-tab is-popped-out';
        if (p.isMinimised)    return 'app-taskbar-tab is-minimised';
        if (p.isFocused)      return 'app-taskbar-tab is-focused';
        return 'app-taskbar-tab is-open';
      };

      return (
        <div className="app-taskbar no-print" role="toolbar" aria-label="Reference panel taskbar">
          <div className="app-taskbar-label">Reference</div>

          <div className="app-taskbar-tabs">
            {panels.map(p => (
              <button key={p.id}
                      className={tabClass(p)}
                      onClick={p.onClick}
                      onMouseEnter={() => setHoverId(p.id)}
                      onMouseLeave={() => setHoverId(null)}
                      title={
                        !p.isOpen      ? `Open ${p.label}` :
                        p.isPoppedOut  ? `${p.label} is in a separate window` :
                        p.isMinimised  ? `Restore ${p.label}` :
                        p.isFocused    ? `Minimize ${p.label}` :
                                         `Bring ${p.label} to front`
                      }
                      aria-pressed={p.isOpen && !p.isMinimised}>
                <span className="tab-icon"><Icon name={p.icon} size={15} /></span>
                <div className="tab-text">
                  <div className="tab-label">
                    {p.label}
                    {p.badge != null && (
                      <span style={{
                        background:'rgba(255,255,255,0.18)', marginLeft:6, padding:'1px 6px',
                        borderRadius:8, fontSize:9, fontWeight:800
                      }}>{p.badge}</span>
                    )}
                  </div>
                  {p.stateText && <div className="tab-state">{p.stateText}</div>}
                </div>
                {/* Secondary actions — visible only when this tab is hovered
                    and the panel is open. Pop-out and close as quick paths
                    that don't require right-clicking. */}
                {p.isOpen && hoverId === p.id && (
                  <div style={{ display:'flex', gap:2, marginLeft:'auto' }}>
                    {!p.isPoppedOut && p.onPopOut && (
                      <span
                        role="button"
                        tabIndex={0}
                        onClick={(e) => { e.stopPropagation(); p.onPopOut(); }}
                        title="Pop out to a separate window"
                        style={{
                          width:22, height:22, display:'flex', alignItems:'center', justifyContent:'center',
                          borderRadius:2, cursor:'pointer', color:'inherit', opacity:0.8,
                          background:'rgba(255,255,255,0.08)'
                        }}>
                        <Icon name="external-link" size={11} />
                      </span>
                    )}
                    <span
                      role="button"
                      tabIndex={0}
                      onClick={(e) => { e.stopPropagation(); p.onClose(); }}
                      title="Close panel"
                      style={{
                        width:22, height:22, display:'flex', alignItems:'center', justifyContent:'center',
                        borderRadius:2, cursor:'pointer', color:'inherit', opacity:0.8,
                        background:'rgba(255,255,255,0.08)'
                      }}>
                      <Icon name="x" size={11} />
                    </span>
                  </div>
                )}
                <div className="state-marker" />
              </button>
            ))}
          </div>

          <div className="app-taskbar-right">
            {groupLockVisible && (
              <button
                className={`app-taskbar-group-btn${groupLockActive ? ' is-active' : ''}`}
                onClick={onToggleGroupLock}
                title={groupLockActive
                  ? 'Panels locked together \u2014 dragging one moves all. Click to unlock.'
                  : 'Lock all floating panels together so dragging one moves the whole stack.'}
                aria-pressed={groupLockActive}>
                <Icon name={groupLockActive ? 'link' : 'link-2'} size={12} />
                {groupLockActive ? 'Locked' : 'Group'}
              </button>
            )}
            <span className="app-taskbar-user">
              {currentUser ? (currentUser.id || currentUser.name || '') : ''}
            </span>
          </div>
        </div>
      );
    }

    function FloatPanelShell({ title, icon, pos, onPosChange, size, onSizeChange, minimised, onToggleMinimise, maximized, onToggleMaximize, isFocused, onClose, defaultRightOffset = 400, defaultBottomOffset = 640, zIndex, onBringToFront, poppedOut, onPopOut, onUnpop, panelsLocked, onGroupDragStart, onGroupDragMove, onGroupDragEnd, children }) {
      const panelRef  = useRef(null);
      const dragState = useRef(null);

      // ── Pop-out to a real browser window (drag to second monitor) ──
      // When poppedOut is true, the new window is opened and a container
      // div inside it becomes the portal target. The floating panel
      // disappears for the duration; closing the popup window restores it.
      const popoutContainer = usePopOutWindow(!!poppedOut, onUnpop || (() => {}), title);

      if (poppedOut) {
        if (!popoutContainer) return null;
        return ReactDOM.createPortal(<>{children}</>, popoutContainer);
      }

      // Default position: right side of viewport, well clear of the
      // bottom-left FAB stack. If the user has dragged before, the persisted
      // pos.x / pos.y win.
      const defaultX = typeof window !== 'undefined'
        ? Math.max(16, window.innerWidth - defaultRightOffset) : 600;
      const defaultY = typeof window !== 'undefined'
        ? Math.max(80, window.innerHeight - defaultBottomOffset) : 100;
      const resolvedPos = { x: pos.x ?? defaultX, y: pos.y ?? defaultY };

      // ── Title-bar drag ─────────────────────────────────────────────────
      // Only fires from the title-bar area (and not its action buttons).
      // Resize handles call their own startResize handler instead.
      const startDrag = (e) => {
        if (e.button !== 0) return;
        if (e.target.closest('button')) return;
        if (maximized) return; // can't drag a maximized window
        e.preventDefault();
        const { x, y } = resolvedPos;
        dragState.current = { startMouseX: e.clientX, startMouseY: e.clientY, startX: x, startY: y };
        if (panelsLocked && onGroupDragStart) onGroupDragStart();
        const onMove = (ev) => {
          if (!dragState.current) return;
          const dx = ev.clientX - dragState.current.startMouseX;
          const dy = ev.clientY - dragState.current.startMouseY;
          const w = panelRef.current ? panelRef.current.getBoundingClientRect().width : 560;
          const nx = Math.max(0, Math.min((window.innerWidth  || 1200) - w, dragState.current.startX + dx));
          const ny = Math.max(0, Math.min((window.innerHeight || 800)  - 60, dragState.current.startY + dy));

          let finalX = nx, finalY = ny;
          if (!panelsLocked && panelRef.current) {
            const rect = panelRef.current.getBoundingClientRect();
            const snap = findSnapAdjustment(panelRef.current, { left: nx, top: ny, width: rect.width, height: rect.height });
            if (snap.snapped) {
              finalX = nx + snap.snapDx;
              finalY = ny + snap.snapDy;
            }
          }

          onPosChange({ x: finalX, y: finalY });
          if (panelsLocked && onGroupDragMove) {
            onGroupDragMove(nx - dragState.current.startX, ny - dragState.current.startY);
          }
        };
        const onUp = () => {
          dragState.current = null;
          if (panelsLocked && onGroupDragEnd) onGroupDragEnd();
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup',   onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup',   onUp);
      };

      // ── Resize handles ─────────────────────────────────────────────────
      // Eight directions: t / r / b / l edges and tl / tr / bl / br corners.
      // The handler reads the panel's current rect at mousedown so that
      // resize math is independent of stored state's possibly-stale values.
      // Top and left handles also push position, since shrinking from those
      // sides shifts the panel's origin. Min bounds prevent pinching to 0.
      const startResize = (direction) => (e) => {
        if (e.button !== 0) return;
        if (poppedOut || minimised || maximized) return;
        if (!panelRef.current) return;
        e.preventDefault();
        e.stopPropagation();
        const rect = panelRef.current.getBoundingClientRect();
        const start = {
          x: rect.left, y: rect.top,
          w: rect.width, h: rect.height,
          mx: e.clientX, my: e.clientY,
        };
        const MIN_W = 400, MIN_H = 200;
        const prevCursor = document.body.style.cursor;
        const dirToCursor = { t:'ns-resize', b:'ns-resize', l:'ew-resize', r:'ew-resize', tl:'nwse-resize', br:'nwse-resize', tr:'nesw-resize', bl:'nesw-resize' };
        document.body.style.cursor = dirToCursor[direction] || 'auto';

        const onMove = (ev) => {
          const dx = ev.clientX - start.mx;
          const dy = ev.clientY - start.my;
          let nx = start.x, ny = start.y, nw = start.w, nh = start.h;

          if (direction.includes('r')) nw = Math.max(MIN_W, start.w + dx);
          if (direction.includes('l')) {
            nw = Math.max(MIN_W, start.w - dx);
            nx = start.x + (start.w - nw);
          }
          if (direction.includes('b')) nh = Math.max(MIN_H, start.h + dy);
          if (direction.includes('t')) {
            nh = Math.max(MIN_H, start.h - dy);
            ny = start.y + (start.h - nh);
          }

          if (onSizeChange) onSizeChange({ w: Math.round(nw), h: Math.round(nh) });
          if ((direction.includes('l') || direction.includes('t')) && onPosChange) {
            onPosChange({ x: Math.round(nx), y: Math.round(ny) });
          }
        };
        const onUp = () => {
          document.body.style.cursor = prevCursor;
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup',   onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup',   onUp);
      };

      const classes = ['float-panel', 'no-print'];
      if (minimised) classes.push('is-minimised');
      if (maximized) classes.push('is-maximized');
      if (isFocused) classes.push('is-focused');

      return (
        <div ref={panelRef} className={classes.join(' ')}
             style={{
               left: resolvedPos.x,
               top: resolvedPos.y,
               zIndex: zIndex || 9200,
               width:  size && size.w ? size.w : undefined,
               height: size && size.h && !minimised ? size.h : undefined,
             }}
             onMouseDown={onBringToFront}
             role="dialog" aria-label={title}>
          {/* Title bar — focused state inverts to the accent color so the

          <div className={`window-titlebar${isFocused ? ' is-focused' : ''}`} onMouseDown={startDrag}
               onDoubleClick={(e) => { if (!e.target.closest('button') && onToggleMaximize) onToggleMaximize(); }}>

            <span className="titlebar-title">{title}</span>

    function WorkingListPanel({ ids, members, selectedMemberId, phiVisible, onPick, onPickPharma, onRemove, onClose, pos, onPosChange, size, onSizeChange, minimised, onToggleMinimise, maximized, onToggleMaximize, isFocused, zIndex, onBringToFront, poppedOut, onPopOut, onUnpop, panelsLocked, onGroupDragStart, onGroupDragMove, onGroupDragEnd }) {
      const panelRef  = useRef(null);
      const dragState = useRef(null);

      // ── Pop-out support (drag to second monitor) ──
      const popoutContainer = usePopOutWindow(!!poppedOut, onUnpop || (() => {}), 'My List — Working List', 420, 720);

      const defaultX = 16;
      const defaultY = typeof window !== 'undefined' ? window.innerHeight - 640 : 200;
      const resolvedPos = { x: pos.x ?? defaultX, y: pos.y ?? defaultY };

      const startDrag = (e) => {
        if (e.button !== 0) return;
        if (e.target.closest('button')) return;
        if (maximized) return;
        e.preventDefault();
        const { x, y } = resolvedPos;
        dragState.current = { startMouseX: e.clientX, startMouseY: e.clientY, startX: x, startY: y };
        if (panelsLocked && onGroupDragStart) onGroupDragStart();
        const onMove = (ev) => {
          if (!dragState.current) return;
          const dx = ev.clientX - dragState.current.startMouseX;
          const dy = ev.clientY - dragState.current.startMouseY;
          const w = panelRef.current ? panelRef.current.getBoundingClientRect().width : 360;
          const nx = Math.max(0, Math.min((window.innerWidth  || 1200) - w,  dragState.current.startX + dx));
          const ny = Math.max(0, Math.min((window.innerHeight || 800)  - 60, dragState.current.startY + dy));

          let finalX = nx, finalY = ny;
          if (!panelsLocked && panelRef.current) {
            const rect = panelRef.current.getBoundingClientRect();
            const snap = findSnapAdjustment(panelRef.current, { left: nx, top: ny, width: rect.width, height: rect.height });
            if (snap.snapped) {
              finalX = nx + snap.snapDx;
              finalY = ny + snap.snapDy;
            }
          }

          onPosChange({ x: finalX, y: finalY });
          if (panelsLocked && onGroupDragMove) {
            onGroupDragMove(nx - dragState.current.startX, ny - dragState.current.startY);
          }
        };
        const onUp = () => {
          dragState.current = null;
          if (panelsLocked && onGroupDragEnd) onGroupDragEnd();
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup',   onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup',   onUp);
      };

      // ── Resize handles — same eight-direction pattern as FloatPanelShell.
      // Different min sizes since the My List panel is naturally narrower. ─
      const startResize = (direction) => (e) => {
        if (e.button !== 0) return;
        if (poppedOut || minimised || maximized) return;
        if (!panelRef.current) return;
        e.preventDefault();
        e.stopPropagation();
        const rect = panelRef.current.getBoundingClientRect();
        const start = { x: rect.left, y: rect.top, w: rect.width, h: rect.height, mx: e.clientX, my: e.clientY };
        const MIN_W = 280, MIN_H = 200;
        const prevCursor = document.body.style.cursor;
        const dirToCursor = { t:'ns-resize', b:'ns-resize', l:'ew-resize', r:'ew-resize', tl:'nwse-resize', br:'nwse-resize', tr:'nesw-resize', bl:'nesw-resize' };
        document.body.style.cursor = dirToCursor[direction] || 'auto';

        const onMove = (ev) => {
          const dx = ev.clientX - start.mx;
          const dy = ev.clientY - start.my;
          let nx = start.x, ny = start.y, nw = start.w, nh = start.h;
          if (direction.includes('r')) nw = Math.max(MIN_W, start.w + dx);
          if (direction.includes('l')) { nw = Math.max(MIN_W, start.w - dx); nx = start.x + (start.w - nw); }
          if (direction.includes('b')) nh = Math.max(MIN_H, start.h + dy);
          if (direction.includes('t')) { nh = Math.max(MIN_H, start.h - dy); ny = start.y + (start.h - nh); }
          if (onSizeChange) onSizeChange({ w: Math.round(nw), h: Math.round(nh) });
          if ((direction.includes('l') || direction.includes('t')) && onPosChange) {
            onPosChange({ x: Math.round(nx), y: Math.round(ny) });
          }
        };
        const onUp = () => {
          document.body.style.cursor = prevCursor;
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup',   onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup',   onUp);
      };

      const items = ids.map(id => members.find(m => m.id === id)).filter(Boolean);

      const priorityCls = (p) =>
        p === 'Critical' ? 'text-[var(--status-critical)]' :
        p === 'High'     ? 'text-[var(--status-warn)]'     :
        p === 'Medium'   ? 'text-[var(--accent)]'          : 'text-[var(--muted)]';

      // PDC badge color matches the RX reference popup
      const pdcBg = (p) =>
        p == null ? '#888' :
        p < 0.70  ? 'var(--status-critical)' :
        p < 0.80  ? 'var(--status-warn)' : '#4a6b52';

      const statusColor = (s) =>
        s === 'Non-Compliant' ? 'var(--status-critical)' :
        s === 'At Risk'       ? 'var(--status-warn)'     :
        s === 'Compliant'     ? '#4a6b52'                : 'var(--muted)';

      // floating wl-panel and (via portal) inside the popped-out window.
      const bodyContent = (
        <>
          <div className="wl-panel-body" style={poppedOut ? { maxHeight: 'none' } : {}}>
            {items.length === 0 ? (
              <div className="wl-empty">
                <Icon name="bookmark" size={18} style={{ margin:'0 auto 6px', display:'block', opacity:0.3 }} />

                <span style={{ fontSize:10 }}>Click 🔖 on any worklist row to bookmark a member.</span>
              </div>
            ) : items.map(m => {
              const isActive   = m.id === selectedMemberId;
              const name       = phiVisible ? `${m.last}, ${m.first}` : m.initials;
              const gapCount   = m.openGaps ?? m.gaps?.length ?? 0;
              const status     = m.outreachStatus || m.lastOutreach || 'Not Attempted';
              const priority   = m.priority || '';
              const hasPharma  = m.pdc != null || m.drugName || m.pharmName;
              const ncMeds     = m.medsNonCompliant ?? 0;
              return (
                <div key={m.id} className={`wl-item ${isActive ? 'wl-item-active' : ''}`}>
                  <button className="wl-item-x" onClick={() => onRemove(m.id)} title="Mark done · remove from list" aria-label={`Remove ${name}`}>
                    <Icon name="check" size={10} />
                  </button>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display:'flex', alignItems:'baseline', gap:6, flexWrap:'wrap' }}>
                      <span className="wl-item-name">{name}</span>
                      {priority && <span className={`wl-item-priority ${priorityCls(priority)}`}>{priority}</span>}
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:1, flexWrap:'wrap' }}>
                      <span style={{ fontSize:10, color:'var(--muted)' }}>{m.id}</span>
                      <span style={{ fontSize:10, color:'var(--muted)' }}>·</span>
                      <span style={{ fontSize:10, color:statusColor(status) }}>{status}</span>
                      {gapCount > 0 && <>
                        <span style={{ fontSize:10, color:'var(--muted)' }}>·</span>
                        <span style={{ fontSize:10, color:'var(--accent)', fontWeight:600 }}>{gapCount} open</span>
                      </>}
                      {hasPharma && m.pdc != null && (<>
                        <span style={{ fontSize:10, color:'var(--muted)' }}>·</span>
                        <span style={{ fontSize:9, fontWeight:700, padding:'1px 5px', borderRadius:3, background:pdcBg(m.pdc), color:'#fff' }}>
                          PDC {Math.round(m.pdc * 100)}
                        </span>
                      </>)}
                      {ncMeds > 0 && (<>
                        <span style={{ fontSize:10, color:'var(--muted)' }}>·</span>
                        <span style={{ fontSize:10, color:'var(--status-critical)', fontWeight:600 }}>{ncMeds} NC med{ncMeds === 1 ? '' : 's'}</span>
                      </>)}
                    </div>
                    {(m.pharmName || m.pharmPhone) && (
                      <div style={{ display:'flex', alignItems:'center', gap:4, marginTop:2, flexWrap:'wrap' }}>
                        {m.pharmName && (
                          <span style={{ fontSize:10, color:'var(--muted)', display:'flex', alignItems:'center', gap:3 }}>
                            <Icon name="building-2" size={9} style={{ color:'var(--accent)', flexShrink:0 }} />
                            {m.pharmName}
                          </span>
                        )}
                        {m.pharmPhone && (
                          <span style={{ fontSize:10, color:'var(--muted)', fontFamily:'monospace' }}>
                            {m.pharmPhone}
                          </span>
                        )}
                      </div>
                    )}
                    <div className="wl-ctx-btns">
                      <button className="wl-ctx-btn" onClick={() => onPick(m)}
                        title="Open member chart (HEDIS / gaps view)">
                        <Icon name="user" size={9} /> Chart
                      </button>
                      {hasPharma && onPickPharma && (
                        <button className="wl-ctx-btn wl-ctx-rx" onClick={() => onPickPharma(m)}
                          title="Open in Pharmacy / Rx view">
                          <Icon name="pill" size={9} /> Open Rx
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {!poppedOut && (
            <div className="wl-footer">
              ✓ to mark done · drag title bar to move · resize from any edge
            </div>
          )}
        </>
      );

      // Popped-out → render body via portal into the new browser window
      // (lets the user drag the panel to a second monitor). The floating
      // panel render is suppressed for the duration.
      if (poppedOut) {
        if (!popoutContainer) return null;
        return ReactDOM.createPortal(bodyContent, popoutContainer);
      }

      const classes = ['wl-panel', 'no-print'];
      if (minimised) classes.push('is-minimised');
      if (maximized) classes.push('is-maximized');
      if (isFocused) classes.push('is-focused');

      return (
        <div ref={panelRef} className={classes.join(' ')}
          style={{
            left: resolvedPos.x,
            top: resolvedPos.y,
            zIndex: zIndex || 9200,
            width:  size && size.w ? size.w : undefined,
            height: size && size.h && !minimised ? size.h : undefined,
          }}
          onMouseDown={onBringToFront}
          role="complementary" aria-label="Active working list">

          {/* Window title bar — matches FloatPanelShell chrome */}
          <div className={`window-titlebar${isFocused ? ' is-focused' : ''}`} onMouseDown={startDrag}
               onDoubleClick={(e) => { if (!e.target.closest('button') && onToggleMaximize) onToggleMaximize(); }}>
            <span className="titlebar-icon"><Icon name="bookmark" size={13} /></span>
            <span className="titlebar-title">My List</span>
            {items.length > 0 && <span className="titlebar-badge">{items.length}</span>}
            <div className="window-titlebar-actions">
              {onPopOut && (
                <button className="titlebar-btn" title="Pop out to a separate window (drag to a second monitor)"
                        onClick={onPopOut}><Icon name="external-link" size={13} /></button>
              )}
              <button className="titlebar-btn" title="Minimize"
                      onClick={onToggleMinimise}><Icon name="minus" size={14} /></button>
              {onToggleMaximize && (
                <button className="titlebar-btn" title={maximized ? 'Restore' : 'Maximize'}
                        onClick={onToggleMaximize}>
                  <Icon name={maximized ? 'minimize-2' : 'square'} size={13} />
