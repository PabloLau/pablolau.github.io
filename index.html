                            {c.measure && c.measure !== '—' && <span className="num">· {c.measure}</span>}
                            {c.nextAction && <span>· Next: {c.nextAction}</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
            </Accordion>
          </div>

          <div className="grid md:grid-cols-2 gap-6 mb-6">
            <Accordion id={`next-steps-${member.id}`} title="Next Steps" icon="calendar-clock"
              badge={(() => {
                const upcoming = memberLog.filter(e => e.nextAction && e.daysUntilAction != null).length;
                return upcoming > 0 ? <span className="font-ui text-[10px] text-[var(--muted)] uppercase tracking-wider ml-3">{upcoming} planned</span> : null;
              })()}>
              {(() => {
                const seen = new Set();
                const items = [];
                for (const e of memberLog) {
                  if (!e.nextAction || e.daysUntilAction == null) continue;
                  const key = e.nextAction.trim().toLowerCase();
                  if (seen.has(key)) continue;
                  seen.add(key);
                  const due = new Date(e.timestamp.getTime() + (e.daysUntilAction * 24 * 60 * 60 * 1000));
                  const today = new Date();
                  const diffDays = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
                  items.push({ id: e.id, action: e.nextAction, by: e.who, plannedOn: e.displayTime, due, diffDays, measure: e.measure });
                }
                items.sort((a, b) => a.diffDays - b.diffDays);
                const top = items.slice(0, 6);
                if (top.length === 0) return (
                  <div className="font-ui text-sm text-[var(--muted)] italic">No upcoming actions on file. Add a "Next Action" and "Days Until Due" in the Log Outreach Contact form to populate this list.</div>
                );
                return (
                  <div className="space-y-2">
                    {top.map(it => {
                      const overdue = it.diffDays < 0;
                      const today   = it.diffDays === 0;
                      const soon    = it.diffDays > 0 && it.diffDays <= 3;
                      const tone = overdue ? 'border-[var(--status-critical)] bg-[var(--secondary-soft)]'
                                : today   ? 'border-[var(--status-warn)] bg-[var(--elevated)]'
                                : soon    ? 'border-[var(--accent)] bg-[var(--elevated)]'
                                          : 'hairline bg-[var(--surface)]';
                      const dueLabel = overdue ? `Overdue by ${Math.abs(it.diffDays)}d`
                                    : today   ? 'Due today'
                                              : `Due in ${it.diffDays}d`;
                      const dueColor = overdue ? 'text-[var(--status-critical)] font-bold'
                                    : today   ? 'text-[var(--status-warn)] font-bold'
                                    : soon    ? 'text-[var(--accent)] font-semibold'
                                              : 'text-[var(--muted)]';
                      return (
                        <div key={it.id} className={`border px-3 py-2 rounded ${tone}`}>
                          <div className="flex items-center justify-between gap-2 flex-wrap">
                            <span className="font-ui text-sm font-semibold">{it.action}</span>
                            <span className={`font-ui text-[10px] uppercase tracking-wider num shrink-0 ${dueColor}`}>{dueLabel}</span>
                          </div>
                          <div className="flex items-center gap-3 mt-1 font-ui text-[10px] text-[var(--muted)]">
                            <span>Planned by {it.by}</span>
                            <span>· {it.plannedOn}</span>
                            {it.measure && it.measure !== '—' && <span className="num">· {it.measure}</span>}
                            <span className="num">· due {it.due.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
            </Accordion>

            <Accordion id={`hist-${member.id}`} title="Contact History" icon="history"
              badge={<span className="font-ui text-[10px] text-[var(--muted)] uppercase tracking-wider ml-3">{memberLog.length} {memberLog.length === 1 ? 'entry' : 'entries'}</span>}>
              <ContactHistory memberLog={memberLog} outreachDocs={outreachDocs} />
            </Accordion>
          </div>

          {/* ── Member context section (full width below the 2-col workspace) ──
             These accordions were previously stacked inside the right column
             beneath the sticky Pharmacy Detail panel, which meant they slid
             up under the panel as the user scrolled — visually appearing to
             be "blocked." Moved here to give them full horizontal space and
             keep the right column purely a sticky reference panel. */}
          <div className="space-y-6 mt-6">

              {/* ── Gap Closure Status panel (accordion) ── */}
              <Accordion id={`gap-${member.id}`} title="Gap Closure Status" icon="git-branch"
                badge={<span className="font-ui text-[10px] text-[var(--muted)] uppercase tracking-wider ml-3">{member.gaps.length} open gap{member.gaps.length !== 1 ? 's' : ''}</span>}>
                <div className="space-y-2">
                  {member.gaps.map(gapCode => {
                    const status   = getGapStatus(gapCode);
                    const meta     = getGapStatusMeta(gapCode);
                    const step     = GAP_STATUS_STEPS.indexOf(status);
                    const measure  = MEASURES.find(m => m.code === gapCode);
                    // Evidence documents attached to this gap. Sourced from
                    // Dashboard-level gapDocs keyed by "memberId__gapCode".
                    const docs = gapDocs[member.id + '__' + gapCode] || [];
                    return (
                      <GapClosureRow key={gapCode}
                        gapCode={gapCode} status={status} meta={meta} step={step} measure={measure}
                        memberId={member.id} docs={docs}
                        onUpdateGapStatus={onUpdateGapStatus} onAddGapDoc={onAddGapDoc} />
                    );
                  })}
                  {member.gaps.length === 0 && (
                    <div className="font-ui text-sm text-[var(--muted)] italic py-2 flex items-center gap-2">
                      <Icon name="check-circle-2" size={14} className="text-[var(--success)]" /> No open gaps recorded for this member.
                    </div>
                  )}
                </div>
              </Accordion>

              {/* ── Communication Preferences panel (accordion) ── */}
              <Accordion id={`comm-${member.id}`} title="Communication Preferences" icon="contact">
                <div className="grid md:grid-cols-2 gap-4">
                  <div className="space-y-2">
                    <div className="flex items-center gap-2 font-ui text-sm">
                      <Icon name="globe" size={13} className="text-[var(--muted)] shrink-0" />
                      <span className="text-[var(--muted)] text-[11px] w-28 shrink-0">Language</span>
                      <span className="font-semibold">{member.language}</span>
                      {member.language !== 'English' && (
                        <span className="font-ui text-[9px] bg-[var(--secondary-soft)] text-[var(--secondary)] px-1.5 py-0.5 uppercase tracking-wider font-bold rounded">Interpreter</span>
                      )}
                    </div>
                    <div className="flex items-center gap-2 font-ui text-sm">
                      <Icon name="phone" size={13} className="text-[var(--muted)] shrink-0" />
                      <span className="text-[var(--muted)] text-[11px] w-28 shrink-0">Preferred Contact</span>
                      <span className="font-semibold">{(member.preferredContactMethod || '—').charAt(0) + (member.preferredContactMethod || '').slice(1).toLowerCase()}</span>
                    </div>
                    <div className="flex items-center gap-2 font-ui text-sm">
                      <Icon name="clock" size={13} className="text-[var(--muted)] shrink-0" />
                      <span className="text-[var(--muted)] text-[11px] w-28 shrink-0">Best Time</span>
                      <span className="font-semibold">{(member.preferredContactTime || '—').charAt(0) + (member.preferredContactTime || '').slice(1).toLowerCase()}</span>
                    </div>
                    <div className="flex items-center gap-2 font-ui text-sm">
                      <Icon name="shield-check" size={13} className={`shrink-0 ${member.consentToContact ? 'text-[var(--success)]' : 'text-[var(--status-warn)]'}`} />
                      <span className="text-[var(--muted)] text-[11px] w-28 shrink-0">Contact Consent</span>
                      <span className={`font-semibold ${member.consentToContact ? 'text-[var(--success)]' : 'text-[var(--status-warn)]'}`}>
                        {member.consentToContact ? `Yes · ${member.consentDate}` : 'No consent on file'}
                      </span>
                    </div>
                    {member.doNotCall && (
                      <div className="flex items-center gap-2 font-ui text-sm">
                        <Icon name="phone-off" size={13} className="text-[var(--status-critical)] shrink-0" />
                        <span className="bg-critical text-white px-2 py-0.5 text-[10px] uppercase tracking-wider font-bold rounded">Do Not Call — Do Not Attempt Phone Contact</span>
                      </div>
                    )}
                  </div>
                  {/* Emergency contact */}
                  {member.emergencyContactName && (
                    <div className="border hairline bg-[var(--elevated)] p-3 rounded-lg">
                      <div className="font-ui text-[10px] uppercase tracking-[0.2em] text-[var(--muted)] mb-2 flex items-center gap-1.5">
                        <Icon name="heart-handshake" size={11} /> Emergency Contact
                      </div>
                      <div className="font-ui text-sm font-semibold">{phiVisible ? member.emergencyContactName : '——— ———'}</div>
                      <div className="font-ui text-[11px] text-[var(--muted)] mt-0.5">{member.emergencyContactRelationship}</div>
                      {phiVisible && member.emergencyContactPhone && (
                        <div className="mt-1.5 flex items-center gap-1.5">
                          <Icon name="phone" size={11} className="text-[var(--muted)]" />
                          <PhoneWithNotes phone={member.emergencyContactPhone} entityKey={`ec-${member.id}`} />
                        </div>
                      )}
                    </div>
                  )}
                </div>
                {/* SDOH flags */}
                {(member.transportationNeeds || member.foodInsecurity || member.housingStatus !== 'STABLE') && (
                  <div className="mt-3 border hairline bg-[var(--elevated)] px-3 py-2 rounded-lg">
                    <div className="font-ui text-[10px] uppercase tracking-[0.2em] text-[var(--status-warn)] mb-1.5 flex items-center gap-1.5">
                      <Icon name="alert-triangle" size={11} /> SDOH Flags
                    </div>
                    <div className="flex items-center gap-2 flex-wrap">
                      {member.housingStatus !== 'STABLE' && <span className="font-ui text-[11px] border border-[var(--status-warn)] text-[var(--status-warn)] px-2 py-0.5 rounded">Housing: {member.housingStatus}</span>}
                      {member.transportationNeeds && <span className="font-ui text-[11px] border border-[var(--status-warn)] text-[var(--status-warn)] px-2 py-0.5 rounded">Transportation Need</span>}
                      {member.foodInsecurity && <span className="font-ui text-[11px] border border-[var(--status-warn)] text-[var(--status-warn)] px-2 py-0.5 rounded">Food Insecurity</span>}
                    </div>
                  </div>
                )}
              </Accordion>

              <div className="border-2 hairline p-4 bg-[var(--elevated)] no-print">
                <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[#8b5a1e] font-semibold mb-2 flex items-center gap-1"><Icon name="shield" size={12} /> Minimum necessary</div>
                <p className="font-ui text-xs text-[var(--muted)] leading-relaxed">PHI displayed is limited to care management purpose of use. Full DOB, address, and NPI are revealed only when PHI is unmasked — all unmask events are audit-logged per HIPAA §164.514. PHI auto-relocks after 5 minutes of user inactivity (stays unlocked while actively working a member).</p>
              </div>
          </div>
        </div>
      );
    }

    // ── Outreach Queue ────────────────────────────────────────────────────────
    function OutreachQueue({ members, onPick, phiVisible, currentUser }) {
      const queues = [
        { key: 'Not Attempted', headerClass: 'queue-h-not-attempted', desc: 'First touch needed' },
        { key: 'Left Voicemail', headerClass: 'queue-h-voicemail', desc: 'Awaiting callback' },
        { key: 'Scheduled', headerClass: 'queue-h-scheduled', desc: 'Appointment set' },
        { key: 'Reached — Pending', headerClass: 'queue-h-pending', desc: 'Engaged, action pending' },
      ];
      // Per-column filters for the outreach queue.
      // Persisted so they survive navigation to a member detail and back.
      const Q_COLS_EMPTY = { name:'', id:'', measure:'', priority:'', line:'' };
      const [qCols, setQCols] = useState(() => {
        try { return { ...Q_COLS_EMPTY, ...(JSON.parse(localStorage.getItem('acm-outreach-cols') || '{}')) }; }
        catch(e) { return { ...Q_COLS_EMPTY }; }
      });
      useEffect(() => {
        try { localStorage.setItem('acm-outreach-cols', JSON.stringify(qCols)); } catch(e) {}
      }, [qCols]);
      const setQCol = (k, v) => setQCols(prev => ({ ...prev, [k]: v }));
      const clearQCols = () => setQCols({ ...Q_COLS_EMPTY });
      const hasQCols = Object.values(qCols).some(v => v !== '');
      const match = (m) => {
        if (qCols.name) {
          const hay = phiVisible ? `${m.first} ${m.last} ${m.initials}` : m.initials;
          if (!hay.toLowerCase().includes(qCols.name.toLowerCase())) return false;
        }
        if (qCols.id && !(m.id||'').toLowerCase().includes(qCols.id.toLowerCase())) return false;
        if (qCols.measure && !(m.gaps||[]).join(' ').toLowerCase().includes(qCols.measure.toLowerCase())) return false;
        if (qCols.priority && !(m.priority||'').toLowerCase().includes(qCols.priority.toLowerCase())) return false;
        if (qCols.line && !(m.healthPlanName||'').toLowerCase().includes(qCols.line.toLowerCase())) return false;
        return true;
      };

      // ── Outreach Queue CSV export ──────────────────────────────────────
      // Exports every member visible across the 4 queue columns under the
      // current filters. Status (queue column) is included so the file is
      // self-describing — without it you'd lose the bucket information that
      // the kanban view encodes visually.
      const handleExportCsv = () => {
        const exportable = (members || []).filter(match);
        const headers = ['Member ID', 'Initials', 'Name (last, first)', 'Priority', 'Risk Score', 'Open Gaps Count', 'Open Gaps', 'Health Plan', 'Line', 'Outreach Status', 'Days Oldest Gap', 'Preferred Contact', 'Best Time', 'Has Pharma', 'Phone (primary)', 'Mobile'];
        const rows = exportable.map(m => [
          m.id, m.initials,
          phiVisible ? `${m.last}, ${m.first}` : '—',
          m.priority, (m.risk || 0).toFixed(2),
          (m.gaps || []).length, (m.gaps || []).join(' · '),
          m.healthPlanName || '', m.line,
          m.outreachStatus || 'Not Attempted',
          m.daysOpen,
          m.preferredContactMethod || '',
          m.preferredContactTime || '',
          m.hasPharma ? 'Y' : 'N',
          phiVisible ? (m.phoneFull || m.phone || '') : (m.phone || ''),
          phiVisible ? (m.mobileFull || m.mobile || '') : (m.mobile || ''),
        ]);
        downloadCsv({
          filename: `UM_Aid_OutreachQueue_${(currentUser && currentUser.id) || 'user'}_${new Date().toISOString().slice(0,10)}.csv`,
          headers, rows,
          meta: {
            title: 'Outreach Queue Export',
            exportedBy: currentUser ? `${currentUser.name} (${currentUser.id})` : 'unknown',
            extra: [
              ['# PHI', phiVisible ? 'REVEALED — names + phone numbers included' : 'masked — initials/IDs only'],
              ['# Column filters', JSON.stringify(qCols).replace(/,/g, ';')],
            ],
          },
        });
      };

      return (
        <div>
          <div className="mb-6 flex items-end justify-between gap-4 flex-wrap">
            <div>
              <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">Queue</div>
              <h2 className="font-display text-3xl font-medium">HEDIS Gap Outreach</h2>
              <p className="font-ui text-sm text-[var(--muted)] mt-1">Your assigned members ranked by priority and gap weight. No file locking — real-time access.</p>
            </div>
            <button onClick={handleExportCsv}
              className="flex items-center gap-1.5 font-ui text-xs uppercase tracking-wider border hairline px-3 py-2 hover:bg-[var(--elevated)] shrink-0">
              <Icon name="download" size={13} /> Export CSV
            </button>
          </div>
          <div className="border hairline bg-[var(--surface)] p-3 mb-4 grid grid-cols-2 md:grid-cols-5 gap-2">
            <div>
              <div className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] mb-0.5">Name / Initials</div>
              <ColFilter value={qCols.name} onChange={v => setQCol('name', v)} placeholder="Filter…" />
            </div>
            <div>
              <div className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] mb-0.5">Member ID</div>
              <ColFilter value={qCols.id} onChange={v => setQCol('id', v)} placeholder="Filter…" />
            </div>
            <div>
              <div className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] mb-0.5">HEDIS Gap</div>
              <ColFilter value={qCols.measure} onChange={v => setQCol('measure', v)} options={MEASURES.map(m => m.code)} />
            </div>
            <div>
              <div className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] mb-0.5">Priority</div>
              <ColFilter value={qCols.priority} onChange={v => setQCol('priority', v)} options={['Critical','High']} />
            </div>
            <div>
              <div className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] mb-0.5">Health Plan</div>
              <ColFilter value={qCols.line} onChange={v => setQCol('line', v)} options={HEALTH_PLANS.map(p => p.name)} />
            </div>
            {hasQCols && (
              <div className="col-span-2 md:col-span-5 flex justify-end">
                <button onClick={clearQCols} className="font-ui text-xs uppercase tracking-wider flex items-center gap-1 text-[var(--status-critical)] hover:underline">
                  <Icon name="x" size={12} /> Clear filters
                </button>
              </div>
            )}
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
            {queues.map(q => {
              const group = members.filter(m => m.outreach === q.key && (m.priority === 'Critical' || m.priority === 'High') && match(m)).slice(0, 10);
              return (
                <div key={q.key} className="border-2 hairline bg-[var(--surface)]">
                  <div className={`px-4 py-3 border-b-2 hairline flex items-center justify-between ${q.headerClass}`}>
                    <div>
                      <div className="font-ui text-[10px] tracking-[0.2em] uppercase font-semibold">{q.key}</div>
                      <div className="font-display text-2xl num mt-0.5 font-medium">{group.length}</div>
                    </div>
                    <div className="font-ui text-[10px] tracking-wider uppercase opacity-80 text-right max-w-[100px]">{q.desc}</div>
                  </div>
                  <div className="divide-y hairline">
                    {group.map(m => (
                      <button key={m.id} onClick={() => onPick(m)} className="w-full text-left p-3 hover:bg-[var(--elevated)]">
                        <div className="flex items-center justify-between">
                          <div className="font-display text-sm font-semibold flex items-center gap-1.5">
                            <MultiMedBadge member={m} />
                            <span>{phiVisible ? `${m.last}, ${m.first[0]}.` : m.initials}</span>
                          </div>
                          <div className="flex items-center gap-1">
                            {m.hasPharma && m.gaps.some(g => ['D-DIAB','D-HTN','D-CHOL','SPC'].includes(g)) && (
                              <span className="text-[9px] tracking-wider uppercase px-1.5 py-0.5 bg-[var(--accent)] text-[var(--on-accent)]">Rx</span>
                            )}
                            {m.gaps.some(g => !['D-DIAB','D-HTN','D-CHOL','SPC'].includes(g)) && (
                              <span className="text-[9px] tracking-wider uppercase px-1.5 py-0.5 border border-[#4a6b52] text-[#4a6b52]">Gap</span>
                            )}
                            <span className={`text-[9px] tracking-wider uppercase px-1.5 py-0.5 ${priorityStyle(m.priority)}`}>{m.priority}</span>
                          </div>
                        </div>
                        <div className="font-ui text-xs text-[var(--muted)] mt-1 flex items-center gap-2 num">
                          <span>{m.id}</span><span>·</span><span>{m.gaps.length} gap{m.gaps.length !== 1 ? 's' : ''}</span>
                          {m.healthPlanShort && <><span>·</span><span className="text-[var(--accent)]">{m.healthPlanShort}</span></>}
                        </div>
                        <div className="flex flex-wrap gap-1 mt-1.5">
                          {m.gaps.slice(0, 3).map(g => {
                            const w = MEASURES.find(x => x.code === g)?.weight || 1;
                            return <span key={g} className={`text-[9px] tracking-wider uppercase px-1 py-0.5 border ${w === 3 ? 'bg-[var(--inverse)] text-[var(--on-inverse)] border-[var(--inverse)]' : 'hairline'}`}>{g}</span>;
                          })}
                        </div>
                        {m.hasPharma && m.nextFillDays <= 14 && (
                          <div className="font-ui text-[10px] text-[var(--status-warn)] mt-1 flex items-center gap-1"><Icon name="alert-circle" size={10} />Refill due {m.nextFillDays}d</div>
                        )}
                      </button>
                    ))}
                    {group.length === 0 && (
                      <div className="p-4 font-ui text-xs text-[var(--muted)] italic flex items-center gap-2">
                        <Icon name="check-circle-2" size={12} className="text-[var(--success)]" /> Queue clear.
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // STAR Rating benchmarks (CMS MY2026 estimates — verify against final CMS Star Ratings Technical Notes)
    const BENCHMARKS = {
      'BCS':    { ncqaAvg: 0.748, planTarget: 0.800, stars4: 0.790, stars5: 0.840 },
      'COL-E':  { ncqaAvg: 0.672, planTarget: 0.730, stars4: 0.720, stars5: 0.780 },
      'CBP':    { ncqaAvg: 0.641, planTarget: 0.700, stars4: 0.690, stars5: 0.750 },
      'CDC-BP': { ncqaAvg: 0.631, planTarget: 0.690, stars4: 0.680, stars5: 0.740 },
      'HBD':    { ncqaAvg: 0.662, planTarget: 0.720, stars4: 0.710, stars5: 0.760 },
      'KED':    { ncqaAvg: 0.694, planTarget: 0.750, stars4: 0.740, stars5: 0.800 },
      'EED':    { ncqaAvg: 0.815, planTarget: 0.850, stars4: 0.840, stars5: 0.890 },
      'MPM':    { ncqaAvg: 0.821, planTarget: 0.860, stars4: 0.850, stars5: 0.900 },
      'TRC':    { ncqaAvg: 0.726, planTarget: 0.780, stars4: 0.770, stars5: 0.830 },
      'FUM':    { ncqaAvg: 0.512, planTarget: 0.580, stars4: 0.560, stars5: 0.640 },
      'SPC':    { ncqaAvg: 0.883, planTarget: 0.910, stars4: 0.900, stars5: 0.940 },
      'D-DIAB': { ncqaAvg: 0.878, planTarget: 0.900, stars4: 0.895, stars5: 0.920 },
      'D-HTN':  { ncqaAvg: 0.891, planTarget: 0.910, stars4: 0.905, stars5: 0.930 },
      'D-CHOL': { ncqaAvg: 0.871, planTarget: 0.890, stars4: 0.885, stars5: 0.910 },
    };

    // ── Performance View ──────────────────────────────────────────────────────
    function PerformanceView({ measures }) {
      const [perfView, setPerfView] = useState('gaps'); // 'gaps' | 'compliance'
      const hedisMeasures = measures.filter(m => !m.pharma);
      const pharmaMeasures = measures.filter(m => m.pharma);
      const maxAll = Math.max(...measures.map(m => gapCount(m) * m.weight));

      const ChartSection = ({ title, items, accent }) => (
        <div className="border-2 hairline bg-[var(--surface)] p-6 mb-4">
          <div className="font-ui text-[11px] tracking-[0.2em] uppercase mb-4 flex items-center gap-2" style={{color: accent ? 'var(--accent)' : '#b8923a'}}>
            <Icon name={accent ? 'target' : 'pill'} size={13} />
            {title} <span className="text-[var(--muted)]">({items.length} measures)</span>
          </div>
          <div className="space-y-2.5">
            {[...items].sort((a,b) => gapCount(b)*b.weight - gapCount(a)*a.weight).map(m => {
              const weighted = gapCount(m) * m.weight;
              const pct = weighted / maxAll;
              const fillClass = m.weight === 3 ? 'fill-w3' : m.weight === 2 ? 'fill-w2' : 'fill-w1';
              const delta = performanceVsTarget(m); const meeting = delta >= 0;
              return (
                <div key={m.code} className="grid grid-cols-12 gap-3 items-center">
                  <div className="col-span-2 font-display font-semibold num text-sm flex items-center gap-1">
                    {m.code}
                    {m.pharma && <span className="text-[8px] border border-[var(--accent)] text-[var(--accent)] px-0.5">Rx</span>}
                  </div>
                  <div className="col-span-5">
                    <div className="h-6 border hairline overflow-hidden">
                      <svg className="progress-svg h-6" viewBox="0 0 100 6" preserveAspectRatio="none" aria-hidden>
                        <rect x="0" y="0" width={pct * 100} height="6" className={fillClass} />
                      </svg>
                    </div>
                  </div>
                  <div className="col-span-1 font-ui text-xs text-right text-[var(--muted)]">{m.weight}×</div>
                  <div className="col-span-1 font-display num text-right text-base font-medium">{weighted.toLocaleString()}</div>
                  <div className={`col-span-1 font-ui text-xs text-right font-semibold ${meeting ? 'text-[var(--accent)]' : 'text-[var(--status-warn)]'}`}>
                    {delta>=0?'+':''}{(delta*100).toFixed(1)}
                  </div>
                  <div className="col-span-2 font-ui text-[10px] text-[var(--muted)] truncate">{m.name}</div>
                </div>
              );
            })}
          </div>
        </div>
      );

      // Compliance rate table with benchmarks
      const ComplianceTable = ({ items, title }) => (
        <div className="border-2 hairline bg-[var(--surface)] p-6 mb-4">
          <div className="font-ui text-[11px] tracking-[0.2em] uppercase mb-4 text-[var(--accent)] flex items-center gap-2">
            <Icon name="bar-chart-2" size={13} /> {title}
          </div>
          <div className="overflow-x-auto">
            <table className="w-full font-ui text-xs">
              <thead>
                <tr className="border-b-2 hairline">
                  <th className="text-left px-2 py-2 text-[var(--muted)] uppercase tracking-wider font-semibold">Measure</th>
                  <th className="text-right px-2 py-2 text-[var(--muted)] uppercase tracking-wider font-semibold">Rate</th>
                  <th className="text-right px-2 py-2 text-[var(--muted)] uppercase tracking-wider font-semibold">vs Target</th>
                  <th className="text-right px-2 py-2 text-[var(--muted)] uppercase tracking-wider font-semibold">NCQA Avg</th>
                  <th className="text-right px-2 py-2 text-[var(--muted)] uppercase tracking-wider font-semibold">4★ Cut</th>
                  <th className="text-right px-2 py-2 text-[var(--muted)] uppercase tracking-wider font-semibold">5★ Cut</th>
                  <th className="px-2 py-2 text-[var(--muted)] uppercase tracking-wider font-semibold">Gap to 4★</th>
                </tr>
              </thead>
              <tbody>
                {[...items].sort((a,b) => {
                  const bm_a = BENCHMARKS[a.code]; const bm_b = BENCHMARKS[b.code];
                  const rate_a = bm_a ? (a.num / a.denom) : 0;
                  const rate_b = bm_b ? (b.num / b.denom) : 0;
                  const gap_a = bm_a ? (bm_a.stars4 - rate_a) : 0;
                  const gap_b = bm_b ? (bm_b.stars4 - rate_b) : 0;
                  return gap_b - gap_a;
                }).map(m => {
                  const bm = BENCHMARKS[m.code];
                  const rate = m.denom > 0 ? m.num / m.denom : 0;
                  const target = bm?.planTarget || 0;
                  const vsTarget = rate - target;
                  const gapTo4 = bm ? (bm.stars4 - rate) : null;
                  const at4 = gapTo4 !== null && gapTo4 <= 0;
                  const at5 = bm ? (rate >= bm.stars5) : false;
                  return (
                    <tr key={m.code} className="border-t hairline hover:bg-[var(--elevated)]">
                      <td className="px-2 py-2">
                        <span className="font-display font-bold num text-sm text-[var(--accent)]">{m.code}</span>
                        <span className="font-ui text-[11px] text-[var(--muted)] ml-2 hidden md:inline">{m.name}</span>
                      </td>
                      <td className="px-2 py-2 text-right num font-semibold">
                        <span className={at5 ? 'text-[var(--success)]' : at4 ? 'text-[var(--accent)]' : 'text-[var(--status-warn)]'}>
                          {(rate * 100).toFixed(1)}%
                          {at5 && <span className="ml-1 text-[10px]">★★★★★</span>}
                          {at4 && !at5 && <span className="ml-1 text-[10px]">★★★★</span>}
                        </span>
                      </td>
                      <td className={`px-2 py-2 text-right num font-semibold ${vsTarget >= 0 ? 'text-[var(--success)]' : 'text-[var(--status-warn)]'}`}>
                        {vsTarget >= 0 ? '+' : ''}{(vsTarget * 100).toFixed(1)}%
                      </td>
                      <td className="px-2 py-2 text-right num text-[var(--muted)]">{bm ? (bm.ncqaAvg * 100).toFixed(1) + '%' : '—'}</td>
                      <td className="px-2 py-2 text-right num text-[var(--muted)]">{bm ? (bm.stars4 * 100).toFixed(1) + '%' : '—'}</td>
                      <td className="px-2 py-2 text-right num text-[var(--muted)]">{bm ? (bm.stars5 * 100).toFixed(1) + '%' : '—'}</td>
                      <td className="px-2 py-2">
                        {gapTo4 !== null && (
                          at4 ? (
                            <span className="font-ui text-[10px] text-[var(--success)] font-semibold flex items-center gap-0.5">
                              <Icon name="check-circle-2" size={10} /> At/above cut
                            </span>
                          ) : (
                            <div className="flex items-center gap-2">
                              <div className="flex-1 bg-[var(--progress-track)] rounded-full h-1.5 min-w-[40px]">
                                <div className="bg-[var(--status-warn)] h-1.5 rounded-full" style={{width: Math.min(100, (rate / bm.stars4) * 100) + '%'}} />
                              </div>
                              <span className="font-ui text-[10px] text-[var(--status-warn)] num">-{(gapTo4 * 100).toFixed(1)}%</span>
                            </div>
                          )
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );

      return (
        <div>
          <div className="flex items-end justify-between mb-6 flex-wrap gap-4">
            <div>
              <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">Performance</div>
              <h2 className="font-display text-3xl font-medium">
                {perfView === 'gaps' ? 'Weighted gap load by measure' : 'Compliance rates vs benchmarks'}
              </h2>
              <p className="font-ui text-sm text-[var(--muted)] mt-1 max-w-2xl">
                {perfView === 'gaps' ? 'Gap count × STAR weight. Clinical and pharmacy measures shown separately.' : 'Current compliance rate vs NCQA national average, plan target, and 4★ / 5★ cut points. Sorted by gap to 4★ (worst first).'}
              </p>
            </div>
            <div className="flex items-center gap-0 border-2 hairline overflow-hidden shrink-0">
              {[['gaps','Gap Load','bar-chart-2'],['compliance','vs Benchmarks','target']].map(([v, label, icon]) => (
                <button key={v} onClick={() => setPerfView(v)}
                  className={`font-ui text-[11px] uppercase tracking-wider px-4 py-2 flex items-center gap-1.5 ${perfView === v ? 'bg-[var(--inverse)] text-[var(--on-inverse)]' : 'hover:bg-[var(--elevated)]'}`}>
                  <Icon name={icon} size={12} /> {label}
                </button>
              ))}
            </div>
          </div>

          {perfView === 'gaps' ? (
            <>
              <ChartSection title="HEDIS Clinical &amp; Preventive Gaps" items={hedisMeasures} accent={true} />
              <ChartSection title="Pharmacy Gaps" items={pharmaMeasures} accent={false} />
            </>
          ) : (
            <>
              <ComplianceTable title="HEDIS Clinical &amp; Preventive — vs STAR Benchmarks" items={hedisMeasures} />
              <ComplianceTable title="Pharmacy Adherence — vs STAR Benchmarks" items={pharmaMeasures} />
              <div className="border hairline p-4 bg-[var(--elevated)] font-ui text-[11px] text-[var(--muted)] leading-relaxed">
                <strong className="text-[var(--text)] uppercase tracking-wider text-[9px]">Benchmark note: </strong>
                4★ and 5★ cut points are estimates based on CMS MY2026 Star Ratings patterns. Verify against the final CMS Star Ratings Technical Notes before plan reporting. NCQA Avg reflects the national plan average from the most recent HEDIS Measures of Quality report.
              </div>
            </>
          )}

          <div className="mt-2 border hairline p-4 bg-[var(--elevated)] font-ui text-xs text-[var(--muted)] flex items-center gap-6 flex-wrap">
            <span className="flex items-center gap-2"><span className="w-3 h-3 bg-[var(--inverse)]" /> Triple-weighted (3×)</span>
            <span className="flex items-center gap-2"><span className="w-3 h-3 bg-[var(--accent)]" /> Double-weighted (2×)</span>
            <span className="flex items-center gap-2"><span className="w-3 h-3 bg-[#b8923a]" /> Single-weighted (1×)</span>
            <span className="flex items-center gap-2"><span className="border border-[var(--accent)] text-[var(--accent)] px-1 text-[9px]">Rx</span> Pharmacy/adherence measure</span>
          </div>
          <div className="mt-4 border hairline p-4 bg-[var(--elevated)] font-ui text-xs text-[var(--muted)] leading-relaxed">
            <div className="font-semibold text-[var(--text)] uppercase tracking-[0.2em] text-[10px] mb-1">Methodology note</div>
            Weights reflect CMS MY2026 Star Ratings schedule. Part D adherence measures are temporarily 1× in MY2026 and expected to return to 3× in MY2027. HEDIS comprises ~26% of overall Star Rating. Patient experience/access measures reduced to 2× for 2026.
          </div>
        </div>
      );
    }

    // ── Audit Trail ───────────────────────────────────────────────────────────
    function AuditTrail({ log, currentUser, isDirector, phiVisible, onPickMember, members }) {
      const [filterCM, setFilterCM] = useState('All');
      const [filterOutcome, setFilterOutcome] = useState('All');
      const [auditCols, setAuditCols] = useState({ time:'', cm:'', member:'', measure:'', outcome:'', notes:'', nextAction:'', due:'' });
      const setACol = (k, v) => setAuditCols(prev => ({ ...prev, [k]: v }));
      const clearACols = () => setAuditCols({ time:'', cm:'', member:'', measure:'', outcome:'', notes:'', nextAction:'', due:'' });
      const hasACols = Object.values(auditCols).some(v => v !== '');

      const visible = isDirector ? log : log.filter(a => a.whoId === currentUser.id);
      const filtered = visible.filter(a => {
        if (filterCM !== 'All' && a.whoId !== filterCM) return false;
        if (filterOutcome !== 'All' && a.outcome !== filterOutcome) return false;
        if (auditCols.time && !(a.displayTime||'').toLowerCase().includes(auditCols.time.toLowerCase())) return false;
        if (auditCols.cm && a.whoId !== auditCols.cm) return false;
        if (auditCols.member && !((a.memberId||'')+' '+(a.memberName||'')).toLowerCase().includes(auditCols.member.toLowerCase())) return false;
        if (auditCols.measure && !(a.measure||'').toLowerCase().includes(auditCols.measure.toLowerCase())) return false;
        if (auditCols.outcome && !(a.outcome||'').toLowerCase().includes(auditCols.outcome.toLowerCase())) return false;
        if (auditCols.notes && !(a.notes||'').toLowerCase().includes(auditCols.notes.toLowerCase())) return false;
        if (auditCols.nextAction && !(a.nextAction||'').toLowerCase().includes(auditCols.nextAction.toLowerCase())) return false;
        if (auditCols.due && !String(a.daysUntilAction||'').startsWith(auditCols.due)) return false;
        return true;
      });

      const handleExportCsv = () => {
        // Exports the CURRENTLY FILTERED set, not the entire log. This
        // matches user mental model: "I just narrowed it down, export
        // exactly what I'm seeing." Filter values are written into the
        // metadata block so the export is self-describing for audit.
        const headers = ['Timestamp','Care Manager','CM ID','Member ID','Member','Measure','Outcome','Notes','Next Action','Days Until Due'];
        const rows = filtered.map(a => {
          const m = members && members.find(mb => mb.id === a.memberId);
          const nameDisplay = phiVisible && m ? `${m.last}, ${m.first}` : (a.memberName || '—');
          return [
            a.displayTime, a.who, a.whoId,
            a.memberId, nameDisplay, a.measure,
            a.outcome, a.notes, a.nextAction || '', a.daysUntilAction != null ? a.daysUntilAction : '',
          ];
        });
        downloadCsv({
          filename: `UM_Aid_Activity_${currentUser.id}_${new Date().toISOString().slice(0,10)}.csv`,
          headers, rows,
          meta: {
            title: 'Activity / Audit Trail',
            exportedBy: `${currentUser.name} (${currentUser.id})`,
            extra: [
              ['# Scope', isDirector ? 'Full team (director view)' : 'My own activity only'],
              ['# PHI', phiVisible ? 'REVEALED — names included' : 'masked — initials/IDs only'],
              ['# Care Manager filter', filterCM],
              ['# Outcome filter', filterOutcome],
              ['# Column filters', JSON.stringify(auditCols).replace(/,/g, ';')],
            ],
          },
        });
      };

      return (
        <div>
          <div className="mb-6 flex items-end justify-between gap-4 flex-wrap">
            <div>
              <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">{isDirector ? 'Audit Trail' : 'My Activity'}</div>
              <h2 className="font-display text-3xl font-medium">
                {isDirector ? 'Real-time team visibility' : 'Your contact log'}
              </h2>
              <p className="font-ui text-sm text-[var(--muted)] mt-1">
                {isDirector ? 'Every outreach action logged with who, what, when, and outcome. No Excel required.' : 'Your logged contacts this session. All actions are permanently audit-recorded.'}
              </p>
            </div>
            <button onClick={handleExportCsv}
              className="flex items-center gap-1.5 font-ui text-xs uppercase tracking-wider border hairline px-3 py-2 hover:bg-[var(--elevated)] shrink-0">
              <Icon name="download" size={13} /> Export CSV
            </button>
          </div>

          {isDirector && (
            <div className="grid grid-cols-2 md:grid-cols-4 border-2 hairline mb-6 bg-[var(--surface)]">
              {CARE_MANAGERS.filter(c => c.id !== 'super').map((cm, i) => {
                const cmCount = log.filter(a => a.whoId === cm.id).length;
                return (
                  <button key={cm.id} onClick={() => setFilterCM(filterCM === cm.id ? 'All' : cm.id)}
                    className={`p-4 text-left border-r hairline border-b hairline hover:bg-[var(--elevated)] ${filterCM === cm.id ? 'bg-[var(--accent)] text-[var(--on-accent)]' : ''}`}>
                    <div className={`font-ui text-[10px] tracking-[0.15em] uppercase mb-1 ${filterCM === cm.id ? 'text-[var(--kpi-sub)]' : 'text-[var(--muted)]'}`}>{cm.role}</div>
                    <div className="font-display text-2xl num font-medium">{cmCount}</div>
                    <div className={`font-ui text-xs mt-1 ${filterCM === cm.id ? 'text-[var(--kpi-sub)]' : 'text-[var(--muted)]'}`}>{cm.name}</div>
                  </button>
                );
              })}
            </div>
          )}

          <div className="flex items-center gap-4 mb-4 flex-wrap">
            {isDirector && (
              <div className="flex items-center gap-2">
                <span className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)]">Care Manager</span>
                <select value={filterCM} onChange={e => setFilterCM(e.target.value)}
                  className="font-ui text-sm border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)]">
                  <option value="All">All</option>
                  {CARE_MANAGERS.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
            )}
            <div className="flex items-center gap-2">
              <span className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)]">Outcome</span>
              <select value={filterOutcome} onChange={e => setFilterOutcome(e.target.value)}
                className="font-ui text-sm border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)]">
                {['All','Reached','Left VM','No Answer','Scheduled','Refused','Disconnected'].map(o => <option key={o}>{o}</option>)}
              </select>
            </div>
            <div className="flex items-center gap-3 ml-auto">
              {hasACols && (
                <button onClick={clearACols}
                  className="font-ui text-xs uppercase tracking-wider flex items-center gap-1 text-[var(--status-critical)] hover:underline">
                  <Icon name="x" size={12} /> Clear column filters
                </button>
              )}
              <div className="font-ui text-xs text-[var(--muted)]">{filtered.length} entries</div>
            </div>
          </div>

          <div className="border-2 hairline bg-[var(--surface)] overflow-x-auto">
            <table className="w-full">
              <thead>
                <tr className="bg-[var(--elevated)] font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--text)]">
                  <th className="text-left px-4 py-3 font-semibold">Timestamp</th>
                  {isDirector && <th className="text-left px-4 py-3 font-semibold">Care Manager</th>}
                  <th className="text-left px-4 py-3 font-semibold">Member</th>
                  <th className="text-left px-4 py-3 font-semibold">Measure</th>
                  <th className="text-left px-4 py-3 font-semibold">Outcome</th>
                  <th className="text-left px-4 py-3 font-semibold">Notes</th>
                  <th className="text-left px-4 py-3 font-semibold">Next Action</th>
                  <th className="text-left px-4 py-3 font-semibold">Due</th>
                </tr>
                <tr className="bg-[var(--surface)] border-t hairline">
                  <th className="px-2 py-1.5"><ColFilter value={auditCols.time} onChange={v => setACol('time', v)} placeholder="Date / time" /></th>
                  {isDirector && <th className="px-2 py-1.5"><ColFilter value={auditCols.cm} onChange={v => setACol('cm', v)} options={CARE_MANAGERS.map(c => ({ value: c.id, label: `${c.initials} · ${c.name}` }))} /></th>}
                  <th className="px-2 py-1.5"><ColFilter value={auditCols.member} onChange={v => setACol('member', v)} placeholder="Member ID / name" /></th>
                  <th className="px-2 py-1.5"><ColFilter value={auditCols.measure} onChange={v => setACol('measure', v)} options={MEASURES.map(m => m.code)} /></th>
                  <th className="px-2 py-1.5"><ColFilter value={auditCols.outcome} onChange={v => setACol('outcome', v)} options={['Reached','Left VM','No Answer','Scheduled','Refused','Disconnected','Reassigned']} /></th>
                  <th className="px-2 py-1.5"><ColFilter value={auditCols.notes} onChange={v => setACol('notes', v)} placeholder="Notes keyword" /></th>
                  <th className="px-2 py-1.5"><ColFilter value={auditCols.nextAction} onChange={v => setACol('nextAction', v)} placeholder="Next action" /></th>
                  <th className="px-2 py-1.5"><ColFilter value={auditCols.due} onChange={v => setACol('due', v)} placeholder="Days" /></th>
                </tr>
              </thead>
              <tbody className="font-ui text-sm">
                {filtered.map((a, i) => (
                  <tr key={a.id} className="log-row border-t hairline">
                    <td className="px-4 py-3 text-xs num text-[var(--muted)] whitespace-nowrap">{a.displayTime}</td>
                    {isDirector && (
                      <td className="px-4 py-3">
                        <div className="flex items-center gap-2">
                          <span className="w-6 h-6 bg-[var(--accent)] text-[var(--on-accent)] text-[9px] font-semibold flex items-center justify-center">{a.whoInitials}</span>
                          <span className="text-sm">{a.who}</span>
                        </div>
                      </td>
                    )}
                    <td className="px-4 py-3 text-xs num">
                      {(() => {
                        const m = members && members.find(mb => mb.id === a.memberId);
                        const nameDisplay = phiVisible && m ? `${m.last}, ${m.first}` : a.memberName;
                        const inner = (
                          <div>
                            <div className="font-semibold text-[var(--text)]">{nameDisplay}</div>
                            <div className="text-[var(--muted)]">{a.memberId}</div>
                            {phiVisible && m && (
                              <>
                                <div className="text-[var(--muted)] mt-0.5">DOB: {m.dobFull}</div>
                                <div className="text-[var(--muted)]">{m.phoneFull}</div>
                                {m.healthPlanName && <div className="text-[var(--accent)] font-medium">{m.healthPlanName}</div>}
                                <div className="text-[var(--muted)]">{m.line} · Age {m.age}</div>
                              </>
                            )}
                          </div>
                        );
                        return onPickMember && m ? (
                          <button onClick={() => onPickMember(m)} className="text-left hover:underline w-full">{inner}</button>
                        ) : inner;
                      })()}
                    </td>
                    <td className="px-4 py-3">
                      <span className="text-[10px] tracking-wider uppercase bg-[var(--inverse)] text-[var(--on-inverse)] px-1.5 py-0.5">{a.measure}</span>
                    </td>
                    <td className="px-4 py-3">
                      <span className={`text-sm font-medium ${outcomeStyle(a.outcome)}`}>{a.outcome}</span>
                    </td>
                    <td className="px-4 py-3 text-xs text-[var(--muted)] max-w-[220px]">{a.notes}</td>
                    <td className="px-4 py-3 text-xs">{a.nextAction || '—'}</td>
                    <td className="px-4 py-3 text-xs num text-[var(--muted)]">{a.daysUntilAction ? `${a.daysUntilAction}d` : '—'}</td>
                  </tr>
                ))}
                {filtered.length === 0 && (
                  <tr><td colSpan={isDirector ? 8 : 7} className="px-6 py-10 text-center font-ui text-sm">
                    <div className="flex flex-col items-center gap-2 text-[var(--muted)]">
                      <Icon name="clipboard-list" size={24} className="text-[var(--dim)]" />
                      <div className="italic">No entries yet. Log a contact from a member record to see it here.</div>
                      {hasACols && (
                        <button onClick={clearACols}
                          className="font-ui text-[11px] uppercase tracking-wider text-[var(--accent)] hover:underline flex items-center gap-1 mt-1">
                          <Icon name="x" size={11} /> Clear column filters
                        </button>
                      )}
                    </div>
                  </td></tr>
                )}
              </tbody>
            </table>
          </div>

          <div className="mt-4 border hairline p-4 bg-[var(--elevated)] font-ui text-xs text-[var(--muted)]">
            <span className="font-semibold text-[var(--text)] uppercase tracking-[0.15em] text-[10px]">Audit policy: </span>
            All contact log entries are immutable once saved. Each entry records: care manager identity, timestamp, member ID, measure, outcome, and notes. This log replaces manual Excel tracking and provides real-time leadership visibility per UM_Aid IPA quality operations policy.
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // ROOT APP
    // ══════════════════════════════════════════════════════════════════════════
    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [theme, setTheme] = useState(getStoredTheme);
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        try { localStorage.setItem('acm-theme', theme); } catch (e) {}
      }, [theme]);
      const toggleTheme = useCallback(() => setTheme(t => t === 'light' ? 'dark' : t === 'dark' ? 'blue-a11y' : 'light'), []);

      const handleLogin = (user) => setCurrentUser(user);
      const handleLogout = () => {
        // Filters are session work-state — clear them on logout so the next
        // login starts clean. Card collapse state (acm-acc:*), theme, zoom,
        // and other personal preferences are intentionally NOT touched.
        try {
          localStorage.removeItem('acm-worklist-search');
          localStorage.removeItem('acm-worklist-filters');
          localStorage.removeItem('acm-worklist-cols');
          localStorage.removeItem('acm-pharma-filter');
          localStorage.removeItem('acm-pharm-cols');
          localStorage.removeItem('acm-pharm-page');
        } catch (e) {}
        setCurrentUser(null);
      };

      if (!currentUser) return <LoginScreen onLogin={handleLogin} theme={theme} onToggleTheme={toggleTheme} />;
      return <Dashboard currentUser={currentUser} onLogout={handleLogout} theme={theme} onToggleTheme={toggleTheme} onSetTheme={setTheme} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    setTimeout(() => {
      const loader = document.getElementById('loading');
      if (loader) loader.classList.add('hidden');
    }, 120);
  </script>
</body>
</html>
