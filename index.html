                </div>
                <div className="mt-6 flex items-center justify-between border-t hairline pt-4">
                  <button
                    onClick={() => { setConfig({ ...DEFAULT_CONFIG }); saveConfig({ ...DEFAULT_CONFIG }); }}
                    className="font-ui text-xs uppercase tracking-wider text-[var(--status-critical)] hover:underline">Reset to defaults</button>
                  <button onClick={() => setShowAdmin(false)} className="font-ui text-xs uppercase tracking-[0.2em] bg-[var(--inverse)] text-[var(--on-inverse)] px-4 py-2 hover:opacity-90">Done</button>
                </div>
              </div>
            </div>
          )}

          {/* Masthead */}
          <header className="border-b-2 hairline bg-[var(--surface)] relative grain">
            <div className="max-w-[1440px] mx-auto px-6 py-6">
              <div className="flex items-start justify-between gap-8 flex-wrap">
                <div>
                  <div className="font-ui text-[11px] tracking-[0.25em] text-[var(--accent)] mb-1">UM_Aid IPA · QUALITY OPERATIONS</div>
                  <h1 className="font-display text-5xl md:text-6xl leading-[0.95] tracking-tight font-medium masthead-display-opsz">
                    Care Manager <span className="text-[var(--accent)] font-medium">NaviStation</span>
                  </h1>
                  <div className="font-ui text-sm text-[var(--muted)] mt-2 flex items-center gap-4 flex-wrap">
                    <span>HEDIS / STARS · Measurement Year 2026</span>
                    <span className="text-[var(--dim)]">·</span>
                    <span>Pharmacy · Outreach Tracking</span>
                    <span className="text-[var(--dim)]">·</span>
                    <span className="num">As of {new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})} · {new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})} PT</span>
                  </div>
                </div>
                <div className="border-2 hairline bg-[var(--surface)] p-4 min-w-[140px]">
                  <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] mb-1">Assigned</div>
                  <div className="font-display text-3xl num font-medium">{myMembers.length}</div>
                  <div className="font-ui text-xs text-[var(--muted)] mt-1">{isDirector ? 'all members' : 'your members'}</div>
                </div>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-0 mt-8 border-t hairline border-b">
                <Kpi label="Open Care Gaps" value={totals.openGaps.toLocaleString()} sub="health plan total" delta={-142} deltaLabel="vs last week" accent />
                <Kpi label="Weighted Gap Load" value={totals.weighted.toLocaleString()} sub="my total · gaps × weight" delta={-58} deltaLabel="vs last week" />
                <Kpi label="At-Risk Members" value={totals.atRisk.toLocaleString()} sub="Critical + High" delta={+4} deltaLabel="vs last week" deltaInverse />
                <Kpi label="My Outreach Logged" value={totals.myContacts.toLocaleString()} sub="this session" delta={null} last />
              </div>
            </div>
          </header>

          {/* Nav */}
          <nav ref={navRef} className="border-b-2 hairline bg-[var(--surface)] sticky top-0 z-10" style={{borderBottomWidth:'3px'}}>
            <div className="max-w-[1440px] mx-auto px-6 flex items-center gap-0 font-ui text-sm overflow-x-auto">
              {NAV.map(t => (
                <button key={t.id} onClick={() => { setView(t.id); setSelectedMeasure(null); setSelectedMember(null); }}
                  className={`flex items-center gap-2 px-5 py-4 tracking-wide uppercase text-[12px] font-bold border-r hairline whitespace-nowrap ${activeTab === t.id ? 'tab-active' : 'tab-inactive text-[var(--text)]'}`}>
                  <Icon name={t.icon} size={14} /> {t.label}
                </button>
              ))}
            </div>
          </nav>

          <main className="max-w-[1440px] mx-auto px-6 py-8">
            <ErrorBoundary key={view} onGoHome={() => setView('today')}>
            {view === 'today' && (
              <TodayView
                currentUser={currentUser} myMembers={myMembers} auditLog={auditLog} measures={MEASURES}
                isDirector={isDirector}
                onOpenView={(v) => setView(v)}
                onJumpTo={jumpTo}
                onPickMember={m => openMember(m, 'today')} />
            )}
            {view === 'overview' && (
              <MeasureOverview measures={MEASURES} members={members} currentUser={currentUser} onJumpTo={jumpTo} onSelect={m => { setSelectedMeasure(m); setView('measure-detail'); }} />
            )}
            {view === 'measure-detail' && selectedMeasure && (
              <MeasureDetail measure={selectedMeasure} members={myMembers.filter(m => m.gaps.includes(selectedMeasure.code))} allSystemMembers={members}
                onBack={() => setView('overview')} onPickMember={m => openMember(m, 'overview')} phiVisible={phiVisible} />
            )}
            {view === 'members' && !selectedMember && (
              <MemberWorklist members={filteredMembers} allMembers={myMembers} allSystemMembers={members} allCount={myMembers.length} search={search} setSearch={setSearch}
                filters={filters} setFilters={setFilters}
                onPick={m => openMember(m, 'members')} phiVisible={phiVisible}
                canReassign={canReassign} onReassign={reassignMember} getAssignee={getAssignee} currentUser={currentUser}
                escalations={escalations} gapStatuses={gapStatuses}
                onOpenPharmRoster={openPharmRoster} pharmRoster={pharmRoster}
                extraColIds={rosterExtraColIds} onExtraColsChange={setRosterExtraColIds}
                pharmaCols={dashPharmaCols}
                isBookmarked={isBookmarked} onToggleBookmark={toggleWorkingList} />
            )}
            {view === 'member-detail' && selectedMember && (
              <MemberDetail member={selectedMember}
                onBack={() => { setSelectedMember(null); setView(memberEntryTab); }}
                backLabel={NAV.find(t => t.id === memberEntryTab)?.label || 'Worklist'}
                phiVisible={phiVisible} currentUser={currentUser} onLogCall={logCall} auditLog={auditLog}
                canReassign={canReassign} onReassign={reassignMember} getAssignee={getAssignee}
                gapStatuses={gapStatuses} onUpdateGapStatus={updateGapStatus}
                escalations={escalations} onEscalate={escalateMember}
                medNotes={medNotes} onAddMedNote={addMedNote}
                medBarriers={medBarriers} onAddMedBarrier={addMedBarrier} onResolveMedBarrier={resolveMedBarrier}
                gapDocs={gapDocs} onAddGapDoc={addGapDoc}
                outreachDocs={outreachDocs}
                isBookmarked={isBookmarked} onToggleBookmark={toggleWorkingList}
                onOpenInPharma={() => openMember(selectedMember, 'pharma')} />
            )}
            {view === 'pharma' && (
              <PharmacyView members={myMembers} phiVisible={phiVisible} filters={pharmaFilter} setFilters={setPharmaFilter}
                currentUser={currentUser}
                onPick={m => openMember(m, 'pharma')}
                canReassign={canReassign} onReassign={reassignMember} getAssignee={getAssignee}
                gapStatuses={gapStatuses} onUpdateGapStatus={updateGapStatus}
                escalations={escalations} onEscalate={escalateMember}
                userPrefs={userPrefs} />
            )}
            {view === 'outreach' && (
              <OutreachQueue members={myMembers} onPick={m => openMember(m, 'outreach')} phiVisible={phiVisible} currentUser={currentUser} />
            )}
            {view === 'analytics' && (
              <PerformanceView measures={MEASURES} />
            )}
            {view === 'gap-guide' && <GapGuideView />}
            {view === 'resources' && <ResourceToolsView />}
            {view === 'audit' && (
              <AuditTrail log={auditLog} currentUser={currentUser} isDirector={isDirector} phiVisible={phiVisible}
                members={members} onPickMember={m => openMember(m, 'audit')} />
            )}
            {view === 'settings' && (
              <SettingsView currentUser={currentUser} userPrefs={userPrefs} savePrefs={savePrefs} theme={theme} onToggleTheme={onToggleTheme} onSetTheme={onSetTheme} />
            )}
            </ErrorBoundary>
          </main>

          {/* Open Members tab rail removed per care manager feedback —        */}
          {/* the worklist + member-detail back button covers the workflow.    */}
          {/* The underlying openTabs state is left in place harmlessly so     */}
          {/* nothing else that references it (deep-link navigation, audit)    */}
          {/* breaks; it just no longer renders a sidebar.                     */}

          {/* Persistent Pharmacy Roster popup — lives at Dashboard level so   */}
          {/* it stays open while the user picks members and navigates between */}
          {/* views. Care managers explicitly close it via the X (or Esc).     */}
          {pharmRoster && (
            <PharmacyRosterCard
              location={pharmRoster}
              members={pharmRosterMembers}
              onClose={closePharmRoster}
              onPick={(m) => openMember(m, view === 'pharma' ? 'pharma' : memberEntryTab)}
              phiVisible={phiVisible}
              getAssignee={getAssignee}
              currentUser={currentUser}
              extraColIds={rosterExtraColIds}
              pharmaCols={dashPharmaCols}
            />
          )}

          <footer className="border-t hairline mt-12 py-6 bg-[var(--bg-secondary)] font-ui text-xs text-[var(--muted)]">
            <div className="max-w-[1440px] mx-auto px-6 flex items-center justify-between flex-wrap gap-2">
              <div>Synthetic demonstration data — no real PHI. MY2026 weighting guidance applied. Multi-user access — no file locking.</div>
              <div className="flex items-center gap-4">
                <span>NCQA HEDIS® MY2026</span>
                <span>CMS Star Ratings 2026</span>
                <span>UM_Aid IPA · v2.0.0-demo</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }



    // ══════════════════════════════════════════════════════════════════════════
    // SETTINGS VIEW — per-user preferences
    // ══════════════════════════════════════════════════════════════════════════
    // ── PinInput — hoisted to module level so React never remounts it on rerender ──
    // Defining a component *inside* another component's body causes React to see a
    // brand-new function reference every render → unmount + remount → lost focus.
    function PinInput({ id, label, hint, value, onChange, inputRef, onSubmit }) {
      const onlyDigits = v => v.replace(/\D/g, '').slice(0, 4);
      return (
        <div>
          <label htmlFor={id} className="font-ui text-xs font-semibold text-[var(--text)] mb-1 block">{label}</label>
          {hint && <div className="font-ui text-[10px] text-[var(--muted)] mb-1.5">{hint}</div>}
          <input
            id={id}
            ref={inputRef}
            type="password"
            inputMode="numeric"
            maxLength={4}
            autoComplete="off"
            value={value}
            onChange={e => onChange(onlyDigits(e.target.value))}
            onKeyDown={e => {
              if (e.key === 'Enter') {
                e.preventDefault();
                e.stopPropagation();
                if (onSubmit) onSubmit();
              }
            }}
            placeholder="••••"
            className="font-ui num text-lg tracking-[0.4em] border hairline bg-[var(--surface)] px-4 py-2.5 rounded-lg w-28 text-center focus:outline-none focus:ring-2 focus:ring-[var(--accent)] placeholder:tracking-normal placeholder:text-[var(--placeholder)]"
          />
          <div className="flex gap-1.5 mt-2">
            {[0,1,2,3].map(i => (
              <div key={i} className={`w-2 h-2 rounded-full transition-colors ${i < value.length ? 'bg-[var(--accent)]' : 'bg-[var(--dim)]'}`} />
            ))}
          </div>
        </div>
      );
    }

    // ── PIN Reset — self-service, no save-bar dependency ──────────────────────
    function PinResetSection({ currentUser }) {
      const [currentPin, setCurrentPin]   = useState('');
      const [newPin,     setNewPin]       = useState('');
      const [confirmPin, setConfirmPin]   = useState('');
      const [status,     setStatus]       = useState(null); // { type: 'ok'|'error', msg }
      const newPinRef = useRef(null);

      const validate = () => {
        const actual = getUserPin(currentUser.id);
        if (currentPin !== actual)          return 'Current PIN is incorrect.';
        if (newPin.length < 4)              return 'New PIN must be 4 digits.';
        if (newPin === currentPin)          return 'New PIN must differ from your current PIN.';
        if (newPin !== confirmPin)          return 'PINs do not match.';
        return null;
      };

      const handleSubmit = () => {
        const err = validate();
        if (err) { setStatus({ type: 'error', msg: err }); return; }
        // Goes through the dual-channel helper — writes to both localStorage
        // and a long-lived cookie so managed-environment data clearing on
        // browser exit (a recurring user complaint) doesn't wipe the override.
        setUserPin(currentUser.id, newPin);
        // Sanity-check that at least one channel persisted the value.
        const verify = getUserPin(currentUser.id);
        if (verify !== newPin) {
          setStatus({ type: 'error', msg: 'Could not save — both browser storage and cookies appear to be blocked. Contact IT.' });
          return;
        }
        clearPinLock(currentUser.id);
        setCurrentPin(''); setNewPin(''); setConfirmPin('');
        setStatus({ type: 'ok', msg: 'PIN updated. Use it the next time your session locks.' });
      };

      return (
        <div className="bg-[var(--surface)] border hairline p-6 rounded-xl shadow-sm">
          <div className="flex items-start gap-3 mb-5 pb-3 border-b hairline">
            <div className="w-8 h-8 rounded-lg bg-[var(--accent)] text-[var(--on-accent)] flex items-center justify-center shrink-0 mt-0.5">
              <Icon name="key-round" size={15} />
            </div>
            <div>
              <div className="font-display text-lg font-medium leading-tight">Session Lock PIN</div>
              <div className="font-ui text-xs text-[var(--muted)] mt-0.5">
                Used only to resume your session after an inactivity timeout.
                Login is handled by SSO — this PIN is separate.
              </div>
            </div>
          </div>

          <div className="flex flex-wrap gap-6 items-start">
            <PinInput
              id="pin-current"
              label="Current PIN"
              hint="Your existing 4-digit lock PIN"
              value={currentPin}
              onChange={v => { setCurrentPin(v); setStatus(null); if (v.length === 4) newPinRef.current?.focus(); }}
              onSubmit={handleSubmit}
            />
            <PinInput
              id="pin-new"
              label="New PIN"
              hint="Choose a new 4-digit PIN"
              value={newPin}
              inputRef={newPinRef}
              onChange={v => { setNewPin(v); setStatus(null); }}
              onSubmit={handleSubmit}
            />
            <PinInput
              id="pin-confirm"
              label="Confirm New PIN"
              hint="Re-enter to confirm"
              value={confirmPin}
              onChange={v => { setConfirmPin(v); setStatus(null); }}
              onSubmit={handleSubmit}
            />
          </div>

          <div className="mt-5 flex items-center gap-4 flex-wrap">
            <button
              onClick={handleSubmit}
              disabled={currentPin.length < 4 || newPin.length < 4 || confirmPin.length < 4}
              className="font-ui text-xs uppercase tracking-wider bg-[var(--accent)] text-[var(--on-accent)] px-5 py-2.5 rounded-lg hover:opacity-90 disabled:opacity-35 disabled:cursor-not-allowed flex items-center gap-2 transition-opacity">
              <Icon name="check" size={12} /> Update PIN
            </button>
            {(currentPin || newPin || confirmPin) && (
              <button
                onClick={() => { setCurrentPin(''); setNewPin(''); setConfirmPin(''); setStatus(null); }}
                className="font-ui text-xs text-[var(--muted)] hover:text-[var(--text)] transition-colors">
                Clear
              </button>
            )}
            {status && (
              <div className={`flex items-center gap-1.5 font-ui text-xs ${status.type === 'ok' ? 'text-[var(--success,#4a6b52)]' : 'text-[var(--status-critical)]'}`}>
                <Icon name={status.type === 'ok' ? 'check-circle-2' : 'alert-circle'} size={13} />
                {status.msg}
              </div>
            )}
          </div>

          {!IS_PROD && (
            <div className="mt-4 pt-4 border-t hairline font-ui text-[10px] text-[var(--placeholder)] flex items-center gap-1.5">
              <Icon name="info" size={11} />
              UAT default PIN is <span className="num font-semibold text-[var(--muted)]">0000</span> (care managers) or <span className="num font-semibold text-[var(--muted)]">1111</span> (admins).
              Overrides are stored in browser localStorage.
            </div>
          )}
        </div>
      );
    }

    function SettingsView({ currentUser, userPrefs, savePrefs, theme, onToggleTheme, onSetTheme }) {
      // Local draft state so changes only commit on "Save"
      const [draft, setDraft] = React.useState({ ...userPrefs });
      const [saved, setSaved] = React.useState(false);
      const set = (k, v) => setDraft(prev => ({ ...prev, [k]: v }));

      const handleSave = () => {
        savePrefs({ ...draft });
        setSaved(true);
        setTimeout(() => setSaved(false), 2500);
      };
      const handleReset = () => {
        const defaults = { defaultTab: 'today', pharmaPageSize: 50, rowDensity: 'comfortable', daysLeftThreshold: 7, phiDefault: 'masked' };
        setDraft(defaults);
      };
      const isDirty = JSON.stringify(draft) !== JSON.stringify(userPrefs);

      const NAV_TABS = [
        { id: 'today',     label: 'Today (Home)' },
        { id: 'overview',  label: 'Measures' },
        { id: 'pharma',    label: 'Pharmacy' },
        { id: 'members',   label: 'Worklist' },
        { id: 'outreach',  label: 'Outreach' },
        { id: 'gap-guide', label: 'Gap Guide' },
        { id: 'resources', label: 'Resource Tools' },
        { id: 'audit',     label: 'Activity' },
      ];

      const SectionHeader = ({ icon, title, sub }) => (
        <div className="flex items-start gap-3 mb-5 pb-3 border-b hairline">
          <div className="w-8 h-8 rounded-lg bg-[var(--accent)] text-[var(--on-accent)] flex items-center justify-center shrink-0 mt-0.5">
            <Icon name={icon} size={15} />
          </div>
          <div>
            <div className="font-display text-lg font-medium leading-tight">{title}</div>
            <div className="font-ui text-xs text-[var(--muted)] mt-0.5">{sub}</div>
          </div>
        </div>
      );

      const RadioGroup = ({ label, hint, options, value, onChange }) => (
        <div className="mb-5">
          <div className="font-ui text-sm font-semibold text-[var(--text)] mb-1">{label}</div>
          {hint && <div className="font-ui text-xs text-[var(--muted)] mb-2">{hint}</div>}
          <div className="flex flex-wrap gap-2">
            {options.map(o => (
              <button key={o.value}
                onClick={() => onChange(o.value)}
                className={`px-4 py-2 font-ui text-xs border rounded-lg transition-colors ${value === o.value ? 'bg-[var(--accent)] text-[var(--on-accent)] border-[var(--accent)]' : 'hairline hover:bg-[var(--elevated)]'}`}>
                {o.label}
              </button>
            ))}
          </div>
        </div>
      );

      return (
        <div className="max-w-2xl mx-auto">
          {/* Page header */}
          <div className="mb-8">
            <div className="font-ui text-[10px] tracking-[0.25em] uppercase text-[var(--accent)] mb-1">User Preferences</div>
            <h2 className="font-display text-4xl font-medium leading-tight">Settings</h2>
            <p className="font-ui text-sm text-[var(--muted)] mt-2">
              Preferences are saved per user and stored locally in your browser.
              They carry over across sessions on this device.
            </p>
            <div className="font-ui text-xs text-[var(--subtle)] mt-1">
              Signed in as <span className="text-[var(--text)] font-medium">{currentUser.name}</span>
              <span className="mx-2 text-[var(--dim)]">·</span>
              <span className="text-[var(--subtle)]">{currentUser.role}</span>
            </div>
          </div>

          <div className="space-y-8">

            {/* ── Display & Navigation ─────────────────────────── */}
            <div className="bg-[var(--surface)] border hairline p-6 rounded-xl shadow-sm">
              <SectionHeader icon="layout-dashboard" title="Display & Navigation" sub="Control how the app opens and looks when you log in." />

              <div className="mb-5">
                <div className="font-ui text-sm font-semibold text-[var(--text)] mb-1">Default Landing Tab</div>
                <div className="font-ui text-xs text-[var(--muted)] mb-2">The tab that opens automatically after login.</div>
                <select
                  value={draft.defaultTab}
                  onChange={e => set('defaultTab', e.target.value)}
                  className="font-ui text-sm border hairline bg-[var(--surface)] px-3 py-2 rounded-lg w-full max-w-xs focus:outline-none focus:ring-2 focus:ring-[var(--accent)] focus:ring-offset-1">
                  {NAV_TABS.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
                </select>
              </div>

              <div className="mb-1">
                <div className="font-ui text-sm font-semibold text-[var(--text)] mb-1">Theme</div>
                <div className="font-ui text-xs text-[var(--muted)] mb-3">Applies instantly — no save required.</div>
                <div className="flex flex-wrap gap-2">
                  {[
                    { id: 'light',     label: 'Light',           icon: 'sun',           sub: 'Warm cream' },
                    { id: 'dark',      label: 'Dark',            icon: 'moon',          sub: 'Espresso' },
                    { id: 'blue-a11y', label: 'Blue Accessible', icon: 'accessibility', sub: 'Color-vision friendly' },
                  ].map(t => (
                    <button key={t.id}
                      onClick={() => onSetTheme(t.id)}
                      className={`flex items-center gap-2 px-4 py-2 border rounded-lg transition-colors font-ui text-xs ${theme === t.id ? 'bg-[var(--accent)] text-[var(--on-accent)] border-[var(--accent)]' : 'hairline hover:bg-[var(--elevated)]'}`}>
                      <Icon name={t.icon} size={13} />
                      <span>{t.label}</span>
                      {theme === t.id && <Icon name="check" size={11} />}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* ── Pharmacy Table ───────────────────────────────── */}
            <div className="bg-[var(--surface)] border hairline p-6 rounded-xl shadow-sm">
              <SectionHeader icon="pill" title="Pharmacy Table" sub="Tune the pharmacy grid for your screen and workflow." />

              <RadioGroup
                label="Rows per Page"
                hint="How many members load in each page of the pharmacy table."
                value={String(draft.pharmaPageSize)}
                onChange={v => set('pharmaPageSize', Number(v))}
                options={[{ value: '25', label: '25 rows' }, { value: '50', label: '50 rows' }, { value: '100', label: '100 rows' }]}
              />

              <RadioGroup
                label="Row Density"
                hint="Compact fits more rows on screen. Spacious is easier to scan quickly."
                value={draft.rowDensity}
                onChange={v => set('rowDensity', v)}
                options={[{ value: 'compact', label: 'Compact' }, { value: 'comfortable', label: 'Comfortable' }, { value: 'spacious', label: 'Spacious' }]}
              />

              <div className="mb-1">
                <div className="font-ui text-sm font-semibold text-[var(--text)] mb-1">Days-Left Alert Threshold</div>
                <div className="font-ui text-xs text-[var(--muted)] mb-2">
                  Highlights the Days Left cell in amber when the refill window is at or below this number of days.
                  Default is 7.
                </div>
                <div className="flex items-center gap-3">
                  <input
                    type="number"
                    min={1} max={30}
                    value={draft.daysLeftThreshold}
                    onChange={e => {
                      const v = Math.max(1, Math.min(30, parseInt(e.target.value, 10) || 7));
                      set('daysLeftThreshold', v);
                    }}
                    className="font-ui num text-sm border hairline bg-[var(--surface)] px-3 py-2 rounded-lg w-20 text-center focus:outline-none focus:ring-2 focus:ring-[var(--accent)]"
                  />
                  <span className="font-ui text-xs text-[var(--muted)]">days (1–30)</span>
                  {draft.daysLeftThreshold !== 7 && (
                    <button onClick={() => set('daysLeftThreshold', 7)} className="font-ui text-[10px] text-[var(--accent)] hover:underline">Reset to 7</button>
                  )}
                </div>
                {/* Live preview bar */}
                <div className="mt-3 flex items-center gap-2">
                  <span className="font-ui text-[10px] uppercase tracking-wider text-[var(--muted)]">Preview</span>
                  {[30, 14, draft.daysLeftThreshold, draft.daysLeftThreshold - 1, 0].filter((v,i,a) => v >= 0 && a.indexOf(v) === i).sort((a,b) => b - a).map(d => (
                    <span key={d} className={`font-ui num text-xs px-2 py-0.5 border hairline rounded ${d <= draft.daysLeftThreshold ? 'text-[var(--status-warn)] font-semibold border-[var(--status-warn)]' : 'text-[var(--muted)]'}`}>{d}d</span>
                  ))}
                </div>
              </div>
            </div>

            {/* ── Privacy & Security ───────────────────────────── */}
            <div className="bg-[var(--surface)] border hairline p-6 rounded-xl shadow-sm">
              <SectionHeader icon="shield-check" title="Privacy & Security" sub="Control how protected health information is handled at login." />

              <RadioGroup
                label="PHI Visibility on Login"
                hint="HIPAA best practice is Always Masked. Remember Last State is available for trusted single-user workstations — PHI access is still logged to the audit trail."
                value={draft.phiDefault}
                onChange={v => set('phiDefault', v)}
                options={[
                  { value: 'masked',   label: 'Always start masked' },
                  { value: 'remember', label: 'Remember last state' },
                ]}
              />
              {draft.phiDefault === 'remember' && (
                <div className="flex items-start gap-2 mt-1 p-3 bg-[var(--elevated)] border border-[var(--status-warn)] rounded-lg">
                  <Icon name="alert-triangle" size={14} className="text-[var(--status-warn)] shrink-0 mt-0.5" />
                  <div className="font-ui text-xs text-[var(--muted)] leading-relaxed">
                    PHI state persists across browser sessions on this device. Use only on a personal, locked workstation.
                    All PHI access is still logged per HIPAA minimum necessary policy.
                  </div>
                </div>
              )}
            </div>

            {/* ── Session Lock PIN ────────────────────────────── */}
            <PinResetSection currentUser={currentUser} />

          </div>

          {/* Save bar */}
          <div className="sticky bottom-0 mt-8 -mx-6 px-6 py-4 bg-[var(--bg)] border-t hairline flex items-center justify-between gap-4">
            <button
              onClick={handleReset}
              className="font-ui text-xs uppercase tracking-wider border hairline px-4 py-2 rounded-lg hover:bg-[var(--elevated)] text-[var(--muted)]">
              Restore Defaults
            </button>
            <div className="flex items-center gap-3">
              {saved && (
                <div className="flex items-center gap-1.5 font-ui text-xs text-[var(--success)]">
                  <Icon name="check-circle-2" size={13} /> Saved
                </div>
              )}
              {isDirty && !saved && (
                <span className="font-ui text-[10px] text-[var(--muted)] italic">Unsaved changes</span>
              )}
              <button
                onClick={handleSave}
                disabled={!isDirty}
                className="font-ui text-xs uppercase tracking-wider bg-[var(--accent)] text-[var(--on-accent)] px-6 py-2 rounded-lg hover:opacity-90 disabled:opacity-35 disabled:cursor-not-allowed flex items-center gap-2 transition-opacity">
                <Icon name="save" size={12} /> Save Preferences
              </button>
            </div>
          </div>
        </div>
      );
    }



    // ══════════════════════════════════════════════════════════════════════════
    // TODAY VIEW — personalized post-login dashboard
    // ══════════════════════════════════════════════════════════════════════════
    function TodayView({ currentUser, myMembers, auditLog, measures, isDirector, onOpenView, onJumpTo, onPickMember }) {
      const now = new Date();
      const hr = now.getHours();
      const greeting = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
      const dayString = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      const firstName = (currentUser.name || '').split(' ')[0] || currentUser.name;

      // ── Compute "what I owe today" ──
      // Critical/High priority members are top priority callbacks
      const critical = myMembers.filter(m => m.priority === 'Critical');
      const high     = myMembers.filter(m => m.priority === 'High');
      const overdue  = myMembers.filter(m => m.daysOpen > 60).slice(0, 50); // gaps open > 60 days
      const pharma   = myMembers.filter(m => m.compStatus === 'Non-Compliant').slice(0, 50);
      const notAttempted = myMembers.filter(m => m.outreach === 'Not Attempted').slice(0, 50);

      // My activity from today (synthetic — counts log entries by current user)
      const mineToday = auditLog.filter(a => a.whoId === currentUser.id).length;

      // Weekly trend (synthetic for now — would be derived from real data in prod)
      const callsThisWeek = mineToday + 14;  // running count
      const targetThisWeek = 25;
      const weekProgress = Math.min(100, Math.round((callsThisWeek / targetThisWeek) * 100));

      // Top measure to focus on — highest-weight measure with most gaps
      const focusMeasure = [...measures]
        .filter(m => m.weight === 3)
        .sort((a,b) => (b.denom - b.num) - (a.denom - a.num))[0];

      const Card = ({ children, className = '' }) => (
        <div className={`border hairline bg-[var(--surface)] p-5 ${className}`}>{children}</div>
      );

      return (
        <div className="space-y-6">
          {/* Greeting header */}
          <div className="flex items-end justify-between flex-wrap gap-4">
            <div>
              <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">{dayString}</div>
              <h2 className="font-display text-4xl font-medium">
                {greeting}, <em className="italic text-[var(--accent)] font-normal">{firstName}</em>.
              </h2>
              <p className="font-ui text-sm text-[var(--muted)] mt-2 max-w-2xl leading-relaxed">
                {isDirector
                  ? `You're overseeing ${myMembers.length} members across the team. Here's what needs attention today.`
                  : `You have ${myMembers.length} assigned members. Here's where to start today.`}
              </p>
            </div>
            <button onClick={() => onOpenView('members')}
              className="font-ui text-xs uppercase tracking-wider bg-[var(--accent)] text-[var(--on-accent)] px-4 py-2.5 hover:opacity-90 flex items-center gap-1.5">
              Open Worklist <Icon name="arrow-right" size={13} />
            </button>
          </div>

          {/* Priority queues — what I owe today. Cards link to a filtered view. */}
          <div>
            <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--muted)] mb-3">What needs attention</div>
            <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-3">
              {[
                { key: 'crit',  label: 'Critical priority', icon: 'alert-octagon',   color: 'var(--status-critical)', count: critical.length, sub: critical.length === 1 ? 'member needs same-day outreach' : 'members need same-day outreach', cta: 'Open filtered worklist', onClick: () => onJumpTo('members', { priority: 'Critical' }) },
                { key: 'high',  label: 'High priority',     icon: 'alert-triangle',  color: 'var(--status-warn)',     count: high.length,     sub: high.length === 1 ? 'member needs outreach this week' : 'members need outreach this week', cta: 'Open filtered worklist', onClick: () => onJumpTo('members', { priority: 'High' }) },
                { key: 'over',  label: 'Overdue 60+ days',  icon: 'alarm-clock',     color: 'var(--secondary)',       count: overdue.length,  sub: 'gaps unopened > 60 days', cta: 'Open filtered worklist', onClick: () => onJumpTo('members', { overdueOnly: true }) },
                { key: 'rx',    label: 'Rx non-compliant',  icon: 'pill',            color: 'var(--accent)',          count: pharma.length,   sub: 'PDC < 0.70', cta: 'Open pharmacy view', onClick: () => onJumpTo('pharma', { status: 'Non-Compliant' }) },
              ].map(c => (
                <button key={c.key} onClick={c.onClick} disabled={c.count === 0}
                  className="text-left border hairline bg-[var(--surface)] p-5 hover:bg-[var(--elevated)] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-[var(--surface)] transition-colors group">
                  <div className="flex items-center justify-between mb-2">
                    <div className="font-ui text-[10px] uppercase tracking-[0.15em] text-[var(--muted)]">{c.label}</div>
                    <Icon name={c.icon} size={14} className="shrink-0" />
                  </div>
                  <div className="font-display text-3xl num font-medium" style={{color: c.color}}>{c.count}</div>
                  <div className="font-ui text-[11px] text-[var(--muted)] mt-1">{c.sub}</div>
                  {c.count > 0 && (
                    <div className="mt-3 font-ui text-[10px] uppercase tracking-wider text-[var(--accent)] flex items-center gap-1.5 opacity-70 group-hover:opacity-100 transition-opacity">
                      {c.cta} <Icon name="arrow-right" size={11} />
                    </div>
                  )}
                </button>
              ))}
            </div>
          </div>

          {/* Progress + focus row */}
          <div className="grid md:grid-cols-3 gap-3">
            {/* Week progress */}
            <div className="md:col-span-2 border hairline bg-[var(--surface)] p-5">
              <div className="flex items-center justify-between mb-3">
                <div>
                  <div className="font-ui text-[10px] uppercase tracking-[0.15em] text-[var(--muted)] mb-0.5">My week so far</div>
                  <div className="font-display text-xl font-medium">
                    <span className="num">{callsThisWeek}</span> <span className="text-[var(--muted)] font-normal">of</span> <span className="num">{targetThisWeek}</span> outreach logged
                  </div>
                </div>
                <div className="text-right">
                  <div className="font-display text-3xl num font-medium" style={{color: weekProgress >= 100 ? 'var(--success)' : weekProgress >= 60 ? 'var(--accent)' : 'var(--status-warn)'}}>
                    {weekProgress}<span className="text-lg">%</span>
                  </div>
                  <div className="font-ui text-[10px] uppercase tracking-wider text-[var(--muted)]">of weekly target</div>
                </div>
              </div>
              <div className="relative h-2 rounded-full overflow-hidden" style={{background: 'var(--progress-track)'}}>
                <div className="absolute inset-y-0 left-0 rounded-full transition-all"
                  style={{width: `${weekProgress}%`, background: weekProgress >= 100 ? 'var(--success)' : 'var(--accent)'}} />
              </div>
              <div className="mt-3 flex items-center justify-between font-ui text-[11px] text-[var(--muted)]">
                <span>This session: <strong className="text-[var(--text)] num">{mineToday}</strong></span>
                <span>·</span>
                <span>Target / day: <strong className="text-[var(--text)] num">5</strong></span>
                <span>·</span>
                <span>Days left in week: <strong className="text-[var(--text)] num">{Math.max(0, 5 - now.getDay())}</strong></span>
              </div>
            </div>

            {/* Today's focus measure */}
            {focusMeasure && (
              <div className="border hairline bg-[var(--surface)] p-5 flex flex-col">
                <div className="font-ui text-[10px] uppercase tracking-[0.15em] text-[var(--muted)] mb-1 flex items-center gap-1.5">
                  <Icon name="crosshair" size={11} /> Suggested focus
                </div>
                <div className="font-display text-2xl num font-semibold text-[var(--accent)]">{focusMeasure.code}</div>
                <div className="font-ui text-xs text-[var(--text)] leading-snug mt-0.5">{focusMeasure.name}</div>
                <div className="mt-auto pt-3 flex items-center justify-between font-ui text-[11px]">
                  <div>
                    <div className="text-[var(--muted)] uppercase tracking-wider text-[9px]">Gap count</div>
                    <div className="font-display text-lg num font-medium">{(focusMeasure.denom - focusMeasure.num).toLocaleString()}</div>
                  </div>
                  <div className="text-right">
                    <div className="text-[var(--muted)] uppercase tracking-wider text-[9px]">Weight</div>
                    <div className="font-display text-lg num font-bold">{focusMeasure.weight}×</div>
                  </div>
                </div>
                <button onClick={() => onOpenView('overview')}
                  className="mt-3 w-full font-ui text-[10px] uppercase tracking-wider border hairline px-2 py-1.5 hover:bg-[var(--elevated)] flex items-center justify-center gap-1.5">
                  See measures <Icon name="chevron-right" size={11} />
                </button>
              </div>
            )}
          </div>

          {/* Quick actions */}
          <div className="grid md:grid-cols-3 gap-3">
            <button onClick={() => onOpenView('outreach')}
              className="border hairline bg-[var(--surface)] p-4 text-left hover:bg-[var(--elevated)] flex items-start gap-3">
              <div className="w-10 h-10 rounded-lg bg-[var(--accent)] text-[var(--on-accent)] flex items-center justify-center shrink-0">
                <Icon name="phone-call" size={18} />
              </div>
              <div>
                <div className="font-ui text-sm font-semibold">Continue outreach queue</div>
                <div className="font-ui text-[11px] text-[var(--muted)] mt-0.5">{notAttempted.length} members not yet attempted</div>
              </div>
            </button>

            <button onClick={() => onOpenView('gap-guide')}
              className="border hairline bg-[var(--surface)] p-4 text-left hover:bg-[var(--elevated)] flex items-start gap-3">
              <div className="w-10 h-10 rounded-lg bg-[var(--secondary)] text-white flex items-center justify-center shrink-0">
                <Icon name="book-open" size={18} />
              </div>
              <div>
                <div className="font-ui text-sm font-semibold">Open Gap Guide</div>
                <div className="font-ui text-[11px] text-[var(--muted)] mt-0.5">Uploadable measures, records, portals</div>
              </div>
            </button>

            <button onClick={() => onOpenView('resources')}
              className="border hairline bg-[var(--surface)] p-4 text-left hover:bg-[var(--elevated)] flex items-start gap-3">
              <div className="w-10 h-10 rounded-lg bg-[var(--accent)] text-[var(--on-accent)] flex items-center justify-center shrink-0">
                <Icon name="life-buoy" size={18} />
              </div>
              <div>
                <div className="font-ui text-sm font-semibold">Open Resource Tools</div>
                <div className="font-ui text-[11px] text-[var(--muted)] mt-0.5">Transportation directory</div>
              </div>
            </button>

            <button onClick={() => onOpenView('audit')}
              className="border hairline bg-[var(--surface)] p-4 text-left hover:bg-[var(--elevated)] flex items-start gap-3">
              <div className="w-10 h-10 rounded-lg flex items-center justify-center shrink-0" style={{background: 'var(--success)', color: 'white'}}>
                <Icon name="file-text" size={18} />
              </div>
              <div>
                <div className="font-ui text-sm font-semibold">Review my activity</div>
                <div className="font-ui text-[11px] text-[var(--muted)] mt-0.5">{mineToday} entries this session</div>
              </div>
            </button>
          </div>

          {/* Recent activity preview */}
          {auditLog.length > 0 && (
            <div>
              <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--muted)] mb-3">Recent activity</div>
              <div className="border hairline bg-[var(--surface)] overflow-hidden">
                {auditLog.slice(0, 4).map((entry, i) => (
                  <div key={i} className={`px-4 py-3 flex items-start gap-3 font-ui text-xs ${i !== 3 ? 'border-b hairline' : ''}`}>
                    <div className={`w-7 h-7 rounded-full flex items-center justify-center shrink-0 text-[10px] font-semibold ${
                      entry.outcome === 'Reached' ? 'bg-[var(--success-soft)] text-[var(--success)]' :
                      entry.outcome === 'PHI Revealed' ? 'bg-[var(--secondary-soft)] text-[var(--secondary)]' :
                      'bg-[var(--elevated)] text-[var(--muted)]'
                    }`}>
                      {entry.who?.split(' ').map(w => w[0]).join('').slice(0,2)}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-[var(--text)]">
                        <strong>{entry.who}</strong> {entry.outcome === 'PHI Revealed' ? 'revealed PHI' : `logged ${entry.outcome?.toLowerCase()}`} for <span className="font-semibold">{entry.memberName || '—'}</span>
                      </div>
                      <div className="text-[var(--muted)] text-[11px] mt-0.5 truncate">{entry.notes}</div>
                    </div>
                    <div className="text-[var(--subtle)] text-[10px] shrink-0">{entry.displayTime}</div>
                  </div>
                ))}
                <button onClick={() => onOpenView('audit')}
                  className="w-full px-4 py-2.5 text-center font-ui text-[10px] uppercase tracking-wider text-[var(--accent)] hover:bg-[var(--elevated)] border-t hairline">
                  View all activity →
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

        color: RECORD_SOURCE_COLORS.pcpsubmit,

        url: 'file:///Y:/STAR%20and%20AMP%20Projects/Care%20Gap%20Reports/Gap%20Reports%20sent%20to%20PCPs/_PCP_Submissions',
        desc: 'Last place to look — records that PCP offices emailed or faxed back in response to gap reports.',
        worklistMarker: 'Use this folder after the three sources above have been exhausted.',
      },
    ];

    // Real upload-impactable measures from Gap Measure Guide 2026
    const UPLOAD_MEASURES = [
      {
        code: 'COL', name: 'Colorectal Cancer Screening',
        sourceTag: null,
        evidence: [
          { type: 'Colonoscopy',                                window: '1/1/2017 – 12/31/2026', detail: 'Record or self-reported.' },
          { type: 'FOBT (Fecal Occult Blood Test)',             window: '1/1/2026 – 12/31/2026', detail: 'Kit result with DOS in measurement year.' },
          { type: 'Cologuard (Exact Sciences)',                 window: '1/1/2024 – 12/31/2026', detail: 'Result with DOS within window.' },
        ],

      },
      {

        sourceTag: 'quest',
        evidence: [
          { type: 'Last HbA1c result with DOS in 2026',         window: '1/1/2026 – 12/31/2026', detail: 'Most recent result in the measurement year is used for compliance.' },

        sourceTag: null,

        ],

      },
      {

        sourceTag: null,
        evidence: [

    const LAP_PROVIDER = {

    // ── Portal link editor — per-plan editable link ──────────────────────────
    function PortalLinkEditor({ plan }) {
      const lsKey = `acm-portal-${plan.short.replace(/[^a-z0-9]/gi,'-').toLowerCase()}`;
      const load = () => { try { return JSON.parse(localStorage.getItem(lsKey) || '{}'); } catch(e) { return {}; } };
      const [data, setData] = useState(() => load());
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState({});

      const startEdit = () => { setDraft({ url: data.url || plan.url || '', notes: data.notes || plan.notes || '' }); setEditing(true); };
      const save = () => { try { localStorage.setItem(lsKey, JSON.stringify(draft)); } catch(e) {} setData({...draft}); setEditing(false); };
      const cancel = () => { setEditing(false); setDraft({}); };

      const url   = data.url   !== undefined ? data.url   : plan.url;
      const notes = data.notes !== undefined ? data.notes : plan.notes;

      return (
        <div className="border-2 hairline bg-[var(--surface)] p-4">
          <div className="flex items-start justify-between gap-3 mb-3">
            <div className="flex-1 min-w-0">
              <div className="font-display text-base font-semibold">{plan.name}</div>
              <div className="flex items-center gap-2 mt-0.5 flex-wrap">
                <span className="font-ui text-[10px] uppercase tracking-wider border px-2 py-0.5 border-[var(--accent)] text-[var(--accent)]">{plan.line}</span>
                <span className="font-ui text-[10px] text-[var(--text)] font-semibold">{plan.portalName}</span>
              </div>
            </div>
            <button onClick={editing ? cancel : startEdit}
              className="font-ui text-[10px] uppercase tracking-wider border hairline px-2 py-1 hover:bg-[var(--elevated)] flex items-center gap-1 shrink-0">
              <Icon name={editing ? 'x' : 'pencil'} size={11} /> {editing ? 'Cancel' : 'Edit'}
            </button>
          </div>

          {editing ? (
            <div className="space-y-2">
              <div>
                <label className="font-ui text-[9px] uppercase tracking-[0.2em] text-[var(--muted)] block mb-0.5">Portal URL</label>
                <input value={draft.url || ''} onChange={e => setDraft(d => ({...d, url: e.target.value}))}
                  placeholder="https://portal.example.com"
                  className="w-full font-ui text-xs border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)] text-[var(--text)] placeholder:text-[var(--placeholder)]" />
              </div>
              <div>
                <label className="font-ui text-[9px] uppercase tracking-[0.2em] text-[var(--muted)] block mb-0.5">Notes</label>
                <textarea value={draft.notes || ''} onChange={e => setDraft(d => ({...d, notes: e.target.value}))} rows={2}
                  placeholder="Login instructions, deadlines, contacts, secure email address..."
                  className="w-full font-ui text-xs border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)] text-[var(--text)] placeholder:text-[var(--placeholder)]" />
              </div>
              <button onClick={save} className="font-ui text-[10px] uppercase tracking-wider bg-[var(--accent)] text-[var(--on-accent)] px-3 py-1.5 flex items-center gap-1 hover:opacity-90">
                <Icon name="check" size={11} /> Save
              </button>
            </div>
          ) : (
            <div className="space-y-1.5 font-ui text-xs">
              <div className="flex items-start gap-2">
                <span className="text-[var(--muted)] text-[10px] uppercase tracking-wider w-16 shrink-0 pt-0.5">Portal</span>
                {url ? (
                  <a href={url} target="_blank" rel="noopener noreferrer"
                    className="text-[var(--accent)] underline break-all flex items-center gap-1 hover:opacity-80">
                    {url} <Icon name="external-link" size={10} />
                  </a>
                ) : (
                  <span className="text-[var(--placeholder)] italic flex items-center gap-1"><Icon name="link" size={10} /> Link pending — will be added from electronic copy</span>
                )}
              </div>
              {notes && (
                <div className="flex items-start gap-2">
                  <span className="text-[var(--muted)] text-[10px] uppercase tracking-wider w-16 shrink-0 pt-0.5">Notes</span>
                  <span className="text-[var(--text)] leading-relaxed">{notes}</span>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── Gap Guide View ─────────────────────────────────────────────────────────
    // The reference manual for closing HEDIS / STARS gaps: uploadable measures,
    // medical record sources, and the health plan portals where evidence gets
    // submitted. Mirrors the UM_Aid IPA Gap Measure Guide.
    function GapGuideView({ compact = false }) {
      const [subTab, setSubTab] = useState('upload');

      const SUB_TABS = [
        { id: 'upload',  label: 'Uploadable Measures',     icon: 'upload' },
        { id: 'medrec',  label: 'Medical Records & Locations', icon: 'folder-tree' },
        { id: 'portals', label: 'Health Plan Portals',     icon: 'link' },
      ];

      return (
        <div>
          {/* Page header — hidden in compact (pop-out) mode where the panel
              chrome already supplies title context. */}
          {!compact && (
          <div className="flex items-end justify-between mb-5 flex-wrap gap-4">
            <div>
              <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">06 · Gap Guide</div>
              <h2 className="font-display text-3xl font-medium">Gap closure reference manual.</h2>
              <p className="font-ui text-sm text-[var(--muted)] mt-1 max-w-2xl">
                Measure evidence, medical record locations, and health plan portal links.
                Portal URLs and upload tool names are editable per-user and save locally to your browser.
              </p>
            </div>
            <div className="border hairline bg-[var(--elevated)] px-4 py-2 font-ui text-[10px] text-[var(--muted)] flex items-center gap-2">
              <Icon name="info" size={12} className="text-[var(--accent)]" />
              <span>Dates follow <strong className="text-[var(--text)]">NCQA HEDIS MY2026</strong> specification. Verify against plan-specific supplements before submission.</span>
            </div>
          </div>
          )}

          {/* Sub-tabs */}
          <div className="flex items-center gap-0 border-b-2 hairline mb-6 overflow-x-auto">
            {SUB_TABS.map(t => (
              <button key={t.id} onClick={() => setSubTab(t.id)}
                className={`font-ui text-[11px] uppercase tracking-wider flex items-center gap-1.5 px-5 py-3 border-b-2 -mb-[2px] whitespace-nowrap ${
                  subTab === t.id
                    ? 'border-[var(--accent)] text-[var(--accent)] font-bold'
                    : 'border-transparent text-[var(--muted)] hover:text-[var(--text)]'}`}>
                <Icon name={t.icon} size={12} /> {t.label}
              </button>
            ))}
          </div>

          {/* Uploadable Measures */}
          {subTab === 'upload' && (
            <div>
              <div className="border hairline bg-[var(--elevated)] px-4 py-3 mb-5 flex items-start gap-3">
                <Icon name="upload" size={14} className="text-[var(--accent)] shrink-0 mt-0.5" />
                <div className="font-ui text-xs text-[var(--muted)] leading-relaxed">
                  These measures can be closed by submitting qualifying documentation. Dates shown are the required
                  <strong className="text-[var(--text)]"> service / date-of-service windows</strong>.
                  Measures tagged <span className="font-bold text-white px-1 py-0.5 mx-0.5" style={{background: RECORD_SOURCE_COLORS.quest.hex}}>Quest</span>
                  pull from Quest lab feeds; <span className="font-bold text-white px-1 py-0.5 mx-0.5" style={{background: '#7c3aed'}}>RIDE Registry</span>
                  pulls from the state immunization registry. Click any row to expand details.
                </div>
              </div>
              <div className="space-y-2">
                {UPLOAD_MEASURES.map((m, i) => (
                  <UploadMeasureCard key={m.code} m={m} defaultOpen={i === 0} />
                ))}
              </div>
            </div>
          )}

          {/* Medical Records */}
          {subTab === 'medrec' && <RecordSourcesSection />}

          {/* Portals */}
          {subTab === 'portals' && (
            <div>
              <div className="border hairline bg-[var(--elevated)] px-4 py-3 mb-5 flex items-start gap-3">
                <Icon name="link" size={14} className="text-[var(--accent)] shrink-0 mt-0.5" />
                <div className="font-ui text-xs text-[var(--muted)] leading-relaxed">
                  Health plan portals where care managers submit gap closure documentation. Click <strong className="text-[var(--text)]">Edit</strong> on any card to enter or update the link, tool name, and notes. Changes save locally to your browser.
                </div>
              </div>
              <div className="grid md:grid-cols-2 gap-3">
                {HEALTH_PLAN_PORTALS.map(plan => <PortalLinkEditor key={plan.short} plan={plan} />)}
              </div>

              {/* Athena reference */}
              <div className="mt-5 border-2 border-[var(--accent)] bg-[var(--surface)] p-4">
                <div className="flex items-start justify-between gap-3 mb-2">
                  <div>
                    <div className="font-ui text-[10px] uppercase tracking-[0.2em] text-[var(--accent)] mb-1 font-bold flex items-center gap-1.5">
                      <Icon name="search" size={12} /> Reference System
                    </div>
                    <div className="font-display text-base font-semibold">{ATHENA_REFERENCE.name}</div>
                    <div className="font-ui text-[10px] text-[var(--muted)] mt-0.5">{ATHENA_REFERENCE.use}</div>
                  </div>
                </div>
                <p className="font-ui text-xs text-[var(--text)] leading-relaxed">{ATHENA_REFERENCE.notes}</p>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Resource Tools View ────────────────────────────────────────────────────
    // Operational tools that help care managers actually deliver care:
    // transportation directory today, more to come (member education materials,
    // language/interpreter directory, community resource referrals, etc).
    function ResourceToolsView({ compact = false }) {
      const [subTab, setSubTab] = useState('transport');

      const SUB_TABS = [
        { id: 'transport', label: 'Transportation', icon: 'car' },
      ];

      return (
        <div>
          {/* Page header — hidden in compact (pop-out) mode. */}
          {!compact && (
          <div className="flex items-end justify-between mb-5 flex-wrap gap-4">
            <div>
              <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">07 · Resource Tools</div>
              <h2 className="font-display text-3xl font-medium">Operational tools for member outreach.</h2>
              <p className="font-ui text-sm text-[var(--muted)] mt-1 max-w-2xl">
                Live directories that help care managers remove barriers to care — starting with transportation.
                Phone notes are editable per-user and save locally to your browser.
              </p>
            </div>
            <div className="border hairline bg-[var(--elevated)] px-4 py-2 font-ui text-[10px] text-[var(--muted)] flex items-center gap-2">
              <Icon name="info" size={12} className="text-[var(--accent)]" />
              <span>For HEDIS gap closure references, see <strong className="text-[var(--text)]">Gap Guide</strong>.</span>
            </div>
          </div>
          )}

          {/* Sub-tabs — overflow-x-auto only when more than one tab exists;
              with a single tab the wrapper otherwise renders a gratuitous
              horizontal scroll affordance that the user flagged. */}
          <div className={`flex items-center gap-0 border-b-2 hairline mb-6 ${SUB_TABS.length > 1 ? 'overflow-x-auto' : ''}`}>
            {SUB_TABS.map(t => (
              <button key={t.id} onClick={() => setSubTab(t.id)}
                className={`font-ui text-[11px] uppercase tracking-wider flex items-center gap-1.5 px-5 py-3 border-b-2 -mb-[2px] whitespace-nowrap ${
                  subTab === t.id
                    ? 'border-[var(--accent)] text-[var(--accent)] font-bold'
                    : 'border-transparent text-[var(--muted)] hover:text-[var(--text)]'}`}>
                <Icon name={t.icon} size={12} /> {t.label}
              </button>
            ))}
          </div>

          {/* Transportation */}
          {subTab === 'transport' && <TransportSection />}
        </div>
      );
    }

    // ── Sub-components ────────────────────────────────────────────────────────

    function Kpi({ label, value, sub, accent, last, delta, deltaLabel, deltaInverse }) {
      const showDelta = delta !== null && delta !== undefined;
      const isGood = showDelta && (deltaInverse ? delta < 0 : delta < 0);
      const isBad  = showDelta && (deltaInverse ? delta > 0 : delta > 0);
      // On the accent tile (mint bg) we need high-contrast dark colors for all text.
      // kpi-sub is intentionally set dark (#033a1c) in dark mode for this purpose.
      const subCls   = accent ? 'text-[var(--kpi-sub)]' : 'text-[var(--muted)]';
      const deltaColor = accent
        ? 'text-[var(--kpi-sub)]'
        : isGood ? 'text-[var(--success)]' : isBad ? 'text-[var(--status-warn)]' : 'text-[var(--muted)]';
      const arrow = !showDelta ? null : delta < 0 ? '↓' : delta > 0 ? '↑' : '—';
      return (
        <div className={`py-5 px-6 ${!last ? 'border-r hairline' : ''} ${accent ? 'bg-[var(--accent)]' : ''}`}
          style={accent ? {color: 'var(--on-accent)'} : {}}>
          <div className={`font-ui text-[10px] tracking-[0.2em] uppercase mb-2 ${subCls}`}>{label}</div>
          <div className="font-display text-4xl num leading-none font-medium">{value}</div>
          <div className={`font-ui text-xs mt-2 ${subCls}`}>{sub}</div>
          {showDelta && (
            <div className={`font-ui text-[11px] num mt-1.5 font-semibold flex items-center gap-1 ${deltaColor}`}>
              <span>{arrow} {Math.abs(delta).toLocaleString()}</span>
              {deltaLabel && <span className="font-normal opacity-80">{deltaLabel}</span>}
            </div>
          )}
        </div>
      );
    }

    function StarBadge({ current, projected }) {
      return (
        <div className="border-2 hairline bg-[var(--surface)] p-4 min-w-[200px]">
          <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] mb-1">Overall STAR rating</div>
          <div className="flex items-end gap-3">
            <div className="font-display text-4xl num font-semibold">{current.toFixed(2)}</div>
            <div className="flex items-center gap-1 text-[var(--accent)] font-ui text-sm pb-1.5">
              <Icon name="trending-up" size={14} />
              <span className="num font-semibold">→ {projected.toFixed(2)}</span>
            </div>
          </div>
          <div className="font-ui text-xs text-[var(--muted)] mt-1">current · projected YE</div>
        </div>
      );
    }

    // ── By Health Plan View ───────────────────────────────────────────────────
    function ByHealthPlanView({ measures, members, onJumpTo }) {
      const [lineFilter, setLineFilter] = useState('All');
      const LINE_OPTIONS = ['All', 'Medicare', 'Commercial', 'Medicaid'];

      const visiblePlans = HEALTH_PLANS.filter(p => lineFilter === 'All' || p.line === lineFilter);

      return (
        <div>
          <div className="flex items-center gap-4 mb-5 flex-wrap">
            <p className="font-ui text-sm text-[var(--muted)] flex-1">Member gap distribution by health plan. Select a line of business to narrow.</p>
            <div className="flex items-center gap-2">
              <span className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)]">Line of Business</span>
              <select value={lineFilter} onChange={e => setLineFilter(e.target.value)}
                className="font-ui text-sm border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)]">
                {LINE_OPTIONS.map(l => <option key={l}>{l}</option>)}
              </select>
            </div>
          </div>

          <div className="space-y-4">
            {visiblePlans.map(plan => {
              const planMembers = members.filter(m => m.healthPlanName === plan.name);
              if (planMembers.length === 0) return null;

              // Gap frequency — top 5 most common gaps for this plan's members
              const gapCounts = {};
              planMembers.forEach(m => m.gaps.forEach(g => { gapCounts[g] = (gapCounts[g] || 0) + 1; }));
              const topGaps = Object.entries(gapCounts).sort((a,b) => b[1]-a[1]).slice(0,5);

              const critHigh = planMembers.filter(m => m.priority === 'Critical' || m.priority === 'High').length;
              const pharmCount = planMembers.filter(m => m.hasPharma).length;
              const ncCount = planMembers.filter(m => m.compStatus === 'Non-Compliant').length;

              return (
                <div key={plan.code} className="border-2 hairline bg-[var(--surface)]">
                  <div className="px-5 py-3 bg-[var(--elevated)] border-b hairline flex items-center justify-between flex-wrap gap-3">
                    <div className="flex items-center gap-3">
                      <div>
                        <div className="font-display text-lg font-semibold">{plan.name}</div>
                        <div className="flex items-center gap-2 mt-0.5">
                          <span className={`font-ui text-[10px] uppercase tracking-wider border px-2 py-0.5 ${lineStyle(plan.line)}`}>{plan.line}</span>
                          <span className="font-ui text-[10px] text-[var(--muted)] num">{plan.code}</span>
                        </div>
                      </div>
                    </div>
                    <div className="flex items-center gap-6">
                      <div className="text-center">
                        <div className="font-display text-2xl num font-semibold">{planMembers.length}</div>
                        <div className="font-ui text-[10px] text-[var(--muted)] uppercase tracking-wider">Members</div>
                      </div>
                      <div className="text-center">
                        <div className="font-display text-2xl num font-semibold text-[var(--status-warn)]">{critHigh}</div>
                        <div className="font-ui text-[10px] text-[var(--muted)] uppercase tracking-wider">Critical/High</div>
                      </div>
                      <div className="text-center">
                        <div className="font-display text-2xl num font-semibold">{pharmCount}</div>
                        <div className="font-ui text-[10px] text-[var(--muted)] uppercase tracking-wider">Pharma</div>
                      </div>
                      <div className="text-center">
                        <div className="font-display text-2xl num font-semibold text-[var(--status-critical)]">{ncCount}</div>
                        <div className="font-ui text-[10px] text-[var(--muted)] uppercase tracking-wider">Non-Compliant Rx</div>
                      </div>
                    </div>
                  </div>
                  <div className="px-5 py-4">
                    <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] mb-3">Top open gaps for this plan</div>
                    <div className="flex flex-wrap gap-2">
                      {topGaps.map(([code, count]) => {
                        const measure = measures.find(m => m.code === code);
                        const w = measure?.weight || 1;
                        return (
                          <button key={code}
                            onClick={() => onJumpTo && onJumpTo('members', { healthPlan: plan.name, measure: code })}
                            title={`Open Worklist filtered to ${plan.short || plan.name} · ${code}`}
                            className={`flex items-center gap-2 px-3 py-2 border transition-transform hover:scale-[1.02] cursor-pointer ${w === 3 ? 'bg-[var(--inverse)] text-[var(--on-inverse)] border-[var(--inverse)]' : 'hairline hover:bg-[var(--elevated)]'}`}>
                            <span className="font-display font-semibold text-sm num">{code}</span>
                            <span className="font-ui text-[10px] opacity-75">{w}×</span>
                            <span className="font-display text-base num font-medium">{count}</span>
                            <span className="font-ui text-[10px] opacity-60">mbrs</span>
                            <Icon name="arrow-right" size={11} className="opacity-60" />
                          </button>
                        );
                      })}
                      {topGaps.length === 0 && <span className="font-ui text-xs text-[var(--muted)] italic">No gap data.</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function MeasureOverview({ measures, members, currentUser, onJumpTo, onSelect }) {
      const [sortBy, setSortBy] = useState('weight');
      const [subTab, setSubTab] = useState('overview'); // 'overview' | 'performance' | 'byplan'
      const [planFilter, setPlanFilter] = useState('All');
      const PLAN_OPTIONS = ['All', ...HEALTH_PLANS.map(p => p.name)];
      const [mCols, setMCols] = useState({ code:'', name:'', category:'', line:'', weight:'' });
      const setMCol = (k, v) => setMCols(prev => ({ ...prev, [k]: v }));
      const clearMCols = () => setMCols({ code:'', name:'', category:'', line:'', weight:'' });
      const hasMCols = Object.values(mCols).some(v => v !== '');

      const sorted = [...measures].sort((a, b) => {
        if (sortBy === 'weight') return b.weight - a.weight || gapCount(b) - gapCount(a);
        if (sortBy === 'gaps')   return gapCount(b) - gapCount(a);
        if (sortBy === 'perf')   return performanceVsTarget(a) - performanceVsTarget(b);
        return 0;
      }).filter(m => {
        if (planFilter !== 'All') {
          const plan = HEALTH_PLANS.find(p => p.name === planFilter);
          if (plan && m.line !== plan.line && m.line !== 'Blended') return false;
        }
        if (mCols.code && !m.code.toLowerCase().includes(mCols.code.toLowerCase())) return false;
        if (mCols.name && !m.name.toLowerCase().includes(mCols.name.toLowerCase())) return false;
        if (mCols.category && !m.category.toLowerCase().includes(mCols.category.toLowerCase())) return false;
        if (mCols.line && !m.line.toLowerCase().includes(mCols.line.toLowerCase())) return false;
        if (mCols.weight && !String(m.weight).startsWith(mCols.weight)) return false;
        return true;
      });

      const handleExport = () => {
        const meta = [
          ['# UM_Aid IPA — Measure Overview Export'],
          ['# Exported by', currentUser ? `${currentUser.name} (${currentUser.id})` : 'unknown'],
          ['# Exported at', new Date().toISOString()],
          ['# Health plan filter', planFilter],
          ['# Column filters', JSON.stringify(mCols).replace(/,/g, ';')],
          ['# Row count', String(sorted.length)],
          ['# Spec', 'NCQA HEDIS MY2026'],
          [],
        ];
        const headers = ['Code','Measure','Category','Line','Weight','Denominator','Numerator','Rate %','Target %','Gap Count','Vs Target (pts)','Trend'];
        const rows = sorted.map(m => [
          m.code, `"${m.name}"`, m.category, m.line, m.weight,
          m.denom, m.num, (rate(m)*100).toFixed(1),
          (m.target*100).toFixed(0), gapCount(m),
          (performanceVsTarget(m)*100).toFixed(1), m.trend,
        ]);
        const csv = [...meta, headers, ...rows].map(r => r.join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url;
        a.download = `UM_Aid_MeasureOverview_${planFilter}_${new Date().toISOString().slice(0,10)}.csv`;
        a.click(); URL.revokeObjectURL(url);
      };

      const SUB_TABS = [
        { id: 'overview',    label: 'Measure Overview' },
        { id: 'performance', label: 'Performance Chart' },
        { id: 'byplan',      label: 'By Health Plan' },
      ];

      return (
        <div>
          <div className="flex items-end justify-between mb-4 flex-wrap gap-4">
            <div>
              <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">Measures</div>
              <h2 className="font-display text-3xl font-medium">The chased list, ranked.</h2>
              <p className="font-ui text-sm text-[var(--muted)] mt-1 max-w-2xl">Triple-weighted clinical and adherence measures drive the score. Select any row to see the member panel.</p>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={handleExport} className="flex items-center gap-1.5 font-ui text-xs uppercase tracking-wider border hairline px-3 py-2 hover:bg-[var(--elevated)]">
                <Icon name="download" size={13} /> Export CSV
              </button>
            </div>
          </div>

          {/* Sub-tab row */}
          <div className="flex items-center gap-0 border-b-2 hairline mb-4">
            {SUB_TABS.map(t => (
              <button key={t.id} onClick={() => setSubTab(t.id)}
                className={`font-ui text-[11px] uppercase tracking-wider px-5 py-3 border-b-2 -mb-[2px] ${subTab === t.id ? 'border-[var(--accent)] text-[var(--accent)] font-semibold' : 'border-transparent text-[var(--muted)] hover:text-[var(--text)]'}`}>
                {t.label}
              </button>
            ))}
            {/* By Plan filter — always visible, affects all sub-tabs */}
            <div className="ml-auto flex items-center gap-2 pb-1 pr-1">
              <span className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)]">Health Plan</span>
              <select value={planFilter} onChange={e => setPlanFilter(e.target.value)}
                className="font-ui text-sm border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)]">
                {PLAN_OPTIONS.map(p => <option key={p}>{p}</option>)}
              </select>
            </div>
          </div>

          {subTab === 'performance' && (
            <PerformanceView measures={sorted} />
          )}

          {subTab === 'byplan' && (
            <ByHealthPlanView measures={measures} members={members} onJumpTo={onJumpTo} />
          )}

          {subTab === 'overview' && (
            <>
              <div className="flex items-center gap-2 font-ui text-xs mb-4 flex-wrap">
                <span className="text-[var(--muted)] uppercase tracking-wider">Sort</span>
                {['weight','gaps','perf'].map(s => (
                  <button key={s} onClick={() => setSortBy(s)}
                    className={`px-3 py-1.5 border hairline uppercase tracking-wider whitespace-nowrap ${sortBy === s ? 'bg-[var(--inverse)] text-[var(--on-inverse)]' : 'hover:bg-[var(--elevated)]'}`}>
                    {s === 'weight' ? 'Weight' : s === 'gaps' ? 'Gap volume' : 'Vs target'}
                  </button>
                ))}
              </div>
              <div className="border hairline bg-[var(--surface)] p-3 mb-4 grid grid-cols-2 md:grid-cols-6 gap-2">
                <div>
                  <div className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] mb-0.5">Code</div>
                  <ColFilter value={mCols.code} onChange={v => setMCol('code', v)} placeholder="Filter…" />
                </div>
                <div>
                  <div className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] mb-0.5">Measure name</div>
                  <ColFilter value={mCols.name} onChange={v => setMCol('name', v)} placeholder="Filter…" />
                </div>
                <div>
                  <div className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] mb-0.5">Category</div>
                  <ColFilter value={mCols.category} onChange={v => setMCol('category', v)} options={['Clinical','Medication','Prevention','Behavioral']} />
                </div>
                <div>
                  <div className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] mb-0.5">Line</div>
                  <ColFilter value={mCols.line} onChange={v => setMCol('line', v)} options={['Medicare','Commercial','Medicaid','Blended']} />
                </div>
                <div>
                  <div className="font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)] mb-0.5">Weight</div>
                  <ColFilter value={mCols.weight} onChange={v => setMCol('weight', v)} options={['1','2','3']} />
                </div>
                {hasMCols && (
                  <div className="flex items-end">
                    <button onClick={clearMCols} className="font-ui text-xs uppercase tracking-wider flex items-center gap-1 text-[var(--status-critical)] hover:underline">
                      <Icon name="x" size={12} /> Clear
                    </button>
                  </div>
                )}
              </div>
              <div className="border-2 hairline bg-[var(--surface)]">
                <div className="grid grid-cols-12 gap-2 px-6 py-3 border-b hairline bg-[var(--elevated)] font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--text)] font-semibold">
                  <div className="col-span-2 whitespace-nowrap">Code</div>
                  <div className="col-span-3 whitespace-nowrap">Measure</div>
                  <div className="col-span-1 text-center whitespace-nowrap">Weight</div>
                  <div className="col-span-2 text-center whitespace-nowrap">Gap volume</div>
                  <div className="col-span-2 whitespace-nowrap">Rate</div>
                  <div className="col-span-1 whitespace-nowrap">Vs target</div>
                  <div className="col-span-1 whitespace-nowrap">Trend</div>
                </div>
                {sorted.map(m => {
                  const r = rate(m); const delta = performanceVsTarget(m); const meeting = delta >= 0;
                  return (
                    <button key={m.code} onClick={() => onSelect(m)}
                      className="w-full grid grid-cols-12 gap-2 px-6 py-4 border-t hairline measure-row text-left items-center">
                      <div className="col-span-2 whitespace-nowrap">
                        <span className="font-display num font-semibold">{m.code}</span>
                        {m.pharma && <span className="ml-1 text-[9px] text-[var(--accent)] border border-[var(--accent)] px-1">Rx</span>}
                      </div>
                      <div className="col-span-3">
                        <div className="font-ui text-sm font-semibold">{m.name}</div>
                        <div className="font-ui text-[11px] text-[var(--muted)]">{m.category} · {m.line}</div>
                      </div>
                      <div className="col-span-1 text-center">
                        <span className={`font-ui text-xs px-1.5 py-0.5 ${m.weight === 3 ? 'bg-[var(--inverse)] text-[var(--on-inverse)]' : m.weight === 2 ? 'bg-[var(--accent)] text-[var(--on-accent)]' : 'border hairline'}`}>{m.weight}×</span>
                      </div>
                      <div className="col-span-2 text-center font-display num text-lg font-medium">{gapCount(m).toLocaleString()}</div>
                      <div className="col-span-2">
                        <div className="font-display num text-xl font-medium">{(r*100).toFixed(1)}%</div>
                        <div className="h-1.5 bg-[var(--progress-track)] mt-1 overflow-hidden">
