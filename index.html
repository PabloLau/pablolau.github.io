          return { x: dx, y: dy };
        };
        const resolveWlPos = (pos) => ({
          x: pos.x ?? 16,
          y: pos.y ?? (typeof window !== 'undefined' ? window.innerHeight - 640 : 200)
        });
        groupDragSnapshot.current = {};
        if (excludeWhich !== 'wl' && showWorkingList && !wlPoppedOut) {
          groupDragSnapshot.current.wl = resolveWlPos(wlPos);
        }
        if (excludeWhich !== 'gg' && showGapGuidePanel && !ggPanelPoppedOut) {
          groupDragSnapshot.current.gg = resolveFloatPos(ggPanelPos, 420, 680);
        }
        if (excludeWhich !== 'rt' && showResourceToolsPanel && !rtPanelPoppedOut) {
          groupDragSnapshot.current.rt = resolveFloatPos(rtPanelPos, 420, 620);
        }
      }, [showWorkingList, wlPoppedOut, wlPos, showGapGuidePanel, ggPanelPoppedOut, ggPanelPos, showResourceToolsPanel, rtPanelPoppedOut, rtPanelPos]);
      const onGroupDragMove = useCallback((dx, dy) => {
        const snap = groupDragSnapshot.current;
        if (!snap) return;
        if (snap.wl) setWlPos({ x: snap.wl.x + dx, y: snap.wl.y + dy });
        if (snap.gg) setGgPanelPos({ x: snap.gg.x + dx, y: snap.gg.y + dy });
        if (snap.rt) setRtPanelPos({ x: snap.rt.x + dx, y: snap.rt.y + dy });
      }, []);
      const onGroupDragEnd = useCallback(() => { groupDragSnapshot.current = null; }, []);
      const floatingPanelCount =
        (showWorkingList && !wlPoppedOut ? 1 : 0) +
        (showGapGuidePanel && !ggPanelPoppedOut ? 1 : 0) +
        (showResourceToolsPanel && !rtPanelPoppedOut ? 1 : 0);
      // Auto-unlock when there's nothing left to group with — keeps the
      // lock state from quietly persisting across sessions and surprising
      // the user the next time they open two panels.
      useEffect(() => {
        if (floatingPanelCount < 2 && panelsLocked) setPanelsLocked(false);
      }, [floatingPanelCount, panelsLocked]);

      // ── Gap Guide pop-out (floating panel that persists across tabs) ────
      // Same mechanics as the My List panel: localStorage-persisted position,
      // minimise/expand, draggable. Lets a CM keep the measure reference
      // open while working any other tab (the common case: "what does Anthem
      // need for COA?" while on a call from the Worklist).
      const ggPosKey = `acm-gap-guide-pos:${(currentUser && currentUser.id) || 'anon'}`;
      const ggSizeKey = `acm-gap-guide-size:${(currentUser && currentUser.id) || 'anon'}`;
      const [showGapGuidePanel, setShowGapGuidePanel] = useState(false);
      const [ggPanelMinimised, setGgPanelMinimised] = useState(false);
      const [ggPanelPos, setGgPanelPos] = useState(() => {
        try { const v = localStorage.getItem(ggPosKey); return v ? JSON.parse(v) : { x: null, y: null }; } catch { return { x: null, y: null }; }
      });
      const [ggPanelSize, setGgPanelSize] = useState(() => {
        try { const v = localStorage.getItem(ggSizeKey); return v ? JSON.parse(v) : { w: null, h: null }; } catch { return { w: null, h: null }; }
      });
      useEffect(() => { try { localStorage.setItem(ggPosKey, JSON.stringify(ggPanelPos)); } catch {} }, [ggPanelPos, ggPosKey]);
      useEffect(() => { try { localStorage.setItem(ggSizeKey, JSON.stringify(ggPanelSize)); } catch {} }, [ggPanelSize, ggSizeKey]);

      // ── Resource Tools pop-out — same mechanics, separate state. ────────
      const rtPosKey = `acm-resource-tools-pos:${(currentUser && currentUser.id) || 'anon'}`;
      const rtSizeKey = `acm-resource-tools-size:${(currentUser && currentUser.id) || 'anon'}`;
      const [showResourceToolsPanel, setShowResourceToolsPanel] = useState(false);
      const [rtPanelMinimised, setRtPanelMinimised] = useState(false);
      const [rtPanelPos, setRtPanelPos] = useState(() => {
        try { const v = localStorage.getItem(rtPosKey); return v ? JSON.parse(v) : { x: null, y: null }; } catch { return { x: null, y: null }; }
      });
      const [rtPanelSize, setRtPanelSize] = useState(() => {
        try { const v = localStorage.getItem(rtSizeKey); return v ? JSON.parse(v) : { w: null, h: null }; } catch { return { w: null, h: null }; }
      });
      useEffect(() => { try { localStorage.setItem(rtPosKey, JSON.stringify(rtPanelPos)); } catch {} }, [rtPanelPos, rtPosKey]);
      useEffect(() => { try { localStorage.setItem(rtSizeKey, JSON.stringify(rtPanelSize)); } catch {} }, [rtPanelSize, rtSizeKey]);

      // ── Maximized state per panel — persisted so layout survives reload.
      // Each panel can be independently maximized (fills viewport above the
      // taskbar). When maximized, the panel's stored bounds remain intact
      // so restoring drops it back exactly where it was. ─────────────────
      const wlMaxKey  = `acm-working-list-max:${(currentUser && currentUser.id) || 'anon'}`;
      const ggMaxKey  = `acm-gap-guide-max:${(currentUser && currentUser.id) || 'anon'}`;
      const rtMaxKey  = `acm-resource-tools-max:${(currentUser && currentUser.id) || 'anon'}`;
      const [wlMaximized, setWlMaximized] = useState(() => {
        try { return localStorage.getItem(wlMaxKey) === '1'; } catch { return false; }
      });
      const [ggMaximized, setGgMaximized] = useState(() => {
        try { return localStorage.getItem(ggMaxKey) === '1'; } catch { return false; }
      });
      const [rtMaximized, setRtMaximized] = useState(() => {
        try { return localStorage.getItem(rtMaxKey) === '1'; } catch { return false; }
      });
      useEffect(() => { try { localStorage.setItem(wlMaxKey, wlMaximized ? '1' : '0'); } catch {} }, [wlMaximized, wlMaxKey]);
      useEffect(() => { try { localStorage.setItem(ggMaxKey, ggMaximized ? '1' : '0'); } catch {} }, [ggMaximized, ggMaxKey]);
      useEffect(() => { try { localStorage.setItem(rtMaxKey, rtMaximized ? '1' : '0'); } catch {} }, [rtMaximized, rtMaxKey]);

      // ── Focused panel — the open, non-minimised panel with the highest
      // z-index. Used to give the active window the accent-colored title
      // bar (and to highlight its taskbar tab). Computed rather than stored
      // because z-order is already the source of truth. ──────────────────
      const focusedPanelId = (() => {
        const candidates = [];
        if (showWorkingList && !wlPoppedOut && !wlMinimised) candidates.push({ id: 'wl', z: wlZ });
        if (showGapGuidePanel && !ggPanelPoppedOut && !ggPanelMinimised) candidates.push({ id: 'gg', z: ggZ });
        if (showResourceToolsPanel && !rtPanelPoppedOut && !rtPanelMinimised) candidates.push({ id: 'rt', z: rtZ });
        if (candidates.length === 0) return null;
        return candidates.reduce((a, b) => a.z > b.z ? a : b).id;
      })();

      // Field Guide deep-link state — which section to scroll to when opened.
      // Set by openHelp(sectionId), by URL hash (#help/<id>), or by contextual
      // "?" affordances on individual surfaces. Reset to null after open.
      const [helpInitialSection, setHelpInitialSection] = useState(null);

      // Open the Field Guide, optionally to a specific section, and audit it.
      // This is the analytics signal we discussed: every help access is logged
      // so leadership can see which surfaces confuse care managers most.
      const openHelp = useCallback((sectionId = null) => {
        setHelpInitialSection(sectionId);
        setShowHelp(true);
        const entry = addAuditEntry(
          currentUser, '—', 'System', 'Field Guide',
          'Help Viewed', sectionId ? `Section: ${sectionId}` : 'Opened from ribbon',
          '', null
        );
        appendAudit(entry);
      }, [currentUser]);

      // Deep-link support: opening the URL with #help/<section> opens the guide
      // to that section. Lets supervisors share targeted links in Slack/email.
      useEffect(() => {
        const checkHash = () => {
          const h = window.location.hash || '';
          if (h.startsWith('#help/')) {
            const id = h.replace('#help/', '').trim();
            if (id) openHelp(id);
            // Clear hash so reload doesn't re-trigger
            history.replaceState(null, '', window.location.pathname + window.location.search);
          } else if (h === '#help') {
            openHelp(null);
            history.replaceState(null, '', window.location.pathname + window.location.search);
          }
        };
        checkHash();
        window.addEventListener('hashchange', checkHash);
        return () => window.removeEventListener('hashchange', checkHash);
      }, [openHelp]);

      const jumpTo = useCallback((targetView, preset = {}) => {
        if (targetView === 'members') {
          // If a deep-link arrives with a pharmacy preset, default scope to
          // 'all' so the user lands directly in the expanded coordination
          // view; otherwise default to 'mine' (single-CM worklist).
          const pharmPreset = preset.pharmacy && preset.pharmacy !== 'All';
          setFilters(prev => ({
            ...prev,
            priority: preset.priority || 'All',
            line: preset.line || 'All',
            healthPlan: preset.healthPlan || 'All',
            measure: preset.measure || 'All',
            pharmacy: preset.pharmacy || 'All',
            outreach: preset.outreach || 'All',
            overdueOnly: !!preset.overdueOnly,
            scope: preset.scope || (pharmPreset ? 'all' : 'mine'),
          }));
        } else if (targetView === 'pharma') {
          setPharmaFilter(prev => ({
            ...prev,
            status: preset.status || 'All',
            measure: preset.measure || 'All',
          }));
        }
        setView(targetView);
      }, []);

      // Global keyboard handler — / focuses search, ? opens help, Esc closes overlays
      useEffect(() => {
        const handler = (e) => {
          const t = e.target;
          const tag = (t.tagName || '').toLowerCase();
          const isTyping = tag === 'input' || tag === 'textarea' || tag === 'select' || (t.isContentEditable === true);
          if (isTyping) {
            if (e.key === 'Escape') {
              if (showShortcuts) setShowShortcuts(false);
              else if (phiModalOpen) setPhiModalOpen(false);
              else if (showAdmin) setShowAdmin(false);
              else if (pendingReassign) setPendingReassign(null);
            }
            return;
          }
          if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            setShowSpotlight(true);
            return;
          }
          if (e.key === '?' && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            setShowShortcuts(true);
            return;
          }
          // F1 — universal help (industry standard). Toggles the drawer.
          if (e.key === 'F1') {
            e.preventDefault();
            if (showHelp) {
              setShowHelp(false);
              setHelpInitialSection(null);
            } else {
              openHelp(null);
            }
            return;
          }
          if (e.key === 'Escape') {
            if (showHelp)       { setShowHelp(false); setHelpInitialSection(null); return; }
            if (showSpotlight)  { setShowSpotlight(false); return; }
            if (showShortcuts) { setShowShortcuts(false); return; }
            if (phiModalOpen)   { setPhiModalOpen(false); return; }
            if (showAdmin)      { setShowAdmin(false); return; }
            if (pendingReassign){ setPendingReassign(null); return; }
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [showSpotlight, showShortcuts, showHelp, phiModalOpen, showAdmin, pendingReassign, openHelp]);

      // Assignment state (reassignments persist in-session)
      const [assignments, setAssignments] = useState({}); // { memberId: newCmId }
      const getAssignee = (m) => assignments[m.id] || m.assignedCM;
      const canReassign = config.ALLOW_ALL_REASSIGN || isDirector;

      const myMembers = isDirector ? members : members.filter(m => getAssignee(m) === currentUser.id);

      const lastActivity = useRef(Date.now());

      useEffect(() => {
        const record = () => { if (!isLocked) lastActivity.current = Date.now(); };
        ['click','keydown','mousemove'].forEach(e => window.addEventListener(e, record));
        return () => ['click','keydown','mousemove'].forEach(e => window.removeEventListener(e, record));
      }, [isLocked]);

      // Idle-based PHI auto-relock — only fires after PHI_IDLE_TIMEOUT_MS of true
      // user inactivity (no click, keydown, or mousemove). PHI stays revealed
      // continuously while the user is actively working — navigating between
      // members, scrolling, typing, etc. does NOT reset it. Steps-away from
      // the workstation does.
      useEffect(() => {
        if (!phiVisible) return;
        const t = setInterval(() => {
          const idle = Date.now() - lastActivity.current;
          if (idle >= PHI_IDLE_TIMEOUT_MS) {
            setPhiVisible(false);
            setPhiRevealedAt(null);
          }
        }, 5000);
        return () => clearInterval(t);
      }, [phiVisible]);

      // Persist PHI visibility for "remember last state" preference
      useEffect(() => {
        try {
          localStorage.setItem(`acm-phi-last-${currentUser?.id || 'default'}`, phiVisible ? '1' : '0');
        } catch(e) {}
      }, [phiVisible]);

      useEffect(() => {
        const t = setInterval(() => {
          setSessionRemaining(() => {
            const idle = Math.floor((Date.now() - lastActivity.current) / 1000);
            const remaining = 15 * 60 - idle;
            if (remaining <= 0) {
              setIsLocked(true);
              setPhiVisible(false);
              setPhiRevealedAt(null);
              return 15 * 60;
            }
            return remaining;
          });
        }, 1000);
        return () => clearInterval(t);
      }, []);

      const logCall = useCallback((member, outcome, notes, nextAction, daysUntilAction, attachedDoc = null) => {
        const entry = addAuditEntry(currentUser, member.id, phiVisible ? `${member.last}, ${member.first}` : member.initials, member.gaps[0] || '—', outcome, notes, nextAction, daysUntilAction);
        appendAudit(entry);
        // If the care manager attached a document to this contact (e.g. just
        // received fax / chart records during the same call), persist it via
        // attachOutreachDoc so the doc shows up in this audit entry's expansion.
        if (attachedDoc && attachedDoc.filename) {
          attachOutreachDoc(entry.id, attachedDoc);
        }
        return entry;
      }, [currentUser, phiVisible]);

      // Reassignment workflow: requestReassign → confirm dialog → applyReassignment → 5s undo toast.
      const [pendingReassign, setPendingReassign] = useState(null);
      const [reassignToast, setReassignToast] = useState(null);
      const reassignToastTimer = useRef(null);

      const applyReassignment = useCallback((member, newCmId, opts = {}) => {
        if (!canReassign) return;
        const prevId = getAssignee(member);
        if (newCmId === prevId) return;
        setAssignments(prev => ({ ...prev, [member.id]: newCmId }));
        const fromCM = CARE_MANAGERS.find(c => c.id === prevId);
        const toCM   = CARE_MANAGERS.find(c => c.id === newCmId);
        const note = (opts.isUndo ? '[UNDO] ' : '') + `Reassigned from ${fromCM ? fromCM.name : 'unassigned'} → ${toCM ? toCM.name : newCmId} by ${currentUser.name}.`;
        const entry = addAuditEntry(currentUser, member.id, phiVisible ? `${member.last}, ${member.first}` : member.initials, '—', 'Reassigned', note, '', null);
        appendAudit(entry);
        if (!opts.isUndo && !opts.suppressToast) {
          if (reassignToastTimer.current) clearTimeout(reassignToastTimer.current);
          setReassignToast({ member, fromCmId: prevId, toCmId: newCmId, expiresAt: Date.now() + 5000 });
          reassignToastTimer.current = setTimeout(() => setReassignToast(null), 5000);
        }
      }, [canReassign, assignments, currentUser, phiVisible]);

      const requestReassign = useCallback((member, newCmId) => {
        if (!canReassign) return;
        const prevId = getAssignee(member);
        if (newCmId === prevId) return;
        setPendingReassign({ member, fromCmId: prevId, toCmId: newCmId });
      }, [canReassign, assignments]);

      const reassignMember = requestReassign;

      const undoReassign = useCallback(() => {
        if (!reassignToast) return;
        applyReassignment(reassignToast.member, reassignToast.fromCmId, { isUndo: true });
        if (reassignToastTimer.current) clearTimeout(reassignToastTimer.current);
        setReassignToast(null);
      }, [reassignToast, applyReassignment]);

      const filteredMembers = useMemo(() => {
        // When a pharmacy filter is active AND the user has expanded scope to
        // see teammates or unassigned members, source from the full member
        // universe (not just `myMembers`). This is the "pharmacy coordination"
        // workflow: the CM is on a call to one pharmacy and wants to see every
        // UM_Aid member there to batch outreach. Otherwise — and by default —
        // they only see their own assigned worklist.
        const pharmacyActive = filters.pharmacy && filters.pharmacy !== 'All';
        const expandedScope = pharmacyActive && (filters.scope === 'all' || filters.scope === 'unassigned');
        const base = expandedScope ? members : myMembers;
        return base.filter(m => {
          // Scope sub-filter — only meaningful in expanded mode
          if (expandedScope) {
            const assignee = getAssignee(m);
            if (filters.scope === 'mine' && assignee !== currentUser.id) return false;
            if (filters.scope === 'unassigned' && assignee) return false;
            // 'all' = pass through every row at this pharmacy
          }
          if (filters.priority !== 'All' && m.priority !== filters.priority) return false;
          if (filters.line !== 'All' && m.line !== filters.line) return false;
          if (filters.healthPlan !== 'All' && m.healthPlanName !== filters.healthPlan) return false;
          if (filters.measure !== 'All' && !m.gaps.includes(filters.measure)) return false;
          if (pharmacyActive) {
            // Filter value is a composite "PharmName|PharmAddr" key so the
            // same chain at different branches stays distinguishable.
            const sep = filters.pharmacy.indexOf('|');
            const fName = sep === -1 ? filters.pharmacy : filters.pharmacy.slice(0, sep);
            const fAddr = sep === -1 ? null               : filters.pharmacy.slice(sep + 1);
            if (m.pharmName !== fName) return false;
            if (fAddr != null && m.pharmAddr !== fAddr) return false;
          }
          if (filters.outreach !== 'All' && m.outreach !== filters.outreach) return false;
          if (filters.overdueOnly && m.daysOpen <= 60) return false;
          if (search) {
            const s = search.toLowerCase();
            const hay = phiVisible ? `${m.first} ${m.last} ${m.id}` : `${m.initials} ${m.id}`;
            if (!hay.toLowerCase().includes(s)) return false;
          }
          return true;
        });
      }, [myMembers, members, filters, search, phiVisible, assignments, currentUser]);

      const totals = useMemo(() => {
        const openGaps = MEASURES.reduce((acc, m) => acc + gapCount(m), 0);
        const weighted = MEASURES.reduce((acc, m) => acc + gapCount(m) * m.weight, 0);
        const atRisk = myMembers.filter(m => m.priority === 'Critical' || m.priority === 'High').length;
        const myAuditToday = auditLog.filter(a => a.whoId === currentUser.id).length;
        return { openGaps, weighted, atRisk, myContacts: myAuditToday };
      }, [myMembers, auditLog, currentUser]);

      const mmss = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
      const urgencyTier = sessionRemaining < 120 ? 'critical' : sessionRemaining < 300 ? 'caution' : 'ok';

      const NAV = [
        { id: 'today',     label: 'Today',                                                 icon: 'sunrise' },
        { id: 'overview',  label: 'Measures',                                              icon: 'target' },
        { id: 'pharma',    label: 'Pharmacy',                                              icon: 'pill' },
        { id: 'members',   label: 'Worklist',                                              icon: 'users' },
        { id: 'outreach',  label: 'Outreach',                                              icon: 'phone' },
        { id: 'gap-guide', label: 'Gap Guide',                                             icon: 'book-open' },
        { id: 'resources', label: 'Resource Tools',                                        icon: 'life-buoy' },
        { id: 'audit',     label: isDirector ? 'Audit Trail' : 'Activity',                 icon: 'file-text' },
        { id: 'settings',  label: 'Settings',                                              icon: 'sliders-horizontal' },
      ];

      // Map sub-views back to their parent nav tab for active highlight.
      // member-detail respects the tab the user came from (memberEntryTab) so
      // entering via Pharmacy keeps "Pharmacy" highlighted, not "Worklist".
      const activeTab = view === 'measure-detail' ? 'overview' : view === 'member-detail' ? memberEntryTab : view === 'today' ? 'today' : view;

      return (
        <div className={`page-root min-h-screen bg-[var(--bg)] text-[var(--text)]${showHelp ? ' help-open' : ''}`}>
          {isLocked && <LockScreen user={currentUser} onUnlock={() => { setIsLocked(false); setSessionRemaining(15*60); lastActivity.current = Date.now(); }} />}

          {!isLocked && sessionRemaining > 0 && sessionRemaining <= 120 && (
            <div className="session-warning no-print" role="alert" aria-live="polite">
              <Icon name="alert-triangle" size={14} />
              <span>Session locks in <strong className="num">{mmss(sessionRemaining)}</strong> — your draft notes will be preserved.</span>
              <button onClick={() => { lastActivity.current = Date.now(); setSessionRemaining(15 * 60); }}
                className="bg-white text-[var(--status-warn)] px-3 py-1 rounded font-bold uppercase tracking-wider text-[11px] hover:opacity-90">
                Keep working
              </button>
            </div>
          )}

          {/* Demo audit-cap banner — only fires in the prototype. The .NET +
              SQL Server build has an unbounded append-only audit schema, so
              this entire block disappears in production. */}
          {!isLocked && auditCapReached && !auditCapDismissed && (
            <div className="no-print bg-[var(--accent)] text-[var(--on-accent)] px-5 py-2.5 flex items-center justify-center gap-3 text-xs font-ui"
                 role="status" aria-live="polite">
              <Icon name="info" size={14} />
              <span>
                <strong className="font-semibold">Demo audit cap reached</strong>
                {' '}— this browser-only log holds the most recent <span className="num">{AUDIT_DEMO_CAP.toLocaleString()}</span> entries.
                Production (SQL Server, append-only) has no cap.
              </span>
              <button onClick={() => setAuditCapDismissed(true)}
                className="bg-[var(--on-accent)] text-[var(--accent)] px-3 py-1 rounded font-bold uppercase tracking-wider text-[10px] hover:opacity-90">
                Dismiss
              </button>
            </div>
          )}

          {/* Reassignment confirmation dialog */}
          {pendingReassign && (() => {
            const fromCM = CARE_MANAGERS.find(c => c.id === pendingReassign.fromCmId);
            const toCM   = CARE_MANAGERS.find(c => c.id === pendingReassign.toCmId);
            const fromCount = members.filter(m => (assignments[m.id] || m.assignedCM) === pendingReassign.fromCmId).length;
            const toCount   = members.filter(m => (assignments[m.id] || m.assignedCM) === pendingReassign.toCmId).length;
            const memberName = phiVisible ? `${pendingReassign.member.last}, ${pendingReassign.member.first}` : pendingReassign.member.initials;
            return (
              <div className="confirm-overlay no-print" onClick={() => setPendingReassign(null)}>
                <div className="confirm-card" onClick={e => e.stopPropagation()} role="dialog" aria-modal="true" aria-labelledby="reassign-title">
                  <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">Confirm reassignment</div>
                  <h3 id="reassign-title" className="font-display text-xl font-medium mb-3">Reassign {memberName}?</h3>
                  <div className="border hairline bg-[var(--elevated)] p-3 rounded text-sm font-ui mb-4">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-[var(--muted)] text-[10px] uppercase tracking-wider w-12">From</span>
                      <strong>{fromCM ? fromCM.name : '—'}</strong>
                      <span className="text-[var(--muted)] text-xs">({fromCount} members)</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-[var(--muted)] text-[10px] uppercase tracking-wider w-12">To</span>
                      <strong>{toCM ? toCM.name : '—'}</strong>
                      <span className="text-[var(--muted)] text-xs">({toCount} members)</span>
                    </div>
                  </div>
                  <p className="font-ui text-xs text-[var(--muted)] mb-4 leading-relaxed">
                    The receiving care manager may already be working their list. This action is audit-logged. You'll have 5 seconds to undo.
                  </p>
                  <div className="flex items-center gap-2">
                    <button onClick={() => setPendingReassign(null)}
                      className="flex-1 font-ui text-xs uppercase tracking-wider border hairline px-4 py-2.5 rounded hover:bg-[var(--elevated)]">
                      Cancel
                    </button>
                    <button onClick={() => {
                        applyReassignment(pendingReassign.member, pendingReassign.toCmId);
                        setPendingReassign(null);
                      }}
                      autoFocus
                      className="flex-1 font-ui text-xs uppercase tracking-wider bg-[var(--inverse)] text-[var(--on-inverse)] px-4 py-2.5 rounded hover:opacity-90 flex items-center justify-center gap-1.5">
                      <Icon name="check" size={12} /> Confirm
                    </button>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Keyboard shortcut help overlay */}
          {showShortcuts && (
            <div className="shortcut-overlay no-print" onClick={() => setShowShortcuts(false)} role="dialog" aria-modal="true" aria-labelledby="shortcuts-title">
              <div className="shortcut-card" onClick={e => e.stopPropagation()}>
                <div className="flex items-start justify-between mb-4">
                  <div>
                    <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">Keyboard</div>
                    <h3 id="shortcuts-title" className="font-display text-xl font-medium">Shortcuts</h3>
                  </div>
                  <button onClick={() => setShowShortcuts(false)} aria-label="Close shortcuts overlay"
                    className="text-[var(--muted)] hover:text-[var(--text)]">
                    <Icon name="x" size={16} />
                  </button>
                </div>
                <div className="space-y-2 font-ui text-sm">
                  <div className="flex items-center justify-between border-b hairline pb-2">
                    <span>Focus global member search</span>
                    <kbd>/</kbd>
                  </div>
                  <div className="flex items-center justify-between border-b hairline pb-2">
                    <span>Show this help</span>
                    <kbd>?</kbd>
                  </div>
                  <div className="flex items-center justify-between">
                    <span>Close any modal or overlay</span>
                    <kbd>Esc</kbd>
                  </div>
                </div>
                <p className="font-ui text-[11px] text-[var(--muted)] mt-4 leading-relaxed">
                  More shortcuts (table navigation, quick actions) will ship in v2.1.
                </p>
              </div>
            </div>
          )}

          {/* ── Help & User Guide drawer ──────────────────────────────────────
             A right-side slide-out drawer with structured help content for
             care managers. Searchable, accordion sections, closes on Esc /
             backdrop click. Renders above page chrome (z:9500) like other
             modals so it eclipses sticky thead and panels cleanly. */}
          {/* ── Floating reference panels ──
              The three bottom-left FABs that used to live here have been
              replaced by the AppTaskbar at the viewport bottom (rendered
              below). The taskbar is the single, discoverable, Windows-
              style entry point for showing / hiding / minimising / popping
              these panels out. Group lock + per-panel state live there too. */}

          {showWorkingList && (
            <WorkingListPanel
              ids={workingListIds}
              members={members}
              selectedMemberId={selectedMember?.id}
              phiVisible={phiVisible}
              onPick={(m) => openMember(m, 'members')}
              onPickPharma={(m) => openMember(m, 'pharma')}
              onRemove={removeFromWorkingList}
              onClose={() => setShowWorkingList(false)}
              pos={wlPos}
              onPosChange={setWlPos}
              size={wlSize}
              onSizeChange={setWlSize}
              minimised={wlMinimised}
              onToggleMinimise={() => setWlMinimised(v => !v)}
              maximized={wlMaximized}
              onToggleMaximize={() => setWlMaximized(v => !v)}
              isFocused={focusedPanelId === 'wl'}
              zIndex={wlZ}
              onBringToFront={() => bringPanelToFront('wl')}
              poppedOut={wlPoppedOut}
              onPopOut={() => { bringPanelToFront('wl'); setWlPoppedOut(true); }}
              onUnpop={() => { setWlPoppedOut(false); setShowWorkingList(false); }}
              panelsLocked={panelsLocked}
              onGroupDragStart={() => onGroupDragStart('wl')}
              onGroupDragMove={onGroupDragMove}
              onGroupDragEnd={onGroupDragEnd}
            />
          )}

          {showGapGuidePanel && (
            <FloatPanelShell
              title="Gap Guide"
              icon="book-open"
              pos={ggPanelPos}
              onPosChange={setGgPanelPos}
              size={ggPanelSize}
              onSizeChange={setGgPanelSize}
              minimised={ggPanelMinimised}
              onToggleMinimise={() => setGgPanelMinimised(v => !v)}
              maximized={ggMaximized}
              onToggleMaximize={() => setGgMaximized(v => !v)}
              isFocused={focusedPanelId === 'gg'}
              onClose={() => setShowGapGuidePanel(false)}
              defaultRightOffset={420}
              defaultBottomOffset={680}
              zIndex={ggZ}
              onBringToFront={() => bringPanelToFront('gg')}
              poppedOut={ggPanelPoppedOut}
              onPopOut={() => { bringPanelToFront('gg'); setGgPanelPoppedOut(true); }}
              onUnpop={() => { setGgPanelPoppedOut(false); setShowGapGuidePanel(false); }}
              panelsLocked={panelsLocked}
              onGroupDragStart={() => onGroupDragStart('gg')}
              onGroupDragMove={onGroupDragMove}
              onGroupDragEnd={onGroupDragEnd}
            >
              <GapGuideView compact />
            </FloatPanelShell>
          )}

          {showResourceToolsPanel && (
            <FloatPanelShell
              title="Resource Tools"
              icon="life-buoy"
              pos={rtPanelPos}
              onPosChange={setRtPanelPos}
              size={rtPanelSize}
              onSizeChange={setRtPanelSize}
              minimised={rtPanelMinimised}
              onToggleMinimise={() => setRtPanelMinimised(v => !v)}
              maximized={rtMaximized}
              onToggleMaximize={() => setRtMaximized(v => !v)}
              isFocused={focusedPanelId === 'rt'}
              onClose={() => setShowResourceToolsPanel(false)}
              defaultRightOffset={420}
              defaultBottomOffset={620}
              zIndex={rtZ}
              onBringToFront={() => bringPanelToFront('rt')}
              poppedOut={rtPanelPoppedOut}
              onPopOut={() => { bringPanelToFront('rt'); setRtPanelPoppedOut(true); }}
              onUnpop={() => { setRtPanelPoppedOut(false); setShowResourceToolsPanel(false); }}
              panelsLocked={panelsLocked}
              onGroupDragStart={() => onGroupDragStart('rt')}
              onGroupDragMove={onGroupDragMove}
              onGroupDragEnd={onGroupDragEnd}
            >
              <ResourceToolsView compact />
            </FloatPanelShell>
          )}

          {/* ── App Taskbar ──
              Windows-style taskbar at the viewport bottom. Always visible
              (across all dashboard tabs), shows every reference panel with
              its current state (closed / open / focused / minimised /
              popped-out), and hosts the Group lock toggle. Replaces the
              old bottom-left FAB stack with a discoverable single source
              of truth for window management. */}
          <AppTaskbar
            currentUser={currentUser}
            panels={[
              {
                id: 'wl', label: 'My List', icon: 'bookmark',
                isOpen: showWorkingList,
                isMinimised: wlMinimised,
                isPoppedOut: wlPoppedOut,
                isFocused: focusedPanelId === 'wl',
                badge: workingListIds.length || null,
                stateText: !showWorkingList ? null
                         : wlPoppedOut    ? 'Popped out'
                         : wlMinimised    ? 'Minimised'
                         : focusedPanelId === 'wl' ? `${workingListIds.length} bookmark${workingListIds.length===1?'':'s'} \u00b7 active`
                                                   : `${workingListIds.length} bookmark${workingListIds.length===1?'':'s'} \u00b7 open`,
                onClick: () => {
                  if (wlPoppedOut) { bringPanelToFront('wl'); return; }
                  if (!showWorkingList) { setShowWorkingList(true); setWlMinimised(false); bringPanelToFront('wl'); }
                  else if (wlMinimised) { setWlMinimised(false); bringPanelToFront('wl'); }
                  else if (focusedPanelId !== 'wl') { bringPanelToFront('wl'); }
                  else { setWlMinimised(true); }
                },
                onPopOut: () => { if (showWorkingList && !wlPoppedOut) { bringPanelToFront('wl'); setWlPoppedOut(true); } },
                onClose:  () => { setShowWorkingList(false); setWlMinimised(false); },
              },
              {
                id: 'gg', label: 'Gap Guide', icon: 'book-open',
                isOpen: showGapGuidePanel,
                isMinimised: ggPanelMinimised,
                isPoppedOut: ggPanelPoppedOut,
                isFocused: focusedPanelId === 'gg',
                badge: null,
                stateText: !showGapGuidePanel ? null
                         : ggPanelPoppedOut  ? 'Popped out'
                         : ggPanelMinimised  ? 'Minimised'
                         : focusedPanelId === 'gg' ? 'Open \u00b7 active' : 'Open',
                onClick: () => {
                  if (ggPanelPoppedOut) { bringPanelToFront('gg'); return; }
                  if (!showGapGuidePanel) { setShowGapGuidePanel(true); setGgPanelMinimised(false); bringPanelToFront('gg'); }
                  else if (ggPanelMinimised) { setGgPanelMinimised(false); bringPanelToFront('gg'); }
                  else if (focusedPanelId !== 'gg') { bringPanelToFront('gg'); }
                  else { setGgPanelMinimised(true); }
                },
                onPopOut: () => { if (showGapGuidePanel && !ggPanelPoppedOut) { bringPanelToFront('gg'); setGgPanelPoppedOut(true); } },
                onClose:  () => { setShowGapGuidePanel(false); setGgPanelMinimised(false); },
              },
              {
                id: 'rt', label: 'Resource Tools', icon: 'life-buoy',
                isOpen: showResourceToolsPanel,
                isMinimised: rtPanelMinimised,
                isPoppedOut: rtPanelPoppedOut,
                isFocused: focusedPanelId === 'rt',
                badge: null,
                stateText: !showResourceToolsPanel ? null
                         : rtPanelPoppedOut       ? 'Popped out'
                         : rtPanelMinimised       ? 'Minimised'
                         : focusedPanelId === 'rt' ? 'Open \u00b7 active' : 'Open',
                onClick: () => {
                  if (rtPanelPoppedOut) { bringPanelToFront('rt'); return; }
                  if (!showResourceToolsPanel) { setShowResourceToolsPanel(true); setRtPanelMinimised(false); bringPanelToFront('rt'); }
                  else if (rtPanelMinimised) { setRtPanelMinimised(false); bringPanelToFront('rt'); }
                  else if (focusedPanelId !== 'rt') { bringPanelToFront('rt'); }
                  else { setRtPanelMinimised(true); }
                },
                onPopOut: () => { if (showResourceToolsPanel && !rtPanelPoppedOut) { bringPanelToFront('rt'); setRtPanelPoppedOut(true); } },
                onClose:  () => { setShowResourceToolsPanel(false); setRtPanelMinimised(false); },
              },
            ]}
            groupLockVisible={floatingPanelCount >= 2}
            groupLockActive={panelsLocked}
            onToggleGroupLock={() => setPanelsLocked(v => !v)}
          />

          {showHelp && (
            <HelpPanel
              onClose={() => { setShowHelp(false); setHelpInitialSection(null); }}
              currentUser={currentUser}
              isDirector={isDirector}
              activeView={activeTab}
              initialSection={helpInitialSection}
              onAuditSection={(sectionId) => {
                const entry = addAuditEntry(
                  currentUser, '—', 'System', 'Field Guide',
                  'Help Section Viewed', `Section: ${sectionId}`, '', null
                );
                appendAudit(entry);
              }}
              onAuditSearch={(query) => {
                if (!query || query.length < 2) return;
                const entry = addAuditEntry(
                  currentUser, '—', 'System', 'Field Guide',
                  'Help Search', `Query: "${query}"`, '', null
                );
                appendAudit(entry);
              }}
            />
          )}

          {/* Reassignment toast (5s with undo) */}
          {reassignToast && (() => {
            const toCM = CARE_MANAGERS.find(c => c.id === reassignToast.toCmId);
            const memberName = phiVisible ? `${reassignToast.member.last}, ${reassignToast.member.first}` : reassignToast.member.initials;
            return (
              <div className="toast-wrap no-print" role="status" aria-live="polite">
                <Icon name="check-circle-2" size={14} />
                <span className="font-ui text-sm"><strong>{memberName}</strong> reassigned to {toCM ? toCM.name : '—'}</span>
                <button onClick={undoReassign}
                  className="ml-2 font-ui text-[11px] uppercase tracking-wider bg-white/15 hover:bg-white/25 px-3 py-1 rounded font-semibold">
                  Undo
                </button>
                <button onClick={() => { if (reassignToastTimer.current) clearTimeout(reassignToastTimer.current); setReassignToast(null); }}
                  aria-label="Dismiss notification" className="opacity-70 hover:opacity-100">
                  <Icon name="x" size={13} />
                </button>
              </div>
            );
          })()}

          {/* HIPAA Ribbon */}
          <div className="ribbon-bar font-ui text-xs tracking-wide text-[var(--ribbon-text)]">
            <div className="max-w-[1440px] mx-auto px-6 py-2 flex items-center justify-between flex-wrap gap-2">
              <div className="flex items-center gap-4 ribbon-group">
                <span className="flex items-center gap-1.5"><Icon name="shield" size={12} /> <span className="ribbon-trim-120">PHI ENVIRONMENT · AUDIT LOGGED</span></span>
                <span className="opacity-40 ribbon-trim-120">|</span>
                <span><span className="ribbon-trim-110">Logged in: </span><strong>{currentUser.name}</strong></span>
                <span className="opacity-40 ribbon-trim-120">|</span>
                <span className="flex items-center gap-1.5" title="Session secure"><span className={`w-1.5 h-1.5 rounded-full pulse urgency-dot-${urgencyTier}`} /> <span className="ribbon-trim-110">Session secure</span></span>
              </div>
              <div className="flex items-center gap-4 ribbon-group">
                <span className={`flex items-center gap-1.5 urgency-text-${urgencyTier}`} title="Auto-lock countdown">
                  <Icon name="clock" size={12} /> <span className="ribbon-trim-120">Auto-lock in </span><span className="num font-semibold">{mmss(sessionRemaining)}</span>
                </span>
                {/* Text zoom — 3 sizes */}
                <div className="flex items-center gap-0.5 border border-[rgba(255,255,255,0.2)] rounded overflow-hidden" title="Text size">
                  {[100, 110, 120].map(z => (
                    <button key={z} onClick={() => setZoom(z)}
                      className={`font-ui px-2 py-0.5 transition-colors ${zoom === z ? 'bg-[rgba(255,255,255,0.25)] text-[var(--ribbon-text)] font-bold' : 'text-[var(--ribbon-muted)] hover:text-[var(--ribbon-text)]'}`}
                      style={{fontSize: z === 100 ? '10px' : z === 110 ? '11px' : '12px'}}
                      title={`${z}% text size`}>
                      A{z === 100 ? '' : z === 110 ? '+' : '++'}
                    </button>
                  ))}
                </div>
                <ThemeToggle theme={theme} onToggle={onToggleTheme} variant="ribbon" />
                <button type="button" onClick={() => { setShowWorkingList(v => !v); setWlMinimised(false); }}
                  aria-label="Active working list"
                  title="Active Working List — your bookmarked members with unfinished business"
                  className="wl-ribbon-btn flex items-center gap-1.5 hover:opacity-80 text-[var(--ribbon-text)]">
                  <Icon name="bookmark" size={12} />
                  <span className="ribbon-trim-120">My List</span>
                  {workingListIds.length > 0 && <span className="wl-count-dot">{workingListIds.length}</span>}
                </button>
                <button type="button" onClick={() => openHelp(null)}
                  aria-label="Open help and user guide"
                  title="Help & Field Guide (F1)"
                  className="flex items-center gap-1.5 hover:opacity-80 text-[var(--ribbon-text)]">
                  <Icon name="help-circle" size={12} />
                  <span className="ribbon-trim-120">Help</span>
                </button>
                <button
                  onClick={() => {
                    if (phiVisible) { setPhiVisible(false); setPhiRevealedAt(null); }
                    else { setPhiReason(''); setPhiReasonOther(''); setPhiModalOpen(true); }
                  }}
                  aria-label={phiVisible ? 'Hide protected health information' : 'Reveal protected health information (requires justification)'}
                  title={phiVisible ? 'Hide PHI' : 'Reveal PHI'}
                  className="flex items-center gap-1.5 hover:opacity-80 text-[var(--ribbon-text)]">
                  <Icon name={phiVisible ? 'eye-off' : 'eye'} size={12} />
                  <span className="ribbon-trim-120">{phiVisible ? 'Hide PHI' : 'Reveal PHI'}</span>
                </button>
                {userIsAdmin && (
                  <button onClick={() => setShowAdmin(true)} title="Admin configuration" className="flex items-center gap-1.5 hover:opacity-80 text-[var(--ribbon-text)]">
                    <Icon name="settings" size={12} /> <span className="ribbon-trim-120">Admin</span>
                  </button>
                )}
                <button type="button" onClick={onLogout} aria-label="Sign out" title="Sign out" className="flex items-center gap-1.5 hover:opacity-80 text-signout">
                  <Icon name="log-out" size={12} /> <span className="ribbon-trim-120">Sign out</span>
                </button>
              </div>
            </div>
          </div>

          {/* Global search affordance — clicking or pressing / opens the spotlight modal */}
          <div className="border-b hairline bg-[var(--elevated)]">
            <div className="max-w-[1440px] mx-auto px-6 py-2 flex items-center gap-3">
              <Icon name="search" size={14} className="text-[var(--muted)] shrink-0" />
              <button
                onClick={() => setShowSpotlight(true)}
                className="flex-1 font-ui text-sm text-left text-[var(--placeholder)] bg-transparent focus:outline-none hover:text-[var(--muted)] transition-colors">
                {phiVisible ? 'Locate any member by name, ID, or MBI…' : 'Locate any member by initials, ID, or MBI…'}
              </button>
              <kbd onClick={() => setShowSpotlight(true)}
                className="font-ui text-[10px] border hairline px-1.5 py-0.5 bg-[var(--surface)] text-[var(--muted)] cursor-pointer hover:bg-[var(--elevated)] select-none rounded">/</kbd>
              <span className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--dim)] shrink-0 hidden md:block">{members.length} members</span>
            </div>
          </div>

          {/* Spotlight Search Modal */}
          {showSpotlight && (
            <SpotlightSearch
              members={members}
              phiVisible={phiVisible}
              currentUser={currentUser}
              getAssignee={getAssignee}
              onPick={(m) => { openMember(m, 'members'); setShowSpotlight(false); }}
              onClose={() => setShowSpotlight(false)}
              onNav={(v) => { setView(v); setSelectedMeasure(null); setSelectedMember(null); setShowSpotlight(false); }}
            />
          )}

          {/* PHI Reveal Interstitial — HIPAA Minimum Necessary justification */}
          {phiModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onMouseDown={() => setPhiModalOpen(false)}>
              <div className="bg-[var(--surface)] max-w-md w-full p-6 rounded-2xl shadow-lg border hairline" onMouseDown={e => e.stopPropagation()}>
                <div className="flex items-start justify-between mb-3">
                  <div>
                    <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1 flex items-center gap-1.5">
                      <Icon name="shield-check" size={11} /> HIPAA Minimum Necessary
                    </div>
                    <h3 className="font-display text-2xl font-medium">Reveal PHI</h3>
                  </div>
                  <button onClick={() => setPhiModalOpen(false)} aria-label="Close PHI reveal dialog" className="text-[var(--muted)] hover:text-[var(--text)]"><Icon name="x" size={18} /></button>
                </div>
                <p className="font-ui text-sm text-[var(--muted)] leading-relaxed mb-4">
                  Reason for accessing identifiable patient information will be logged to the audit trail.
                  Select the reason that best describes your task.
                </p>
                <div className="space-y-1.5 mb-4">
                  {[
                    'Member outreach',
                    'Documentation review',
                    'Gap verification',
                    'Plan submission / supplemental data upload',
                    'Care coordination',
                    'Other',
                  ].map(r => (
                    <label key={r} className={`flex items-center gap-2.5 px-3 py-2 border rounded-lg cursor-pointer transition-colors ${phiReason === r ? 'border-[var(--accent)] bg-[var(--secondary-soft)]' : 'hairline hover:bg-[var(--elevated)]'}`}>
                      <input type="radio" name="phi-reason" value={r} checked={phiReason === r} onChange={e => setPhiReason(e.target.value)}
                        className="accent-[var(--accent)]" />
                      <span className="font-ui text-sm">{r}</span>
                    </label>
                  ))}
                </div>
                {phiReason === 'Other' && (
                  <textarea value={phiReasonOther} onChange={e => setPhiReasonOther(e.target.value)} rows={2}
                    placeholder="Specify reason (required for audit log)"
                    className="w-full font-ui text-sm border hairline bg-[var(--surface)] p-2 rounded-lg mb-4 focus:bg-[var(--elevated)] placeholder:text-[var(--placeholder)]" autoFocus />
                )}
                <div className="flex items-center gap-2">
                  <button onClick={() => setPhiModalOpen(false)}
                    className="flex-1 font-ui text-xs uppercase tracking-wider border hairline px-4 py-2.5 rounded-lg hover:bg-[var(--elevated)]">
                    Cancel
                  </button>
                  <button
                    disabled={!phiReason || (phiReason === 'Other' && !phiReasonOther.trim())}
                    onClick={() => {
                      const reasonText = phiReason === 'Other' ? `Other: ${phiReasonOther.trim()}` : phiReason;
                      setPhiVisible(true);
                      setPhiRevealedAt(Date.now());
                      setPhiModalOpen(false);
                      const entry = addAuditEntry(currentUser, '—', 'SYSTEM', '—', 'PHI Revealed', `Reason: ${reasonText} · auto-relock after 5 min idle`, '', null);
                      appendAudit(entry);
                    }}
                    className="flex-1 font-ui text-xs uppercase tracking-wider bg-[var(--accent)] text-[var(--on-accent)] px-4 py-2.5 rounded-lg hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-1.5">
                    <Icon name="check" size={12} /> Reveal &amp; log
                  </button>
                </div>
                <div className="font-ui text-[10px] text-[var(--subtle)] mt-3 text-center">
                  Your reveal will be tied to your audit record. Auto-hides on session lock.
                </div>
              </div>
            </div>
          )}

          {/* Admin Config Modal — only visible to jbryan / brees */}
          {showAdmin && userIsAdmin && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={() => setShowAdmin(false)}>
              <div className="border-2 hairline bg-[var(--surface)] max-w-lg w-full p-6" onClick={e => e.stopPropagation()}>
                <div className="flex items-start justify-between mb-4">
                  <div>
                    <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">Admin · Application Config</div>
                    <h3 className="font-display text-2xl font-medium">Runtime settings</h3>
                    <p className="font-ui text-xs text-[var(--muted)] mt-1">Changes save to this browser only (localStorage). Admins: {(config.ADMIN_USERS || []).join(', ')}.</p>
                  </div>
                  <button onClick={() => setShowAdmin(false)} aria-label="Close admin config dialog" className="text-[var(--muted)] hover:text-[var(--text)]"><Icon name="x" size={18} /></button>
                </div>
                <div className="space-y-4 border-t hairline pt-4">
                  <div className="flex items-start justify-between gap-4">
                    <div className="flex-1">
                      <div className="font-ui text-sm font-semibold">Allow all users to reassign members</div>
                      <div className="font-ui text-xs text-[var(--muted)] mt-0.5">When ON, any care manager can reassign any member. When OFF, only Director / Administrator can reassign. Flip OFF once a dedicated lead is in place.</div>
                    </div>
                    <button
                      onClick={() => { const c = { ...config, ALLOW_ALL_REASSIGN: !config.ALLOW_ALL_REASSIGN }; setConfig(c); saveConfig(c); }}
                      className={`shrink-0 px-3 py-1.5 font-ui text-[11px] tracking-wider uppercase border-2 ${config.ALLOW_ALL_REASSIGN ? 'bg-[var(--accent)] text-[var(--on-accent)] border-[var(--accent)]' : 'hairline'}`}>
