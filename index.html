      width: 32px;
      background: linear-gradient(to right, transparent, var(--surface));
      pointer-events: none;
      z-index: 5;
    }
    [data-theme="dark"] .pharma-table-wrap::after { background: linear-gradient(to right, transparent, var(--surface)); }

    /* ── Table row density overrides ── */
    .pharma-table[data-density="compact"] td  { padding-top: 3px !important; padding-bottom: 3px !important; }
    .pharma-table[data-density="spacious"] td { padding-top: 10px !important; padding-bottom: 10px !important; }

    /* Shortcut overlay */
    .shortcut-overlay {
      position: fixed; inset: 0; z-index: 9400;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      padding: 16px; animation: fadeIn .15s ease-out;
    }
    .shortcut-card {
      background: var(--surface); border-radius: var(--radius-card);
      box-shadow: var(--shadow-lg); padding: 24px;
      max-width: 480px; width: 100%;
    }
  </style>
  
</head>
<body>
  <div id="loading">
    <div class="loading-inner">
      <div class="loading-kicker">UM_Aid IPA · Quality Operations</div>
      <div class="loading-logo">Care Manager <em>NaviStation</em></div>
      <div class="loading-tagline">HEDIS &amp; STARS · Measurement Year 2026</div>
      <div class="loading-bar"><div class="loading-bar-fill"></div></div>
      <div style="font-family:'Inter Tight',sans-serif;font-size:11px;color:#a39684;letter-spacing:0.15em;">Initializing secure session<span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <div class="loading-preview">
        <span class="preview-tag">Preview Build</span>
        <span style="color:#a39684;">Not for production use</span>
      </div>
    </div>
  </div>
  <div id="root"></div>

  <!-- Persistent preview-build strip. Lives outside #root so it survives
       any React render failure, route change, or state transition. Hidden
       during print via @media print. Hidden during the lock overlay and
       loading screen via z-index ordering (8000 < 9000 < 9999). -->
  <div class="preview-strip" role="note" aria-label="Preview build notice">
    <span class="preview-tag">Preview Build</span>
    <span>Not for production use</span>
    <span class="preview-sep">·</span>
    <span>Excel remains system of record through launch</span>
  </div>

  <script type="text/babel" data-type="module">
    const { useState, useMemo, useEffect, useRef, useCallback, createElement: h } = React;

    // ── ErrorBoundary ─────────────────────────────────────────────────────────
    // Wraps each top-level view so one render-time exception in any of the
    // 44+ components doesn't blank the whole app — which would be the
    // worst-case moment during a live stakeholder walk-through. Has to be a
    // class component because error boundaries can't be implemented with
    // hooks (React 18 still requires componentDidCatch / getDerivedStateFromError).
    //
    // The parent uses `key={view}` so navigating to a different tab fully
    // remounts the boundary and clears any error state — i.e. a broken view
    // is always recoverable by clicking a different nav button.
    //
    // In production we'll wire `componentDidCatch` to whatever telemetry
    // pipeline the .NET side exposes (App Insights, Serilog HTTP sink, etc.)
    // so render failures generate a ticket instead of just a console log.
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { error: null, info: null };
      }
      static getDerivedStateFromError(error) {
        return { error };
      }
      componentDidCatch(error, info) {
        // Prototype: console only. Production: ship to telemetry endpoint.
        // Intentionally NOT swallowing — we want this loud in dev tools.
        console.error('[NaviStation] View render failure:', error, info);
        this.setState({ info });
      }
      render() {
        if (!this.state.error) return this.props.children;
        const { error, info } = this.state;
        const goHome = this.props.onGoHome;
        return (
          <div className="border-2 hairline bg-[var(--surface)] p-8 max-w-2xl mx-auto mt-8">
            <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--status-warn)] mb-2">View unavailable</div>
            <h2 className="font-display text-2xl font-medium mb-3">This screen couldn't load.</h2>
            <p className="font-ui text-sm text-[var(--muted)] mb-5">
              Something went wrong rendering this view. Your work in other tabs is unaffected — you can navigate to another section, or reload the page.
            </p>
            <div className="flex items-center gap-2 mb-5">
              {goHome && (
                <button onClick={goHome}
                  className="font-ui text-xs uppercase tracking-wider bg-[var(--accent)] text-[var(--on-accent)] px-4 py-2 rounded hover:opacity-90">
                  Go to Today
                </button>
              )}
              <button onClick={() => window.location.reload()}
                className="font-ui text-xs uppercase tracking-wider border-2 hairline px-4 py-2 rounded hover:bg-[var(--elevated)]">
                Reload page
              </button>
            </div>
            <details className="border-t hairline pt-3 mt-3">
              <summary className="font-ui text-[10px] uppercase tracking-wider text-[var(--subtle)] cursor-pointer hover:text-[var(--text)]">
                Technical details (for developers)
              </summary>
              <pre className="font-ui text-[11px] text-[var(--muted)] mt-2 whitespace-pre-wrap break-all overflow-auto max-h-48">
                {String(error?.stack || error?.message || error)}
                {info?.componentStack ? '\n\nComponent stack:' + info.componentStack : ''}
              </pre>
            </details>
          </div>
        );
      }
    }

    // ── Icon wrapper ──────────────────────────────────────────────────────────
    function Icon({ name, size = 16, className = '' }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = '';
          const el = document.createElement('i');
          el.setAttribute('data-lucide', name);
          ref.current.appendChild(el);
          window.lucide.createIcons({ nameAttr: 'data-lucide', attrs: { width: size, height: size } });
        }
      }, [name, size]);
      return h('span', { ref, className: `inline-flex ${className}`.trim() });
    }


    // ── PhoneWithNotes ────────────────────────────────────────────────────────
    // Hover (or click the notebook icon) over any phone number to see saved notes
    // and alternate numbers for that entity. Data is per-user in localStorage.
    // entityKey: stable string (pharmacy name, prescriber name, member ID, etc.)
    function PhoneWithNotes({ phone, entityKey }) {
      const lsKey = 'acm-phone-notes:' + (entityKey || phone || '').replace(/[^a-z0-9]/gi, '-').toLowerCase().slice(0, 80);
      const loadNotes = () => { try { return JSON.parse(localStorage.getItem(lsKey) || '[]'); } catch(e) { return []; } };

      const [open, setOpen]       = useState(false);
      const [notes, setNotes]     = useState([]);
      const [draft, setDraft]     = useState('');
      const [editIdx, setEditIdx] = useState(null);
      const [editText, setEditText] = useState('');
      const [panelPos, setPanelPos] = useState({ top: 0, left: 0 });
      const wrapRef  = useRef(null);
      const inputRef = useRef(null);
      const hoverT   = useRef(null);

      // Compute viewport-relative position so overflow:hidden/auto ancestors can't clip us
      const calcPos = () => {
        if (!wrapRef.current) return;
        const r = wrapRef.current.getBoundingClientRect();
        const panelH = 380; // approx panel height with larger text
        const panelW = 400;
        const spaceBelow = window.innerHeight - r.bottom;
        const spaceAbove = r.top;
        const top = spaceBelow >= panelH || spaceBelow >= spaceAbove
          ? r.bottom + 6
          : r.top - panelH - 6;
        const left = Math.min(r.left, window.innerWidth - panelW - 12);
        setPanelPos({ top, left });
      };

      const openPanel  = () => { setNotes(loadNotes()); calcPos(); setOpen(true); };
      const closePanel = () => { clearTimeout(hoverT.current); setOpen(false); setDraft(''); setEditIdx(null); setEditText(''); };

      useEffect(() => {
        if (!open) return;
        const handler = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) closePanel(); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [open]);

      const persist = (list) => { try { localStorage.setItem(lsKey, JSON.stringify(list.slice(0,20))); } catch(e) {} };

      const saveNote = () => {
        if (!draft.trim()) return;
        const updated = [{ text: draft.trim(), ts: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}) }, ...notes];
        persist(updated); setNotes(updated); setDraft('');
        if (inputRef.current) inputRef.current.focus();
      };
      const deleteNote = (i) => { const u = notes.filter((_,j) => j!==i); persist(u); setNotes(u); };
      const saveEdit = (i) => {
        if (!editText.trim()) return;
        const u = notes.map((n,j) => j===i ? {...n, text:editText.trim()} : n);
        persist(u); setNotes(u); setEditIdx(null); setEditText('');
      };

      return (
        <div ref={wrapRef} className="relative inline-flex items-center gap-1 group"
          onMouseEnter={() => { clearTimeout(hoverT.current); hoverT.current = setTimeout(openPanel, 260); }}
          onMouseLeave={() => { if (!open) clearTimeout(hoverT.current); }}>

          <span className={`num text-xs select-text underline decoration-dotted decoration-[var(--dim)] underline-offset-2 ${open ? 'text-[var(--accent)] font-semibold' : ''}`}>{phone}</span>

          <button type="button" onClick={e => { e.stopPropagation(); open ? closePanel() : openPanel(); }}
            title="Phone notes and alt numbers"
            className={`ml-0.5 flex-shrink-0 transition-opacity ${open ? 'opacity-100 text-[var(--accent)]' : 'opacity-0 group-hover:opacity-60 text-[var(--muted)]'} hover:!opacity-100`}>
            <Icon name="notebook-pen" size={11} />
          </button>

          {open && (
            <div className="fixed z-[9999] border-2 hairline shadow-xl font-ui bg-[var(--surface)] rounded"
              style={{top: panelPos.top, left: panelPos.left, minWidth:'360px', maxWidth:'420px'}} onMouseDown={e => e.stopPropagation()}>

              {/* Header */}
              <div className="flex items-center justify-between px-3 py-2.5 bg-[var(--elevated)] border-b hairline">
                <span className="font-ui text-[11px] uppercase tracking-[0.2em] text-[var(--accent)] font-bold flex items-center gap-1.5">
                  <Icon name="notebook-pen" size={13} /> Phone notes
                </span>
                <button onClick={closePanel} className="text-[var(--muted)] hover:text-[var(--text)]" title="Close"><Icon name="x" size={15} /></button>
              </div>
              <div className="px-3 pt-2 pb-1.5 font-ui text-xs text-[var(--muted)] truncate">
                <span className="opacity-70">For: </span><span className="text-[var(--text)] font-semibold">{entityKey || phone}</span>
                <span className="opacity-50 ml-2">· your notes only · not shared</span>
              </div>

              {/* Note list */}
              <div className="max-h-60 overflow-y-auto px-3 pb-2 space-y-2">
                {notes.length === 0 && (
                  <div className="font-ui text-sm text-[var(--placeholder)] italic py-2">
                    No notes yet. Add alt numbers, IVR sequences, back-lines, extension codes...
                  </div>
                )}
                {notes.map((n, i) => (
                  <div key={i} className="border hairline bg-[var(--elevated)] px-3 py-2 text-sm rounded">
                    {editIdx === i ? (
                      <div className="flex gap-1.5">
                        <input autoFocus value={editText} onChange={e => setEditText(e.target.value)}
                          onKeyDown={e => { if(e.key==='Enter') saveEdit(i); if(e.key==='Escape'){setEditIdx(null);setEditText('');} }}
                          className="flex-1 min-w-0 border hairline bg-[var(--surface)] px-2 py-1 text-sm text-[var(--text)]" />
                        <button onClick={() => saveEdit(i)} className="text-[var(--accent)] hover:opacity-80 shrink-0" title="Save"><Icon name="check" size={15} /></button>
                        <button onClick={() => {setEditIdx(null);setEditText('');}} className="text-[var(--muted)] shrink-0" title="Cancel"><Icon name="x" size={15} /></button>
                      </div>
                    ) : (
                      <div className="flex items-start gap-2">
                        <span className="flex-1 leading-relaxed text-[var(--text)] break-words">{n.text}</span>
                        <span className="text-[11px] text-[var(--placeholder)] shrink-0 mt-0.5 num">{n.ts}</span>
                        <button onClick={() => {setEditIdx(i);setEditText(n.text);}} className="text-[var(--muted)] hover:text-[var(--text)] shrink-0" title="Edit"><Icon name="pencil" size={13} /></button>
                        <button onClick={() => deleteNote(i)} className="text-[var(--status-critical)] hover:opacity-80 shrink-0" title="Delete"><Icon name="trash-2" size={13} /></button>
                      </div>
                    )}
                  </div>
                ))}
              </div>

              {/* Add note */}
              <div className="border-t hairline px-3 py-2.5 bg-[var(--bg-secondary)]">
                <div className="flex gap-1.5">
                  <input ref={inputRef} value={draft} onChange={e => setDraft(e.target.value)}
                    onKeyDown={e => { if(e.key==='Enter') saveNote(); if(e.key==='Escape') closePanel(); }}
                    placeholder="Alt number or note — e.g. Back line, press #2 #2 #2"
                    className="flex-1 min-w-0 border hairline bg-[var(--surface)] px-2.5 py-2 text-sm text-[var(--text)] placeholder:text-[var(--placeholder)]" />
                  <button onClick={saveNote} disabled={!draft.trim()}
                    className="shrink-0 px-3 py-2 bg-[var(--accent)] text-[var(--on-accent)] text-sm font-semibold disabled:opacity-40 flex items-center gap-1 rounded">
                    <Icon name="plus" size={13} /> Add
                  </button>
                </div>
                <div className="font-ui text-[11px] text-[var(--placeholder)] mt-1.5">Saved to this browser only · Enter to save · Esc to close</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Polypharmacy helpers ────────────────────────────────────────────────
    // A member is "multi-med" when they have 2+ open Part D adherence gaps.
    // Drives the MultiMedBadge shown anywhere the member is rendered.
    const PHARMA_MEASURES = ['D-DIAB','D-HTN','D-CHOL','SPC'];
    const pharmaGapCount = (m) => (m?.gaps || []).filter(g => PHARMA_MEASURES.includes(g)).length;
    const isMultiMed = (m) => pharmaGapCount(m) >= 2;

    // Small inline badge: pills icon + count, dusty-rose styling so it reads as
    // clinical/attention without competing with the priority/measure pills.
    // size: 'sm' (default) for tables/cards, 'md' for the member detail header.
    function MultiMedBadge({ member, size = 'sm' }) {
      const count = pharmaGapCount(member);
      if (count < 2) return null;
      const isMd = size === 'md';
      const px = isMd ? 'px-2 py-0.5' : 'px-1.5 py-0.5';
      const txt = isMd ? 'text-[11px]' : 'text-[9px]';
      const iconSize = isMd ? 12 : 10;
      return (
        <span

    // different set of policies and frequently survive when localStorage does

    function pinOverrideKey(userId) { return 'acm-pin:' + userId; }

    function readCookie(name) {
      try {
        const esc = name.replace(/([.$?*|{}()\[\]\\\/+^])/g, '\\$1');
        const m = document.cookie.match(new RegExp('(?:^|; )' + esc + '=([^;]*)'));
        return m ? decodeURIComponent(m[1]) : null;

        // for the real session cookie; this is the prototype's persistence shim.

    // Seed some initial audit history
    function seedAuditLog(members, cms) {

    // ── CSV export helper ─────────────────────────────────────────────────
    // Used by Activity / Worklist / Outreach export buttons. Same shape as
    // the inline one in MeasureOverview, lifted here so the three new
    // exporters share consistent metadata-comment headers (auditable: every
    // export records who/when/what filters) plus consistent quoting/escape
    // behavior across the dashboard. Anything containing a comma, quote, or
    // newline is wrapped in quotes and inner quotes are doubled — the
    // canonical RFC-4180 escape rules so Excel/Google Sheets open clean.
    function escapeCsv(v) {
      if (v === null || v === undefined) return '';
      const s = String(v);
      if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }
    function downloadCsv({ filename, headers, rows, meta = {} }) {
      // Metadata block — leading `#` lines that Excel reads as comments
      // are not part of the formal CSV spec; many tools tolerate them on
      // import, others surface them as a first row of `#`-prefixed cells.
      // We include them for human auditability when the file is opened in a
      // text editor; for Excel-clean import, users can strip the first few
      // lines or wrap them under the column heading row.
      const metaLines = [
        ['# UM_Aid IPA — ' + (meta.title || 'Export')],
        ['# Exported by', meta.exportedBy || 'unknown'],
        ['# Exported at', new Date().toISOString()],
        ...(meta.extra || []).map(line => Array.isArray(line) ? line : [line]),
        ['# Row count', String(rows.length)],
        [],
      ];
      const lines = [
        ...metaLines.map(r => r.map(escapeCsv).join(',')),
        headers.map(escapeCsv).join(','),
        ...rows.map(r => r.map(escapeCsv).join(',')),
      ];
      const csv = lines.join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      // Small delay before revoking — some browsers race the click→download
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    // LOGIN SCREEN
    // ══════════════════════════════════════════════════════════════════════════
    function LoginScreen({ onLogin, theme, onToggleTheme }) {
      const [selectedUser, setSelectedUser] = useState(null);
      const [pin, setPin] = useState('');
      const [error, setError] = useState('');
      const [showPin, setShowPin] = useState(false);

      const [retryCountdown, setRetryCountdown] = useState(0);
      useEffect(() => {
        if (retryCountdown <= 0) return;
        const t = setInterval(() => setRetryCountdown(s => Math.max(0, s - 1)), 1000);
        return () => clearInterval(t);
      }, [retryCountdown]);

      const handleLogin = () => {
        if (!selectedUser) { setError('Select a care manager.'); return; }
        const cm = CARE_MANAGERS.find(c => c.id === selectedUser);
        if (!cm) return;
        const status = pinAttemptStatus(cm.id);
        if (!status.allowed) {
          setError(status.reason);
          if (status.retryInMs) setRetryCountdown(Math.ceil(status.retryInMs / 1000));
          setPin('');
          return;
        }
        if (pin !== getUserPin(cm.id)) {
          const after = recordPinFailure(cm.id);
          let msg = 'Incorrect PIN. Try again.';
          if (after.backoffUntil) {
            msg = 'Too many attempts. Locked for 60 seconds.';
            setRetryCountdown(Math.ceil((after.backoffUntil - Date.now()) / 1000));
          } else if (after.strikes >= PIN_LOCKOUT_STRIKES) {
            msg = 'Account locked after ' + PIN_LOCKOUT_STRIKES + ' failed attempts. Contact an admin.';
          } else {
            msg = 'Incorrect PIN. ' + (PIN_LOCKOUT_STRIKES - after.strikes) + ' attempts remaining.';
          }
          setError(msg); setPin(''); return;
        }
        recordPinSuccess(cm.id);
        onLogin(cm);
      };

      return (
        <div className="min-h-screen flex items-center justify-center relative bg-[var(--bg)] text-[var(--text)]">
          <div className="absolute top-4 right-4 z-10">
            <ThemeToggle theme={theme} onToggle={onToggleTheme} />
          </div>
          <div className="w-full max-w-md px-4">
            <div className="text-center mb-10">
              <div className="font-ui text-[11px] tracking-[0.3em] text-[var(--accent)] mb-3">UM_Aid IPA · QUALITY OPERATIONS</div>
              <h1 className="font-display text-5xl leading-tight font-medium">Care Manager <em className="italic text-[var(--accent)] font-normal">NaviStation</em></h1>
              <p className="font-ui text-sm text-[var(--muted)] mt-3">HEDIS · STARS · Pharmacy</p>
            </div>

            <div className="border-2 hairline bg-[var(--surface)] p-8">
              <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] mb-3">Select your account</div>
              <div className="grid grid-cols-1 gap-2 mb-6 max-h-64 overflow-y-auto">
                {CARE_MANAGERS.map(cm => (
                  <button key={cm.id} onClick={() => { setSelectedUser(cm.id); setError(''); setPin(''); }}
                    className={`text-left px-4 py-3 border-2 flex items-center gap-3 transition-colors ${selectedUser === cm.id ? 'bg-[var(--inverse)] text-[var(--on-inverse)] border-[var(--inverse)]' : 'hairline hover:bg-[var(--elevated)]'}`}>
                    <div className={`w-8 h-8 flex items-center justify-center text-xs font-semibold font-ui ${selectedUser === cm.id ? 'bg-[var(--surface)] text-[var(--text)]' : 'bg-[var(--accent)] text-[var(--on-accent)]'}`}>
                      {cm.initials}
                    </div>
                    <div>
                      <div className={`font-display text-base font-medium ${selectedUser === cm.id ? '' : 'text-[var(--text)]'}`}>{cm.name}</div>
                      <div className={`font-ui text-xs ${selectedUser === cm.id ? 'opacity-70' : 'text-[var(--muted)]'}`}>{cm.role}</div>
                    </div>
                  </button>
                ))}
              </div>

              {selectedUser && (
                <div className="slide-in">
                  <label htmlFor="login-pin" className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] mb-2 block">PIN</label>
                  <div className="relative">
                    <input
                      id="login-pin"
                      type={showPin ? 'text' : 'password'}
                      maxLength={4}
                      aria-label="4-digit PIN"
                      disabled={retryCountdown > 0}
                      value={pin}
                      onChange={e => { setPin(e.target.value.replace(/\D/g,'')); setError(''); }}
                      onKeyDown={e => e.key === 'Enter' && handleLogin()}
                      placeholder="····"
                      className="w-full font-ui text-2xl tracking-[0.5em] border-2 hairline bg-[var(--surface)] px-4 py-3 focus:bg-[var(--elevated)] placeholder:text-[var(--placeholder)] text-[var(--text)] num"
                      autoFocus
                    />
                    <button onClick={() => setShowPin(v => !v)} className="absolute right-3 top-1/2 -translate-y-1/2 text-[var(--muted)] hover:text-[var(--text)]">
                      <Icon name={showPin ? 'eye-off' : 'eye'} size={16} />
                    </button>
                  </div>
                  {!IS_PROD && <div className="font-ui text-[10px] text-[var(--muted)] mt-1">PIN: 0000 for all accounts during UAT</div>}
                  {retryCountdown > 0 && (
                    <div className="font-ui text-[11px] text-[var(--status-warn)] mt-1 flex items-center gap-1">
                      <Icon name="clock" size={11} /> Retry available in <span className="num font-semibold">{retryCountdown}s</span>
                    </div>
                  )}
                </div>
              )}

              {error && <div className="mt-3 font-ui text-xs text-[var(--status-critical)] flex items-center gap-1"><Icon name="alert-circle" size={12} /> {error}</div>}

              <button onClick={handleLogin} disabled={!selectedUser || pin.length < 4 || retryCountdown > 0}
                className="mt-6 w-full bg-[var(--inverse)] text-[var(--on-inverse)] font-ui text-sm uppercase tracking-[0.2em] py-3.5 hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed">
                {retryCountdown > 0 ? `Locked · ${retryCountdown}s` : 'Sign In →'}
              </button>
            </div>

            <div className="mt-4 font-ui text-[10px] text-[var(--subtle)] text-center leading-relaxed">
              Synthetic demonstration data only · No real PHI · Session auto-locks after 15 min inactivity<br/>
              HIPAA Minimum Necessary · All access is audit-logged
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // LOCK SCREEN
    // ══════════════════════════════════════════════════════════════════════════
    function LockScreen({ user, onUnlock }) {
      const [pin, setPin] = useState('');
      const [error, setError] = useState('');

      const [retryCountdown, setRetryCountdown] = useState(0);
      useEffect(() => {
        if (retryCountdown <= 0) return;
        const t = setInterval(() => setRetryCountdown(s => Math.max(0, s - 1)), 1000);
        return () => clearInterval(t);
      }, [retryCountdown]);

      const tryUnlock = () => {
        const cm = CARE_MANAGERS.find(c => c.id === user.id);
        if (!cm) return;
        const status = pinAttemptStatus(cm.id);
        if (!status.allowed) {
          setError(status.reason);
          if (status.retryInMs) setRetryCountdown(Math.ceil(status.retryInMs / 1000));
          setPin('');
          return;
        }
        if (pin === getUserPin(cm.id)) {
          recordPinSuccess(cm.id);
          onUnlock(); setPin('');
        } else {
          const after = recordPinFailure(cm.id);
          let msg = 'Incorrect PIN.';
          if (after.backoffUntil) {
            msg = 'Locked for 60 seconds.';
            setRetryCountdown(Math.ceil((after.backoffUntil - Date.now()) / 1000));
          } else if (after.strikes >= PIN_LOCKOUT_STRIKES) {
            msg = 'Account locked. Contact an admin.';
          } else {
            msg = 'Incorrect PIN. ' + (PIN_LOCKOUT_STRIKES - after.strikes) + ' attempts remaining.';
          }
          setError(msg); setPin('');
        }
      };

      return (
        <div className="lock-overlay">
          <div className="w-full max-w-sm mx-4">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-[var(--accent)] flex items-center justify-center mx-auto mb-4 text-[var(--on-accent)] text-xl font-display font-medium">
                {user.initials}
              </div>
              <div className="font-display text-2xl text-[var(--ribbon-text)] font-medium">{user.name}</div>
              <div className="font-ui text-sm text-[var(--ribbon-muted)] mt-1">{user.role}</div>
              <div className="font-ui text-xs text-[var(--subtle)] mt-3 flex items-center justify-center gap-1.5">
                <Icon name="lock" size={12} className="text-[var(--subtle)]" />Session locked — inactivity timeout
              </div>
            </div>
            <div className="border-2 lock-card p-6">
              <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--subtle)] mb-2">Enter PIN to resume</div>
              <input type="password" maxLength={4} value={pin}
                aria-label="PIN to unlock session"
                onChange={e => { setPin(e.target.value.replace(/\D/g,'')); setError(''); }}
                onKeyDown={e => e.key === 'Enter' && tryUnlock()}
                disabled={retryCountdown > 0}
                className="w-full font-ui text-2xl tracking-[0.5em] border lock-input px-4 py-3 focus:border-[var(--accent)] num disabled:opacity-40"
                autoFocus />
              {error && <div className="mt-2 font-ui text-xs text-[var(--status-warn)]">{error}</div>}
              {retryCountdown > 0 && (
                <div className="mt-2 font-ui text-[11px] text-[var(--status-warn)] flex items-center gap-1">
                  <Icon name="clock" size={11} /> Retry available in <span className="num font-semibold">{retryCountdown}s</span>
                </div>
              )}
              <button onClick={tryUnlock} disabled={pin.length < 4 || retryCountdown > 0}
                className="mt-4 w-full bg-[var(--accent)] text-[var(--on-accent)] font-ui text-sm uppercase tracking-wider py-3 hover:opacity-90 disabled:opacity-40">
                Unlock →
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // SPOTLIGHT SEARCH — / key triggers full-screen member + nav search modal
    // ══════════════════════════════════════════════════════════════════════════
    function SpotlightSearch({ members, phiVisible, currentUser, getAssignee, onPick, onClose, onNav }) {
      const [query, setQuery] = React.useState('');
      const [activeIdx, setActiveIdx] = React.useState(0);
      const inputRef = React.useRef(null);
      const listRef = React.useRef(null);

      const NAV_SHORTCUTS = [
        { id: 'today',     label: 'Go to Today',           icon: 'sunrise',           sub: 'Your personalized dashboard' },
        { id: 'overview',  label: 'Go to Measures',        icon: 'target',            sub: 'HEDIS / STARS gap overview' },
        { id: 'pharma',    label: 'Go to Pharmacy',        icon: 'pill',              sub: 'PDC adherence tracker' },
        { id: 'members',   label: 'Go to Worklist',        icon: 'users',             sub: 'Full member list' },
        { id: 'outreach',  label: 'Go to Outreach',        icon: 'phone',             sub: 'Outreach queue and log' },
        { id: 'gap-guide', label: 'Go to Gap Guide',       icon: 'book-open',         sub: 'Measure coding reference' },
        { id: 'resources', label: 'Go to Resource Tools',  icon: 'life-buoy',         sub: 'Forms, letters, templates' },
        { id: 'audit',     label: 'Go to Activity',        icon: 'file-text',         sub: 'Audit trail and session log' },
        { id: 'settings',  label: 'Go to Settings',        icon: 'sliders-horizontal',sub: 'Preferences and display options' },
      ];

      const q = query.trim().toLowerCase();

      // Member results
      const memberResults = React.useMemo(() => {
        if (!q) return [];
        return members.filter(m => {
          const hay = phiVisible
            ? `${m.first} ${m.last} ${m.id} ${m.mbi} ${m.phone} ${m.gaps.join(' ')}`.toLowerCase()
            : `${m.initials} ${m.id} ${m.mbi}`.toLowerCase();
          return hay.includes(q);
        }).slice(0, 8);
      }, [q, members, phiVisible]);

      // Nav results (filter when typing)
      const navResults = React.useMemo(() => {
        if (!q) return NAV_SHORTCUTS;
        return NAV_SHORTCUTS.filter(n => n.label.toLowerCase().includes(q) || n.sub.toLowerCase().includes(q));
      }, [q]);

      // Flat list of all navigable items for keyboard control
      const allItems = React.useMemo(() => {
        const items = [];
        memberResults.forEach(m => items.push({ type: 'member', data: m }));
        navResults.forEach(n => items.push({ type: 'nav', data: n }));
        return items;
      }, [memberResults, navResults]);

      // Auto-focus input on mount
      React.useEffect(() => {
        if (inputRef.current) inputRef.current.focus();
      }, []);

      // Reset active index when results change
      React.useEffect(() => { setActiveIdx(0); }, [query]);

      // Scroll active item into view
      React.useEffect(() => {
        if (listRef.current) {
          const active = listRef.current.querySelector('[data-active="true"]');
          if (active) active.scrollIntoView({ block: 'nearest' });
        }
      }, [activeIdx]);

      const handleKeyDown = (e) => {
        if (e.key === 'Escape') { onClose(); return; }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          setActiveIdx(i => Math.min(i + 1, allItems.length - 1));
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          setActiveIdx(i => Math.max(i - 1, 0));
        } else if (e.key === 'Enter') {
          e.preventDefault();
          const item = allItems[activeIdx];
          if (!item) return;
          if (item.type === 'member') onPick(item.data);
          else onNav(item.data.id);
        }
      };

      let globalIdx = 0; // running counter for flat keyboard nav

      return (
        <div
          className="fixed inset-0 z-[9900] flex items-start justify-center pt-[10vh] px-4"
          style={{ background: 'rgba(10,8,6,0.72)', backdropFilter: 'blur(4px)' }}
          onMouseDown={onClose}>

          <div
            className="w-full max-w-xl bg-[var(--surface)] rounded-2xl shadow-2xl overflow-hidden border hairline"
            onMouseDown={e => e.stopPropagation()}
            style={{ maxHeight: '70vh', display: 'flex', flexDirection: 'column' }}>

            {/* Input row */}
            <div className="flex items-center gap-3 px-4 py-3.5 border-b hairline">
              <Icon name="search" size={18} className="text-[var(--muted)] shrink-0" />
              <input
                ref={inputRef}
                value={query}
                onChange={e => setQuery(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder={phiVisible ? 'Search members by name, ID, MBI, gap…' : 'Search members by initials, ID, MBI…'}
                className="flex-1 font-ui text-base bg-transparent focus:outline-none placeholder:text-[var(--placeholder)]"
                aria-label="Spotlight search"
                autoComplete="off"
                spellCheck={false}
              />
              {query && (
                <button onClick={() => setQuery('')} className="text-[var(--muted)] hover:text-[var(--text)]">
                  <Icon name="x" size={14} />
                </button>
              )}
              <kbd className="font-ui text-[10px] border hairline px-1.5 py-0.5 bg-[var(--elevated)] text-[var(--muted)] rounded select-none shrink-0">Esc</kbd>
            </div>

            {/* Results */}
            <div ref={listRef} className="overflow-y-auto flex-1">

              {/* Member results */}
              {memberResults.length > 0 && (
                <div>
                  <div className="px-4 pt-3 pb-1.5 font-ui text-[9px] tracking-[0.25em] uppercase text-[var(--placeholder)] font-semibold">Members</div>
                  {memberResults.map((m) => {
                    const idx = globalIdx++;
                    const assigned = CARE_MANAGERS.find(c => c.id === getAssignee(m));
                    const isActive = activeIdx === idx;
                    return (
                      <button
                        key={m.id}
                        data-active={isActive}
                        onClick={() => onPick(m)}
                        onMouseEnter={() => setActiveIdx(idx)}
                        className={`w-full text-left px-4 py-2.5 flex items-center gap-3 transition-colors ${isActive ? 'bg-[var(--accent)] text-[var(--on-accent)]' : 'hover:bg-[var(--elevated)]'}`}>
                        {/* Priority avatar */}
                        <div className={`w-8 h-8 flex items-center justify-center text-[10px] font-semibold font-ui shrink-0 rounded ${
                          isActive ? 'bg-[var(--on-accent)]/20 text-[var(--on-accent)]' : priorityStyle(m.priority)
                        }`}>{m.initials}</div>
                        <div className="flex-1 min-w-0">
                          <div className={`font-display text-sm font-medium truncate flex items-center gap-1.5 ${isActive ? 'text-[var(--on-accent)]' : ''}`}>
                            {phiVisible ? `${m.last}, ${m.first}` : m.initials}
                            {m.hasPharma && m.compStatus === 'Non-Compliant' && (
                              <span className={`text-[9px] px-1 py-px border rounded ${isActive ? 'border-[var(--on-accent)]/40 text-[var(--on-accent)]/80' : 'border-[var(--status-critical)] text-[var(--status-critical)]'}`}>Rx</span>
                            )}
                          </div>
                          <div className={`font-ui text-[10px] num truncate ${isActive ? 'text-[var(--on-accent)]/70' : 'text-[var(--muted)]'}`}>
                            {m.id} · {m.line} · {m.gaps.length} gap{m.gaps.length !== 1 ? 's' : ''} · {m.priority}
                          </div>
                        </div>
                        <div className={`font-ui text-[10px] text-right shrink-0 ${isActive ? 'text-[var(--on-accent)]/70' : 'text-[var(--muted)]'}`}>
                          {assigned && <div>{assigned.initials}</div>}
                          <div className="mt-0.5 flex items-center justify-end gap-1">
                            <Icon name="chevron-right" size={11} />
                          </div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}

              {/* Nav shortcuts */}
              {navResults.length > 0 && (
                <div className={memberResults.length > 0 ? 'border-t hairline' : ''}>
                  <div className="px-4 pt-3 pb-1.5 font-ui text-[9px] tracking-[0.25em] uppercase text-[var(--placeholder)] font-semibold">
                    {q ? 'Navigation' : 'Quick Navigation'}
                  </div>
                  {navResults.map((n) => {
                    const idx = globalIdx++;
                    const isActive = activeIdx === idx;
                    return (
                      <button
                        key={n.id}
                        data-active={isActive}
                        onClick={() => onNav(n.id)}
                        onMouseEnter={() => setActiveIdx(idx)}
                        className={`w-full text-left px-4 py-2.5 flex items-center gap-3 transition-colors ${isActive ? 'bg-[var(--accent)] text-[var(--on-accent)]' : 'hover:bg-[var(--elevated)]'}`}>
                        <div className={`w-8 h-8 flex items-center justify-center rounded shrink-0 border ${isActive ? 'bg-[var(--on-accent)]/15 border-[var(--on-accent)]/25' : 'hairline bg-[var(--elevated)]'}`}>
                          <Icon name={n.icon} size={14} className={isActive ? 'text-[var(--on-accent)]' : 'text-[var(--muted)]'} />
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className={`font-ui text-sm font-medium ${isActive ? 'text-[var(--on-accent)]' : ''}`}>{n.label}</div>
                          <div className={`font-ui text-[10px] ${isActive ? 'text-[var(--on-accent)]/70' : 'text-[var(--muted)]'}`}>{n.sub}</div>
                        </div>
                        <Icon name="arrow-right" size={13} className={isActive ? 'text-[var(--on-accent)]/70' : 'text-[var(--dim)]'} />
                      </button>
                    );
                  })}
                </div>
              )}

              {/* Empty state */}
              {q && memberResults.length === 0 && navResults.length === 0 && (
                <div className="px-4 py-10 text-center">
                  <Icon name="search-x" size={24} className="text-[var(--dim)] mx-auto mb-2" />
                  <div className="font-display text-base text-[var(--muted)]">No results for "{query}"</div>
                  <div className="font-ui text-xs text-[var(--placeholder)] mt-1">Try member ID, initials, or a tab name</div>
                </div>
              )}

              {/* Bottom hint bar */}
              <div className="flex items-center gap-4 px-4 py-2.5 border-t hairline bg-[var(--elevated)] font-ui text-[10px] text-[var(--muted)]">
                <span className="flex items-center gap-1"><kbd className="border hairline px-1 py-px bg-[var(--surface)] rounded text-[9px]">↑↓</kbd> navigate</span>
                <span className="flex items-center gap-1"><kbd className="border hairline px-1 py-px bg-[var(--surface)] rounded text-[9px]">↵</kbd> open</span>
                <span className="flex items-center gap-1"><kbd className="border hairline px-1 py-px bg-[var(--surface)] rounded text-[9px]">Esc</kbd> close</span>
                <span className="ml-auto">{members.length} members · synthetic data</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // MAIN DASHBOARD
    // ══════════════════════════════════════════════════════════════════════════
    function Dashboard({ currentUser, onLogout, theme, onToggleTheme, onSetTheme }) {
      const [members] = useState(() => {
        const m = generateMembers(500);
        seedAuditLog(m, CARE_MANAGERS);
        return m;
      });
      const [auditLog, setAuditLog] = useState(() => [...AUDIT_LOG]);

      // ── Centralized audit-log append ─────────────────────────────────────
      // All audit call sites route through here. This is the single point of
      // truncation for the prototype's in-memory log, and the single point
      // that will swap to a POST against the .NET audit endpoint when the
      // backend ships — at which point the cap goes away. Touching this is
      // the right way to change audit behavior; touching the 12+ callers is
      // not. `auditCapReached` flips once when the cap is hit so the banner
      // can render; `auditCapDismissed` lets the user acknowledge it.
      const [auditCapReached, setAuditCapReached]     = useState(false);
      const [auditCapDismissed, setAuditCapDismissed] = useState(false);
      const appendAudit = useCallback((entry) => {
        setAuditLog(prev => {
          if (prev.length >= AUDIT_DEMO_CAP) {
            setAuditCapReached(true);
            // Drop oldest, keep newest. Production has no equivalent — every
            // entry is preserved server-side.
            return [entry, ...prev.slice(0, AUDIT_DEMO_CAP - 1)];
          }
          return [entry, ...prev];
        });
      }, []);

      const [view, setView] = useState(() => { try { const p = JSON.parse(localStorage.getItem(`acm-prefs-${currentUser?.id||'default'}`)||'null'); return (p&&p.defaultTab)||'today'; } catch(e){return 'today';} });
      const [selectedMeasure, setSelectedMeasure] = useState(null);
      const [selectedMember, setSelectedMember] = useState(null);
      // Open Members tabs — array of member IDs that the user has opened in the
      // current session. Lets care managers keep multiple members "in flight"
      // and jump between them via the right-side tab rail. Persisted to
      // localStorage so a refresh doesn't blow away an active queue of work.
      const [openTabs, setOpenTabs] = useState(() => {
        try { return JSON.parse(localStorage.getItem('acm-open-tabs') || '[]'); } catch(e) { return []; }
      });
      useEffect(() => {
        try { localStorage.setItem('acm-open-tabs', JSON.stringify(openTabs)); } catch(e) {}
      }, [openTabs]);
      // Tracks which top-level tab the user opened a member from. Keeps the nav  
      // highlight in sync with the entry path (e.g. clicking a member from the   
      // Pharmacy tab keeps "Pharmacy" highlighted, not "Worklist"). Also drives   
      // the back-button label.                                                   
      const [memberEntryTab, setMemberEntryTab] = useState('members');

      // ─── PHARMACY ROSTER POPUP (lifted state) ────────────────────────────
      // The roster popup used to live inside MemberWorklist, but that
      // component unmounts when the user picks a member — taking the popup
      // with it. Care managers need the roster to stay visible while they
      // work through the list of members at a pharmacy, so the state lives
      // here on the parent and the popup itself renders at the bottom of
      // Dashboard, outside the per-view conditional renders.
      const [pharmRoster, setPharmRoster] = useState(null); // null | { name, addr, city, zip, count }
      const openPharmRoster  = (pharm) => setPharmRoster(pharm);
      const closePharmRoster = () => setPharmRoster(null);

      // ─── WORKLIST EXTRA PHARMA COLUMNS (lifted state) ────────────────────
      // Lifted from MemberWorklist so PharmacyRosterCard can render the same
      // extra columns the care manager has enabled. The roster popup survives
      // worklist unmounts (it lives at Dashboard level), so the column state
      // must also live here. Persisted per-user to localStorage.
      // First-time users see a useful default set of pharmacy columns so Rx
      // context is visible without digging into the Columns popover.
      // Once a user explicitly customizes (and we write to localStorage),
      // their choice — including an empty selection — is respected.
      const WORKLIST_PHARMA_DEFAULTS = ['drugName', 'status', 'daysLeft'];
      const wExtraColsLsKey = `acm-worklist-extra-cols:${(currentUser && currentUser.id) || 'anon'}`;
      const [rosterExtraColIds, setRosterExtraColIds] = useState(() => {
        try {
          const v = localStorage.getItem(wExtraColsLsKey);
          if (v === null) return WORKLIST_PHARMA_DEFAULTS.filter(id => PHARMA_COL_IDS.includes(id));
          const parsed = JSON.parse(v);
          return Array.isArray(parsed) ? parsed.filter(id => PHARMA_COL_IDS.includes(id)) : [];
        } catch (e) { return WORKLIST_PHARMA_DEFAULTS.filter(id => PHARMA_COL_IDS.includes(id)); }
      });
      // Keep localStorage in sync whenever the selection changes (changes come
      // from MemberWorklist via the onExtraColsChange callback below).
      useEffect(() => {
        try { localStorage.setItem(wExtraColsLsKey, JSON.stringify(rosterExtraColIds)); } catch (e) {}
      }, [rosterExtraColIds, wExtraColsLsKey]);
      // Build the pharma column registry once at this level so both MemberWorklist
      // and PharmacyRosterCard share the same render functions.
      const dashPharmaCols = React.useMemo(
        () => buildPharmaCols({ phiVisible, userPrefs: {} }),
        [phiVisible]
      );
      const pharmRosterMembers = useMemo(() => {
        if (!pharmRoster) return [];
        return members.filter(m =>
          m.pharmName === pharmRoster.name &&
          (m.pharmAddr || '') === (pharmRoster.addr || '')
        );
      }, [members, pharmRoster]);
      const openMember = (m, fromTab = 'members') => {
        setSelectedMember(m);
        setMemberEntryTab(fromTab);
        setView('member-detail');
        setOpenTabs(prev => prev.includes(m.id) ? prev : [...prev, m.id]);
      };
      const switchToTab = (memberId) => {
        const m = members.find(x => x.id === memberId);
        if (m) { setSelectedMember(m); setView('member-detail'); }
      };
      const closeTab = (memberId) => {
        setOpenTabs(prev => {
          const remaining = prev.filter(id => id !== memberId);
          // If the closed tab was the active one, switch to the next-most-recent
          // open tab; if none remain, return to the entry tab.
          if (selectedMember?.id === memberId) {
            if (remaining.length > 0) {
              const nextMember = members.find(x => x.id === remaining[remaining.length - 1]);
              if (nextMember) { setSelectedMember(nextMember); setView('member-detail'); }
              else            { setSelectedMember(null);     setView(memberEntryTab); }
            } else {
              setSelectedMember(null); setView(memberEntryTab);
            }
          }
          return remaining;
        });
      };
      const closeAllTabs = () => {
        setOpenTabs([]);
        setSelectedMember(null);
        setView(memberEntryTab);
      };
      const [search, setSearch] = useState(() => {
        try { return localStorage.getItem('acm-worklist-search') || ''; } catch(e) { return ''; }
      });
      useEffect(() => {
        try { localStorage.setItem('acm-worklist-search', search); } catch(e) {}
      }, [search]);
      // Worklist top-level filter pills (priority, line, plan, etc.). Persisted
      // to localStorage so they survive navigation to a member detail and back.
      // scope: 'mine' (assigned to me only — default), 'all' (everyone at the
      // filtered pharmacy regardless of CM), or 'unassigned' (orphaned members
      // at the filtered pharmacy that need ownership). Only meaningful when a
      // pharmacy filter is set — for the default worklist the user only ever
      // sees their own assigned members.
      // WORKLIST_FILTERS_DEFAULT is declared at module scope (above) so the
      // Clear button inside MemberWorklist can reference it without it being
      // a closure variable.
      const [filters, setFilters] = useState(() => {
        try { return { ...WORKLIST_FILTERS_DEFAULT, ...(JSON.parse(localStorage.getItem('acm-worklist-filters') || '{}')) }; }
        catch(e) { return { ...WORKLIST_FILTERS_DEFAULT }; }
      });
      useEffect(() => {
        try { localStorage.setItem('acm-worklist-filters', JSON.stringify(filters)); } catch(e) {}
      }, [filters]);
      // Text zoom — persisted to localStorage, applied via CSS zoom on <html>
      const [zoom, setZoom] = useState(() => {
        try { return parseInt(localStorage.getItem('acm-zoom') || '100', 10); } catch(e) { return 100; }
      });
      useEffect(() => {
        if (zoom === 100) document.documentElement.removeAttribute('data-text-size');
        else document.documentElement.setAttribute('data-text-size', String(zoom));
        try { localStorage.setItem('acm-zoom', String(zoom)); } catch(e) {}
      }, [zoom]);

      // ── Sticky-header offset (v2 hotfix · May 16, 2026) ────────────────
      // The pharma-table <thead> sticks at top:var(--header-offset). That
      // variable was hard-coded to 72px in CSS but the real sticky <nav> is
      // ~49–52px tall after the dynamic masthead-compaction was removed.
      // The leftover gap caused body rows to render visibly ABOVE the sticky
      // column header as they scrolled past — the "T.A. floating above the
      // header" bug reported in UAT. Measure the real nav height and push it
      // into the CSS variable so the thead pins flush against the nav bottom.
      const navRef = useRef(null);
      useEffect(() => {
        const nav = navRef.current;
        if (!nav) return;
        const apply = () => {
          const h = Math.round(nav.getBoundingClientRect().height);
          if (h > 0) document.documentElement.style.setProperty('--header-offset', h + 'px');
        };
        apply();
        let ro = null;
        if (typeof ResizeObserver !== 'undefined') {
          ro = new ResizeObserver(apply);
          ro.observe(nav);
        }
        window.addEventListener('resize', apply);
        // Fonts can reflow the nav after first paint — re-measure when ready
        if (document.fonts && document.fonts.ready && typeof document.fonts.ready.then === 'function') {
          document.fonts.ready.then(apply).catch(() => {});
        }
        return () => {
          if (ro) ro.disconnect();
          window.removeEventListener('resize', apply);
        };
      }, [zoom, view]);

      // ─── USER PREFERENCES (must precede phiVisible so phiDefault is readable) ──
      const prefsKey = `acm-prefs-${currentUser?.id || 'default'}`;
      const [userPrefs, setUserPrefs] = useState(() => {
        try {
          const saved = JSON.parse(localStorage.getItem(prefsKey) || 'null');
          return { defaultTab: 'today', pharmaPageSize: 50, rowDensity: 'comfortable', daysLeftThreshold: 7, phiDefault: 'masked', ...( saved && typeof saved === 'object' ? saved : {} ) };
        } catch(e) { return { defaultTab: 'today', pharmaPageSize: 50, rowDensity: 'comfortable', daysLeftThreshold: 7, phiDefault: 'masked' }; }
      });
      const savePrefs = (next) => { setUserPrefs(next); try { localStorage.setItem(prefsKey, JSON.stringify(next)); } catch(e) {} };

      const [phiVisible, setPhiVisible] = useState(() => {
        try {
          const p = JSON.parse(localStorage.getItem(prefsKey) || 'null');
          if (p && p.phiDefault === 'remember') {
            return localStorage.getItem(`acm-phi-last-${currentUser?.id || 'default'}`) === '1';
          }
        } catch(e) {}
        return false;
      });
      const [phiRevealedAt, setPhiRevealedAt] = useState(null);
      const PHI_IDLE_TIMEOUT_MS = 5 * 60 * 1000;
      // PHI auto-relock is now idle-based (see effect after lastActivity declaration).
      // It no longer fires while the user is actively working a member.
      // Gap closure status — keyed by "memberId__gapCode"
      const [gapStatuses, setGapStatuses] = useState({});
      const updateGapStatus = (memberId, gapCode, status) => {
        const key = memberId + '__' + gapCode;
        setGapStatuses(prev => ({ ...prev, [key]: { status, updatedAt: new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}), updatedBy: currentUser.name } }));
        const entry = addAuditEntry(currentUser, memberId, 'Gap Closure', gapCode, 'Status Updated', 'Gap status → ' + status, '', null);
        appendAudit(entry);
      };

      // ── Per-medication notes ─────────────────────────────────────────────
      // Per Michelle's explanation doc (5/20/26): each medication needs THREE
      // distinct note streams because the pharmacy adherence workflow chains
      // three different contacts (Pharmacy → Rx Provider → Member), and
      // notes from each contact attach to the specific medication, not the
      // member as a whole. A single member often has meds in different
      // measures, so notes have to live at the med level or they get lost.
      // Keyed: "memberId__medIdx" → { pharmacy:[], rxProvider:[], member:[] }
      // Each note: { id, type, text, ts, displayTs, author, authorId, measure? }
      const [medNotes, setMedNotes] = useState({});
      const addMedNote = (memberId, medIdx, contactType, text, med) => {
        if (!text || !text.trim()) return;
        const key = memberId + '__' + medIdx;
        const now = new Date();
        const note = {
          id: `mn-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
          type: contactType, // 'pharmacy' | 'rxProvider' | 'member'
          text: text.trim(),
          ts: now.toISOString(),
          displayTs: `${now.toLocaleDateString('en-US',{month:'short',day:'numeric'})} · ${now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`,
          author: currentUser.name, authorId: currentUser.id,
          measure: med?.measure || null,
        };
        setMedNotes(prev => {
          const cur = prev[key] || { pharmacy: [], rxProvider: [], member: [] };
          return { ...prev, [key]: { ...cur, [contactType]: [note, ...(cur[contactType] || [])] } };
        });
        // Audit — outcome maps to existing rendering, then notes carry the detail
        const outcomeLabel = contactType === 'pharmacy'   ? 'Pharmacy Note'
                          : contactType === 'rxProvider' ? 'Rx Provider Note' : 'Member Note';
        const drug = med?.drug ? ` re: ${med.drug}` : '';
        const m = members.find(mb => mb.id === memberId);
        const memberName = phiVisible && m ? `${m.last}, ${m.first}` : (m?.initials || '—');
        const entry = addAuditEntry(currentUser, memberId, memberName, med?.measure || '—', outcomeLabel, `${drug.slice(5) || ''}${drug ? ' — ' : ''}${text.trim()}`, '', null);
        appendAudit(entry);
      };

      // ── Per-medication barriers ───────────────────────────────────────────
      // Patricia's call-out: a barrier ("spitting out pills," "side effects,
      // refuses to take") attaches to a specific Rx, not the patient. This
      // lets the next provider call be precise: "Mrs. X is not taking
      // metformin because of GI side effects" — not a generic "barrier
      // flagged" on the member overall.
      // Keyed: "memberId__medIdx" → [{ id, type, detail, flaggedAt, flaggedBy, resolvedAt? }]
      const [medBarriers, setMedBarriers] = useState({});
      const addMedBarrier = (memberId, medIdx, type, detail, med) => {
        const key = memberId + '__' + medIdx;
        const now = new Date();
        const barrier = {
          id: `mb-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
          type, detail: (detail || '').trim(),
          flaggedAt: now.toISOString(),
          displayTs: `${now.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`,
          flaggedBy: currentUser.name, flaggedById: currentUser.id,
          resolvedAt: null,
        };
        setMedBarriers(prev => ({ ...prev, [key]: [barrier, ...(prev[key] || [])] }));
        const m = members.find(mb => mb.id === memberId);
        const memberName = phiVisible && m ? `${m.last}, ${m.first}` : (m?.initials || '—');
        const drug = med?.drug || 'medication';
        const entry = addAuditEntry(currentUser, memberId, memberName, med?.measure || '—', 'Barrier Flagged',
          `${drug}: ${type}${detail ? ' — ' + detail.trim() : ''}`, '', null);
        appendAudit(entry);
      };
      const resolveMedBarrier = (memberId, medIdx, barrierId, resolutionNote, med) => {
        const key = memberId + '__' + medIdx;
        setMedBarriers(prev => {
          const cur = prev[key] || [];
          return { ...prev, [key]: cur.map(b => b.id === barrierId ? { ...b, resolvedAt: new Date().toISOString(), resolvedBy: currentUser.name, resolutionNote: (resolutionNote || '').trim() } : b) };
        });
        const m = members.find(mb => mb.id === memberId);
        const memberName = phiVisible && m ? `${m.last}, ${m.first}` : (m?.initials || '—');
        const drug = med?.drug || 'medication';
        const entry = addAuditEntry(currentUser, memberId, memberName, med?.measure || '—', 'Barrier Resolved',
          `${drug}${resolutionNote ? ' — ' + resolutionNote.trim() : ''}`, '', null);
        appendAudit(entry);
      };

      // ── Documents attached to gaps (chart notes, lab results, provider attestations) ─
      // Anchored at member → gap level. One canonical document can close
      // multiple gaps via linking (Phase 2); for now each upload binds to a
      // single gap which covers ~90% of real-world cases per the call.
      // Keyed: "memberId__gapCode" → [{ id, filename, source, dateOfService, receivedDate, uploadedAt, uploadedBy, status, sizeKb }]
      const [gapDocs, setGapDocs] = useState({});
      const addGapDoc = (memberId, gapCode, doc) => {
        const key = memberId + '__' + gapCode;
        const now = new Date();
        const record = {
          id: `gd-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
          filename: doc.filename || 'evidence.pdf',
          source: doc.source || 'PCP / Specialist',
          dateOfService: doc.dateOfService || '',
          receivedDate:  doc.receivedDate  || now.toLocaleDateString('en-CA'),
          uploadedAt:    now.toISOString(),
          displayTs:     `${now.toLocaleDateString('en-US',{month:'short',day:'numeric'})} · ${now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`,
          uploadedBy:    currentUser.name,
          uploadedById:  currentUser.id,
          status:        'Pending Review',  // → Accepted | Rejected
          sizeKb:        doc.sizeKb || Math.floor(80 + Math.random() * 2400),
          notes:         doc.notes || '',
        };
        setGapDocs(prev => ({ ...prev, [key]: [record, ...(prev[key] || [])] }));
        const m = members.find(mb => mb.id === memberId);
        const memberName = phiVisible && m ? `${m.last}, ${m.first}` : (m?.initials || '—');
        const auditEntry = addAuditEntry(currentUser, memberId, memberName, gapCode, 'Document Uploaded',
          `${record.filename} (source: ${record.source}, DOS ${record.dateOfService || 'n/a'})`, '', null);
        appendAudit(auditEntry);
        return record;
      };

      // Documents attached to a specific outreach contact log entry — captures
      // the "Bryan faxed me the chart and I logged it on the same call" flow.
      // Keyed: "auditEntryId" → [{ ...same shape as gap doc... }]
      const [outreachDocs, setOutreachDocs] = useState({});
      const attachOutreachDoc = (auditEntryId, doc) => {
        const now = new Date();
        const record = {
          id: `od-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
          filename: doc.filename || 'attachment.pdf',
          source: doc.source || 'PCP / Specialist',
          dateOfService: doc.dateOfService || '',
          receivedDate:  doc.receivedDate  || now.toLocaleDateString('en-CA'),
          uploadedAt:    now.toISOString(),
          displayTs:     `${now.toLocaleDateString('en-US',{month:'short',day:'numeric'})} · ${now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`,
          uploadedBy:    currentUser.name,
          uploadedById:  currentUser.id,
          status:        'Pending Review',
          sizeKb:        doc.sizeKb || Math.floor(80 + Math.random() * 2400),
          notes:         doc.notes || '',
        };
        setOutreachDocs(prev => ({ ...prev, [auditEntryId]: [record, ...(prev[auditEntryId] || [])] }));
        return record;
      };

      // ── Demo seed for Phase A surfaces ────────────────────────────────────
      // One-shot population of medNotes, medBarriers, and gapDocs so that
      // when stakeholders open the demo, the new surfaces aren't empty. We
      // pick a handful of members that already have pharma data and project
      // realistic notes onto specific medications + a couple of barriers + a
      // couple of gap-evidence documents. Seeded on first render only.
      useEffect(() => {
        // Bail if we've already seeded — second-mount safety in case React
        // strict mode double-invokes effects.
        if (Object.keys(medNotes).length > 0 || Object.keys(medBarriers).length > 0 || Object.keys(gapDocs).length > 0) return;

        // Pick deterministic seed targets — distribute across the first ~40
        // pharma members so a stakeholder opening any randomly-ordered list
        // is likely to land on a member with sample notes/barriers/docs.
        // Each tier of seeding shows a different workflow archetype.
        const allPharma = members.filter(m => m.hasPharma && m.medications && m.medications.length >= 2);
        if (allPharma.length === 0) return;
        // Mail-order workflow (Pharmacy → Rx Provider → Member chain) — first 3
        const mailOrderTargets = allPharma.slice(0, 3);
        // Active barrier examples — next 3 members
        const activeBarrierTargets = allPharma.slice(3, 6);
        // Resolved barrier example (shows lifecycle) — next 1
        const resolvedBarrierTargets = allPharma.slice(6, 7);
        // Gap-evidence document uploads — next 4 (different combos of Accepted / Pending)
        const gapDocTargets = allPharma.slice(7, 11).filter(m => m.gaps && m.gaps.length > 0);

        const stampOffset = (minsAgo) => {
          const d = new Date(Date.now() - minsAgo * 60000);
          return {
            ts: d.toISOString(),
            displayTs: `${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})} · ${d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`,
            iso: d.toISOString(),
            ymd: d.toLocaleDateString('en-CA'),
          };
        };

        const seededMedNotes    = {};
        const seededMedBarriers = {};
        const seededGapDocs     = {};

        // ── Tier 1: Mail-order workflow (3 members) ──
        // Full chain of pharmacy → Rx provider → member contact, mirroring
        // Michelle's explanation doc verbatim style.
        mailOrderTargets.forEach((m, i) => {
          const med0 = m.medications[0];
          const cm = CARE_MANAGERS[(1 + i) % 6]; // distribute across CMs
          const key = `${m.id}__0`;
          const t1 = stampOffset(180 + i * 60);
          const t2 = stampOffset(120 + i * 60);
          const t3 = stampOffset(60  + i * 30);
          seededMedNotes[key] = {
            pharmacy: [{
              id: `mn-seed-${m.id}-p`, type: 'pharmacy',
              text: `Walgreens — John, Pharm.: confirmed last p/u of ${med0.drug} ${med0.daySupply}-day supply ct 60 w/ 2 refills remaining on ${t1.ymd}. Enquired re ext day supply — pharmacist concurred, will send request to Rx Provider; advised us to request as well.`,
              ts: t1.ts, displayTs: t1.displayTs,
              author: cm.name, authorId: cm.id, measure: med0.measure,
            }],
            rxProvider: [{
              id: `mn-seed-${m.id}-r`, type: 'rxProvider',
              text: `R/o & s/w Jane @ ${med0.prescriber}: advised member elig for ext day supply if tx allows. Jane concurred, confirmed pharm on file, msg sent to Rx Provider to review & send new Rx if tx allows.`,
              ts: t2.ts, displayTs: t2.displayTs,
              author: cm.name, authorId: cm.id, measure: med0.measure,
            }],
            member: [{
              id: `mn-seed-${m.id}-m`, type: 'member',
              text: `R/o & s/w member: advised Rx is available for p/u at pharmacy. Also advised Mail Order is free via HP. Member concurred — initiated transfer of all meds from current pharm to Express Scripts. Will r b/o to Rx Provider for new mail-order Rxs.`,
              ts: t3.ts, displayTs: t3.displayTs,
              author: cm.name, authorId: cm.id, measure: med0.measure,
            }],
          };
        });

        // ── Tier 2: Active barriers (3 members) ──
        // Each gets a different barrier type so the demo shows variety.
        const activeBarrierVariants = [
          { type: 'Side Effects',  detail: 'GI side effects since titrating to higher dose; member spitting out morning dose. Flagged per call w/ pharmacy.' },
          { type: 'Cost / Copay',  detail: 'Member at $42 copay, not picking up consistently. Submitted Extra Help / LIS application — pending review.' },
          { type: 'Member Refusing', detail: 'Member reports concerns about long-term liver effects after reading social media post. Refusing daily dose. Education needed.' },
        ];
        activeBarrierTargets.forEach((m, i) => {
          const med0 = m.medications[0];
          const cm = CARE_MANAGERS[3]; // Patricia (per call discussion)
          const key = `${m.id}__0`;
          const variant = activeBarrierVariants[i % activeBarrierVariants.length];
          const t = stampOffset(240 + i * 90);
          seededMedBarriers[key] = [{
            id: `mb-seed-${m.id}`,
            type: variant.type,
            detail: variant.detail,
            flaggedAt: t.iso,
            displayTs: t.displayTs.split(' · ')[0],
            flaggedBy: cm.name, flaggedById: cm.id,
            resolvedAt: null,
          }];
          // Attach a corresponding Rx Provider note so the workflow story is complete
          seededMedNotes[key] = {
            pharmacy: [],
            rxProvider: [{
              id: `mn-seed-${m.id}-rx-bar`, type: 'rxProvider',
              text: `Faxed Rx Provider re: ${med0.drug} barrier — ${variant.type.toLowerCase()}. Requesting dose review or alternative. Awaiting response.`,
              ts: t.ts, displayTs: t.displayTs,
              author: cm.name, authorId: cm.id, measure: med0.measure,
            }],
            member: [],
          };
        });

        // ── Tier 3: Resolved barrier (1 member) ──
        resolvedBarrierTargets.forEach(m => {
          const cm = CARE_MANAGERS[5]; // Kristine
          const key = `${m.id}__0`;
          const t1 = stampOffset(60 * 24 * 7); // flagged 1 week ago
          const t2 = stampOffset(60 * 24 * 2); // resolved 2 days ago
          seededMedBarriers[key] = [{
            id: `mb-seed-${m.id}`,
            type: 'Cost / Copay',
            detail: 'Member at $42 copay, not picking up consistently.',
            flaggedAt: t1.iso,
            displayTs: t1.displayTs.split(' · ')[0],
            flaggedBy: cm.name, flaggedById: cm.id,
            resolvedAt: t2.iso,
            resolvedBy: cm.name,
            resolutionNote: 'Submitted Extra Help / LIS application — approved, copay dropped to $0. Member confirmed first p/u at new copay.',
          }];
        });

        // ── Tier 4: Gap evidence documents (4 members) ──
        const docVariants = [
          { src: 'PCP / Specialist',   status: 'Pending Review', note: 'Pages 14–17 of full chart; relevant screening result and PCP attestation.' },
          { src: 'Lab',                status: 'Accepted',        note: 'HbA1c result within compliant range.' },
          { src: 'Hospital / Health System', status: 'Accepted',  note: 'Discharge summary with mammogram report attached.' },
          { src: 'Pharmacy',           status: 'Pending Review',  note: 'Pharmacy attestation of statin therapy duration.' },
        ];
        gapDocTargets.forEach((m, i) => {
          if (!m.gaps || m.gaps.length === 0) return;
          const cm = CARE_MANAGERS[2 + (i % 3)]; // distribute across Jade / Patricia / Fay
          const t = stampOffset(60 * 24 * (1 + i * 2)); // staggered, 1 to 7 days ago
          const variant = docVariants[i % docVariants.length];
          const gapCode = m.gaps[0];
          seededGapDocs[`${m.id}__${gapCode}`] = [{
            id: `gd-seed-${m.id}`,
            filename: `chart_evidence_${gapCode.toLowerCase()}_${t.ymd.replace(/-/g,'_')}.pdf`,
            source: variant.src,
            dateOfService: stampOffset(60 * 24 * (14 + i * 5)).ymd,
            receivedDate: t.ymd,
            uploadedAt: t.iso,
            displayTs: t.displayTs,
            uploadedBy: cm.name, uploadedById: cm.id,
            status: variant.status,
            sizeKb: 800 + i * 400,
            notes: variant.note,
          }];
        });

        if (Object.keys(seededMedNotes).length > 0)    setMedNotes(seededMedNotes);
        if (Object.keys(seededMedBarriers).length > 0) setMedBarriers(seededMedBarriers);
        if (Object.keys(seededGapDocs).length > 0)     setGapDocs(seededGapDocs);
        // Note: we intentionally don't push these to the audit log on seed —
        // they represent prior-session history, not net-new events. Real new
        // actions (via the UI) will continue to land in the audit feed.
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      // Member escalation
      const [escalations, setEscalations] = useState({});
      const escalateMember = (memberId, reason) => {
        setEscalations(prev => ({ ...prev, [memberId]: { reason, at: new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}), by: currentUser.name } }));
        const entry = addAuditEntry(currentUser, memberId, 'Escalation', '—', 'Escalated', reason, '', null);
        appendAudit(entry);
      };
      const [phiModalOpen, setPhiModalOpen] = useState(false);
      const [phiReason, setPhiReason] = useState('');
      const [phiReasonOther, setPhiReasonOther] = useState('');
      const [sessionRemaining, setSessionRemaining] = useState(15 * 60);
      const [isLocked, setIsLocked] = useState(false);
      // Pharmacy top-level Status/Measure dropdowns. Persisted so the user's
      // active filter survives navigation to a member detail and back.
      const [pharmaFilter, setPharmaFilter] = useState(() => {
        try { return { status: 'All', measure: 'All', pharmacy: 'All', ...(JSON.parse(localStorage.getItem('acm-pharma-filter') || '{}')) }; }
        catch(e) { return { status: 'All', measure: 'All', pharmacy: 'All' }; }
      });
      useEffect(() => {
        try { localStorage.setItem('acm-pharma-filter', JSON.stringify(pharmaFilter)); } catch(e) {}
      }, [pharmaFilter]);

      const isDirector = currentUser.role === 'Director' || currentUser.role === 'Administrator';

      // App config (admin-editable by jbryan / brees only)
      const [config, setConfig] = useState(() => loadConfig());
      const [showAdmin, setShowAdmin] = useState(false);
      const userIsAdmin = isAppAdmin(currentUser, config);

      // Spotlight search modal (triggered by /)
      const [showSpotlight, setShowSpotlight] = useState(false);
      const [showShortcuts, setShowShortcuts] = useState(false);
      const [showHelp, setShowHelp] = useState(false);

      // ─── ACTIVE WORKING LIST (bookmark panel) ────────────────────────────
      // Persisted per-user. Each entry is just a member ID — we look the
      // member up from the live members array so name/status stay current.
      const wlLsKey = `acm-working-list:${(currentUser && currentUser.id) || 'anon'}`;
      const wlPosKey = `acm-working-list-pos:${(currentUser && currentUser.id) || 'anon'}`;
      const wlSizeKey = `acm-working-list-size:${(currentUser && currentUser.id) || 'anon'}`;
      const [workingListIds, setWorkingListIds] = useState(() => {
        try { const v = localStorage.getItem(wlLsKey); return v ? JSON.parse(v) : []; } catch { return []; }
      });
      const [showWorkingList, setShowWorkingList] = useState(false);
      const [wlMinimised, setWlMinimised] = useState(false);
      const [wlPos, setWlPos] = useState(() => {
        try { const v = localStorage.getItem(wlPosKey); return v ? JSON.parse(v) : { x: null, y: null }; } catch { return { x: null, y: null }; }
      });
      const [wlSize, setWlSize] = useState(() => {
        try { const v = localStorage.getItem(wlSizeKey); return v ? JSON.parse(v) : { w: null, h: null }; } catch { return { w: null, h: null }; }
      });
      useEffect(() => { try { localStorage.setItem(wlLsKey, JSON.stringify(workingListIds)); } catch {} }, [workingListIds, wlLsKey]);
      useEffect(() => { try { localStorage.setItem(wlPosKey, JSON.stringify(wlPos)); } catch {} }, [wlPos, wlPosKey]);
      useEffect(() => { try { localStorage.setItem(wlSizeKey, JSON.stringify(wlSize)); } catch {} }, [wlSize, wlSizeKey]);
      const addToWorkingList    = (id) => setWorkingListIds(p => p.includes(id) ? p : [id, ...p]);
      const removeFromWorkingList = (id) => setWorkingListIds(p => p.filter(x => x !== id));
      const toggleWorkingList   = (id) => workingListIds.includes(id) ? removeFromWorkingList(id) : addToWorkingList(id);
      const isBookmarked        = (id) => workingListIds.includes(id);

      // ── Panel z-index stacking (click brings to front) ──────────────────
      // Multiple floating panels (My List + Gap Guide + Resource Tools) can
      // be open simultaneously. A ref-based counter (avoids re-render
      // cascades) hands out monotonically-increasing z-index values; each
      // panel stores its own and updates it on mousedown. Initial value is
      // 9200 — matches the legacy .wl-panel z-index so existing CSS still
      // wins over page chrome.
      const zCounterRef = useRef(9200);
      const [wlZ, setWlZ] = useState(9200);
      const [ggZ, setGgZ] = useState(9200);
      const [rtZ, setRtZ] = useState(9200);
      const bringPanelToFront = useCallback((which) => {
        zCounterRef.current += 1;
        const z = zCounterRef.current;
        if      (which === 'wl') setWlZ(z);
        else if (which === 'gg') setGgZ(z);
        else if (which === 'rt') setRtZ(z);
      }, []);

      // ── Popped-out state per panel (drag to second monitor) ─────────────
      // When poppedOut is true, the panel is rendered via React portal into
      // a separate browser window. The floating panel render is suppressed.
      // Closing the popup window (OS chrome or internal ✕) flips this back
      // to false AND closes the panel entirely (sets show*Panel to false).
      const [wlPoppedOut, setWlPoppedOut] = useState(false);
      const [ggPanelPoppedOut, setGgPanelPoppedOut] = useState(false);
      const [rtPanelPoppedOut, setRtPanelPoppedOut] = useState(false);

      // ── Group-drag (lock all open panels and move them as one) ──────────
      // When `panelsLocked` is true, dragging any floating panel applies the
      // same delta to every other floating (non-popped-out) panel. Popped-
      // out panels aren't affected — they're in their own OS windows.
      //
      // The snapshot ref captures the start-of-drag positions for every
      // open floating panel so deltas accumulate from a stable origin
      // (rather than compounding from a moving target). The exception is
      // the panel doing the dragging — it manages its own position via the
      // normal startDrag flow.
      const [panelsLocked, setPanelsLocked] = useState(false);
      const groupDragSnapshot = useRef(null);
      const onGroupDragStart = useCallback((excludeWhich) => {
        // Resolve current positions to numbers (replace null defaults). Uses
        // the same default formulas as the panel components do internally.
        const resolveFloatPos = (pos, defOffsetRight, defOffsetBottom) => {
          const dx = pos.x ?? Math.max(16, (typeof window !== 'undefined' ? window.innerWidth : 1200) - defOffsetRight);
          const dy = pos.y ?? Math.max(80, (typeof window !== 'undefined' ? window.innerHeight : 800) - defOffsetBottom);
