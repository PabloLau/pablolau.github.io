          <div className="resize-edge b"  onMouseDown={startResize('b')}  />
          <div className="resize-edge l"  onMouseDown={startResize('l')}  />
          <div className="resize-corner tl" onMouseDown={startResize('tl')} />
          <div className="resize-corner tr" onMouseDown={startResize('tr')} />
          <div className="resize-corner bl" onMouseDown={startResize('bl')} />
          <div className="resize-corner br" onMouseDown={startResize('br')} />
        </div>
      );
    }

    // Care-manager-facing help. Renders as a right-side drawer with searchable
    // accordion sections. Esc / backdrop click closes. Content is care-manager-
    // focused (workflows, not features) — grouped by what they're trying to
    // *do*, not by what the app *is*. Mirrors the editorial Field Guide that
    // ships alongside the app.
    //
    // Props:
    //   onClose          - close handler (parent owns showHelp state)
    //   currentUser      - for role-aware section filtering
    //   isDirector       - shortcut flag, also controls director-only sections
    //   activeView       - the dashboard view the user was on when they opened
    //                      help. Used to pick the contextual section to focus.
    //   initialSection   - explicit section id to open to (overrides activeView).
    //                      Set by openHelp(id) or by URL hash #help/<id>.
    //   onAuditSection   - called when the user expands a section, so the host
    //                      app can write an audit entry. This is the analytics
    //                      signal — leadership sees which surfaces confuse CMs.
    //   onAuditSearch    - called (debounced) when the user runs a search.
    function HelpPanel({ onClose, currentUser, isDirector, activeView, initialSection, onAuditSection, onAuditSearch }) {
      const [filter, setFilter] = useState('');
      const [openSections, setOpenSections] = useState({});
      const [activeAnchor, setActiveAnchor] = useState(null);
      const searchRef = useRef(null);
      const scrollerRef = useRef(null);
      const sectionRefs = useRef({});

      // Map dashboard tabs → most relevant Field Guide section. Used both for
      // "open to the section that matches where you are" and for the contextual
      // breadcrumb at the top of the drawer.
      const VIEW_TO_SECTION = {
        today:          'cockpit',
        overview:       'gaps',
        'measure-detail':'gaps',
        members:        'worklist',
        'member-detail':'chart',
        pharma:         'pharmacy',
        outreach:       'outreach',
        'gap-guide':    'gaps',
        resources:      'resources',
        audit:          'security',
        settings:       'settings',
        workinglist:    'workinglist',
      };

      // Esc-to-close + focus search on open
      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', onKey);
        const t = setTimeout(() => searchRef.current && searchRef.current.focus(), 80);
        return () => { document.removeEventListener('keydown', onKey); clearTimeout(t); };
      }, [onClose]);

      // Decide opening section. Explicit initialSection wins; otherwise infer
      // from active view; otherwise default to What's New.
      const startSection = useMemo(() => {
        if (initialSection) return initialSection;
        if (activeView && VIEW_TO_SECTION[activeView]) return VIEW_TO_SECTION[activeView];
        return 'whatsnew';
      }, [initialSection, activeView]);

      // On mount, expand and scroll to the start section.
      useEffect(() => {
        if (!startSection) return;
        setOpenSections(s => ({ ...s, [startSection]: true }));
        setActiveAnchor(startSection);
        // Defer scroll until accordion has rendered
        const t = setTimeout(() => {
          const el = sectionRefs.current[startSection];
          if (el && scrollerRef.current) {
            scrollerRef.current.scrollTo({ top: el.offsetTop - 8, behavior: 'instant' in scrollerRef.current ? 'instant' : 'auto' });
          }
        }, 120);
        return () => clearTimeout(t);
      }, [startSection]);

      // Debounced search audit — only log meaningful queries (≥3 chars, paused).
      useEffect(() => {
        if (!onAuditSearch) return;
        const q = filter.trim();
        if (q.length < 3) return;
        const t = setTimeout(() => onAuditSearch(q), 1200);
        return () => clearTimeout(t);
      }, [filter, onAuditSearch]);

      const toggle = (id) => {
        setOpenSections(s => {
          const willOpen = !s[id];
          if (willOpen && onAuditSection) onAuditSection(id);
          return { ...s, [id]: willOpen };
        });
      };

      const jumpTo = (id) => {
        setOpenSections(s => ({ ...s, [id]: true }));
        setActiveAnchor(id);
        if (onAuditSection) onAuditSection(id);
        const el = sectionRefs.current[id];
        if (el && scrollerRef.current) {

      // ── Reusable presentational helpers ──────────────────────────────────
      const HI = ({ name }) => h(Icon, { name, size: 13, className: 'inline align-text-bottom text-[var(--accent)]' });
      const Btn = ({ children }) => (
        <span className="font-ui text-[11px] uppercase tracking-wider border hairline px-1.5 py-0.5 bg-[var(--elevated)] inline-block align-baseline">
          {children}
        </span>
      );
      const Kbd = ({ children }) => (
        <kbd className="font-ui text-[10px] border hairline px-1.5 py-0.5 bg-[var(--elevated)] mx-0.5 align-baseline">{children}</kbd>
      );
      const Step = ({ n, children }) => (
        <div className="flex gap-3 mb-2">
          <span className="font-display num font-bold text-[var(--accent)] shrink-0 w-6">{n}.</span>
          <div className="flex-1 font-ui text-sm text-[var(--text)] leading-relaxed">{children}</div>
        </div>
      );
      const Tip = ({ children }) => (
        <div className="border-l-2 border-[var(--accent)] bg-[var(--elevated)] pl-3 pr-2 py-2 my-2 font-ui text-xs text-[var(--muted)]">

        </div>
      );
      const Note = ({ children }) => (
        <div className="border-l-2 border-[var(--secondary)] bg-[var(--secondary-soft)] pl-3 pr-2 py-2 my-2 font-ui text-xs text-[var(--muted)]">

        <div className="border hairline bg-[var(--surface)] p-3 mb-2">
          <div className="flex items-baseline justify-between gap-2 mb-1.5">
            <div className="font-ui text-[10px] tracking-[0.18em] uppercase text-[var(--accent)] font-bold">{tag}</div>
            <div className="font-ui text-[10px] text-[var(--placeholder)] tracking-wider uppercase">{time}</div>

        </div>
      );

      // ── Section definitions ───────────────────────────────────────────────
      // 14 sections mirroring the editorial Field Guide. `roles` controls who
      // sees each section; omitting it = visible to all. `relatedView` lets
      // the contextual mapping above stay in sync.
      const SECTIONS = [
        {
          id: 'whatsnew',
          title: "What's new in v3.4.1",
          icon: 'sparkles',
          keywords: 'new release update version changelog features 3.4 latest working list bookmark my list scrollbar pharmacy worklist roster columns',
          content: (
            <div className="space-y-2 font-ui text-sm">
              <p className="leading-relaxed">v3.4.1 is a quality-of-life release focused on scroll behavior, multi-call workflows, and smarter help. Built from direct care-manager feedback.</p>
              <h4 className="font-display text-base font-medium mt-3 mb-1">New in v3.4.1</h4>
              <ul className="space-y-1.5 pl-1">
                <li>• <strong>Active Working List ("My List")</strong> — floating bookmark panel so you never lose your place when a call-back comes in. Add any member from the Worklist or their chart; the panel stays open across all tabs. See <button className="underline text-[var(--accent)]" onClick={() => jumpTo('workinglist')}>Working List guide</button>.</li>
                <li>• <strong>Sticky scrollbars on Pharmacy &amp; Worklist</strong> — the horizontal scrollbar now pins to the bottom of your viewport so you don't have to scroll all the way down to reach it. The Worklist also has a matching teal vertical scrollbar.</li>
                <li>• <strong>Sticky column headers on Worklist</strong> — both header rows (labels + inline filters) stay visible as you scroll through long lists.</li>
                <li>• <strong>Pharmacy Roster columns sync with Worklist</strong> — extra columns you enable in the Worklist column picker automatically appear in the Pharmacy Roster card too.</li>
                <li>• <strong>Field Guide now pushes the page</strong> — pressing F1 or clicking Help slides the Field Guide in from the right and shifts the page content over, so you can read your member's data and the guide at the same time.</li>
              </ul>
              <h4 className="font-display text-base font-medium mt-3 mb-1">Still here from v3.2</h4>
              <ul className="space-y-1 pl-1 text-[var(--muted)]">
                <li>• Today tab · Pharmacy Saved Views · Draggable Roster Card</li>
                <li>• Med Pop-out · Phone Notes · Draft Autosave</li>

              <Recipe tag="Recipe 01 · Morning" title="The 90-second morning brief" time="≈ 90 sec · daily">

          ),
        },
        {
          id: 'glossary',
          title: 'Glossary & badge dictionary',
          icon: 'book',
          keywords: 'glossary terms definitions acronyms hedis stars pdc mbi badge pill color',
          content: (
            <div className="space-y-3 font-ui text-sm">
              <h4 className="font-display text-base font-medium mt-1 mb-1">Common acronyms</h4>
              <div className="space-y-1">
                <div><strong>HEDIS</strong> <span className="text-[var(--muted)]">— Healthcare Effectiveness Data and Information Set. The performance measures used by health plans.</span></div>
                <div><strong>STARS</strong> <span className="text-[var(--muted)]">— CMS Medicare Advantage rating system, 1–5 stars. Many measures derive from HEDIS.</span></div>
                <div><strong>PDC</strong> <span className="text-[var(--muted)]">— Proportion of Days Covered. % of days a member should have had a medication. ≥80% = adherent.</span></div>
                <div><strong>MBI</strong> <span className="text-[var(--muted)]">— Medicare Beneficiary Identifier. Replaced the old SSN-based HICN.</span></div>
                <div><strong>PHI</strong> <span className="text-[var(--muted)]">— Protected Health Information. Anything that identifies a member combined with health data.</span></div>
                <div><strong>DNC</strong> <span className="text-[var(--muted)]">— Do Not Call. Member-elected outreach restriction.</span></div>
                <div><strong>IVR</strong> <span className="text-[var(--muted)]">— Interactive Voice Response. The "press 1 for English" menus.</span></div>
                <div><strong>LOB</strong> <span className="text-[var(--muted)]">— Line of Business. Commercial / Medicare / Medicaid / Marketplace.</span></div>
              </div>

              <h4 className="font-display text-base font-medium mt-3 mb-1">Badge colors at a glance</h4>
              <div className="space-y-1">
                <div className="flex items-center gap-2"><span className="inline-block w-3 h-3 rounded-full" style={{background:'var(--status-critical)'}} /><span><strong>Red</strong> — critical priority, overdue, or non-compliant</span></div>
                <div className="flex items-center gap-2"><span className="inline-block w-3 h-3 rounded-full" style={{background:'var(--status-warn)'}} /><span><strong>Amber</strong> — high priority, at-risk, or approaching due date</span></div>
                <div className="flex items-center gap-2"><span className="inline-block w-3 h-3 rounded-full" style={{background:'var(--success)'}} /><span><strong>Sage</strong> — on pace, compliant, or closed</span></div>
                <div className="flex items-center gap-2"><span className="inline-block w-3 h-3 rounded-full" style={{background:'var(--accent)'}} /><span><strong>Teal</strong> — accent / informational</span></div>
                <div className="flex items-center gap-2"><span className="inline-block w-3 h-3 rounded-full" style={{background:'var(--secondary)'}} /><span><strong>Dusty rose</strong> — needs attention (no contact 60+ days, etc.)</span></div>
              </div>
            </div>
          ),
        },
      ];

      // Role-aware filtering: hide sections restricted to directors if the
      // current user isn't one. Reuse the same `roles` field for future ACLs.
      const roleVisible = (s) => !s.roles || s.roles.length === 0 ||
        (s.roles.includes('director') && isDirector) ||
        s.roles.includes('careManager');
      const visibleByRole = SECTIONS.filter(roleVisible);

      // Search filtering: title + keywords. When searching, auto-expand matches.
      const q = filter.trim().toLowerCase();
      const visible = q
        ? visibleByRole.filter(s => (s.title + ' ' + s.keywords).toLowerCase().includes(q))
        : visibleByRole;

      // Track scroll → set active anchor for the TOC. Throttled via rAF.
      useEffect(() => {
        const sc = scrollerRef.current;
        if (!sc) return;
        let ticking = false;
        const onScroll = () => {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(() => {
            const top = sc.scrollTop + 60;
            let current = visible[0]?.id;
            for (const s of visible) {
              const el = sectionRefs.current[s.id];
              if (el && el.offsetTop <= top) current = s.id;
            }
            if (current) setActiveAnchor(current);
            ticking = false;
          });
        };
        sc.addEventListener('scroll', onScroll, { passive: true });
        return () => sc.removeEventListener('scroll', onScroll);
      }, [visible]);

      // Contextual breadcrumb at the top of the drawer
      const contextLabel = useMemo(() => {
        if (initialSection) return 'Jumped to topic';
        if (!activeView || !VIEW_TO_SECTION[activeView]) return 'Field Guide';
        const matched = SECTIONS.find(s => s.id === VIEW_TO_SECTION[activeView]);
        return matched ? `For "${matched.title}"` : 'Field Guide';
      }, [activeView, initialSection]);

      return (
        <aside className="help-panel-aside no-print" role="dialog" aria-modal="true" aria-labelledby="help-title" onClick={e => e.stopPropagation()}>
            {/* Header */}
            <header className="border-b-2 hairline px-5 py-4 shrink-0 bg-[var(--surface)]">
              <div className="flex items-start justify-between gap-3">

                  <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--accent)] font-bold mb-1 flex items-center gap-1.5">

                  </div>
                  <h2 id="help-title" className="font-display text-2xl font-medium leading-tight">How to use NaviStation</h2>
                  <p className="font-ui text-xs text-[var(--muted)] mt-1">v3.4.1 · Audit-logged</p>
                </div>
                <button onClick={onClose} aria-label="Close help"
                  className="text-[var(--muted)] hover:text-[var(--text)] p-1 -m-1 shrink-0">
                  <Icon name="x" size={20} />
                </button>
              </div>
            </header>
            {/* Search */}
            <div className="px-5 py-3 border-b hairline shrink-0">
              <div className="relative">
                <Icon name="search" size={13} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-[var(--muted)]" />
                <input
                  ref={searchRef}
                  type="text"
                  value={filter}
                  onChange={e => setFilter(e.target.value)}
                  placeholder="Search the guide — try 'spotlight' or 'pharmacy roster'…"
                  className="w-full pl-8 pr-2 py-1.5 border hairline bg-[var(--elevated)] font-ui text-sm focus:outline-none focus:border-[var(--accent)]"
                />
              </div>
              <div className="font-ui text-[10px] text-[var(--placeholder)] uppercase tracking-wider mt-2 flex justify-between">
                <span>{visible.length} {visible.length === 1 ? 'section' : 'sections'}{q ? ` matching "${filter}"` : ''}</span>
                {!q && <span>15 sections total{isDirector ? ' · incl. leadership' : ''}</span>}
              </div>
            </div>
            {/* Mini-TOC strip (no scroll, click-to-jump) */}
            {!q && (
              <nav className="px-5 py-2 border-b hairline shrink-0 bg-[var(--elevated)] overflow-x-auto" aria-label="Sections">
                <div className="flex gap-1.5">
                  {visibleByRole.map(s => (
                    <button
                      key={s.id}
                      onClick={() => jumpTo(s.id)}
                      className={`font-ui text-[10px] uppercase tracking-wider whitespace-nowrap px-2 py-1 border hairline rounded-sm transition-colors shrink-0 ${
                        activeAnchor === s.id
                          ? 'bg-[var(--accent)] text-[var(--on-accent)] border-[var(--accent)]'
                          : 'bg-[var(--surface)] text-[var(--muted)] hover:text-[var(--text)]'
                      }`}>
                      {s.title}
                    </button>
                  ))}
                </div>
              </nav>
            )}
            {/* Content */}
            <div ref={scrollerRef} className="flex-1 overflow-y-auto px-5 py-4 space-y-2">
              {visible.map(section => {
                const isOpen = openSections[section.id] === true || (q && q.length > 0);
                return (
                  <div
                    key={section.id}
                    ref={el => (sectionRefs.current[section.id] = el)}
                    className="border hairline bg-[var(--surface)]"
                    id={`help-${section.id}`}>
                    <button
                      onClick={() => toggle(section.id)}
                      className="w-full flex items-center justify-between gap-3 px-4 py-3 text-left hover:bg-[var(--elevated)]">

                        {section.roles && section.roles.includes('director') && (
                          <span className="font-ui text-[9px] uppercase tracking-wider px-1.5 py-0.5 bg-[var(--secondary-soft)] text-[var(--secondary)] border hairline rounded-sm">Leadership</span>
                        )}
                      </div>
                      <Icon name={isOpen ? 'chevron-down' : 'chevron-right'} size={14} className="text-[var(--muted)] shrink-0" />
                    </button>
                    {isOpen && (
                      <div className="px-4 pb-4 pt-1 border-t hairline">
                        {section.content}
                      </div>
                    )}
                  </div>
                );
              })}
              {visible.length === 0 && (
                <div className="font-ui text-sm text-[var(--muted)] italic text-center py-12">
                  No help topics match "{filter}". Try different keywords, or clear the search.
                </div>
              )}
              <div className="h-4" />
            </div>
            {/* Footer */}
            <footer className="border-t-2 hairline px-5 py-3 shrink-0 bg-[var(--elevated)] flex items-center justify-between font-ui text-[10px] uppercase tracking-wider text-[var(--muted)]">
              <span>UM_Aid IPA · NaviStation v3.2 · Field Guide</span>
              <span className="flex items-center gap-2">
                <span className="hidden sm:inline">Logged: {currentUser?.name}</span>
                <span>· <Kbd>Esc</Kbd> to close</span>
              </span>
            </footer>
          </aside>
      );
    }
    function Accordion({ id, title, icon, defaultOpen = false, children, badge, headerExtra, accent }) {
      const lsKey = `acm-acc:${id}`;
      const [open, setOpen] = useState(() => {
        try {
          const v = localStorage.getItem(lsKey);
          return v === null ? defaultOpen : v === '1';
        } catch (e) { return defaultOpen; }
      });
      const toggle = () => {
        setOpen(o => {
          const next = !o;
          try { localStorage.setItem(lsKey, next ? '1' : '0'); } catch (e) {}
          return next;
        });
      };
      // accent: 'critical' -> red border + chevron · 'primary' -> accent border + chevron · undefined -> hairline default
      const borderClass = accent === 'critical' ? 'border-[var(--status-critical)] shadow-md'
                        : accent === 'primary'  ? 'border-[var(--accent)] shadow-md'
                                                : 'hairline';
      const iconColor   = accent === 'critical' ? 'text-[var(--status-critical)]'
                                                : 'text-[var(--accent)]';
      return (
        <div className={`acc-section border-2 bg-[var(--surface)] ${borderClass} ${open ? 'open' : ''}`}>
          <button type="button" onClick={toggle} className="acc-trigger" aria-expanded={open} aria-controls={`acc-panel-${id}`}>
            <span className="flex items-center gap-2 flex-1 min-w-0">
              <Icon name="chevron-right" size={14} className={`acc-chevron shrink-0 ${iconColor}`} />
              {icon && <Icon name={icon} size={16} className={`shrink-0 ${iconColor}`} />}
              <span className="font-display text-xl font-medium">{title}</span>
              {badge}
            </span>
            {headerExtra && <span className="shrink-0 ml-2" onClick={e => e.stopPropagation()}>{headerExtra}</span>}
          </button>
          {open && <div id={`acc-panel-${id}`} className="acc-panel">{children}</div>}
        </div>
      );
    }

    // ── Call Log / Member Detail ──────────────────────────────────────────────

    // MED POPOUT — compact draggable call-reference panel (no backdrop)
    // Floats above the call log so the CM can read Rx / prescriber info while
    // filling in the outreach form. Drag by the header grip to reposition.
    // ══════════════════════════════════════════════════════════════════════════
    function MedPopoutModal({ member, phiVisible, onClose }) {
      const [pos, setPos] = React.useState(() => ({
        x: Math.max(0, window.innerWidth - 430),
        y: 120,
        w: 380,
        h: null,   // null = auto height (unconstrained); set once user resizes
      }));
      const [dragging, setDragging] = React.useState(false);
      const dragOrigin              = React.useRef(null);
      const resizeRef               = React.useRef(null);

      // Copy feedback — key → 'phone'|'fax'|'drug' per med index
      const [copiedKey, setCopiedKey] = React.useState(null);
      const copyVal = (key, text) => {
        if (!text || text === '—') return;
        const finish = () => { setCopiedKey(key); setTimeout(() => setCopiedKey(k => k === key ? null : k), 1400); };
        try { navigator.clipboard.writeText(text).then(finish); }
        catch (e) {
          const ta = document.createElement('textarea');
          ta.value = text; ta.style.cssText = "position:fixed;opacity:0";
          document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); } catch (_) {}
          document.body.removeChild(ta); finish();
        }
      };

      // Drag
      const onDragStart = (e) => {
        e.preventDefault();
        setDragging(true);
        dragOrigin.current = { mx: e.clientX, my: e.clientY, px: pos.x, py: pos.y };
      };
      React.useEffect(() => {
        if (!dragging) return;
        const onMove = (e) => {
          const nx = dragOrigin.current.px + e.clientX - dragOrigin.current.mx;
          const ny = dragOrigin.current.py + e.clientY - dragOrigin.current.my;
          setPos(p => ({ ...p, x: Math.max(0, nx), y: Math.max(0, ny) }));
        };
        const onUp = () => setDragging(false);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
      }, [dragging]);

      // Resize — right edge and bottom-right corner
      const startResize = (edges) => (e) => {
        e.preventDefault(); e.stopPropagation();
        resizeRef.current = { sx: e.clientX, sy: e.clientY, bw: pos.w, bh: pos.h ?? 500, edges };
        const MIN_W = 300, MIN_H = 240;
        const onMove = (ev) => {
          if (!resizeRef.current) return;
          const { sx, sy, bw, bh, edges: ed } = resizeRef.current;
          const nw = ed.e ? Math.max(MIN_W, Math.min(window.innerWidth - pos.x - 8, bw + (ev.clientX - sx))) : bw;
          const nh = ed.s ? Math.max(MIN_H, Math.min(window.innerHeight - pos.y - 8, bh + (ev.clientY - sy))) : bh;
          setPos(p => ({ ...p, w: nw, h: nh }));
        };
        const onUp = () => {
          resizeRef.current = null;
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };

      // Esc to close
      React.useEffect(() => {
        const h = (e) => { if (e.key === 'Escape') onClose(); };

      return (

            </div>
          </div>

          {/* ── Medication list ── */}
          <div className="overflow-y-auto" style={{ maxHeight: pos.h ? pos.h - 76 : '70vh' }}>
            {member.medications.map((med, idx) => (
              <div key={idx}
                className={`${idx > 0 ? 'border-t hairline' : ''}`}
                style={{ borderLeft: `3px solid ${statusBg(med.status)}` }}>

                </div>

                {/* Refill strip */}
                <div className="flex items-center gap-3 px-3 pb-2 font-ui text-[10px] text-[var(--muted)] flex-wrap">

                  <span className="text-[var(--dim)]">·</span>
                  <span>Last <span className="num text-[var(--text)]">{med.lastRefill}</span></span>
                  <span className="text-[var(--dim)]">·</span>

                {/* Pharmacy + Prescriber two-column contact strip */}

                    <div className="font-ui text-[11px] num text-[var(--muted)] mt-0.5">
                      {med.pharmacyPhone}
                      <CopyBtn k={`phph-${idx}`} val={med.pharmacyPhone} />
                    </div>
                  </div>
                  {/* Prescriber */}
                  <div className="px-3 py-2">
                    <div className="font-ui text-[9px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1 flex items-center gap-1">
                      <Icon name="user-check" size={9} /> Prescriber
                      {!med.samePrescriberAsPrimary && (
                        <span className="text-[8px] font-semibold px-1 py-px text-white rounded" style={{ background: 'var(--status-warn)' }}>≠</span>
                      )}

                    <div className="font-ui text-sm font-semibold text-[var(--text)] leading-tight">{med.prescriber}</div>
                    <div className="font-ui text-xs num text-[var(--muted)] mt-0.5">

                    <div className="font-ui text-xs num text-[var(--placeholder)]">

                {/* PHI address strip — primary med only, PHI visible only */}
                {phiVisible && med.isPrimary && (
                  <div className="px-3 py-1.5 border-t hairline bg-[var(--elevated)] font-ui text-xs text-[var(--muted)] flex items-center gap-1.5 flex-wrap">
                    <Icon name="map-pin" size={11} className="shrink-0 text-[var(--placeholder)]" />

                    <span className="text-[var(--dim)]">·</span>

            ))}

          {/* ── Footer hint + right/SE resize handles ── */}

            <span>Drag to move · resize edge/corner · Esc to close</span>
            {!phiVisible && (
              <span className="ml-auto flex items-center gap-1"><Icon name="eye-off" size={9} /> PHI masked</span>
            )}
          </div>

          {/* Right-edge resize strip */}
          <div onMouseDown={startResize({ e: true })} aria-hidden="true"
            style={{ position:'absolute', top:12, right:-4, bottom:12, width:8, cursor:'e-resize', zIndex:10 }} />
          {/* SE corner resize grip (visible diagonal lines) */}
          <div onMouseDown={startResize({ e: true, s: true })} aria-hidden="true" title="Drag to resize"
            style={{
              position:'absolute', bottom:0, right:0, width:22, height:22,
              cursor:'se-resize', zIndex:11, borderRadius:'0 0 10px 0',
              background:'linear-gradient(135deg, transparent 0 32%, var(--accent) 32% 40%, transparent 40% 55%, var(--accent) 55% 63%, transparent 63% 78%, var(--accent) 78% 86%, transparent 86%)',
              opacity: 0.55, transition:'opacity 0.15s',
            }}
            onMouseEnter={e => e.currentTarget.style.opacity = '1'}
            onMouseLeave={e => e.currentTarget.style.opacity = '0.55'}
          />

      );
    }

    function MemberDetail({ member, onBack, backLabel = 'Worklist', phiVisible, currentUser, onLogCall, auditLog, canReassign, onReassign, getAssignee, gapStatuses = {}, onUpdateGapStatus, escalations = {}, onEscalate, medNotes = {}, onAddMedNote, medBarriers = {}, onAddMedBarrier, onResolveMedBarrier, gapDocs = {}, onAddGapDoc, outreachDocs = {}, isBookmarked, onToggleBookmark, onOpenInPharma }) {

        try {

      const savedDraft = loadDraft();

      const [outcome, setOutcome] = useState(savedDraft?.outcome || 'Reached — Member Directly');
      const [notes, setNotes] = useState(savedDraft?.notes || '');
      const [nextAction, setNextAction] = useState(savedDraft?.nextAction || '');
      const [daysUntil, setDaysUntil] = useState(savedDraft?.daysUntil || '');
      const [measure, setMeasure] = useState(savedDraft?.measure || member.gaps[0] || '');

      const [draftAgeMs] = useState(savedDraft ? Date.now() - savedDraft.savedAt : 0);

            }));

        return () => clearTimeout(t);
      }, [outcome, notes, nextAction, daysUntil, measure, contactType, draftKey]);
      const [gapsOpen, setGapsOpen] = useState(false); // eslint-disable-line no-unused-vars -- legacy, kept to avoid touching surrounding state declarations

      const memberLog = auditLog.filter(a => a.memberId === member.id);
      const memberEscalation = escalations[member.id];
      const getGapStatus = (gapCode) => (gapStatuses[member.id + '__' + gapCode]?.status) || 'Open';
      const getGapStatusMeta = (gapCode) => gapStatuses[member.id + '__' + gapCode] || null;

                    <span className="border hairline px-2 py-1 text-[11px] tracking-wider font-semibold text-[var(--accent)] border-[var(--accent)]">{member.healthPlanName}</span>
                  )}
                  {member.dualEligible && <span className="border border-[#8b5a1e] text-[#8b5a1e] px-2 py-1 text-[11px] tracking-wider uppercase">Dual eligible</span>}
                  {!member.pcpAttr && <span className="border border-[var(--status-critical)] text-[var(--status-critical)] px-2 py-1 text-[11px] tracking-wider uppercase">Unattributed PCP</span>}
                  {/* ── SDOH flags surfaced on the title card ─────────────  */}
                  {/* These were previously only visible inside the SDOH     */}
                  {/* accordion further down the page. Per stakeholder       */}
                  {/* feedback: care managers need them visible the moment a */}
                  {/* member is opened — barriers like housing instability   */}
                  {/* or transportation need fundamentally change how an     */}
                  {/* outreach call should be framed. Same warn color as the */}
                  {/* in-accordion treatment, but bold + uppercase to match  */}
                  {/* the title-card badge rhythm.                           */}
                  {member.housingStatus !== 'STABLE' && (
                    <span className="border border-[var(--status-warn)] text-[var(--status-warn)] px-2 py-1 text-[11px] tracking-wider uppercase font-bold flex items-center gap-1 rounded">
                      <Icon name="home" size={10} /> Housing: {member.housingStatus}
                    </span>
                  )}
                  {member.transportationNeeds && (
                    <span className="border border-[var(--status-warn)] text-[var(--status-warn)] px-2 py-1 text-[11px] tracking-wider uppercase font-bold flex items-center gap-1 rounded">
                      <Icon name="car" size={10} /> Transportation Need
                    </span>
                  )}
                  {member.foodInsecurity && (
                    <span className="border border-[var(--status-warn)] text-[var(--status-warn)] px-2 py-1 text-[11px] tracking-wider uppercase font-bold flex items-center gap-1 rounded">
                      <Icon name="shopping-cart" size={10} /> Food Insecurity
                    </span>
                  )}
                </div>
              </div>

              {/* Assignment panel — shown when reassign is allowed */}
              {canReassign && (
                <div className="border hairline bg-[var(--elevated)] p-3 min-w-[220px]">
                  <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] mb-1 flex items-center gap-1">
                    <Icon name="user-cog" size={11} /> Assigned Care Manager
                  </div>
                  <div className="font-display text-sm font-medium mb-2">
                    {assignee ? `${assignee.name}` : 'Unassigned'}
                    {assignee && <span className="font-ui text-[10px] text-[var(--muted)] ml-1">· {assignee.role}</span>}
                  </div>
                  <select value={assigneeId || ''}
                    onChange={e => onReassign && onReassign(member, e.target.value)}
                    className="w-full font-ui text-xs border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)]">
                    {CARE_MANAGERS.map(c => (
                      <option key={c.id} value={c.id}>{c.initials} · {c.name} · {c.role}</option>
                    ))}
                  </select>
                  <div className="font-ui text-[10px] text-[var(--subtle)] mt-1.5">Reassigning is audit-logged.</div>
                </div>
              )}
            </div>

            <div className="grid md:grid-cols-4 gap-0 mt-6 border-t hairline">
              <div className="py-4 px-5 border-r hairline">
                <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)]">Risk score</div>
                <div className="font-display text-2xl num mt-1 font-medium">{member.risk.toFixed(2)}</div>
              </div>
              <div className="py-4 px-5 border-r hairline">
                <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)]">Open gaps</div>
                <div className="font-display text-2xl num mt-1 font-medium">{memberGaps.length}</div>
              </div>
              <div className="py-4 px-5 border-r hairline">
                <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)]">Days oldest gap</div>
                <div className="font-display text-2xl num mt-1 font-medium">{member.daysOpen}d</div>
              </div>
              <div className="py-4 px-5">
                <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)]">PCP</div>
                <div className="font-display text-lg mt-1 font-medium">{member.pcp}</div>
                {member.pcpAttr && <div className="font-ui text-xs text-[var(--muted)]">{member.pcpSpecialty}</div>}
                {member.pcpAttr && <div className="font-ui text-[10px] text-[var(--muted)] mt-0.5 truncate">{member.pcpGroup}</div>}
                {member.pcpAttr && (
                  <div className="font-ui text-[10px] text-[var(--muted)] mt-1 flex items-center gap-1">
                    <Icon name="phone" size={10} />
                    <PhoneWithNotes phone={member.pcpPhone} entityKey={member.pcp} />
                  </div>
                )}
                {phiVisible && member.pcpAttr && <div className="font-ui text-xs text-[var(--subtle)]">NPI {member.pcpNPI}</div>}
              </div>
            </div>
          </div>

          {/* Pharmacy detail if applicable — comprehensive top-of-page reference. */}
          {/* Stacked list: ONE row per medication the member is on, each with   */}
          {/* its own PDC, prescriber, and pharmacy. Different MD / different Rx */}
          {/* badges flag fragmented care — a real adherence risk indicator.     */}
          {/* For members with no Rx data on file, we render a placeholder card  */}
          {/* in this slot so pharmacy presence is always answered on the chart. */}
          {member.hasPharma && member.medications && member.medications.length > 0 ? (
            <>
            {pharmDetailPopout && (
              <MedPopoutModal
                member={member}
                phiVisible={phiVisible}
                onClose={() => setPharmDetailPopout(false)}
              />
            )}
            <details className="mb-6 group" open={pharmDetailOpen}
                     onToggle={(e) => setPharmDetailOpen(e.currentTarget.open)}>
              <summary className="border-2 border-[var(--accent)] bg-[var(--surface)] p-4 cursor-pointer list-none flex items-center justify-between hover:bg-[var(--elevated)]">
                <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--accent)] flex items-center gap-2 font-bold">
                  <Icon name="pill" size={13} /> Pharmacy Detail
                  <span className="font-normal text-[var(--muted)] normal-case tracking-normal">
                    · {member.medsCount} medication{member.medsCount !== 1 ? 's' : ''} on profile
                    {member.medsNonCompliant > 0 && (
                      <span className="text-[var(--status-critical)] font-semibold"> · {member.medsNonCompliant} non-compliant</span>
                    )}
                    {member.distinctPrescribers > 1 && (
                      <span className="text-[var(--status-warn)] font-semibold"> · {member.distinctPrescribers} prescribers</span>
                    )}
                    {member.distinctPharmacies > 1 && (
                      <span className="text-[var(--status-warn)] font-semibold"> · {member.distinctPharmacies} pharmacies</span>
                    )}
                  </span>
                </div>
                <div className="flex items-center gap-3">
                  <button
                    type="button"
                    onClick={e => { e.preventDefault(); e.stopPropagation(); setPharmDetailPopout(true); }}
                    title="Pop out — full medication detail view"
                    className="flex items-center gap-1 font-ui text-[10px] tracking-[0.15em] uppercase text-[var(--accent)] border border-[var(--accent)] px-2 py-1 hover:bg-[var(--accent)] hover:text-[var(--on-accent)] transition-colors">
                    <Icon name="maximize-2" size={11} /> Pop out
                  </button>
                  <span className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] flex items-center gap-1">
                    <Icon name="chevron-down" size={12} className="group-open:rotate-180 transition-transform" />
                    <span className="group-open:hidden">Expand</span>
                    <span className="hidden group-open:inline">Collapse</span>
                  </span>
                </div>
              </summary>
              <div className="border-2 border-t-0 border-[var(--accent)] bg-[var(--surface)] p-4 space-y-3">
                {member.medications.map((med, mIdx) => {
                  const borderColor =
                    med.status === 'Non-Compliant' ? 'var(--status-critical)' :
                    med.status === 'At Risk'        ? 'var(--status-warn)' :
                    med.status === 'Compliant'      ? '#4a6b52' : 'var(--muted)';
                  // Active per-medication barriers — shown as a prominent
                  // header pill so the care manager can't miss them on the
                  // call (per Patricia's request: barriers attach to the
                  // specific Rx, not the member generally).
                  const medKey = member.id + '__' + mIdx;
                  const medActiveBarriers = (medBarriers[medKey] || []).filter(b => !b.resolvedAt);
                  return (
                    <div key={mIdx}
                         className="bg-[var(--elevated)] p-4"
                         style={{ borderLeft: `4px solid ${borderColor}` }}>
                      {/* Header row: drug + measure + status + PDC + barrier flag if any */}
                      <div className="flex items-start justify-between gap-4 flex-wrap mb-3">
                        <div className="flex items-baseline gap-3 flex-wrap">
                          <span className="font-display text-base font-bold">{med.drug}</span>
                          <span className="text-[10px] tracking-wider uppercase bg-[var(--inverse)] text-[var(--on-inverse)] px-1.5 py-0.5">{med.measure}</span>
                          <span className={`text-[10px] tracking-wider uppercase px-1.5 py-0.5 font-semibold ${compStyle(med.status)}`}>{med.status}</span>
                          {med.isPrimary && (
                            <span className="text-[10px] tracking-wider uppercase text-[var(--muted)] border border-[var(--muted)] px-1.5 py-0.5">Primary gap</span>
                          )}
                          {medActiveBarriers.length > 0 && (
                            <span className="text-[10px] tracking-wider uppercase bg-[var(--status-critical)] text-white px-2 py-0.5 font-bold rounded-sm flex items-center gap-1"
                                  title={medActiveBarriers.map(b => b.type + (b.detail ? ': ' + b.detail : '')).join(' · ')}>
                              <Icon name="alert-triangle" size={10} />
                              {medActiveBarriers.length} barrier{medActiveBarriers.length !== 1 ? 's' : ''}
                            </span>
                          )}
                        </div>
                        <div className="flex items-baseline gap-2">
                          <span className="font-ui text-[10px] uppercase tracking-wider text-[var(--muted)]">PDC</span>
                          <span className="font-display text-xl num font-medium">{med.pdc.toFixed(2)}</span>
                          {med.pdc < 0.80 && <span className="text-[var(--status-warn)] text-sm">⚠ below threshold</span>}
                          {med.pdc >= 0.80 && <span className="text-[#4a6b52] text-sm">✓ compliant</span>}
                        </div>
                      </div>

                      {/* Detail line */}
                      <div className="font-ui text-xs text-[var(--muted)] mb-3 italic font-bold">{med.detail}</div>

                      {/* Two-column body: refill data | prescriber + pharmacy */}
                      <div className="grid md:grid-cols-2 gap-x-8 gap-y-1">
                        <div className="space-y-1.5 font-ui text-sm">
                          <div className="flex gap-2"><span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-28 shrink-0 pt-0.5">Days Covered</span><span className="num">{med.daysCovered} / 365</span></div>
                          <div className="flex gap-2"><span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-28 shrink-0 pt-0.5">Last Refill</span><span className="num">{med.lastRefill}</span></div>
                          <div className="flex gap-2"><span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-28 shrink-0 pt-0.5">Next Fill Due</span><span className="num">{med.nextFill} ({med.nextFillDays}d)</span></div>
                          <div className="flex gap-2"><span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-28 shrink-0 pt-0.5">Day Supply</span><span className="num">{med.daySupply}</span></div>
                          <div className="flex gap-2"><span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-28 shrink-0 pt-0.5">Prior Year</span><span>{med.priorYear}</span></div>
                        </div>
                        <div className="space-y-1.5 font-ui text-sm">
                          <div className="flex gap-2 flex-wrap items-baseline">
                            <span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-24 shrink-0 pt-0.5">Prescriber</span>
                            <span className="font-bold">{med.prescriber}</span>
                            {!med.samePrescriberAsPrimary && (
                              <span className="text-[9px] tracking-wider uppercase font-semibold px-1.5 py-0.5"
                                    style={{ background: 'var(--status-warn)', color: '#fff' }}>Different MD</span>
                            )}
                          </div>
                          <div className="flex gap-2"><span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-24 shrink-0 pt-0.5">Phone</span><span className="num">{med.prescriberPhone}</span></div>
                          <div className="flex gap-2"><span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-24 shrink-0 pt-0.5">Fax</span><span className="num">{med.prescriberFax}</span></div>
                          <div className="flex gap-2 flex-wrap items-baseline pt-1">
                            <span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-24 shrink-0 pt-0.5">Pharmacy</span>
                            <span className="font-bold">{med.pharmacy}</span>
                            {!med.samePharmacyAsPrimary && (
                              <span className="text-[9px] tracking-wider uppercase font-semibold px-1.5 py-0.5"
                                    style={{ background: 'var(--status-warn)', color: '#fff' }}>Different Rx</span>
                            )}
                          </div>
                          <div className="flex gap-2"><span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-24 shrink-0 pt-0.5">Phone</span><span className="num">{med.pharmacyPhone}</span></div>
                        </div>
                      </div>

                      {/* Per-medication notes (3 contact types) + barriers panel */}
                      {onAddMedNote && (
                        <MedNotesAndBarriers
                          member={member} med={med} medIdx={mIdx}
                          medNotes={medNotes} onAddMedNote={onAddMedNote}
                          medBarriers={medBarriers}
                          onAddMedBarrier={onAddMedBarrier}
                          onResolveMedBarrier={onResolveMedBarrier} />
                      )}
                    </div>
                  );
                })}

                {/* PHI-gated address block (single occurrence — applies to primary pharmacy of record) */}
                {phiVisible && (
                  <div className="bg-[var(--elevated)] p-3 mt-2 border-l-4 border-l-[var(--muted)]">
                    <div className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] mb-2 font-semibold">Primary pharmacy of record</div>
                    <div className="grid md:grid-cols-3 gap-4 font-ui text-sm">
                      <div className="flex gap-2"><span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-20 shrink-0 pt-0.5">NPI</span><span className="num">{member.pharmNPI}</span></div>
                      <div className="flex gap-2"><span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-20 shrink-0 pt-0.5">Address</span><span>{member.pharmAddr}</span></div>
                      <div className="flex gap-2"><span className="text-[10px] uppercase tracking-wider text-[var(--muted)] w-20 shrink-0 pt-0.5">City</span><span>{member.pharmCity}, CA {member.pharmZip}</span></div>
                    </div>
                  </div>
                )}
              </div>
            </details>
            </>
          ) : (
            <div id={`pharmacy-detail-${member.id}`} className="mb-6 border-2 border-dashed border-[var(--border-color)] bg-[var(--elevated)] p-4 flex items-start gap-3">
              <Icon name="pill" size={18} className="text-[var(--muted)] shrink-0 mt-0.5" />
              <div className="flex-1 min-w-0">
                <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--muted)] font-bold flex items-center gap-2 flex-wrap">
                  Pharmacy Detail
                  <span className="font-normal normal-case tracking-normal text-[var(--placeholder)]">· No Rx on file</span>
                </div>
                <div className="font-ui text-xs text-[var(--muted)] mt-1 leading-relaxed">
                  {member.hasPharma
                    ? "Member is flagged for pharmacy adherence tracking but no medications are loaded in the current data set."
                    : "No medication adherence tracking for this member — they're not enrolled in a HEDIS pharmacy measure (MAC, MAH, MAD, SUPD, or Statin Use)."}
                </div>
              </div>
            </div>
          )}

          {/* Call logging — full-width, directly under the top Pharmacy Detail reference. */}
          {/* This is the primary active workspace during an outreach call.                    */}
          <div className="mb-6">
          <Accordion id={`log-outreach-${member.id}`} title="Log Outreach Contact" icon="phone-call" accent="primary"
            headerExtra={
              <div className="flex items-center gap-2 flex-wrap">
                {/* Quick jump to the Pharmacy view — re-opens the same member */}
                {/* with the Pharmacy tab as the entry context (back button    */}
                {/* returns there). Always rendered; the destination will show */}
                {/* the "No Rx on file" placeholder if no pharma data exists.  */}
                {onOpenInPharma && (
                  <button onClick={(e) => { e.stopPropagation(); onOpenInPharma(); }}
                    title="Re-open this member in the Pharmacy view (changes the back-button context)"
                    className="font-ui text-[10px] tracking-[0.12em] uppercase flex items-center gap-1 border border-[var(--accent)] text-[var(--accent)] px-2 py-0.5 rounded-sm hover:bg-[var(--accent)] hover:text-[var(--on-accent)] transition-colors">
                    <Icon name="pill" size={10} /> Open in Rx view
                  </button>
                )}
                {member.hasPharma && (
                  <span className="font-ui text-[9px] uppercase tracking-[0.15em] text-[var(--accent)] flex items-center gap-1 border border-[var(--accent)] px-2 py-0.5 rounded-sm">
                    <Icon name="anchor" size={9} /> active call workspace
                  </span>
                )}
              </div>
            }>
            <div className="space-y-4">
              {/* Contact-type chooser + context panel */}
              <div>
                <label className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] block mb-1">Contacting</label>
                <select value={contactType} onChange={e => setContactType(e.target.value)}
                  className="w-full font-ui text-sm border-2 hairline bg-[var(--surface)] px-3 py-2 focus:bg-[var(--elevated)]">
                  <option>Member</option>
                  <option>Pharmacy</option>
                  <option>Rx Provider</option>
                </select>

                {/* Contextual contact info — changes with the selector */}
                <div className="mt-2 border hairline bg-[var(--elevated)] p-3">
                  {contactType === 'Member' && (
                    <div className="font-ui text-xs space-y-1">
                      <div className="flex items-center gap-2 flex-wrap">
                        <Icon name="user" size={12} className="text-[var(--muted)]" />
                        <span className="font-semibold">{phiVisible ? `${member.last}, ${member.first}` : member.initials}</span>
                        <MultiMedBadge member={member} />
                        <span className="text-[var(--muted)]">· {member.language}</span>
                      </div>
                      {phiVisible ? (
                        <>
                          <div className="flex items-center gap-2">
                            <Icon name="phone" size={12} className="text-[var(--muted)]" />
                            <PhoneWithNotes phone={member.phoneFull || member.phone} entityKey={`member-${member.id}-home`} />
                            <span className="text-[var(--muted)] text-[10px]">home</span>
                          </div>
                          {member.mobile && (
                            <div className="flex items-center gap-2">
                              <Icon name="smartphone" size={12} className="text-[var(--muted)]" />
                              <PhoneWithNotes phone={member.mobileFull || member.mobile} entityKey={`member-${member.id}-mobile`} />
                              <span className="text-[var(--muted)] text-[10px]">mobile</span>
                            </div>
                          )}
                        </>
                      ) : (
                        <div className="text-[var(--muted)] italic">Reveal PHI to display member phone numbers.</div>
                      )}
                    </div>
                  )}
                  {contactType === 'Pharmacy' && (
                    <div className="font-ui text-xs space-y-1">
                      {member.hasPharma && member.pharmName ? (
                        <>
                          <div className="flex items-center gap-2">
                            <Icon name="pill" size={12} className="text-[var(--accent)]" />
                            <span className="font-semibold">{member.pharmName}</span>
                          </div>
                          <div className="flex items-center gap-2">
                            <Icon name="phone" size={12} className="text-[var(--muted)]" />
                            <PhoneWithNotes phone={member.pharmPhone} entityKey={member.pharmName} />
                          </div>
                          {phiVisible && <div className="flex items-start gap-2"><Icon name="map-pin" size={12} className="text-[var(--muted)] mt-0.5" /><span>{member.pharmAddr}, {member.pharmCity} {member.pharmZip}</span></div>}
                          {!phiVisible && <div className="text-[var(--muted)] italic">Reveal PHI for full pharmacy address.</div>}
                        </>
                      ) : (
                        <div className="text-[var(--muted)] italic">No pharmacy on file for this member.</div>
                      )}
                    </div>
                  )}
                  {contactType === 'Rx Provider' && (
                    <div className="font-ui text-xs space-y-1">
                      {member.hasPharma && member.prescriber ? (
                        <>
                          <div className="flex items-center gap-2">
                            <Icon name="user-check" size={12} className="text-[var(--accent)]" />
                            <span className="font-semibold">{member.prescriber}</span>
                          </div>
                          <div className="flex items-center gap-2">
                            <Icon name="phone" size={12} className="text-[var(--muted)]" />
                            <PhoneWithNotes phone={member.prescriberPhone} entityKey={member.prescriber} />
                          </div>
                          <div className="flex items-center gap-2 num"><Icon name="printer" size={12} className="text-[var(--muted)]" /><span>{member.prescriberFax}</span><span className="text-[var(--muted)]">fax</span></div>
                        </>
                      ) : member.pcp && member.pcpAttr ? (
                        <>
                          <div className="flex items-center gap-2">
                            <Icon name="user-check" size={12} className="text-[var(--accent)]" />
                            <span className="font-semibold">{member.pcp}</span>
                            <span className="text-[var(--muted)]">(PCP)</span>
                          </div>
                          {member.pcpPhone && (
                            <div className="flex items-center gap-2">
                              <Icon name="phone" size={12} className="text-[var(--muted)]" />
                              <PhoneWithNotes phone={member.pcpPhone} entityKey={member.pcp} />
                            </div>
                          )}
                        </>
                      ) : (
                        <div className="text-[var(--muted)] italic">No prescriber or attributed PCP on file.</div>
                      )}
                    </div>
                  )}
                </div>
              </div>

              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] block mb-1">Outcome *</label>
                  <select value={outcome} onChange={e => setOutcome(e.target.value)}
                    className="w-full font-ui text-sm border-2 hairline bg-[var(--surface)] px-3 py-2">
                    {OUTCOME_GROUPS.map(grp => (
                      <optgroup key={grp.label} label={grp.label}>
                        {grp.items.map(o => <option key={o}>{o}</option>)}
                      </optgroup>
                    ))}
                  </select>
                </div>
                <div>
                  <label className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] block mb-1">Measure</label>
                  <select value={measure} onChange={e => setMeasure(e.target.value)}
                    className="w-full font-ui text-sm border-2 hairline bg-[var(--surface)] px-3 py-2 focus:bg-[var(--elevated)]">
                    {member.gaps.map(g => <option key={g}>{g}</option>)}
                    {member.gaps.length === 0 && <option>—</option>}
                  </select>
                </div>
              </div>
              <div>
                <label className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] block mb-1">Notes * (required to save)</label>
                {draftBannerVisible && (
                  <div className="mb-2 border-2 hairline bg-[var(--secondary-soft)] px-3 py-2 flex items-center gap-2 rounded">
                    <Icon name="save" size={13} className="text-[var(--secondary)] shrink-0" />
                    <div className="flex-1 font-ui text-[11px] text-[var(--text)]">
                      <strong>Draft restored</strong> from {(() => { const m = Math.floor(draftAgeMs/60000); return m < 1 ? 'just now' : m < 60 ? `${m} min ago` : `${Math.floor(m/60)}h ago`; })()} — autosaved when you stepped away.
                    </div>
                    <button onClick={() => setDraftBannerVisible(false)} className="font-ui text-[10px] uppercase tracking-wider text-[var(--muted)] hover:text-[var(--text)] px-2 py-1">Keep</button>
                    <button onClick={discardDraft} className="font-ui text-[10px] uppercase tracking-wider text-[var(--status-critical)] hover:underline px-2 py-1">Discard</button>
                  </div>
                )}
                <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={3}
                  placeholder={`Document ${contactType.toLowerCase()} contact attempt, barriers, response, plan…`}
                  aria-label="Contact attempt notes"
                  className="w-full font-ui text-sm border-2 hairline bg-[var(--surface)] p-3 focus:bg-[var(--elevated)] placeholder:text-[var(--placeholder)]" />
                <div className="font-ui text-[10px] text-[var(--subtle)] mt-1 flex items-center gap-1">
                  <Icon name="save" size={10} /> Autosaves every few seconds — safe if your session locks
                </div>
              </div>

              {/* Document attachment — for the "Bryan just faxed me chart    */}
              {/* records during this call" workflow. Doc binds to the audit   */}
              {/* log entry created when the form is submitted, so timeline    */}
              {/* and provenance are inseparable.                              */}
              <div>
                {pendingDoc && !docAttachOpen && (
                  <div className="border-2 border-[#5b3a6b] bg-[var(--surface)] p-2 rounded flex items-center gap-2 mb-2">
                    <Icon name="file-text" size={13} className="text-[#5b3a6b] shrink-0" />
                    <div className="flex-1 font-ui text-xs min-w-0">
                      <span className="font-semibold">{pendingDoc.filename}</span>
                      <span className="text-[var(--muted)]"> · {pendingDoc.source}</span>
                      {pendingDoc.dateOfService && <span className="text-[var(--muted)] num"> · DOS {pendingDoc.dateOfService}</span>}
                      <div className="text-[var(--subtle)] text-[10px] italic">Will attach to this contact entry on save.</div>
                    </div>
                    <button onClick={() => setPendingDoc(null)}
                      title="Remove attachment"
                      className="font-ui text-[10px] uppercase tracking-wider text-[var(--status-critical)] hover:underline px-2 py-1">
                      Remove
                    </button>
                  </div>
                )}
                {!docAttachOpen && !pendingDoc && (
                  <button onClick={() => setDocAttachOpen(true)}
                    className="font-ui text-[10px] uppercase tracking-wider text-[var(--accent)] hover:underline flex items-center gap-1">
                    <Icon name="paperclip" size={11} /> Attach document to this contact
                  </button>
                )}
                {docAttachOpen && (
                  <DocUploadInlineForm
                    onSubmit={(doc) => { setPendingDoc(doc); setDocAttachOpen(false); }}
                    onCancel={() => setDocAttachOpen(false)}
                    compact />
                )}
              </div>

              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] block mb-1">Next Action</label>
                  <input value={nextAction} onChange={e => setNextAction(e.target.value)}
                    placeholder="e.g. Follow-up call, Send referral…"
                    className="w-full font-ui text-sm border-2 hairline bg-[var(--surface)] px-3 py-2 focus:bg-[var(--elevated)] placeholder:text-[var(--placeholder)]" />
                </div>
                <div>
                  <label className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)] block mb-1">Days Until Due</label>
                  <input type="number" min="1" max="90" value={daysUntil} onChange={e => setDaysUntil(e.target.value)}
                    placeholder="e.g. 7"
                    className="w-full font-ui text-sm border-2 hairline bg-[var(--surface)] px-3 py-2 focus:bg-[var(--elevated)] placeholder:text-[var(--placeholder)] num" />
                </div>
              </div>
              <div className="flex items-center gap-3">
                <button onClick={handleLog} disabled={!notes.trim()}
                  className="font-ui text-xs uppercase tracking-wider bg-[var(--inverse)] text-[var(--on-inverse)] px-5 py-2.5 hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2">
                  <Icon name="check" size={13} /> Save Contact Log
                </button>
                {saved && <span className="font-ui text-xs text-[#4a6b52] flex items-center gap-1"><Icon name="check-circle" size={13} /> Logged & audit-recorded</span>}
                <span className="font-ui text-[10px] text-[var(--subtle)] ml-auto">{currentUser.name} · {new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span>
              </div>

              {/* ── Escalation — embedded in log form ── */}
              <div className="border-t hairline pt-3 mt-1">
                {memberEscalation ? (
                  <div className="flex items-start gap-2 border border-[var(--status-critical)] bg-[var(--elevated)] px-3 py-2 rounded">
                    <Icon name="alert-octagon" size={13} className="text-[var(--status-critical)] shrink-0 mt-0.5" />
                    <div className="flex-1 min-w-0">
                      <div className="font-ui text-[10px] uppercase tracking-wider text-[var(--status-critical)] font-bold">Active Escalation</div>
                      <p className="font-ui text-xs text-[var(--text)] mt-0.5">{memberEscalation.reason}</p>
                      <div className="font-ui text-[10px] text-[var(--muted)] mt-0.5">By {memberEscalation.by} at {memberEscalation.at}</div>
                    </div>
                  </div>
                ) : showEscalateForm ? (
                  <div className="space-y-2">
                    <label className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--status-critical)] block">Escalation Reason *</label>
                    <textarea value={escalateReason} onChange={e => setEscalateReason(e.target.value)} rows={2}
                      placeholder="Describe the reason for escalation (required)…"
                      className="w-full font-ui text-sm border-2 border-[var(--status-critical)] bg-[var(--surface)] p-3 placeholder:text-[var(--placeholder)]" autoFocus />
                    <div className="flex gap-2">
                      <button onClick={() => { if (escalateReason.trim() && onEscalate) { onEscalate(member.id, escalateReason.trim()); setShowEscalateForm(false); } }}
                        disabled={!escalateReason.trim()}
                        className="font-ui text-[10px] uppercase tracking-wider bg-[var(--status-critical)] text-white px-4 py-2 flex items-center gap-1.5 disabled:opacity-40 hover:opacity-90">
                        <Icon name="alert-octagon" size={11} /> Confirm Escalation
                      </button>
                      <button onClick={() => { setShowEscalateForm(false); setEscalateReason(''); }}
                        className="font-ui text-[10px] uppercase tracking-wider border hairline px-4 py-2 hover:border-[var(--text)]">
                        Cancel
                      </button>
                    </div>
                  </div>
                ) : onEscalate ? (
                  <button onClick={() => setShowEscalateForm(true)}
                    className="font-ui text-[10px] uppercase tracking-wider border hairline px-3 py-1.5 flex items-center gap-1.5 text-[var(--muted)] hover:border-[var(--status-critical)] hover:text-[var(--status-critical)] transition-colors">
                    <Icon name="alert-octagon" size={11} /> Escalate to Supervisor
                  </button>
                ) : null}
              </div>
            </div>
          </Accordion>
          </div>
          {/* Phase 2: Clinical / Risk */}
          <div className="grid md:grid-cols-2 gap-6 mb-6">
            <Accordion id={`clinical-${member.id}`} title="Clinical & Risk" icon="activity">
              <div className="space-y-2">
                {[
                  ['Care Level',       member.careLevel || '—'],
                  ['Risk Score',       member.riskScore != null ? String(member.riskScore.toFixed(2)) : (member.risk != null ? member.risk.toFixed(2) : '—')],
                  ['High Risk',        member.isHighRisk ? 'Yes' : 'No'],
                  ['Primary Dx',       member.primaryDiagnosis || '—'],
                  ['Dual Eligible',    member.dualEligible ? 'Yes' : 'No'],
                  ['Line of Business', member.line || '—'],
                  ['Health Plan',       member.healthPlanName || '—'],
                ].map(([k, v]) => (
                  <div key={k} className="flex gap-2">
                    <span className="font-ui text-[10px] uppercase tracking-wider text-[var(--muted)] w-24 shrink-0 pt-0.5">{k}</span>
                    <span className={`font-ui text-sm ${
                      k === 'High Risk' && v === 'Yes' ? 'text-[var(--status-warn)] font-semibold' :
                      k === 'Care Level' && v === 'COMPLEX' ? 'text-[var(--status-warn)] font-semibold' :
                      k === 'Care Level' && v === 'HIGH' ? 'text-[#b8923a] font-semibold' : ''
                    }`}>{v}</span>
                  </div>
                ))}
              </div>
            </Accordion>

            <Accordion id={`sdoh-${member.id}`} title="Social Determinants of Health" icon="home">
              <SdohEditor member={member} />
            </Accordion>
          </div>

          {/* Phase 2: Contact Preferences + Emergency Contact */}
          <div className="grid md:grid-cols-2 gap-6 mb-6">
            <Accordion id={`pref-${member.id}`} title="Contact Preferences" icon="settings">
              <div className="space-y-2">
                {[
                  ['Preferred Method',   member.preferredContactMethod || '—'],
                  ['Preferred Time',     member.preferredContactTime   || '—'],
                  ['Do Not Call',        member.doNotCall  ? 'YES — Do not call' : 'No restriction'],
                  ['Do Not Mail',        member.doNotMail  ? 'YES — Do not mail' : 'No restriction'],
                  ['Consent to Contact', member.consentToContact === false ? 'No — withdrawn' : 'Yes'],
                  ['Consent Date',       member.consentDate || '—'],
                ].map(([k, v]) => (
                  <div key={k} className="flex gap-2">
                    <span className="font-ui text-[10px] uppercase tracking-wider text-[var(--muted)] w-32 shrink-0 pt-0.5">{k}</span>
                    <span className={`font-ui text-sm ${
                      (k === 'Do Not Call' || k === 'Do Not Mail') && v.startsWith('YES') ? 'text-[var(--status-warn)] font-semibold' :
                      k === 'Consent to Contact' && v.startsWith('No') ? 'text-[var(--status-warn)] font-semibold' : ''
                    }`}>{v}</span>
                  </div>
                ))}
              </div>
            </Accordion>

            <Accordion id={`emergency-${member.id}`} title="Emergency Contact" icon="users">
              {member.emergencyContactName ? (
                <div className="space-y-2">
                  {[
                    ['Name',         member.emergencyContactName],
                    ['Relationship', member.emergencyContactRelationship || '—'],
                    ['Phone',        phiVisible ? (member.emergencyContactPhone || '—') : '···-···-····'],
                  ].map(([k, v]) => (
                    <div key={k} className="flex gap-2">
                      <span className="font-ui text-[10px] uppercase tracking-wider text-[var(--muted)] w-24 shrink-0 pt-0.5">{k}</span>
                      <span className="font-ui text-sm num">{v}</span>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="font-ui text-sm text-[var(--muted)] italic">No emergency contact on file.</div>
              )}
              {member.preferredPharmacyName && (
                <>
                  <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--muted)] mt-5 mb-2 flex items-center gap-2">
                    <Icon name="pill" size={12} /> Preferred Pharmacy
                  </div>
                  <div className="space-y-2">
                    {[
                      ['Name',  member.preferredPharmacyName  || '—'],
                      ['Phone', member.preferredPharmacyPhone
                          ? <PhoneWithNotes phone={member.preferredPharmacyPhone} entityKey={member.preferredPharmacyName} />
                          : '—'],
                      ...(phiVisible ? [['NPI', member.preferredPharmacyNPI || '—']] : []),
                    ].map(([k, v]) => (
                      <div key={k} className="flex gap-2">
                        <span className="font-ui text-[10px] uppercase tracking-wider text-[var(--muted)] w-24 shrink-0 pt-0.5">{k}</span>
                        <span className="font-ui text-sm num">{v}</span>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </Accordion>
          </div>

          {/* Phase 3: Gap context + call history — clean 2-col layout.       */}
          {/* Previously rendered as a 5-col split with Open Gaps alone on    */}
          {/* the left and 3 accordions stacked on the right — left dead      */}
          {/* space below Open Gaps when collapsed. Now: consistent 2-col     */}
          {/* throughout and Open Gaps uses the same Accordion chrome as the  */}
          {/* surrounding cards for a uniform look.                           */}
          <div className="grid md:grid-cols-2 gap-6 mb-6">
            <Accordion id={`open-gaps-${member.id}`} title="Open Gaps" icon="alert-circle"
              badge={<span className="font-ui text-[10px] text-[var(--muted)] uppercase tracking-wider ml-3 num">{memberGaps.length} open{memberGaps.length > 0 && ` · ${memberGaps.map(g => g.code).join(' · ')}`}</span>}>
              <div className="space-y-3">
                {memberGaps.map(g => (
                  <div key={g.code} className="border-2 hairline p-4 bg-[var(--surface)]">
                    <div className="flex items-start justify-between gap-4">
                      <div>
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-display text-lg num font-semibold">{g.code}</span>
                          <span className="font-ui text-xs text-[var(--muted)]">{g.name}</span>
                          <span className={`text-[10px] tracking-wider uppercase px-1.5 py-0.5 ${g.weight === 3 ? 'bg-[var(--inverse)] text-[var(--on-inverse)]' : 'border hairline'}`}>{g.weight}× weight</span>
                          {g.pharma && <span className="text-[10px] border border-[var(--accent)] text-[var(--accent)] px-1.5 py-0.5">Rx</span>}
                        </div>
                        <div className="font-ui text-xs text-[var(--muted)] mt-1">{g.category} · {g.line}</div>
                        {g.pharma && DRUG_NAMES[g.code] && (
                          <div className="flex flex-wrap gap-1 mt-2">
                            {DRUG_NAMES[g.code].map(drug => (
                              <span key={drug} className={`font-ui text-[10px] px-2 py-0.5 border hairline ${member.drugName === drug ? 'bg-[var(--accent)] text-[var(--on-accent)] border-[var(--accent)]' : 'bg-[var(--elevated)]'}`}>
                                {drug}{member.drugName === drug ? ' ✓' : ''}
                              </span>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
                {memberGaps.length === 0 && (
                  <div className="font-ui text-sm text-[var(--muted)] italic py-2 flex items-center gap-2">
                    <Icon name="check-circle-2" size={14} className="text-[var(--success)]" /> No open gaps for this member.
                  </div>
                )}
              </div>
            </Accordion>

            <Accordion id={`recent-${member.id}`} title="Recent Calls" icon="phone-incoming"
              badge={<span className="font-ui text-[10px] text-[var(--muted)] uppercase tracking-wider ml-3">{Math.min(memberLog.filter(e => e.outcome && e.outcome !== 'Status Updated' && e.outcome !== 'Reassigned').length, 5)} most recent</span>}>
              {(() => {
                const calls = memberLog
                  .filter(e => e.outcome && e.outcome !== 'Status Updated' && e.outcome !== 'Reassigned' && e.outcome !== 'PHI Revealed')
                  .slice(0, 5);
                if (calls.length === 0) return (
                  <div className="font-ui text-sm text-[var(--muted)] italic">No outreach attempts logged yet. Use Log Outreach Contact above to record the first.</div>
                );
                return (
                  <div className="space-y-2">
                    {calls.map(c => {
                      const outcomeColor = /Reached|Closed|Scheduled|Received/i.test(c.outcome) ? 'text-[var(--success)]'
                                        : /Voicemail|No Answer|Wrong/i.test(c.outcome) ? 'text-[var(--status-warn)]'
                                        : /Declined|Refused|Max Attempts/i.test(c.outcome) ? 'text-[var(--status-critical)]'
                                                                                          : 'text-[var(--text)]';
                      return (
                        <div key={c.id} className="border hairline bg-[var(--elevated)] px-3 py-2 rounded">
                          <div className="flex items-center justify-between gap-2 flex-wrap">
                            <span className={`font-ui text-xs font-semibold ${outcomeColor}`}>{c.outcome}</span>
                            <span className="font-ui text-[10px] text-[var(--muted)] num shrink-0">{c.displayTime}</span>
                          </div>
                          <div className="font-ui text-xs text-[var(--text)] mt-1 leading-snug line-clamp-2">{c.notes}</div>
                          <div className="flex items-center gap-3 mt-1 font-ui text-[10px] text-[var(--muted)]">
                            <span>By {c.who}</span>
