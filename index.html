      const isViewDirty = (() => {
        if (!activeView) return false;
        const orderEq = activeView.order.length === pharmColOrder.length &&
          activeView.order.every((id, i) => pharmColOrder[i] === id);
        const a = (activeView.hidden || []).slice().sort();
        const b = pharmColHidden.slice().sort();
        const hiddenEq = a.length === b.length && a.every((id, i) => b[i] === id);
        return !orderEq || !hiddenEq;
      })();

      const loadView = (id) => {
        const v = pharmaViews.find(x => x.id === id);
        if (!v) return;
        setPharmColOrder(v.order.slice());
        setPharmColHidden((v.hidden || []).slice());
        setActiveViewId(id);
        setViewMenuOpen(false);
      };
      const loadDefaultView = () => {
        setPharmColOrder(PHARMA_COL_DEFAULT.slice());
        setPharmColHidden([]);
        setActiveViewId(null);
        setViewMenuOpen(false);
      };
      const saveAsNewView = () => {
        const name = (prompt('Save current layout as a new view:\n(e.g. "Morning Triage", "Plan Analysis")', '') || '').trim();
        if (!name) return;
        if (pharmaViews.some(v => v.name.toLowerCase() === name.toLowerCase())) {
          alert(`A view named "${name}" already exists. Pick a different name.`);
          return;
        }
        const id = 'v_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
        setPharmaViews(prev => [...prev, { id, name, order: pharmColOrder.slice(), hidden: pharmColHidden.slice() }]);
        setActiveViewId(id);
        setViewMenuOpen(false);
      };
      const saveToActiveView = () => {
        if (!activeView) return;
        setPharmaViews(prev => prev.map(v => v.id === activeView.id
          ? { ...v, order: pharmColOrder.slice(), hidden: pharmColHidden.slice() }
          : v));
        setViewMenuOpen(false);
      };
      const revertActiveView = () => {
        if (!activeView) return;
        setPharmColOrder(activeView.order.slice());
        setPharmColHidden((activeView.hidden || []).slice());
        setViewMenuOpen(false);
      };
      const renameActiveView = () => {
        if (!activeView) return;
        const name = (prompt('Rename view:', activeView.name) || '').trim();
        if (!name || name === activeView.name) return;
        if (pharmaViews.some(v => v.id !== activeView.id && v.name.toLowerCase() === name.toLowerCase())) {
          alert(`A view named "${name}" already exists. Pick a different name.`);
          return;
        }
        setPharmaViews(prev => prev.map(v => v.id === activeView.id ? { ...v, name } : v));
        setViewMenuOpen(false);
      };
      const deleteActiveView = () => {
        if (!activeView) return;
        if (!confirm(`Delete the saved view "${activeView.name}"?\n\nThis only removes the saved layout — your current view will stay on screen.`)) return;
        setPharmaViews(prev => prev.filter(v => v.id !== activeView.id));
        setActiveViewId(null);
        setViewMenuOpen(false);
      };

      // ───────────────────────────────────────────────────────────────────
      // Jump-to-column. With 49 reorderable columns, hunting for one by
      // dragging the scrollbar is slow. This dropdown lists every visible
      // column with a live filter; clicking one (or pressing Enter on a
      // filtered list) smooth-scrolls the wrap so the target column lands
      // just to the right of the frozen first column.
      // ───────────────────────────────────────────────────────────────────
      const jumpToColumn = (id) => {
        const wrap = tableWrapRef.current;
        if (!wrap) return;
        const th = wrap.querySelector(`thead th[data-col-id="${id}"]`);
        if (!th) return;
        const table = wrap.querySelector('table.pharma-table');
        if (!table) return;
        const offsetInTable = th.getBoundingClientRect().left - table.getBoundingClientRect().left;
        const firstTh = wrap.querySelector('thead th:first-child');
        const frozenWidth = firstTh ? firstTh.getBoundingClientRect().width : 0;
        // If this column IS the frozen first one, scroll to 0; otherwise
        // line up just after the frozen edge with 8px breathing room.
        const target = th === firstTh ? 0 : Math.max(0, offsetInTable - frozenWidth - 8);
        if (typeof wrap.scrollTo === 'function') {
          wrap.scrollTo({ left: target, behavior: 'smooth' });
        } else {
          wrap.scrollLeft = target;
        }
      };

      // Close jump menu on outside click; focus the search input when opened
      useEffect(() => {
        if (!jumpMenuOpen) return;
        const onDocClick = (e) => {
          if (jumpMenuRef.current && !jumpMenuRef.current.contains(e.target)) {
            setJumpMenuOpen(false); setJumpFilter('');
          }
        };
        document.addEventListener('mousedown', onDocClick);
        const t = setTimeout(() => { jumpInputRef.current && jumpInputRef.current.focus(); }, 30);
        return () => { document.removeEventListener('mousedown', onDocClick); clearTimeout(t); };
      }, [jumpMenuOpen]);

      const jumpMatches = visiblePharmCols.filter(id =>
        PHARMA_COLS[id].label.toLowerCase().includes(jumpFilter.toLowerCase())
      );

      // ───────────────────────────────────────────────────────────────────
      // Sticky <thead> via outside-the-wrapper clone.
      // The .pharma-table-wrap has overflow-x: auto for horizontal scroll
      // of ~45 columns. Chrome coerces our `overflow-y: clip` → `hidden`,
      // turning the wrapper into a Y-axis scroll container — which kills
      // sticky positioning on the descendant <thead>. We can't keep both
      // the horizontal-scroll UX AND a true CSS sticky <thead>, so instead
      // we clone the <thead> into a sibling .pharma-sticky-thead that IS
      // sticky relative to the viewport, and sync its column widths +
      // horizontal scroll offset to the real (now hidden) <thead>.
      // ───────────────────────────────────────────────────────────────────
      const stickyTheadRef = useRef(null);
      const tableWrapRef = useRef(null);
      const stickyScrollbarRef = useRef(null);

      useEffect(() => {
        const stickyEl = stickyTheadRef.current;
        const wrapEl = tableWrapRef.current;
        if (!stickyEl || !wrapEl) return;

        const realTable = wrapEl.querySelector('table.pharma-table');
        const realThead = realTable && realTable.querySelector('thead');
        if (!realTable || !realThead) return;

        // Build the clone DOM (one <table> with a single cloned <thead>)
        stickyEl.innerHTML = '';
        const cloneTable = document.createElement('table');
        cloneTable.className = realTable.className;
        cloneTable.setAttribute('aria-hidden', 'true');
        const cloneThead = realThead.cloneNode(true);
        cloneTable.appendChild(cloneThead);
        stickyEl.appendChild(cloneTable);

        // First clone TH (the "Member" anchor) — pin to the left edge of
        // the sticky overlay via counter-translateX so it matches the
        // body's frozen first column when horizontally scrolled.
        // We must explicitly clear the inherited `top`/`left` from the
        // .pharma-table thead th[:first-child] rule, otherwise switching
        // from `position: sticky` (where those offsets are sticky bounds)
        // to `position: relative` (where they're applied as static offsets)
        // pushes the cell 55px down + 0px right of its natural slot.
        const cloneFirstTh = cloneThead.querySelector('th:first-child');
        if (cloneFirstTh) {
          cloneFirstTh.style.position = 'relative';
          cloneFirstTh.style.top = '0';
          cloneFirstTh.style.left = '0';
          cloneFirstTh.style.zIndex = '2';
          cloneFirstTh.style.background = 'var(--elevated)';
          cloneFirstTh.style.willChange = 'transform';
        }
        cloneTable.style.willChange = 'transform';

        // ── Forward resize gestures from the *cloned* resizer handles ──
        // The visible thead is the clone (the real one is visibility:hidden
        // so it can't receive pointer events). The clone is created via
        // cloneNode(true) which preserves the DOM structure but strips React
        // event handlers, so our <Resizer onMouseDown={…}/> spans render but
        // are inert. We bridge that with a delegated native listener: any
        // mousedown on a .col-resizer inside the clone gets routed to
        // startPharmaResize via a ref (the ref keeps this effect from having
        // to depend on the hook's identity, which would force re-clones).
        cloneTable.addEventListener('mousedown', (ev) => {
          const handle = ev.target && ev.target.closest && ev.target.closest('.col-resizer');
          if (!handle) return;
          const th = handle.closest('th[data-col-id]');
          if (!th) return;
          const colId = th.getAttribute('data-col-id');
          const fn = startPharmaResizeRef.current;
          if (!fn) return;
          // Duck-type a synthetic event whose currentTarget IS the handle
          // (startResize toggles a `.resizing` class on currentTarget — we
          // want the visible clone handle highlighted, not the table itself).
          fn(colId, {
            preventDefault:  () => ev.preventDefault(),
            stopPropagation: () => ev.stopPropagation(),
            currentTarget:   handle,
            clientX:         ev.clientX,
          });
        });

        const syncWidths = () => {
          const realThs = realThead.querySelectorAll('th');
          const cloneThs = cloneThead.querySelectorAll('th');
          let total = 0;
          realThs.forEach((th, i) => {
            const ct = cloneThs[i];
            if (!ct) return;
            const w = th.getBoundingClientRect().width;
            ct.style.boxSizing = 'border-box';
            ct.style.minWidth = w + 'px';
            ct.style.maxWidth = w + 'px';
            ct.style.width = w + 'px';
            total += w;
          });
          if (total > 0) cloneTable.style.width = total + 'px';

          // Size the sticky overlay to the real thead's height, and pull
          // the wrapper up by that amount so the (visibility:hidden) real
          // thead overlaps the visible clone — no double-height gap.
          const newH = Math.round(realThead.getBoundingClientRect().height);
          if (newH > 0) {
            stickyEl.style.height = newH + 'px';
            wrapEl.style.marginTop = '-' + newH + 'px';
          }
        };

        const syncScroll = () => {
          const sl = wrapEl.scrollLeft;
          cloneTable.style.transform = 'translate3d(' + (-sl) + 'px, 0, 0)';
          // Counter-translate the first TH so it remains pinned at left:0
          // of the overlay (matches the body's sticky-left first column).
          if (cloneFirstTh) {
            cloneFirstTh.style.transform = 'translate3d(' + sl + 'px, 0, 0)';
          }
        };

        // Initial sync after layout settles
        const raf1 = requestAnimationFrame(() => {
          syncWidths();
          syncScroll();
          // Second pass once fonts/layout fully settled
          const raf2 = requestAnimationFrame(() => { syncWidths(); syncScroll(); });
        });

        // Hide the real thead (kept in DOM so the table's column auto-layout
        // still gets every column's natural width)
        realThead.style.visibility = 'hidden';

        // Width observers on every real TH (catches content/zoom changes)
        let ro = null;
        if (typeof ResizeObserver !== 'undefined') {
          ro = new ResizeObserver(syncWidths);
          realThead.querySelectorAll('th').forEach(th => ro.observe(th));
        }

        wrapEl.addEventListener('scroll', syncScroll, { passive: true });
        window.addEventListener('resize', syncWidths);
        if (document.fonts && document.fonts.ready && typeof document.fonts.ready.then === 'function') {
          document.fonts.ready.then(syncWidths).catch(() => {});
        }

        return () => {
          cancelAnimationFrame(raf1);
          if (ro) ro.disconnect();
          wrapEl.removeEventListener('scroll', syncScroll);
          window.removeEventListener('resize', syncWidths);
          if (realThead) realThead.style.visibility = '';
          if (wrapEl) wrapEl.style.marginTop = '';
          if (stickyEl) {
            stickyEl.style.height = '';
            stickyEl.innerHTML = '';
          }
        };
      }, [visiblePharmCols]);

      // ───────────────────────────────────────────────────────────────────
      // Sticky-bottom horizontal scrollbar proxy. Mirrors the wrap's
      // horizontal scroll so the scrollbar is always reachable at the
      // viewport bottom even when the table extends below the fold. Hides
      // itself when the table fits in the viewport (no overflow).
      // ───────────────────────────────────────────────────────────────────
      useEffect(() => {
        const wrap = tableWrapRef.current;
        const proxy = stickyScrollbarRef.current;
        if (!wrap || !proxy) return;
        const inner = proxy.firstElementChild;
        if (!inner) return;

        let syncing = false;
        const update = () => {
          const needs = wrap.scrollWidth > wrap.clientWidth + 1;
          proxy.style.display = needs ? 'block' : 'none';
          if (needs) inner.style.width = wrap.scrollWidth + 'px';
        };
        const onWrapScroll = () => {
          if (syncing) return;
          syncing = true;
          proxy.scrollLeft = wrap.scrollLeft;
          requestAnimationFrame(() => { syncing = false; });
        };
        const onProxyScroll = () => {
          if (syncing) return;
          syncing = true;
          wrap.scrollLeft = proxy.scrollLeft;
          requestAnimationFrame(() => { syncing = false; });
        };

        // Initial sync — run twice across rAFs so it catches layout settle
        const raf1 = requestAnimationFrame(() => {
          update();
          requestAnimationFrame(update);
        });
        wrap.addEventListener('scroll', onWrapScroll, { passive: true });
        proxy.addEventListener('scroll', onProxyScroll, { passive: true });
        window.addEventListener('resize', update);

        let ro = null;
        if (typeof ResizeObserver !== 'undefined') {
          ro = new ResizeObserver(update);
          ro.observe(wrap);
          const table = wrap.querySelector('table.pharma-table');
          if (table) ro.observe(table);
        }

        return () => {
          cancelAnimationFrame(raf1);
          wrap.removeEventListener('scroll', onWrapScroll);
          proxy.removeEventListener('scroll', onProxyScroll);
          window.removeEventListener('resize', update);
          if (ro) ro.disconnect();
        };
      }, [visiblePharmCols]);

      // ── Pharmacy address-level dropdown options ───────────────────────
      // Builds the same chain+branch list the Worklist already exposes, so
      // a CVS on Crenshaw can be filtered separately from one in Hawthorne.
      // Sourced from the Rx-tracked subset only, since this view only shows
      // pharmacy members. Sorted alphabetically by chain, then by address.
      const pharmacyOptions = React.useMemo(() => {
        const seen = new Map();
        pharmaMembers.forEach(m => {
          if (!m.pharmName) return;
          const key = `${m.pharmName}|${m.pharmAddr || ''}`;
          if (!seen.has(key)) {
            seen.set(key, {
              value: key, name: m.pharmName,
              addr: m.pharmAddr || '', city: m.pharmCity || '', zip: m.pharmZip || '',
              count: 0,
            });
          }
          seen.get(key).count++;
        });
        const list = Array.from(seen.values()).sort((a, b) => {
          const n = a.name.localeCompare(b.name);
          return n !== 0 ? n : a.addr.localeCompare(b.addr);
        });
        list.forEach(o => {
          const where = o.addr ? `${o.addr}, ${o.city}` : '';
          o.label = where ? `${o.name} — ${where} (${o.count})` : `${o.name} (${o.count})`;
          o.title = where ? `${o.name} · ${o.addr}, ${o.city} ${o.zip}` : o.name;
        });
        return [{ value: 'All', label: 'All pharmacies' }, ...list];
      }, [pharmaMembers]);

      const filtered = pharmaMembers.filter(m => {
        if (filters.status !== 'All' && m.compStatus !== filters.status) return false;
        if (filters.measure !== 'All' && m.pharmGap !== filters.measure) return false;
        // Pharmacy address-level filter — value format is "chainName|address"
        // matching the Worklist's pharmacy filter shape, so a CVS on Crenshaw
        // is a different filter target than a CVS in Hawthorne. Empty string
        // address (chain only with no location data) round-trips cleanly.
        if (filters.pharmacy && filters.pharmacy !== 'All') {
          const sep = filters.pharmacy.indexOf('|');
          const fName = sep === -1 ? filters.pharmacy : filters.pharmacy.slice(0, sep);
          const fAddr = sep === -1 ? null               : filters.pharmacy.slice(sep + 1);
          if (m.pharmName !== fName) return false;
          if (fAddr !== null && (m.pharmAddr || '') !== fAddr) return false;
        }
        // column filters
        if (pharmCols.member) {
          const hay = phiVisible ? `${m.first} ${m.last} ${m.id} ${m.mbi}` : `${m.initials} ${m.id} ${m.mbi}`;
          if (!hay.toLowerCase().includes(pharmCols.member.toLowerCase())) return false;
        }
        if (pharmCols.language && !(m.language||'').toLowerCase().includes(pharmCols.language.toLowerCase())) return false;
        if (pharmCols.phone && !((m.phone||'')+ ' '+(m.mobile||'')).toLowerCase().includes(pharmCols.phone.toLowerCase())) return false;
        if (pharmCols.measure && !(m.pharmGap||'').toLowerCase().includes(pharmCols.measure.toLowerCase())) return false;
        if (pharmCols.status && !(m.compStatus||'').toLowerCase().includes(pharmCols.status.toLowerCase())) return false;
        if (pharmCols.pharmacy && !(m.pharmName||'').toLowerCase().includes(pharmCols.pharmacy.toLowerCase())) return false;
        if (pharmCols.prescriber && !((m.prescriberFirst||'')+' '+(m.prescriberLast||'')).toLowerCase().includes(pharmCols.prescriber.toLowerCase())) return false;
        if (pharmCols.pdc && !String((m.pdc||0).toFixed(2)).startsWith(pharmCols.pdc)) return false;
        if (pharmCols.lisCat && !(m.lisCat||'').toLowerCase().includes(pharmCols.lisCat.toLowerCase())) return false;
        if (pharmCols.tier && !(m.formularyTier != null ? `tier ${m.formularyTier}` : '').toLowerCase().includes(pharmCols.tier.toLowerCase())) return false;
        if (pharmCols.planCode && !(m.healthPlanName||'').toLowerCase().includes(pharmCols.planCode.toLowerCase())) return false;
        if (pharmCols.mso && !(m.msoName||'').toLowerCase().includes(pharmCols.mso.toLowerCase())) return false;
        if (pharmCols.ppg && !((m.parentPPGName||'')+' '+(m.parentPPGId||'')).toLowerCase().includes(pharmCols.ppg.toLowerCase())) return false;
        if (pharmCols.dual === 'Yes' && !m.dualEligible) return false;
        if (pharmCols.dual === 'No'  &&  m.dualEligible) return false;
        if (pharmCols.priorYr && !(m.priorYearAdh||'').toLowerCase().includes(pharmCols.priorYr.toLowerCase())) return false;
        if (pharmCols.daysLeft) {
          const dl = parseInt(pharmCols.daysLeft);
          if (!isNaN(dl) && (m.daysLeft == null || m.daysLeft > dl)) return false;
        }
        return true;
      });
      const nonCompliant = pharmaMembers.filter(m => m.compStatus === 'Non-Compliant').length;
      const atRisk = pharmaMembers.filter(m => m.compStatus === 'At Risk').length;
      const compliant = pharmaMembers.filter(m => m.compStatus === 'Compliant').length;
      const avgPDC = pharmaMembers.length ? (pharmaMembers.reduce((a,m) => a + (m.pdc||0), 0) / pharmaMembers.length) : 0;

      return (
        <div>
          <div className="mb-6">
            <div className="font-ui text-[11px] tracking-[0.2em] uppercase text-[var(--accent)] mb-1">Pharmacy</div>
            <h2 className="font-display text-3xl font-medium">Medication adherence tracking</h2>
            <p className="font-ui text-sm text-[var(--muted)] mt-1">PDC-based compliance for Part D adherence STAR measures. Three adherence measures are triple-weighted in MY2026.</p>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 border-2 hairline mb-6 bg-[var(--surface)]">
            {[
              { label: 'Non-Compliant (PDC <0.80)', value: nonCompliant, rowClass: 'pharma-stat-nc', labelClass: 'pharma-stat-label-nc', valueClass: 'pharma-stat-value-nc' },
              { label: 'At Risk (PDC 0.70–0.79)', value: atRisk, rowClass: 'pharma-stat-ar', labelClass: 'pharma-stat-label-ar', valueClass: 'pharma-stat-value-ar' },
              { label: 'Compliant (PDC ≥0.80)', value: compliant, rowClass: 'pharma-stat-cmp', labelClass: 'pharma-stat-label-cmp', valueClass: 'pharma-stat-value-cmp' },
              { label: 'Avg PDC (all pharma)', value: (avgPDC*100).toFixed(1)+'%', rowClass: 'pharma-stat-avg', labelClass: 'pharma-stat-label-avg', valueClass: 'pharma-stat-value-avg' },
            ].map((s, i) => (
              <div key={i} className={`p-5 ${s.rowClass} ${i < 3 ? 'border-r hairline' : ''}`}>
                <div className={`font-ui text-[10px] tracking-[0.15em] uppercase mb-2 ${s.labelClass}`}>{s.label}</div>
                <div className={`font-display text-4xl num font-medium ${s.valueClass}`}>{s.value}</div>
              </div>
            ))}
          </div>

          <div className="border hairline bg-[var(--surface)] p-4 mb-6 space-y-3">
            <div className="flex items-center gap-4 flex-wrap">
              <div className="flex items-center gap-2">
                <span className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)]">Status</span>
                <select value={filters.status} onChange={e => setFilters({ ...filters, status: e.target.value })}
                  className="font-ui text-sm border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)]">
                  {['All','Non-Compliant','At Risk','Compliant'].map(v => <option key={v}>{v}</option>)}
                </select>
              </div>
              <div className="flex items-center gap-2">
                <span className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)]">Measure</span>
                <select value={filters.measure} onChange={e => setFilters({ ...filters, measure: e.target.value })}
                  className="font-ui text-sm border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)]">
                  {['All','D-DIAB','D-HTN','D-CHOL','SPC','PHARM'].map(v => <option key={v}>{v}</option>)}
                </select>
              </div>
              {/* Pharmacy address-level dropdown — same shape as Worklist.   */}
              {/* Lets a CM pinpoint a single branch (CVS on Crenshaw vs CVS  */}
              {/* in Hawthorne) instead of treating "CVS" as one bucket.      */}
              <div className="flex items-center gap-2">
                <span className="font-ui text-[10px] tracking-[0.2em] uppercase text-[var(--muted)]">Pharmacy</span>
                <select value={filters.pharmacy || 'All'} onChange={e => setFilters({ ...filters, pharmacy: e.target.value })}
                  className="font-ui text-sm border hairline bg-[var(--surface)] px-2 py-1.5 focus:bg-[var(--elevated)] max-w-[24rem] truncate"
                  title={pharmacyOptions.find(o => o.value === (filters.pharmacy || 'All'))?.title || 'All pharmacies'}>
                  {pharmacyOptions.map(o => <option key={o.value} value={o.value} title={o.title}>{o.label}</option>)}
                </select>
                {filters.pharmacy && filters.pharmacy !== 'All' && (
                  <button onClick={() => setFilters({ ...filters, pharmacy: 'All' })}
                    title="Clear pharmacy filter"
                    className="text-[var(--status-critical)] hover:underline font-ui text-xs uppercase tracking-wider">
                    <Icon name="x" size={12} />
                  </button>
                )}
              </div>
              {hasPCols && (
                <button onClick={() => { clearPCols(); setPharmPage(0); }}
                  className="font-ui text-xs uppercase tracking-wider flex items-center gap-1 text-[var(--status-critical)] hover:underline">
                  <Icon name="x" size={12} /> Clear column filters
                </button>
              )}
              <button onClick={() => setColPanelOpen(true)}
                className="font-ui text-xs uppercase tracking-wider flex items-center gap-1 text-[var(--muted)] hover:text-[var(--text)] hover:underline">
                <Icon name="settings" size={12} /> Columns
                {pharmColHidden.length > 0 && (
                  <span className="bg-[var(--inverse)] text-[var(--on-inverse)] text-[9px] num px-1 py-px ml-0.5 normal-case tracking-normal">{pharmColHidden.length} hidden</span>
                )}
              </button>
              <div className="relative" ref={viewMenuRef}>
                <button onClick={() => setViewMenuOpen(o => !o)}
                  className="font-ui text-xs uppercase tracking-wider flex items-center gap-1 text-[var(--muted)] hover:text-[var(--text)] px-2 py-1 border hairline bg-[var(--surface)] hover:bg-[var(--elevated)]">
                  <Icon name="save" size={12} />
                  <span>View:</span>
                  <span className="text-[var(--text)] normal-case tracking-normal font-medium">{activeView ? activeView.name : 'Default'}</span>
                  {isViewDirty && <span className="text-[var(--status-warn)] font-bold ml-0.5" title="Unsaved changes to this view">●</span>}
                  <Icon name="chevron-down" size={10} className="ml-0.5" />
                </button>
                {viewMenuOpen && (
                  <div className="absolute top-full left-0 mt-1 z-[200] bg-[var(--surface)] border-2 hairline w-72 shadow-xl">
                    <div className="px-3 py-2 border-b hairline font-ui text-[9px] tracking-[0.15em] uppercase text-[var(--muted)]">Switch view</div>
                    <div className="max-h-60 overflow-y-auto">
                      <button onClick={loadDefaultView}
                        className={`w-full text-left px-3 py-1.5 font-ui text-sm hover:bg-[var(--elevated)] flex items-center gap-2 ${!activeViewId ? 'bg-[var(--elevated)]' : ''}`}>
                        <span className="w-3 text-[var(--accent)]">{!activeViewId ? '●' : ''}</span>
                        <span className="flex-1">Default</span>
                        <span className="font-ui text-[9px] tracking-wider uppercase text-[var(--placeholder)]">built-in</span>
                      </button>
                      {pharmaViews.map(v => (

          <div className="pharma-table-section">

              <button
                onClick={() => setPharmPage(p => Math.max(0, p - 1))}

                className="flex items-center gap-1 px-3 py-1.5 border hairline bg-[var(--surface)] disabled:opacity-30 hover:bg-[var(--elevated)]">
                <Icon name="chevron-left" size={12} /> Prev
              </button>
              <span>
                Page {pharmPage + 1} of {Math.ceil(filtered.length / PHARMA_PAGE_SIZE)} &nbsp;·&nbsp; Rows {pharmPage * PHARMA_PAGE_SIZE + 1}–{Math.min((pharmPage + 1) * PHARMA_PAGE_SIZE, filtered.length)} of {filtered.length}
              </span>
              <button
                onClick={() => setPharmPage(p => Math.min(Math.ceil(filtered.length / PHARMA_PAGE_SIZE) - 1, p + 1))}
                disabled={pharmPage >= Math.ceil(filtered.length / PHARMA_PAGE_SIZE) - 1}
                className="flex items-center gap-1 px-3 py-1.5 border hairline bg-[var(--surface)] disabled:opacity-30 hover:bg-[var(--elevated)]">
                Next <Icon name="chevron-right" size={12} />
              </button>

          )}

          <div className="mt-4 border hairline p-4 bg-[var(--elevated)] font-ui text-xs text-[var(--muted)]">

            Part D adherence measures (D-DIAB, D-HTN, D-CHOL) are temporarily weighted 1× per CMS final rule but expected to return to 3× in MY2027. PDC threshold ≥0.80 required for compliance per NCQA specification.
          </div>

          {colPanelOpen && (

              onClick={() => { setColPanelOpen(false); setDragColId(null); setDropOnId(null); }}>
              <div className="bg-[var(--surface)] border-2 hairline w-[480px] max-w-full max-h-[80vh] flex flex-col"
                onClick={e => e.stopPropagation()}>
                <div className="p-4 border-b hairline flex items-start justify-between gap-3">
                  <div>
                    <div className="font-display text-lg font-medium">Customize Columns</div>
                    <div className="font-ui text-xs text-[var(--muted)] mt-0.5">Drag or use ↑↓ to reorder · uncheck to hide · saved to your account.</div>
                    <div className="font-ui text-[11px] text-[var(--muted)] mt-2 num">
                      <span className="text-[var(--text)] font-semibold">{visiblePharmCols.length}</span> shown
                      {pharmColHidden.length > 0 && <> · <span className="text-[var(--text)] font-semibold">{pharmColHidden.length}</span> hidden</>}
                      <span className="text-[var(--placeholder)]"> · {pharmColOrder.length} total</span>
                    </div>
                  </div>
                  <button onClick={() => { setColPanelOpen(false); setDragColId(null); setDropOnId(null); }}
                    className="text-[var(--muted)] hover:text-[var(--text)] p-1">
                    <Icon name="x" size={16} />
                  </button>
                </div>
                <div className="flex-1 overflow-y-auto">
                  {pharmColOrder.map((id, idx) => {
                    const col = PHARMA_COLS[id];
                    const isHidden = pharmColHidden.includes(id);
                    const isLastVisible = !isHidden && visiblePharmCols.length === 1;
                    const isDrag = dragColId === id;
                    const isDropTarget = dropOnId === id && dragColId && dragColId !== id;
                    return (
                      <div key={id}
                        draggable
                        onDragStart={e => { e.dataTransfer.effectAllowed = 'move'; setDragColId(id); }}
                        onDragOver={e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; if (dragColId && dragColId !== id) setDropOnId(id); }}
                        onDragLeave={() => { if (dropOnId === id) setDropOnId(null); }}
                        onDrop={e => { e.preventDefault(); dropColOnTarget(id); }}
                        onDragEnd={() => { setDragColId(null); setDropOnId(null); }}
                        className={`flex items-center gap-2 px-3 py-2 border-b hairline cursor-grab active:cursor-grabbing select-none ${isDrag ? 'opacity-40' : ''} ${isDropTarget ? 'bg-[var(--accent)] text-[var(--on-accent)]' : 'hover:bg-[var(--elevated)]'}`}>
                        <input type="checkbox" checked={!isHidden} disabled={isLastVisible}
                          onClick={e => e.stopPropagation()}
                          onChange={() => toggleColHidden(id)}

                        <span className={`font-ui text-[10px] num w-6 text-right ${isDropTarget ? 'opacity-70' : 'text-[var(--muted)]'}`}>{idx + 1}</span>

                          <Icon name="chevron-up" size={14} />
                        </button>
                        <button onClick={e => { e.stopPropagation(); moveCol(id, 1); }} disabled={idx === pharmColOrder.length - 1}
                          className="p-1 disabled:opacity-20 hover:bg-[var(--surface)]" title="Move down">
                          <Icon name="chevron-down" size={14} />
                        </button>
                      </div>

                  })}
